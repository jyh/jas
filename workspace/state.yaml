state:
  active_tool:
    type: enum
    values: [selection, partial_selection, interior_selection,
             pen, add_anchor, delete_anchor, anchor_point,
             pencil, path_eraser, smooth,
             type, type_on_path,
             line, rect, rounded_rect, polygon, star, lasso]
    default: selection
    description: "Currently selected drawing tool"

  fill_color:
    type: color
    default: "#ffffff"
    nullable: true
    description: "Active fill color (null = no fill)"

  stroke_color:
    type: color
    default: "#000000"
    nullable: true
    description: "Active stroke color (null = no stroke)"

  stroke_width:
    type: number
    default: 1.0
    description: "Active stroke width in points"

  stroke_cap:
    type: enum
    values: [butt, round, square]
    default: butt
    description: "Active stroke cap style"

  stroke_join:
    type: enum
    values: [miter, round, bevel]
    default: miter
    description: "Active stroke join style"

  stroke_miter_limit:
    type: number
    default: 10
    description: "Active stroke miter limit"

  stroke_align:
    type: enum
    values: [center, inside, outside]
    default: center
    description: "Active stroke alignment relative to the path"

  stroke_dashed:
    type: bool
    default: false
    description: "Active stroke uses dashed pattern"

  stroke_dash_1:
    type: number
    default: 12
    description: "Active stroke dash length for pair 1"

  stroke_gap_1:
    type: number
    default: 12
    description: "Active stroke gap length for pair 1"

  stroke_dash_2:
    type: number
    default: null
    nullable: true
    description: "Active stroke dash length for pair 2 (null = unused)"

  stroke_gap_2:
    type: number
    default: null
    nullable: true
    description: "Active stroke gap length for pair 2 (null = unused)"

  stroke_dash_3:
    type: number
    default: null
    nullable: true
    description: "Active stroke dash length for pair 3 (null = unused)"

  stroke_gap_3:
    type: number
    default: null
    nullable: true
    description: "Active stroke gap length for pair 3 (null = unused)"

  stroke_start_arrowhead:
    type: enum
    values: [none, simple_arrow, open_arrow, closed_arrow, stealth_arrow,
             barbed_arrow, half_arrow_upper, half_arrow_lower,
             circle, open_circle, square, open_square,
             diamond, open_diamond, slash]
    default: none
    description: "Active stroke start arrowhead shape"

  stroke_end_arrowhead:
    type: enum
    values: [none, simple_arrow, open_arrow, closed_arrow, stealth_arrow,
             barbed_arrow, half_arrow_upper, half_arrow_lower,
             circle, open_circle, square, open_square,
             diamond, open_diamond, slash]
    default: none
    description: "Active stroke end arrowhead shape"

  stroke_start_arrowhead_scale:
    type: number
    default: 100
    description: "Active stroke start arrowhead scale (%)"

  stroke_end_arrowhead_scale:
    type: number
    default: 100
    description: "Active stroke end arrowhead scale (%)"

  stroke_link_arrowhead_scale:
    type: bool
    default: false
    description: "Active stroke arrowhead scales are linked"

  stroke_arrow_align:
    type: enum
    values: [tip_at_end, center_at_end]
    default: tip_at_end
    description: "Active stroke arrow alignment mode"

  stroke_profile:
    type: enum
    values: [uniform, taper_both, taper_start, taper_end, bulge, pinch]
    default: uniform
    description: "Active stroke variable-width profile"

  stroke_profile_flipped:
    type: bool
    default: false
    description: "Active stroke profile is flipped"

  stroke_brush:
    type: string
    default: null
    nullable: true
    description: >
      Active stroke brush, encoded as "<library_slug>/<brush_slug>".
      Null when no brush is applied; non-null causes the brush
      renderer to take over from the native stroke pipeline. See
      transcripts/BRUSHES.md §Stroke styling interaction.

  stroke_brush_overrides:
    type: string
    default: null
    nullable: true
    description: >
      Per-instance brush parameter overrides as compact JSON.
      Polymorphic by brush type; partial dict layered over the
      master library brush at render time. Edited via the
      Brush Options dialog in instance_edit mode.

  # ── Paintbrush tool options ───────────────────────────────────
  # Per-document preferences for the Paintbrush tool. Edited via
  # the Paintbrush Tool Options dialog (double-click the tool
  # icon). See transcripts/PAINTBRUSH_TOOL.md §Tool options.

  paintbrush_fidelity:
    type: number
    default: 3
    description: >
      5-stop slider position (1-5) for curve-fit tolerance. Maps
      to fit_error as [0.5, 2.5, 5.0, 7.5, 10.0] pt. Lower tick =
      more faithful to raw drag; higher tick = smoother output.
      See PAINTBRUSH_TOOL.md §Fidelity → fit_error mapping.

  paintbrush_fill_new_strokes:
    type: bool
    default: false
    description: >
      When true, new Paintbrush commits set fill=state.fill_color
      on the Path element. When false, fill=none. Does not apply
      to edit-gesture commits (preservation rules).

  paintbrush_keep_selected:
    type: bool
    default: true
    description: >
      When true, the path committed by a Paintbrush drag becomes
      the canvas selection after commit.

  paintbrush_edit_selected_paths:
    type: bool
    default: true
    description: >
      When true, Option/Alt-drag within paintbrush_edit_within px
      of a selected Path rewrites the nearest sub-segment of that
      path instead of starting a new stroke. See
      PAINTBRUSH_TOOL.md §Edit gesture.

  paintbrush_edit_within:
    type: number
    default: 12
    description: >
      Proximity threshold in px for the Paintbrush edit gesture.
      Press and release distances are both bounded by this value.

  # ── Align panel ───────────────────────────────────────────────
  # Mirror state for the Align panel's four persistent fields.
  # See transcripts/ALIGN.md §Panel state.

  align_to:
    type: enum
    values: [selection, artboard, key_object]
    default: selection
    description: >
      Align-To target mode. 'selection' uses the current selection
      bounding box; 'artboard' uses the active artboard rectangle;
      'key_object' uses a designated element from the selection as
      the fixed reference.

  align_key_object_path:
    type: path
    default: null
    nullable: true
    description: >
      Path of the designated key object while align_to == 'key_object'.
      Null when no key has been designated or while align_to is not
      in key_object mode.

  align_distribute_spacing:
    type: number
    default: 0
    description: >
      Explicit gap in points applied by Distribute Spacing operations
      when align_to == 'key_object' and a key has been designated.
      Otherwise the two spacing buttons average existing gaps.

  align_use_preview_bounds:
    type: bool
    default: false
    description: >
      When true, Align / Distribute / Distribute Spacing operations
      consult each element's preview bounds (stroke-inclusive);
      otherwise they consult geometric bounds.

  # ── Boolean panel ─────────────────────────────────────────────
  # Mirror state for the Boolean panel and its Options dialog. See
  # transcripts/BOOLEAN.md §Repeat state and §Boolean Options dialog.

  last_boolean_op:
    type: enum
    values: [
      null,
      union, subtract_front, intersection, exclude,
      divide, trim, merge, crop, subtract_back,
      union_compound, subtract_front_compound,
      intersection_compound, exclude_compound,
    ]
    default: null
    nullable: true
    description: >
      Most-recently-applied boolean operation. Populated by the
      destructive and compound-creating actions; consumed by
      "Repeat Boolean Operation". Make / Release / Expand Compound
      Shape do not write this field.

  boolean_precision:
    type: number
    default: 0.0283
    description: >
      Geometric tolerance in points for Bezier flattening, Bezier
      refit, and redundant-point removal. Edited via the Boolean
      Options dialog. Default 0.0283 pt = 0.01 mm.

  boolean_remove_redundant_points:
    type: bool
    default: false
    description: >
      When true, collinear points in boolean-op output are collapsed
      within Precision after each operation. Edited via the Boolean
      Options dialog.

  boolean_divide_remove_unpainted:
    type: bool
    default: false
    description: >
      When true, DIVIDE fragments with no fill and no stroke are
      discarded rather than kept as invisible paths. Edited via the
      Boolean Options dialog.

  # ── Brushes panel ─────────────────────────────────────────────
  # Mirror state for the Brushes panel. See
  # transcripts/BRUSHES.md §Panel state.

  brushes_selected_library:
    type: string
    default: "default_brushes"
    description: >
      Library slug owning the current panel selection. Changing
      libraries clears brushes_selected_brushes.

  brushes_selected_brushes:
    type: list
    item_type: string
    default: []
    description: >
      List of brush slugs selected within brushes_selected_library.
      Slug-keyed (not index-keyed) so library reordering or
      duplication does not scramble the selection.

  brushes_open_libraries:
    type: list
    item_type: object
    default: [{ id: "default_brushes", collapsed: false }]
    description: >
      Libraries currently open as disclosure sections in the panel
      body, each with its collapsed state. Initialised at startup
      from preferences.brushes.persistent_libraries; falls back to
      [{ id: default_brushes, collapsed: false }] when the
      preference list is empty.

  brushes_view_mode:
    type: enum
    values: [thumbnail, list]
    default: thumbnail
    description: "Brushes panel tile rendering mode."

  brushes_thumbnail_size:
    type: enum
    values: [small, medium, large]
    default: small
    description: >
      Brushes panel thumbnail tile size. Small=48x16, Medium=72x24,
      Large=96x32. Disabled (radio dim) when view_mode == list.

  brushes_category_filter:
    type: list
    item_type: string
    default: [calligraphic, scatter, art, pattern, bristle]
    description: >
      Brush types currently visible in the panel body. Each toggled
      independently from the panel menu's "Show X Brushes" checkbox
      group. Empty list renders the body with a "No brushes match
      current filter" hint.

  fill_on_top:
    type: bool
    default: true
    description: "Whether the fill swatch renders in front of the stroke swatch"

  toolbar_visible:
    type: bool
    default: true
    description: "Whether the toolbar pane is visible"

  canvas_visible:
    type: bool
    default: true
    description: "Whether the canvas pane is visible"

  dock_visible:
    type: bool
    default: true
    description: "Whether the dock panel pane is visible"

  canvas_maximized:
    type: bool
    default: false
    description: "Whether the canvas fills the viewport"

  dock_collapsed:
    type: bool
    default: false
    description: "Whether the dock is in collapsed (chevron-only) state"

  active_tab:
    type: number
    default: -1
    description: "Index of the active document tab (-1 = none)"

  tab_count:
    type: number
    default: 0
    description: "Number of open document tabs"

  # Panel visibility and group state are now managed by the dock_view
  # element's groups list. The following variables were removed:
  # layers_visible, color_visible, stroke_visible, properties_visible,
  # dock_group0_active, dock_group0_collapsed, dock_group1_active,
  # dock_group1_collapsed
  # These are now intrinsic to the dock model (panel_group.active,
  # panel_group.collapsed, panel presence in any group).

  # ── Internal (managed by the renderer, not user-facing) ──
  # These fields are imperative-only: the engine maintains them
  # during drag/resize interactions. `writable: false` prevents
  # YAML `set:` effects from targeting them; writes evaluate to
  # unit and log a warning. Reads via expressions are unaffected.

  _drag_pane:
    type: string
    default: null
    nullable: true
    writable: false
    description: "Internal: element id of the pane currently being dragged"

  _drag_offset_x:
    type: number
    default: 0
    writable: false
    description: "Internal: cursor X offset from pane origin at drag start"

  _drag_offset_y:
    type: number
    default: 0
    writable: false
    description: "Internal: cursor Y offset from pane origin at drag start"

  _resize_pane:
    type: string
    default: null
    nullable: true
    writable: false
    description: "Internal: element id of the pane currently being resized"

  _resize_edge:
    type: string
    default: null
    nullable: true
    writable: false
    description: "Internal: which edge is being resized (left, right, top, bottom)"

  _resize_start_x:
    type: number
    default: 0
    writable: false
    description: "Internal: cursor X position at resize start"

  _resize_start_y:
    type: number
    default: 0
    writable: false
    description: "Internal: cursor Y position at resize start"
