state:
  active_tool:
    type: enum
    values: [selection, partial_selection, interior_selection,
             pen, add_anchor, delete_anchor, anchor_point,
             pencil, path_eraser, smooth,
             type, type_on_path,
             line, rect, rounded_rect, polygon, star, lasso,
             scale, rotate, shear]
    default: selection
    description: "Currently selected drawing tool"

  fill_color:
    type: color
    default: "#ffffff"
    nullable: true
    description: "Active fill color (null = no fill)"

  stroke_color:
    type: color
    default: "#000000"
    nullable: true
    description: "Active stroke color (null = no stroke)"

  stroke_width:
    type: number
    default: 1.0
    description: "Active stroke width in points"

  stroke_cap:
    type: enum
    values: [butt, round, square]
    default: butt
    description: "Active stroke cap style"

  stroke_join:
    type: enum
    values: [miter, round, bevel]
    default: miter
    description: "Active stroke join style"

  stroke_miter_limit:
    type: number
    default: 10
    description: "Active stroke miter limit"

  stroke_align:
    type: enum
    values: [center, inside, outside]
    default: center
    description: "Active stroke alignment relative to the path"

  stroke_dashed:
    type: bool
    default: false
    description: "Active stroke uses dashed pattern"

  stroke_dash_1:
    type: number
    default: 12
    description: "Active stroke dash length for pair 1"

  stroke_gap_1:
    type: number
    default: 12
    description: "Active stroke gap length for pair 1"

  stroke_dash_2:
    type: number
    default: null
    nullable: true
    description: "Active stroke dash length for pair 2 (null = unused)"

  stroke_gap_2:
    type: number
    default: null
    nullable: true
    description: "Active stroke gap length for pair 2 (null = unused)"

  stroke_dash_3:
    type: number
    default: null
    nullable: true
    description: "Active stroke dash length for pair 3 (null = unused)"

  stroke_gap_3:
    type: number
    default: null
    nullable: true
    description: "Active stroke gap length for pair 3 (null = unused)"

  stroke_dash_align_anchors:
    type: bool
    default: false
    description: >
      When true, dash and gap lengths flex per-segment so a dash is
      centered on every anchor and a full dash sits at each open path
      end. When false (default), the dash pattern lays out by exact
      length along the path. See DASH_ALIGN.md.

  stroke_start_arrowhead:
    type: enum
    values: [none, simple_arrow, open_arrow, closed_arrow, stealth_arrow,
             barbed_arrow, half_arrow_upper, half_arrow_lower,
             circle, open_circle, square, open_square,
             diamond, open_diamond, slash]
    default: none
    description: "Active stroke start arrowhead shape"

  stroke_end_arrowhead:
    type: enum
    values: [none, simple_arrow, open_arrow, closed_arrow, stealth_arrow,
             barbed_arrow, half_arrow_upper, half_arrow_lower,
             circle, open_circle, square, open_square,
             diamond, open_diamond, slash]
    default: none
    description: "Active stroke end arrowhead shape"

  stroke_start_arrowhead_scale:
    type: number
    default: 100
    description: "Active stroke start arrowhead scale (%)"

  stroke_end_arrowhead_scale:
    type: number
    default: 100
    description: "Active stroke end arrowhead scale (%)"

  stroke_link_arrowhead_scale:
    type: bool
    default: false
    description: "Active stroke arrowhead scales are linked"

  stroke_arrow_align:
    type: enum
    values: [tip_at_end, center_at_end]
    default: tip_at_end
    description: "Active stroke arrow alignment mode"

  stroke_profile:
    type: enum
    values: [uniform, taper_both, taper_start, taper_end, bulge, pinch]
    default: uniform
    description: "Active stroke variable-width profile"

  stroke_profile_flipped:
    type: bool
    default: false
    description: "Active stroke profile is flipped"

  stroke_brush:
    type: string
    default: null
    nullable: true
    description: >
      Active stroke brush, encoded as "<library_slug>/<brush_slug>".
      Null when no brush is applied; non-null causes the brush
      renderer to take over from the native stroke pipeline. See
      transcripts/BRUSHES.md §Stroke styling interaction.

  stroke_brush_overrides:
    type: string
    default: null
    nullable: true
    description: >
      Per-instance brush parameter overrides as compact JSON.
      Polymorphic by brush type; partial dict layered over the
      master library brush at render time. Edited via the
      Brush Options dialog in instance_edit mode.

  # ── Paintbrush tool options ───────────────────────────────────
  # Per-document preferences for the Paintbrush tool. Edited via
  # the Paintbrush Tool Options dialog (double-click the tool
  # icon). See transcripts/PAINTBRUSH_TOOL.md §Tool options.

  paintbrush_fidelity:
    type: number
    default: 3
    description: >
      5-stop slider position (1-5) for curve-fit tolerance. Maps
      to fit_error as [0.5, 2.5, 5.0, 7.5, 10.0] pt. Lower tick =
      more faithful to raw drag; higher tick = smoother output.
      See PAINTBRUSH_TOOL.md §Fidelity → fit_error mapping.

  paintbrush_fill_new_strokes:
    type: bool
    default: false
    description: >
      When true, new Paintbrush commits set fill=state.fill_color
      on the Path element. When false, fill=none. Does not apply
      to edit-gesture commits (preservation rules).

  paintbrush_keep_selected:
    type: bool
    default: true
    description: >
      When true, the path committed by a Paintbrush drag becomes
      the canvas selection after commit.

  paintbrush_edit_selected_paths:
    type: bool
    default: true
    description: >
      When true, Option/Alt-drag within paintbrush_edit_within px
      of a selected Path rewrites the nearest sub-segment of that
      path instead of starting a new stroke. See
      PAINTBRUSH_TOOL.md §Edit gesture.

  paintbrush_edit_within:
    type: number
    default: 12
    description: >
      Proximity threshold in px for the Paintbrush edit gesture.
      Press and release distances are both bounded by this value.

  # ── Blob Brush tool options ───────────────────────────────────
  # Per-document preferences for the Blob Brush tool. Edited via
  # the Blob Brush Tool Options dialog (double-click tool icon).
  # See transcripts/BLOB_BRUSH_TOOL.md §Tool options.

  blob_brush_fidelity:
    type: number
    default: 3
    description: >
      5-stop slider position (1-5) for commit-time polygon
      simplification. Maps to RDP epsilon as
      [0.5, 2.5, 5.0, 7.5, 10.0] pt. Lower tick = more faithful
      to raw sweep; higher tick = smoother output boundary.
      See BLOB_BRUSH_TOOL.md §Fidelity → simplification tolerance
      mapping.

  blob_brush_keep_selected:
    type: bool
    default: false
    description: >
      When true, the path committed / merged by a Blob Brush
      sweep becomes the canvas selection after commit. Default
      false (Blob Brush is less selection-oriented than
      Paintbrush, whose equivalent flag defaults true).

  blob_brush_merge_only_with_selection:
    type: bool
    default: false
    description: >
      When true, a painting-mode sweep merges only with existing
      Blob Brush elements that are part of the current canvas
      selection. Independent of Erase mode, which always acts on
      all blob-brush elements regardless of selection. See
      BLOB_BRUSH_TOOL.md §Merge condition.

  blob_brush_size:
    type: number
    default: 10
    description: >
      Default tip diameter in pt. Consulted only when no
      Calligraphic brush is active; a Calligraphic brush's own
      size (with overrides + variation) takes precedence. See
      BLOB_BRUSH_TOOL.md §Runtime tip resolution.

  blob_brush_angle:
    type: number
    default: 0
    description: >
      Default tip rotation in degrees. Consulted only when no
      Calligraphic brush is active.

  blob_brush_roundness:
    type: number
    default: 100
    description: >
      Default tip aspect ratio (percent: 100 = circle; lower =
      narrower oval). Consulted only when no Calligraphic brush
      is active.

  # ── Magic Wand tool ───────────────────────────────────────────
  # Per-document persistence for the Magic Wand Panel's five
  # criteria (Fill Color, Stroke Color, Stroke Weight, Opacity,
  # Blending Mode) plus tolerances. See
  # transcripts/MAGIC_WAND_TOOL.md §State persistence.

  magic_wand_fill_color:
    type: bool
    default: true
    description: >
      When true, Fill Color contributes to the wand match
      predicate. The criterion compares Euclidean distance in
      0–255 sRGB space against magic_wand_fill_tolerance.

  magic_wand_fill_tolerance:
    type: number
    default: 32
    description: >
      Maximum Euclidean RGB distance (0–255 scale) at which two
      solid fills are considered similar. Integer 0–255. Default
      32 matches the reference design.

  magic_wand_stroke_color:
    type: bool
    default: true
    description: >
      When true, Stroke Color contributes to the wand match
      predicate. Same Euclidean / 0–255 sRGB rule as Fill Color
      against magic_wand_stroke_tolerance.

  magic_wand_stroke_tolerance:
    type: number
    default: 32
    description: >
      Maximum Euclidean RGB distance (0–255 scale) at which two
      solid strokes are considered similar. Integer 0–255.

  magic_wand_stroke_weight:
    type: bool
    default: true
    description: >
      When true, Stroke Weight contributes to the wand match
      predicate. Compares |candidate.width − seed.width| against
      magic_wand_stroke_weight_tolerance (in pt).

  magic_wand_stroke_weight_tolerance:
    type: number
    default: 5.0
    description: >
      Maximum stroke-weight delta in points at which two strokes
      are considered similar. Float ≥ 0. Default 5.0.

  magic_wand_opacity:
    type: bool
    default: true
    description: >
      When true, Opacity contributes to the wand match predicate.
      Compares |candidate.opacity − seed.opacity| × 100 against
      magic_wand_opacity_tolerance (in percentage points).

  magic_wand_opacity_tolerance:
    type: number
    default: 5
    description: >
      Maximum opacity delta in percentage points at which two
      elements are considered similar. Integer 0–100. The
      document model stores opacity in [0.0, 1.0]; the predicate
      multiplies by 100 so the user-facing tolerance is in
      percentage points.

  magic_wand_blending_mode:
    type: bool
    default: false
    description: >
      When true, Blending Mode contributes to the wand match
      predicate. Compares blend_mode enum values for exact
      equality — there is no tolerance, blend mode is
      categorical. Default false (the reference design ships
      this checkbox unchecked).

  # ── Eyedropper tool options ───────────────────────────────────
  # Per-document persistence for the Eyedropper Tool Options
  # dialog. 25 boolean toggles gating which attribute groups and
  # sub-attributes the Eyedropper samples and applies, plus a
  # nullable cache holding the most recently sampled appearance.
  # See transcripts/EYEDROPPER_TOOL.md §State persistence.

  eyedropper_fill:
    type: bool
    default: true
    description: "Master toggle for the Fill attribute group."

  eyedropper_stroke:
    type: bool
    default: true
    description: "Master toggle for the Stroke attribute group."

  eyedropper_stroke_color:
    type: bool
    default: true
    description: >
      When true (and Stroke master is true), copies the source's
      stroke color (solid / none / gradient / pattern).

  eyedropper_stroke_weight:
    type: bool
    default: true
    description: >
      When true (and Stroke master is true), copies stroke-width.

  eyedropper_stroke_cap_join:
    type: bool
    default: true
    description: >
      When true (and Stroke master is true), copies
      stroke-linecap, stroke-linejoin, and stroke-miterlimit.

  eyedropper_stroke_align:
    type: bool
    default: true
    description: >
      When true (and Stroke master is true), copies stroke-align
      (center / inside / outside).

  eyedropper_stroke_dash:
    type: bool
    default: true
    description: >
      When true (and Stroke master is true), copies the dashed
      flag and the six dash/gap values.

  eyedropper_stroke_arrowheads:
    type: bool
    default: true
    description: >
      When true (and Stroke master is true), copies start/end
      arrowhead shapes, scales, scale-link, and arrow-align.

  eyedropper_stroke_profile:
    type: bool
    default: true
    description: >
      When true (and Stroke master is true), copies the
      variable-width profile and its flipped flag.

  eyedropper_stroke_brush:
    type: bool
    default: true
    description: >
      When true (and Stroke master is true), copies
      jas:stroke-brush.

  eyedropper_opacity:
    type: bool
    default: true
    description: "Master toggle for the Opacity attribute group."

  eyedropper_opacity_alpha:
    type: bool
    default: true
    description: >
      When true (and Opacity master is true), copies
      element.opacity.

  eyedropper_opacity_blend:
    type: bool
    default: true
    description: >
      When true (and Opacity master is true), copies element.mode
      (blend mode).

  eyedropper_character:
    type: bool
    default: true
    description: >
      Master toggle for the Character attribute group. Sub-toggles
      are no-ops when the source or target isn't a text element.

  eyedropper_character_font:
    type: bool
    default: true
    description: >
      When true (and Character master is true), copies font family
      and style (font-weight + font-style).

  eyedropper_character_size:
    type: bool
    default: true
    description: >
      When true (and Character master is true), copies font size.

  eyedropper_character_leading:
    type: bool
    default: true
    description: >
      When true (and Character master is true), copies leading.

  eyedropper_character_kerning:
    type: bool
    default: true
    description: >
      When true (and Character master is true), copies kerning.

  eyedropper_character_tracking:
    type: bool
    default: true
    description: >
      When true (and Character master is true), copies tracking.

  eyedropper_character_color:
    type: bool
    default: true
    description: >
      When true (and Character master is true), copies character
      color.

  eyedropper_paragraph:
    type: bool
    default: true
    description: >
      Master toggle for the Paragraph attribute group. Sub-toggles
      are no-ops when the source or target isn't a text element.

  eyedropper_paragraph_align:
    type: bool
    default: true
    description: >
      When true (and Paragraph master is true), copies paragraph
      alignment.

  eyedropper_paragraph_indent:
    type: bool
    default: true
    description: >
      When true (and Paragraph master is true), copies left,
      right, and first-line indents.

  eyedropper_paragraph_space:
    type: bool
    default: true
    description: >
      When true (and Paragraph master is true), copies space
      before and space after.

  eyedropper_paragraph_hyphenate:
    type: bool
    default: true
    description: >
      When true (and Paragraph master is true), copies the
      hyphenate flag.

  eyedropper_cache:
    type: object
    default: null
    nullable: true
    description: >
      Most recently sampled appearance, or null. Plain click on an
      eligible source writes here; Alt+click reads here to apply
      to a target. Persists with the document so a non-null cache
      survives save/load. Cleared by Escape (or replaced by a
      fresh sample).

  # ── Transform tools (Scale / Rotate / Shear) ─────────────────
  # Per-document persistence for the three transformation tools.
  # transform_reference_point is shared across all three; the
  # tool-specific keys mirror the most-recent dialog values so
  # re-opening the dialog (after Cancel or after a previous OK)
  # shows the user's last entered values. See SCALE_TOOL.md /
  # ROTATE_TOOL.md / SHEAR_TOOL.md §State persistence.

  transform_reference_point:
    type: list
    item_type: number
    default: null
    nullable: true
    description: >
      Shared pivot for Scale / Rotate / Shear, stored as
      [x, y] in absolute document coordinates. null means
      "use the selection's union bounding-box center."
      Resets to null on selection change. Custom values are
      written by a click on canvas while a transform tool is
      active. Visualised as a cyan-blue crosshair overlay
      (reference_point_cross render type) when (a) the active
      tool is one of scale/rotate/shear and (b) a selection
      exists.

  scale_uniform:
    type: bool
    default: true
    description: "Uniform mode (single percentage) vs Non-Uniform (independent H/V) in the Scale Options dialog"

  scale_uniform_pct:
    type: number
    default: 100.0
    description: "Most-recent uniform-mode scale percentage entered in the Scale Options dialog"

  scale_horizontal_pct:
    type: number
    default: 100.0
    description: "Most-recent non-uniform horizontal percentage entered in the Scale Options dialog"

  scale_vertical_pct:
    type: number
    default: 100.0
    description: "Most-recent non-uniform vertical percentage entered in the Scale Options dialog"

  scale_strokes:
    type: bool
    default: true
    description: >
      When true, scaling multiplies stroke-width by the unsigned
      geometric mean √(|sx · sy|). When false, stroke-width is
      preserved. Brush-stroke size overrides scale by the same
      factor. See SCALE_TOOL.md §Apply behavior.

  scale_corners:
    type: bool
    default: false
    description: >
      When true, scaling multiplies a rounded_rect's rx by |sx|
      and ry by |sy|. No-op on other element types. Default
      false matches the reference dialog. See SCALE_TOOL.md
      §Apply behavior.

  scale_preview:
    type: bool
    default: true
    description: "When true, the Scale Options dialog drives a live preview overlay (per-element transform-matrix override). No document mutation until OK"

  rotate_angle:
    type: number
    default: 0.0
    description: "Most-recent angle (degrees) entered in the Rotate Options dialog. Positive values rotate counter-clockwise"

  rotate_preview:
    type: bool
    default: true
    description: "When true, the Rotate Options dialog drives a live preview overlay"

  shear_angle:
    type: number
    default: 0.0
    description: "Most-recent shear angle (degrees) entered in the Shear Options dialog"

  shear_axis:
    type: enum
    values: [horizontal, vertical, custom]
    default: horizontal
    description: "Shear axis selected in the Shear Options dialog: horizontal (x-axis fixed), vertical (y-axis fixed), or custom (use shear_axis_angle)"

  shear_axis_angle:
    type: number
    default: 0.0
    description: "Custom-axis angle (degrees from horizontal) used when shear_axis == 'custom'"

  shear_preview:
    type: bool
    default: true
    description: "When true, the Shear Options dialog drives a live preview overlay"

  # ── Align panel ───────────────────────────────────────────────
  # Mirror state for the Align panel's four persistent fields.
  # See transcripts/ALIGN.md §Panel state.

  align_to:
    type: enum
    values: [selection, artboard, key_object]
    default: selection
    description: >
      Align-To target mode. 'selection' uses the current selection
      bounding box; 'artboard' uses the active artboard rectangle;
      'key_object' uses a designated element from the selection as
      the fixed reference.

  align_key_object_path:
    type: path
    default: null
    nullable: true
    description: >
      Path of the designated key object while align_to == 'key_object'.
      Null when no key has been designated or while align_to is not
      in key_object mode.

  align_distribute_spacing:
    type: number
    default: 0
    description: >
      Explicit gap in points applied by Distribute Spacing operations
      when align_to == 'key_object' and a key has been designated.
      Otherwise the two spacing buttons average existing gaps.

  align_use_preview_bounds:
    type: bool
    default: false
    description: >
      When true, Align / Distribute / Distribute Spacing operations
      consult each element's preview bounds (stroke-inclusive);
      otherwise they consult geometric bounds.

  # ── Boolean panel ─────────────────────────────────────────────
  # Mirror state for the Boolean panel and its Options dialog. See
  # transcripts/BOOLEAN.md §Repeat state and §Boolean Options dialog.

  last_boolean_op:
    type: enum
    values: [
      null,
      union, subtract_front, intersection, exclude,
      divide, trim, merge, crop, subtract_back,
      union_compound, subtract_front_compound,
      intersection_compound, exclude_compound,
    ]
    default: null
    nullable: true
    description: >
      Most-recently-applied boolean operation. Populated by the
      destructive and compound-creating actions; consumed by
      "Repeat Boolean Operation". Make / Release / Expand Compound
      Shape do not write this field.

  boolean_precision:
    type: number
    default: 0.0283
    description: >
      Geometric tolerance in points for Bezier flattening, Bezier
      refit, and redundant-point removal. Edited via the Boolean
      Options dialog. Default 0.0283 pt = 0.01 mm.

  boolean_remove_redundant_points:
    type: bool
    default: false
    description: >
      When true, collinear points in boolean-op output are collapsed
      within Precision after each operation. Edited via the Boolean
      Options dialog.

  boolean_divide_remove_unpainted:
    type: bool
    default: false
    description: >
      When true, DIVIDE fragments with no fill and no stroke are
      discarded rather than kept as invisible paths. Edited via the
      Boolean Options dialog.

  # ── Brushes panel ─────────────────────────────────────────────
  # Mirror state for the Brushes panel. See
  # transcripts/BRUSHES.md §Panel state.

  brushes_selected_library:
    type: string
    default: "default_brushes"
    description: >
      Library slug owning the current panel selection. Changing
      libraries clears brushes_selected_brushes.

  brushes_selected_brushes:
    type: list
    item_type: string
    default: []
    description: >
      List of brush slugs selected within brushes_selected_library.
      Slug-keyed (not index-keyed) so library reordering or
      duplication does not scramble the selection.

  brushes_open_libraries:
    type: list
    item_type: object
    default: [{ id: "default_brushes", collapsed: false }]
    description: >
      Libraries currently open as disclosure sections in the panel
      body, each with its collapsed state. Initialised at startup
      from preferences.brushes.persistent_libraries; falls back to
      [{ id: default_brushes, collapsed: false }] when the
      preference list is empty.

  brushes_view_mode:
    type: enum
    values: [thumbnail, list]
    default: thumbnail
    description: "Brushes panel tile rendering mode."

  brushes_thumbnail_size:
    type: enum
    values: [small, medium, large]
    default: small
    description: >
      Brushes panel thumbnail tile size. Small=48x16, Medium=72x24,
      Large=96x32. Disabled (radio dim) when view_mode == list.

  brushes_category_filter:
    type: list
    item_type: string
    default: [calligraphic, scatter, art, pattern, bristle]
    description: >
      Brush types currently visible in the panel body. Each toggled
      independently from the panel menu's "Show X Brushes" checkbox
      group. Empty list renders the body with a "No brushes match
      current filter" hint.

  fill_on_top:
    type: bool
    default: true
    description: "Whether the fill swatch renders in front of the stroke swatch"

  toolbar_visible:
    type: bool
    default: true
    description: "Whether the toolbar pane is visible"

  canvas_visible:
    type: bool
    default: true
    description: "Whether the canvas pane is visible"

  dock_visible:
    type: bool
    default: true
    description: "Whether the dock panel pane is visible"

  canvas_maximized:
    type: bool
    default: false
    description: "Whether the canvas fills the viewport"

  dock_collapsed:
    type: bool
    default: false
    description: "Whether the dock is in collapsed (chevron-only) state"

  active_tab:
    type: number
    default: -1
    description: "Index of the active document tab (-1 = none)"

  tab_count:
    type: number
    default: 0
    description: "Number of open document tabs"

  # Panel visibility and group state are now managed by the dock_view
  # element's groups list. The following variables were removed:
  # layers_visible, color_visible, stroke_visible, properties_visible,
  # dock_group0_active, dock_group0_collapsed, dock_group1_active,
  # dock_group1_collapsed
  # These are now intrinsic to the dock model (panel_group.active,
  # panel_group.collapsed, panel presence in any group).

  # ── Internal (managed by the renderer, not user-facing) ──
  # These fields are imperative-only: the engine maintains them
  # during drag/resize interactions. `writable: false` prevents
  # YAML `set:` effects from targeting them; writes evaluate to
  # unit and log a warning. Reads via expressions are unaffected.

  _drag_pane:
    type: string
    default: null
    nullable: true
    writable: false
    description: "Internal: element id of the pane currently being dragged"

  _drag_offset_x:
    type: number
    default: 0
    writable: false
    description: "Internal: cursor X offset from pane origin at drag start"

  _drag_offset_y:
    type: number
    default: 0
    writable: false
    description: "Internal: cursor Y offset from pane origin at drag start"

  _resize_pane:
    type: string
    default: null
    nullable: true
    writable: false
    description: "Internal: element id of the pane currently being resized"

  _resize_edge:
    type: string
    default: null
    nullable: true
    writable: false
    description: "Internal: which edge is being resized (left, right, top, bottom)"

  _resize_start_x:
    type: number
    default: 0
    writable: false
    description: "Internal: cursor X position at resize start"

  _resize_start_y:
    type: number
    default: 0
    writable: false
    description: "Internal: cursor Y position at resize start"
