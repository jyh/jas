layout:
  id: main
  type: pane_system
  summary: "Main workspace"
  description: >
    Three draggable, resizable panes with edge-snapping. Panes can be
    reordered in z-order by clicking. The canvas pane can be maximized
    to fill the viewport, causing toolbar and dock to float on top.
  style:
    background: "{{theme.colors.window_bg}}"
  behavior:
    # Pane title bar drag protocol
    - event: drag_start
      description: "Begin dragging a pane by its title bar"
      effects:
        - cursor: grabbing
        - set: { _drag_pane: "event.target_id", _drag_offset_x: "event.offset_x", _drag_offset_y: "event.offset_y" }
    - event: drag_move
      description: >
        Move pane to follow cursor. If any pane edge is within
        theme.sizes.snap_distance pixels of another pane's edge or
        the viewport boundary, snap to that edge and show a
        snap_preview colored guide line.
      effects:
        - set_style:
            target: "state._drag_pane"
            left: "event.client_x - state._drag_offset_x"
            top: "event.client_y - state._drag_offset_y"
    - event: drag_end
      description: >
        Drop the pane at its current position. Remove any snap
        preview guide lines.
      effects:
        - cursor: grab
        - set: { _drag_pane: null }
    # Edge resize protocol
    - event: drag_start
      condition: "event.target_class == 'jas-edge-handle'"
      description: "Begin resizing a pane by its edge handle"
      effects:
        - cursor: "event.resize_cursor"
        - set: { _resize_pane: "event.target_id", _resize_edge: "event.edge", _resize_start_x: "event.client_x", _resize_start_y: "event.client_y" }
    - event: drag_move
      condition: "state._resize_pane != null"
      description: >
        Resize the pane by moving the dragged edge. Compute the delta from
        _resize_start to the current cursor position. For left/right edges,
        adjust the pane's left and/or width. For top/bottom edges, adjust
        top and/or height. Clamp to the pane's min_width/max_width and
        min_height constraints. Snap the edge to nearby pane edges within
        theme.sizes.snap_distance pixels.
      effects:
        - set_style:
            target: "state._resize_pane"
            "state._resize_edge": "event.client_x"
    - event: drag_end
      condition: "state._resize_pane != null"
      effects:
        - cursor: default
        - set: { _resize_pane: null }
  children:

    # ─── Toolbar pane ───────────────────────────────────────
    - id: toolbar_pane
      type: pane
      summary: "Toolbar"
      description: >
        Fixed-width (72px) vertical toolbar on the left side of the
        workspace. Contains a 2-column grid of 32x32px tool buttons
        followed by the fill/stroke color indicator widget. The pane can
        be dragged by its title bar, closed via the X button, and
        shown/hidden via the Window menu. Cannot be resized horizontally.
      default_position: { x: 0, y: 0, width: 72, height: 900 }
      min_width: 72
      max_width: 72
      fixed_width: true
      style:
        background: "{{theme.colors.pane_bg}}"
        border: "1px solid {{theme.colors.border}}"
      bind:
        visible: "state.toolbar_visible"
      title_bar:
        label: ""
        draggable: true
        buttons:
          - id: toolbar_close_btn
            type: icon_button
            summary: "Close toolbar"
            icon: "close"
            style: { size: 14 }
            behavior:
              - event: click
                action: toggle_pane
                params: { pane: toolbar }
      content:
        type: container
        layout: column
        style:
          padding: "4 2 4 2"
        children:

          # Tool button grid
          - id: tool_grid
            type: grid
            summary: "Tool buttons"
            description: >
              4-row, 2-column grid of 32x32px tool buttons. Single click
              selects the tool. Buttons with a small triangle indicator have
              alternate tools accessible via long-press (250ms hold).
            cols: 2
            gap: 2
            children:

              # Row 0, Col 0: Selection
              - id: btn_selection
                type: icon_button
                summary: "Selection (V)"
                description: >
                  Black arrow cursor for selecting, moving, and resizing
                  objects. Click to select; Shift+click to add to selection;
                  drag to move; drag handles to resize. No long-press
                  alternates.
                icon: "selection_arrow"
                grid: { row: 0, col: 0 }
                style:
                  size: "{{theme.sizes.tool_button}}"
                  checked_bg: "{{theme.colors.button_checked}}"
                  hover: { background: "{{theme.colors.button_checked}}" }
                behavior:
                  - event: click
                    action: select_tool
                    params: { tool: selection }
                bind:
                  checked: 'state.active_tool == "selection"'

              # Row 0, Col 1: Arrow slot (Partial Selection / Interior Selection)
              - id: btn_arrow_slot
                type: icon_button
                summary: "Partial Selection (A)"
                description: >
                  White arrow for selecting individual anchor points and
                  path segments. Click an anchor to select it; drag to move
                  it; drag control handles to adjust curves. Long-press
                  (250ms) opens a menu to switch between Partial Selection
                  and Interior Selection tools. The button shows checked state
                  when any tool in this slot is active.
                icon: "partial_selection_arrow"
                grid: { row: 0, col: 1 }
                style:
                  size: "{{theme.sizes.tool_button}}"
                  checked_bg: "{{theme.colors.button_checked}}"
                  hover: { background: "{{theme.colors.button_checked}}" }
                behavior:
                  - event: mouse_down
                    effects:
                      - start_timer:
                          id: "long_press_btn_arrow_slot"
                          delay_ms: 250
                          effects:
                            - open_dialog: { id: arrow_alternates }
                  - event: mouse_up
                    effects:
                      - cancel_timer: "long_press_btn_arrow_slot"
                  - event: click
                    action: select_tool
                    params: { tool: partial_selection }
                bind:
                  checked: 'mem(state.active_tool, ["partial_selection", "interior_selection", "magic_wand"])'
                alternates:
                  menu_id: arrow_alternates
                  items:
                    - id: partial_selection
                      label: "Partial Selection"
                      icon: "partial_selection_arrow"
                      description: "Select and move individual anchor points and path segments"
                    - id: interior_selection
                      label: "Interior Selection"
                      icon: "interior_selection_arrow"
                      description: "Select objects within groups without ungrouping"
                    - id: magic_wand
                      label: "Magic Wand (Y)"
                      icon: "magic_wand"
                      description: >
                        Click an element to select every other element in
                        the document that shares its fill color, stroke
                        color, stroke weight, opacity, and blend mode within
                        the Magic Wand Panel's tolerances. Shift+click adds
                        to the selection; Alt+click subtracts.

              # Row 1, Col 0: Pen slot
              - id: btn_pen_slot
                type: icon_button
                summary: "Pen (P)"
                description: >
                  Draw precise paths by clicking to place anchor points.
                  Click-and-drag to create smooth bezier curves with control
                  handles. Long-press (250ms) opens a menu to switch between
                  Pen, Add Anchor Point, Delete Anchor Point, and Anchor
                  Point tools.
                icon: "pen"
                grid: { row: 1, col: 0 }
                style:
                  size: "{{theme.sizes.tool_button}}"
                  checked_bg: "{{theme.colors.button_checked}}"
                  hover: { background: "{{theme.colors.button_checked}}" }
                behavior:
                  - event: mouse_down
                    effects:
                      - start_timer:
                          id: "long_press_btn_pen_slot"
                          delay_ms: 250
                          effects:
                            - open_dialog: { id: pen_alternates }
                  - event: mouse_up
                    effects:
                      - cancel_timer: "long_press_btn_pen_slot"
                  - event: click
                    action: select_tool
                    params: { tool: pen }
                bind:
                  checked: 'mem(state.active_tool, ["pen", "add_anchor", "delete_anchor", "anchor_point"])'
                alternates:
                  menu_id: pen_alternates
                  items:
                    - { id: pen,            label: "Pen",                 icon: "pen",
                        description: "Draw paths by clicking to place anchor points" }
                    - { id: add_anchor,     label: "Add Anchor Point",    icon: "add_anchor",
                        description: "Add anchor points to an existing path" }
                    - { id: delete_anchor,  label: "Delete Anchor Point", icon: "delete_anchor",
                        description: "Remove anchor points from a path" }
                    - { id: anchor_point,   label: "Anchor Point",        icon: "anchor_point",
                        description: "Convert anchor points between smooth and corner" }

              # Row 1, Col 1: Pencil slot
              - id: btn_pencil_slot
                type: icon_button
                summary: "Pencil (N)"
                description: >
                  Freehand drawing tool that creates paths by tracking mouse
                  movement. The path is smoothed after drawing. Long-press
                  (250ms) opens a menu to switch between Pencil, Path Eraser,
                  and Smooth tools.
                icon: "pencil"
                grid: { row: 1, col: 1 }
                style:
                  size: "{{theme.sizes.tool_button}}"
                  checked_bg: "{{theme.colors.button_checked}}"
                  hover: { background: "{{theme.colors.button_checked}}" }
                behavior:
                  - event: mouse_down
                    effects:
                      - start_timer:
                          id: "long_press_btn_pencil_slot"
                          delay_ms: 250
                          effects:
                            - open_dialog: { id: pencil_alternates }
                  - event: mouse_up
                    effects:
                      - cancel_timer: "long_press_btn_pencil_slot"
                  - event: click
                    action: select_tool
                    params: { tool: pencil }
                bind:
                  checked: 'mem(state.active_tool, ["pencil", "path_eraser", "smooth"])'
                alternates:
                  menu_id: pencil_alternates
                  items:
                    - { id: pencil,      label: "Pencil",      icon: "pencil",
                        description: "Draw freehand paths" }
                    - { id: path_eraser, label: "Path Eraser",  icon: "path_eraser",
                        description: "Erase portions of paths" }
                    - { id: smooth,      label: "Smooth",       icon: "smooth",
                        description: "Smooth rough path segments" }

              # Row 2, Col 0: Text slot
              - id: btn_text_slot
                type: icon_button
                summary: "Type (T)"
                description: >
                  Create and edit text objects. Click on the canvas to place
                  a text insertion point; click-drag to create a text area
                  box. Long-press (250ms) opens a menu to switch between
                  Type and Type on a Path tools.
                icon: "type"
                grid: { row: 2, col: 0 }
                style:
                  size: "{{theme.sizes.tool_button}}"
                  checked_bg: "{{theme.colors.button_checked}}"
                  hover: { background: "{{theme.colors.button_checked}}" }
                behavior:
                  - event: mouse_down
                    effects:
                      - start_timer:
                          id: "long_press_btn_text_slot"
                          delay_ms: 250
                          effects:
                            - open_dialog: { id: text_alternates }
                  - event: mouse_up
                    effects:
                      - cancel_timer: "long_press_btn_text_slot"
                  - event: click
                    action: select_tool
                    params: { tool: type }
                bind:
                  checked: 'mem(state.active_tool, ["type", "type_on_path"])'
                alternates:
                  menu_id: text_alternates
                  items:
                    - { id: type,         label: "Type",            icon: "type",
                        description: "Create and edit text" }
                    - { id: type_on_path, label: "Type on a Path",  icon: "type_on_path",
                        description: "Place text along a path curve" }

              # Row 2, Col 1: Line
              - id: btn_line
                type: icon_button
                summary: "Line (\\)"
                description: >
                  Draw straight line segments. Click to place the start
                  point, drag to the end point, and release. Hold Shift to
                  constrain to 45-degree increments. No long-press
                  alternates.
                icon: "line"
                grid: { row: 2, col: 1 }
                style:
                  size: "{{theme.sizes.tool_button}}"
                  checked_bg: "{{theme.colors.button_checked}}"
                  hover: { background: "{{theme.colors.button_checked}}" }
                behavior:
                  - event: click
                    action: select_tool
                    params: { tool: line }
                bind:
                  checked: 'state.active_tool == "line"'

              # Row 3, Col 0: Shape slot
              - id: btn_shape_slot
                type: icon_button
                summary: "Rectangle (M)"
                description: >
                  Draw rectangular shapes. Click-drag to define the
                  bounding box. Hold Shift to constrain to a square; hold
                  Alt/Option to draw from center. Long-press (250ms) opens
                  a menu to switch between Rectangle, Rounded Rectangle,
                  Polygon, and Star tools.
                icon: "rect"
                grid: { row: 3, col: 0 }
                style:
                  size: "{{theme.sizes.tool_button}}"
                  checked_bg: "{{theme.colors.button_checked}}"
                  hover: { background: "{{theme.colors.button_checked}}" }
                behavior:
                  - event: mouse_down
                    effects:
                      - start_timer:
                          id: "long_press_btn_shape_slot"
                          delay_ms: 250
                          effects:
                            - open_dialog: { id: shape_alternates }
                  - event: mouse_up
                    effects:
                      - cancel_timer: "long_press_btn_shape_slot"
                  - event: click
                    action: select_tool
                    params: { tool: rect }
                bind:
                  checked: 'mem(state.active_tool, ["rect", "rounded_rect", "ellipse", "polygon", "star"])'
                alternates:
                  menu_id: shape_alternates
                  items:
                    - { id: rect,         label: "Rectangle",         icon: "rect",
                        description: "Draw rectangles and squares" }
                    - { id: rounded_rect, label: "Rounded Rectangle", icon: "rounded_rect",
                        description: "Draw rectangles with rounded corners" }
                    - { id: ellipse,      label: "Ellipse",           icon: "ellipse",
                        description: "Draw ellipses and circles" }
                    - { id: polygon,      label: "Polygon",           icon: "polygon",
                        description: "Draw regular polygons" }
                    - { id: star,         label: "Star",              icon: "star",
                        description: "Draw star shapes" }

              # Row 3, Col 1: Lasso
              - id: btn_lasso
                type: icon_button
                summary: "Lasso (Q)"
                description: >
                  Freehand selection tool. Draw a closed lasso boundary
                  around objects to select them. Any object whose bounds
                  intersect the lasso path is included in the selection.
                  No long-press alternates.
                icon: "lasso"
                grid: { row: 3, col: 1 }
                style:
                  size: "{{theme.sizes.tool_button}}"
                  checked_bg: "{{theme.colors.button_checked}}"
                  hover: { background: "{{theme.colors.button_checked}}" }
                behavior:
                  - event: click
                    action: select_tool
                    params: { tool: lasso }
                bind:
                  checked: 'state.active_tool == "lasso"'

              # Row 4, Col 0: Hand slot (Hand / Zoom)
              - id: btn_hand_slot
                type: icon_button
                summary: "Hand (H)"
                description: >
                  Pan the canvas by click-and-drag. Spacebar held while
                  another tool is active temporarily switches to Hand.
                  Long-press (250ms) opens a menu to switch between Hand
                  and Zoom tools (the navigation tool pair). Double-click
                  the icon to invoke fit_active_artboard. The button shows
                  checked state when either tool in this slot is active.
                  See HAND_TOOL.md and ZOOM_TOOL.md.
                icon: "hand"
                grid: { row: 4, col: 0 }
                style:
                  size: "{{theme.sizes.tool_button}}"
                  checked_bg: "{{theme.colors.button_checked}}"
                  hover: { background: "{{theme.colors.button_checked}}" }
                behavior:
                  - event: mouse_down
                    effects:
                      - start_timer:
                          id: "long_press_btn_hand_slot"
                          delay_ms: 250
                          effects:
                            - open_dialog: { id: hand_alternates }
                  - event: mouse_up
                    effects:
                      - cancel_timer: "long_press_btn_hand_slot"
                  - event: click
                    action: select_tool
                    params: { tool: hand }
                  # Double-click is dispatched by each app's toolbar
                  # dispatcher reading the active tool's
                  # tool_options_action field — see
                  # workspace/tools/hand.yaml and zoom.yaml.
                bind:
                  checked: 'mem(state.active_tool, ["hand", "zoom"])'
                alternates:
                  menu_id: hand_alternates
                  items:
                    - id: hand
                      label: "Hand (H)"
                      icon: "hand"
                      description: "Pan the canvas by click-and-drag"
                    - id: zoom
                      label: "Zoom (Z)"
                      icon: "zoom"
                      description: >
                        Zoom in by click; Alt-click to zoom out;
                        drag for scrubby or marquee zoom; Ctrl+wheel
                        for stepped zoom

              # Row 4, Col 1: Artboard
              - id: btn_artboard_slot
                type: icon_button
                summary: "Artboard (Shift+O)"
                description: >
                  Create, activate, move, resize, and duplicate
                  artboards on the canvas. Drag from empty canvas to
                  create a new artboard. Click an artboard to activate
                  it (writes panel-selection per the panel rules).
                  Drag an artboard interior to move it; drag a resize
                  handle to resize it; Alt-drag to duplicate. Double-
                  click an artboard to open the Artboard Options
                  Dialogue. Double-click the icon to invoke
                  fit_all_artboards. No long-press alternates.
                  See ARTBOARD_TOOL.md.
                icon: "artboard"
                grid: { row: 4, col: 1 }
                style:
                  size: "{{theme.sizes.tool_button}}"
                  checked_bg: "{{theme.colors.button_checked}}"
                  hover: { background: "{{theme.colors.button_checked}}" }
                behavior:
                  - event: click
                    action: select_tool
                    params: { tool: artboard }
                  # Double-click is dispatched by each app's toolbar
                  # dispatcher reading the active tool's
                  # tool_options_action field — see
                  # workspace/tools/artboard.yaml.
                bind:
                  checked: 'state.active_tool == "artboard"'

          - type: spacer
            style: { height: 8 }

          # Fill / Stroke widget
          - template: fill_stroke_widget
            params: { size: 56 }

          - type: spacer

    # ─── Canvas pane ────────────────────────────────────────
    - id: canvas_pane
      type: pane
      summary: "Canvas"
      description: >
        Central drawing area with a multi-tab document bar at the top.
        Each open document gets a tab labeled with its filename (or
        "Untitled-N" for new documents); a * prefix indicates unsaved
        changes. Clicking a tab switches the visible canvas. The drawing
        surface supports zoom (Ctrl+=/-, scroll wheel) and pan (scroll
        bars, Space+drag). The pane is a flex pane that expands to fill
        space between the toolbar and dock. Double-clicking the title bar
        maximizes the canvas to fill the viewport; double-click again or
        click the maximize button to restore.
      default_position: { x: 72, y: 0, width: 888, height: 900 }
      min_width: 200
      flex: true
      layout_state: [canvas_maximized]
      style:
        background: "{{theme.colors.window_bg}}"
        border: "1px solid {{theme.colors.border}}"
      bind:
        visible: "state.canvas_visible"
      title_bar:
        id: canvas_title_bar
        label: ""
        draggable: true
        behavior:
          - event: double_click
            condition: "not state.canvas_maximized"
            action: maximize_canvas
          - event: double_click
            condition: "state.canvas_maximized"
            action: restore_canvas
        buttons:
          - id: maximize_btn
            type: icon_button
            summary: "Maximize"
            icon: "maximize"
            style: { size: 14 }
            behavior:
              - event: click
                condition: "not state.canvas_maximized"
                action: maximize_canvas
              - event: click
                condition: "state.canvas_maximized"
                action: restore_canvas
          - id: canvas_close_btn
            type: icon_button
            summary: "Close canvas"
            icon: "close"
            style: { size: 14 }
            behavior:
              - event: click
                action: toggle_pane
                params: { pane: canvas }
      content:
        type: container
        layout: column
        style: { flex: 1 }
        children:

          # Tab bar (populated dynamically by new_document)
          - id: canvas_tab_bar
            type: container
            summary: "Document tabs"
            description: >
              Horizontal row of tab buttons at the top of the canvas pane.
              Starts empty; tabs are added dynamically by new_document and
              open_file actions via create_child. Each tab shows the document
              name and a close (X) button. Clicking a tab sets active_tab to
              that tab's index; the active tab gets highlighted styling. The
              tab bar is hidden when no documents are open (tab_count == 0).
            layout: row
            style:
              background: "{{theme.colors.pane_bg_dark}}"
              min_height: 24
              gap: 0
              alignment: center
            bind:
              visible: "state.tab_count != 0"
            children: []

          # Drawing surface area (canvases added dynamically)
          - id: drawing_surface
            type: container
            summary: "Drawing surface"
            description: >
              Container for document canvases, filling the space below the
              tab bar. Each open document gets a canvas element here via
              create_child (see actions.yaml::new_document, ::open_file).
              Only the canvas matching active_tab is visible; the rest are
              hidden. Starts empty — the brand logo below acts as the
              visual placeholder until the first document is opened. The
              visible canvas is the interactive drawing surface where
              tools operate; canvas_bootstrap.mjs binds a Model (with
              undo/redo) to each new canvas-stack as it appears in the
              DOM and the engine renders the matching document into its
              5-layer SVG stack.
            layout: column
            style:
              flex: 1
              min_height: 200
              background: "{{theme.colors.window_bg}}"
            children:
              - id: canvas_brand_logo
                type: brand_logo
                summary: "Brand logo placeholder"
                description: >
                  Brand logo shown in the top-right of the drawing surface when
                  no documents are open. Spans 2 Bootstrap columns wide (16.67%)
                  and is positioned in the top-right corner. Hidden once any
                  document tab is open.
                style:
                  position: absolute
                  top: 10
                  right: 12
                  width: "16.667%"
                  height: auto
                  opacity: 0.35
                bind:
                  visible: "state.tab_count == 0"

    # ─── Dock panel pane ────────────────────────────────────
    - id: dock_pane
      type: pane
      summary: "Panels"
      description: >
        Right-side anchored dock pane containing a dock_view element.
        The dock_view renders panel groups with tab bars, collapse/expand
        chevrons, and hamburger menus automatically from its groups list.
        When collapsed, shows a narrow icon strip. Panel groups can be
        dragged out to create floating dock panes, or dragged between
        docks. The dock is resizable between 150px and 500px. Panel
        group state is saved with workspace layouts.
      default_position: { x: 960, y: 0, width: 240, height: 900 }
      min_width: 150
      max_width: 500
      collapsed_width: 36
      style:
        background: "{{theme.colors.pane_bg}}"
        border: "1px solid {{theme.colors.border}}"
      bind:
        visible: "state.dock_visible"
      title_bar:
        label: ""
        draggable: true
        buttons:
          - id: dock_collapse_btn
            type: icon_button
            summary: "Collapse/Expand dock"
            icon: "chevron_right"
            style: { size: 20 }
            behavior:
              - event: click
                condition: "not state.dock_collapsed"
                action: collapse_dock
              - event: click
                condition: "state.dock_collapsed"
                action: expand_dock
            bind:
              icon: 'if state.dock_collapsed then "chevron_left" else "chevron_right"'
          - id: dock_close_btn
            type: icon_button
            summary: "Close panels"
            icon: "close"
            style: { size: 14 }
            behavior:
              - event: click
                action: toggle_pane
                params: { pane: dock }
      content:
        id: dock_main
        type: dock_view
        summary: "Main dock"
        description: >
          The primary anchored dock containing all panel groups. The
          dock_view element renders group headers (tab bars with panel
          tabs, collapse chevrons, hamburger menus), group bodies
          (active panel content from workspace/panels/*.yaml), group
          separators, and the collapsed icon strip. Panel tabs can be
          dragged to reorder within a group, move to another group's
          tab bar, or dropped on an empty area of a dock to create a
          new panel group at that position. Dragging a tab or group to
          empty space outside any dock creates a new floating dock pane.
          Groups can be dragged by their grip handle to reorder within
          the dock or detach as floating dock panes. Empty groups are
          removed automatically when their last panel is moved or
          closed. Empty floating docks are removed when their last
          group is emptied. Double-clicking a floating dock's title bar
          merges its groups back into this anchored dock.
        collapsed_width: 36
        groups:
          - panels: [color, swatches]
            active: 0
            collapsed: false
          - panels: [character, paragraph]
            active: 0
            collapsed: false
          - panels: [stroke, properties]
            active: 0
            collapsed: false
          - panels: [artboards, layers]
            active: 0
            collapsed: false
