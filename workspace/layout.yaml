layout:
  id: main
  type: pane_system
  summary: "Main workspace"
  description: >
    Three draggable, resizable panes with edge-snapping. Panes can be
    reordered in z-order by clicking. The canvas pane can be maximized
    to fill the viewport, causing toolbar and dock to float on top.
  style:
    background: "{{theme.colors.window_bg}}"
  behavior:
    # Pane title bar drag protocol
    - event: drag_start
      description: "Begin dragging a pane by its title bar"
      effects:
        - cursor: grabbing
        - set: { _drag_pane: "{{event.target_id}}", _drag_offset_x: "{{event.offset_x}}", _drag_offset_y: "{{event.offset_y}}" }
    - event: drag_move
      description: >
        Move pane to follow cursor. If any pane edge is within
        theme.sizes.snap_distance pixels of another pane's edge or
        the viewport boundary, snap to that edge and show a
        snap_preview colored guide line.
      effects:
        - set_style:
            target: "{{state._drag_pane}}"
            left: "{{event.client_x - state._drag_offset_x}}"
            top: "{{event.client_y - state._drag_offset_y}}"
    - event: drag_end
      description: >
        Drop the pane at its current position. Remove any snap
        preview guide lines.
      effects:
        - cursor: grab
        - set: { _drag_pane: null }
    # Edge resize protocol
    - event: drag_start
      condition: "event.target_class == 'jas-edge-handle'"
      description: "Begin resizing a pane by its edge handle"
      effects:
        - cursor: "{{event.resize_cursor}}"
        - set: { _resize_pane: "{{event.target_id}}", _resize_edge: "{{event.edge}}", _resize_start_x: "{{event.client_x}}", _resize_start_y: "{{event.client_y}}" }
    - event: drag_move
      condition: "state._resize_pane != null"
      description: >
        Resize the pane by moving the dragged edge. Compute the delta from
        _resize_start to the current cursor position. For left/right edges,
        adjust the pane's left and/or width. For top/bottom edges, adjust
        top and/or height. Clamp to the pane's min_width/max_width and
        min_height constraints. Snap the edge to nearby pane edges within
        theme.sizes.snap_distance pixels.
      effects:
        - set_style:
            target: "{{state._resize_pane}}"
            "{{state._resize_edge}}": "{{event.client_x}}"
    - event: drag_end
      condition: "state._resize_pane != null"
      effects:
        - cursor: default
        - set: { _resize_pane: null }
  children:

    # ─── Toolbar pane ───────────────────────────────────────
    - id: toolbar_pane
      type: pane
      summary: "Toolbar"
      description: >
        Fixed-width (72px) vertical toolbar on the left side of the
        workspace. Contains a 2-column grid of 32x32px tool buttons
        followed by the fill/stroke color indicator widget. The pane can
        be dragged by its title bar, closed via the X button, and
        shown/hidden via the Window menu. Cannot be resized horizontally.
      default_position: { x: 0, y: 0, width: 72, height: 900 }
      min_width: 72
      max_width: 72
      fixed_width: true
      style:
        background: "{{theme.colors.pane_bg}}"
        border: "1px solid {{theme.colors.border}}"
      bind:
        visible: "{{state.toolbar_visible}}"
      title_bar:
        label: "Tools"
        draggable: true
        buttons:
          - id: toolbar_close_btn
            type: icon_button
            summary: "Close toolbar"
            icon: "close"
            style: { size: 14 }
            behavior:
              - event: click
                action: toggle_pane
                params: { pane: toolbar }
      content:
        type: container
        layout: column
        style:
          padding: "4 2 4 2"
        children:

          # Tool button grid
          - id: tool_grid
            type: grid
            summary: "Tool buttons"
            description: >
              4-row, 2-column grid of 32x32px tool buttons. Single click
              selects the tool. Buttons with a small triangle indicator have
              alternate tools accessible via long-press (250ms hold).
            cols: 2
            gap: 2
            children:

              # Row 0, Col 0: Selection
              - id: btn_selection
                type: icon_button
                summary: "Selection (V)"
                description: >
                  Black arrow cursor for selecting, moving, and resizing
                  objects. Click to select; Shift+click to add to selection;
                  drag to move; drag handles to resize. No long-press
                  alternates.
                icon: "selection_arrow"
                grid: { row: 0, col: 0 }
                style:
                  size: "{{theme.sizes.tool_button}}"
                  checked_bg: "{{theme.colors.button_checked}}"
                  hover: { background: "{{theme.colors.button_checked}}" }
                behavior:
                  - event: click
                    action: select_tool
                    params: { tool: selection }
                bind:
                  checked: "{{state.active_tool}} == selection"

              # Row 0, Col 1: Arrow slot (Direct Selection / Group Selection)
              - id: btn_arrow_slot
                type: icon_button
                summary: "Direct Selection (A)"
                description: >
                  White arrow for selecting individual anchor points and
                  path segments. Click an anchor to select it; drag to move
                  it; drag control handles to adjust curves. Long-press
                  (250ms) opens a menu to switch between Direct Selection
                  and Group Selection tools. The button shows checked state
                  when any tool in this slot is active.
                icon: "direct_selection_arrow"
                grid: { row: 0, col: 1 }
                style:
                  size: "{{theme.sizes.tool_button}}"
                  checked_bg: "{{theme.colors.button_checked}}"
                  hover: { background: "{{theme.colors.button_checked}}" }
                behavior:
                  - event: mouse_down
                    effects:
                      - start_timer:
                          id: "long_press_btn_arrow_slot"
                          delay_ms: 250
                          effects:
                            - open_dialog: { id: arrow_alternates }
                  - event: mouse_up
                    effects:
                      - cancel_timer: "long_press_btn_arrow_slot"
                  - event: click
                    action: select_tool
                    params: { tool: direct_selection }
                bind:
                  checked: "{{state.active_tool}} in [direct_selection, group_selection]"
                alternates:
                  menu_id: arrow_alternates
                  items:
                    - id: direct_selection
                      label: "Direct Selection"
                      icon: "direct_selection_arrow"
                      description: "Select and move individual anchor points and path segments"
                    - id: group_selection
                      label: "Group Selection"
                      icon: "group_selection_arrow"
                      description: "Select objects within groups without ungrouping"

              # Row 1, Col 0: Pen slot
              - id: btn_pen_slot
                type: icon_button
                summary: "Pen (P)"
                description: >
                  Draw precise paths by clicking to place anchor points.
                  Click-and-drag to create smooth bezier curves with control
                  handles. Long-press (250ms) opens a menu to switch between
                  Pen, Add Anchor Point, Delete Anchor Point, and Anchor
                  Point tools.
                icon: "pen"
                grid: { row: 1, col: 0 }
                style:
                  size: "{{theme.sizes.tool_button}}"
                  checked_bg: "{{theme.colors.button_checked}}"
                  hover: { background: "{{theme.colors.button_checked}}" }
                behavior:
                  - event: mouse_down
                    effects:
                      - start_timer:
                          id: "long_press_btn_pen_slot"
                          delay_ms: 250
                          effects:
                            - open_dialog: { id: pen_alternates }
                  - event: mouse_up
                    effects:
                      - cancel_timer: "long_press_btn_pen_slot"
                  - event: click
                    action: select_tool
                    params: { tool: pen }
                bind:
                  checked: "{{state.active_tool}} in [pen, add_anchor, delete_anchor, anchor_point]"
                alternates:
                  menu_id: pen_alternates
                  items:
                    - { id: pen,            label: "Pen",                 icon: "pen",
                        description: "Draw paths by clicking to place anchor points" }
                    - { id: add_anchor,     label: "Add Anchor Point",    icon: "add_anchor",
                        description: "Add anchor points to an existing path" }
                    - { id: delete_anchor,  label: "Delete Anchor Point", icon: "delete_anchor",
                        description: "Remove anchor points from a path" }
                    - { id: anchor_point,   label: "Anchor Point",        icon: "anchor_point",
                        description: "Convert anchor points between smooth and corner" }

              # Row 1, Col 1: Pencil slot
              - id: btn_pencil_slot
                type: icon_button
                summary: "Pencil (N)"
                description: >
                  Freehand drawing tool that creates paths by tracking mouse
                  movement. The path is smoothed after drawing. Long-press
                  (250ms) opens a menu to switch between Pencil, Path Eraser,
                  and Smooth tools.
                icon: "pencil"
                grid: { row: 1, col: 1 }
                style:
                  size: "{{theme.sizes.tool_button}}"
                  checked_bg: "{{theme.colors.button_checked}}"
                  hover: { background: "{{theme.colors.button_checked}}" }
                behavior:
                  - event: mouse_down
                    effects:
                      - start_timer:
                          id: "long_press_btn_pencil_slot"
                          delay_ms: 250
                          effects:
                            - open_dialog: { id: pencil_alternates }
                  - event: mouse_up
                    effects:
                      - cancel_timer: "long_press_btn_pencil_slot"
                  - event: click
                    action: select_tool
                    params: { tool: pencil }
                bind:
                  checked: "{{state.active_tool}} in [pencil, path_eraser, smooth]"
                alternates:
                  menu_id: pencil_alternates
                  items:
                    - { id: pencil,      label: "Pencil",      icon: "pencil",
                        description: "Draw freehand paths" }
                    - { id: path_eraser, label: "Path Eraser",  icon: "path_eraser",
                        description: "Erase portions of paths" }
                    - { id: smooth,      label: "Smooth",       icon: "smooth",
                        description: "Smooth rough path segments" }

              # Row 2, Col 0: Text slot
              - id: btn_text_slot
                type: icon_button
                summary: "Type (T)"
                description: >
                  Create and edit text objects. Click on the canvas to place
                  a text insertion point; click-drag to create a text area
                  box. Long-press (250ms) opens a menu to switch between
                  Type and Type on a Path tools.
                icon: "type"
                grid: { row: 2, col: 0 }
                style:
                  size: "{{theme.sizes.tool_button}}"
                  checked_bg: "{{theme.colors.button_checked}}"
                  hover: { background: "{{theme.colors.button_checked}}" }
                behavior:
                  - event: mouse_down
                    effects:
                      - start_timer:
                          id: "long_press_btn_text_slot"
                          delay_ms: 250
                          effects:
                            - open_dialog: { id: text_alternates }
                  - event: mouse_up
                    effects:
                      - cancel_timer: "long_press_btn_text_slot"
                  - event: click
                    action: select_tool
                    params: { tool: type }
                bind:
                  checked: "{{state.active_tool}} in [type, type_on_path]"
                alternates:
                  menu_id: text_alternates
                  items:
                    - { id: type,         label: "Type",            icon: "type",
                        description: "Create and edit text" }
                    - { id: type_on_path, label: "Type on a Path",  icon: "type_on_path",
                        description: "Place text along a path curve" }

              # Row 2, Col 1: Line
              - id: btn_line
                type: icon_button
                summary: "Line (\\)"
                description: >
                  Draw straight line segments. Click to place the start
                  point, drag to the end point, and release. Hold Shift to
                  constrain to 45-degree increments. No long-press
                  alternates.
                icon: "line"
                grid: { row: 2, col: 1 }
                style:
                  size: "{{theme.sizes.tool_button}}"
                  checked_bg: "{{theme.colors.button_checked}}"
                  hover: { background: "{{theme.colors.button_checked}}" }
                behavior:
                  - event: click
                    action: select_tool
                    params: { tool: line }
                bind:
                  checked: "{{state.active_tool}} == line"

              # Row 3, Col 0: Shape slot
              - id: btn_shape_slot
                type: icon_button
                summary: "Rectangle (M)"
                description: >
                  Draw rectangular shapes. Click-drag to define the
                  bounding box. Hold Shift to constrain to a square; hold
                  Alt/Option to draw from center. Long-press (250ms) opens
                  a menu to switch between Rectangle, Rounded Rectangle,
                  Polygon, and Star tools.
                icon: "rect"
                grid: { row: 3, col: 0 }
                style:
                  size: "{{theme.sizes.tool_button}}"
                  checked_bg: "{{theme.colors.button_checked}}"
                  hover: { background: "{{theme.colors.button_checked}}" }
                behavior:
                  - event: mouse_down
                    effects:
                      - start_timer:
                          id: "long_press_btn_shape_slot"
                          delay_ms: 250
                          effects:
                            - open_dialog: { id: shape_alternates }
                  - event: mouse_up
                    effects:
                      - cancel_timer: "long_press_btn_shape_slot"
                  - event: click
                    action: select_tool
                    params: { tool: rect }
                bind:
                  checked: "{{state.active_tool}} in [rect, rounded_rect, polygon, star]"
                alternates:
                  menu_id: shape_alternates
                  items:
                    - { id: rect,         label: "Rectangle",         icon: "rect",
                        description: "Draw rectangles and squares" }
                    - { id: rounded_rect, label: "Rounded Rectangle", icon: "rounded_rect",
                        description: "Draw rectangles with rounded corners" }
                    - { id: polygon,      label: "Polygon",           icon: "polygon",
                        description: "Draw regular polygons" }
                    - { id: star,         label: "Star",              icon: "star",
                        description: "Draw star shapes" }

              # Row 3, Col 1: Lasso
              - id: btn_lasso
                type: icon_button
                summary: "Lasso (Q)"
                description: >
                  Freehand selection tool. Draw a closed lasso boundary
                  around objects to select them. Any object whose bounds
                  intersect the lasso path is included in the selection.
                  No long-press alternates.
                icon: "lasso"
                grid: { row: 3, col: 1 }
                style:
                  size: "{{theme.sizes.tool_button}}"
                  checked_bg: "{{theme.colors.button_checked}}"
                  hover: { background: "{{theme.colors.button_checked}}" }
                behavior:
                  - event: click
                    action: select_tool
                    params: { tool: lasso }
                bind:
                  checked: "{{state.active_tool}} == lasso"

          - type: spacer
            style: { height: 8 }

          # Fill / Stroke widget
          - id: fill_stroke_widget
            type: container
            summary: "Fill & Stroke"
            description: >
              Two overlapping color swatches showing the active fill and stroke
              colors. Click a swatch to bring it to front. Double-click to open
              the color picker. Swap arrow (top-right) exchanges colors. Default
              button (bottom-left, D key) resets to white fill / 1pt black stroke.
              None button removes color from the front swatch.
            layout: column
            style:
              alignment: center
              width: 56
              height: 76
            children:

              - id: fill_swatch
                type: color_swatch
                summary: "Fill color"
                description: >
                  28x28 filled square showing the active fill color. Positioned
                  at the top-left of the fill/stroke widget, overlapping with
                  the stroke swatch. Click to bring fill to front (fill_on_top
                  = true); double-click to open the color picker for fill.
                  When fill is null, shows a white square with a red diagonal
                  line. Z-index swaps based on fill_on_top state.
                style: { size: 28, position: { x: 0, y: 0 } }
                bind:
                  color: "{{state.fill_color}}"
                  z_index: "{{state.fill_on_top}} == true ? 2 : 1"
                behavior:
                  - event: click
                    effects:
                      - set: { fill_on_top: true }
                    description: "Bring fill swatch to front"
                  - event: double_click
                    action: open_color_picker
                    params: { target: fill }

              - id: stroke_swatch
                type: color_swatch
                summary: "Stroke color"
                description: >
                  28x28 hollow square representing the stroke color — a
                  colored border (6px) with a white center, offset 10px
                  down-right from the fill swatch so both are partially
                  visible. Click to bring stroke to front (fill_on_top =
                  false); double-click to open the color picker for stroke.
                  When stroke is null, shows a white square with a red
                  diagonal line.
                hollow: true
                style: { size: 28, position: { x: 10, y: 10 } }
                bind:
                  color: "{{state.stroke_color}}"
                  z_index: "{{state.fill_on_top}} == true ? 1 : 2"
                behavior:
                  - event: click
                    effects:
                      - set: { fill_on_top: false }
                    description: "Bring stroke swatch to front"
                  - event: double_click
                    action: open_color_picker
                    params: { target: stroke }

              - id: swap_btn
                type: icon_button
                summary: "Swap (Shift+X)"
                description: "Double-headed arrow; swaps fill and stroke colors"
                icon: "swap_arrows"
                style: { size: 12, position: { x: 44, y: 0 } }
                behavior:
                  - event: click
                    action: swap_fill_stroke

              - id: default_btn
                type: icon_button
                summary: "Default (D)"
                description: "Resets fill to white and stroke to 1pt black"
                icon: "default_colors"
                style: { size: 14, position: { x: 0, y: 42 } }
                behavior:
                  - event: click
                    action: reset_fill_stroke

              - id: none_btn
                type: icon_button
                summary: "None"
                description: >
                  Sets the front swatch color to none. If fill is on top,
                  removes fill; otherwise removes stroke.
                icon: "color_none"
                style: { size: 14, position: { x: 38, y: 62 } }
                behavior:
                  - event: click
                    action: set_fill_none
                    condition: "{{state.fill_on_top}}"
                  - event: click
                    action: set_stroke_none
                    condition: "not {{state.fill_on_top}}"

          - type: spacer

    # ─── Canvas pane ────────────────────────────────────────
    - id: canvas_pane
      type: pane
      summary: "Canvas"
      description: >
        Central drawing area with a multi-tab document bar at the top.
        Each open document gets a tab labeled with its filename (or
        "Untitled-N" for new documents); a * prefix indicates unsaved
        changes. Clicking a tab switches the visible canvas. The drawing
        surface supports zoom (Ctrl+=/-, scroll wheel) and pan (scroll
        bars, Space+drag). The pane is a flex pane that expands to fill
        space between the toolbar and dock. Double-clicking the title bar
        maximizes the canvas to fill the viewport; double-click again or
        click the maximize button to restore.
      default_position: { x: 72, y: 0, width: 888, height: 900 }
      min_width: 200
      flex: true
      layout_state: [canvas_maximized]
      style:
        background: "{{theme.colors.window_bg}}"
        border: "1px solid {{theme.colors.border}}"
      bind:
        visible: "{{state.canvas_visible}}"
      title_bar:
        id: canvas_title_bar
        label: "Canvas"
        draggable: true
        behavior:
          - event: double_click
            condition: "not {{state.canvas_maximized}}"
            action: maximize_canvas
          - event: double_click
            condition: "{{state.canvas_maximized}}"
            action: restore_canvas
        buttons:
          - id: maximize_btn
            type: icon_button
            summary: "Maximize"
            icon: "maximize"
            style: { size: 14 }
            behavior:
              - event: click
                condition: "not {{state.canvas_maximized}}"
                action: maximize_canvas
              - event: click
                condition: "{{state.canvas_maximized}}"
                action: restore_canvas
          - id: canvas_close_btn
            type: icon_button
            summary: "Close canvas"
            icon: "close"
            style: { size: 14 }
            behavior:
              - event: click
                action: toggle_pane
                params: { pane: canvas }
      content:
        type: container
        layout: column
        style: { flex: 1 }
        children:

          # Tab bar (populated dynamically by new_document)
          - id: canvas_tab_bar
            type: container
            summary: "Document tabs"
            description: >
              Horizontal row of tab buttons at the top of the canvas pane.
              Starts empty; tabs are added dynamically by new_document and
              open_file actions via create_child. Each tab shows the document
              name and a close (X) button. Clicking a tab sets active_tab to
              that tab's index; the active tab gets highlighted styling. The
              tab bar is hidden when no documents are open (tab_count == 0).
            layout: row
            style:
              background: "{{theme.colors.pane_bg_dark}}"
              min_height: 24
              gap: 0
              alignment: center
            bind:
              visible: "{{state.tab_count}} != 0"
            children: []

          # Drawing surface area (canvases added dynamically)
          - id: drawing_surface
            type: container
            summary: "Drawing surface"
            description: >
              Container for document canvases, filling the space below the
              tab bar. Each open document gets a canvas element here via
              create_child. Only the canvas matching active_tab is visible;
              the rest are hidden. Starts empty. The visible canvas is the
              interactive drawing surface where tools operate.
            layout: column
            style:
              flex: 1
              min_height: 200
              background: "{{theme.colors.window_bg}}"
            children: []

    # ─── Dock panel pane ────────────────────────────────────
    - id: dock_pane
      type: pane
      summary: "Panels"
      description: >
        Right-side dock containing panel groups (Layers; Color/Stroke/
        Properties). Each group has a tab bar for switching between its
        panels, a collapse chevron to minimize the group, and a hamburger
        menu for closing individual panels. The dock can collapse to a
        36px icon strip showing one icon per visible panel; clicking an
        icon expands the dock and activates that panel. The dock is
        resizable between min_width (150px) and max_width (500px). Panels
        can be reordered between groups via drag-and-drop (tier 2).
        Panel visibility and group state are saved with workspace layouts.
      default_position: { x: 960, y: 0, width: 240, height: 900 }
      min_width: 150
      max_width: 500
      collapsed_width: 36
      layout_state: [dock_collapsed, dock_group0_active, dock_group1_active,
                     dock_group0_collapsed, dock_group1_collapsed,
                     layers_visible, color_visible, stroke_visible,
                     properties_visible]
      style:
        background: "{{theme.colors.pane_bg}}"
        border: "1px solid {{theme.colors.border}}"
      bind:
        visible: "{{state.dock_visible}}"
        collapsed: "{{state.dock_collapsed}}"
      title_bar:
        label: "Panels"
        draggable: true
        buttons:
          - id: dock_collapse_btn
            type: icon_button
            summary: "Collapse/Expand dock"
            icon: "chevron_right"
            style: { size: 20 }
            behavior:
              - event: click
                condition: "not {{state.dock_collapsed}}"
                action: collapse_dock
              - event: click
                condition: "{{state.dock_collapsed}}"
                action: expand_dock
            bind:
              icon: "{{state.dock_collapsed}} == true ? chevron_left : chevron_right"
          - id: dock_close_btn
            type: icon_button
            summary: "Close panels"
            icon: "close"
            style: { size: 14 }
            behavior:
              - event: click
                action: toggle_pane
                params: { pane: dock }
      tier: 2
      behavior:
        - event: drag_start
          description: >
            Drag a panel tab to reorder it within its group or move it to
            another group. A translucent ghost of the tab follows the cursor.
            Visual drop indicators (horizontal line between groups, highlight
            on a group header) show where the panel will land.
        - event: drag_move
          description: >
            Update the drop indicator position as the cursor moves over
            group headers and between-group gaps.
        - event: drag_end
          description: >
            Drop the panel tab. If dropped on a different group header,
            remove the panel from its source group and append it to the
            target group, updating the active tab indices. If dropped
            between groups, create a new group containing just that panel.
            If the source group is now empty, remove it.
        - event: drop
          description: >
            Accept a panel tab dragged from another group. Insert it at
            the indicated position and make it the active tab.
      content:
        type: container
        layout: column
        children:

          # Collapsed icon strip (visible only when dock is collapsed)
          - id: dock_collapsed_strip
            type: container
            summary: "Collapsed panel icons"
            description: >
              Vertically stacked panel icons shown when the dock is collapsed
              to its narrow strip. Each icon represents one panel; only icons
              for visible panels are shown. A separator divides group 0 icons
              from group 1 icons. Clicking any icon expands the dock to full
              width, activates the clicked panel's tab, and un-collapses its
              group.
            layout: column
            style: { alignment: center, gap: 2, padding: "4 0" }
            bind:
              visible: "{{state.dock_collapsed}}"
            children:
              # Group 0 icons
              - id: dock_icon_layers
                type: icon_button
                summary: "Layers"
                icon: "panel_layers"
                style: { size: 28 }
                bind:
                  visible: "{{state.layers_visible}}"
                behavior:
                  - event: click
                    effects:
                      - dispatch: expand_dock
                      - set: { dock_group0_active: 0, dock_group0_collapsed: false }
              # Separator between groups
              - { type: separator }
              # Group 1 icons
              - id: dock_icon_color
                type: icon_button
                summary: "Color"
                icon: "panel_color"
                style: { size: 28 }
                bind:
                  visible: "{{state.color_visible}}"
                behavior:
                  - event: click
                    effects:
                      - dispatch: expand_dock
                      - set: { dock_group1_active: 0, dock_group1_collapsed: false }
              - id: dock_icon_stroke
                type: icon_button
                summary: "Stroke"
                icon: "panel_stroke"
                style: { size: 28 }
                bind:
                  visible: "{{state.stroke_visible}}"
                behavior:
                  - event: click
                    effects:
                      - dispatch: expand_dock
                      - set: { dock_group1_active: 1, dock_group1_collapsed: false }
              - id: dock_icon_properties
                type: icon_button
                summary: "Properties"
                icon: "panel_properties"
                style: { size: 28 }
                bind:
                  visible: "{{state.properties_visible}}"
                behavior:
                  - event: click
                    effects:
                      - dispatch: expand_dock
                      - set: { dock_group1_active: 2, dock_group1_collapsed: false }

          # Group 0: Layers (hidden when collapsed)
          - id: dock_group_0
            type: container
            summary: "Layers group"
            description: >
              Panel group containing the Layers panel. Has a header bar with
              the Layers tab button, a collapse/expand chevron, and a
              hamburger menu (with Close Layers). The group body shows the
              layers panel content. Hidden when the dock is collapsed or
              when layers_visible is false. The chevron toggles
              dock_group0_collapsed, which hides the body and hamburger
              while keeping the header visible.
            layout: column
            bind:
              visible: "not {{state.dock_collapsed}} and {{state.layers_visible}}"
            children:
              - id: dock_group_0_header
                type: container
                layout: row
                style:
                  background: "{{theme.colors.pane_bg_dark}}"
                  padding: "2 4"
                  gap: 2
                  alignment: center
                children:
                  - id: dock_group_0_tab_layers
                    type: button
                    label: "Layers"
                    summary: "Layers tab"
                    style: { padding: "1 6", font_size: 11 }
                    behavior:
                      - event: click
                        effects:
                          - set: { dock_group0_active: 0 }
                    bind:
                      active: "{{state.dock_group0_active}} == 0"
                  - type: spacer
                  - id: dock_group_0_chevron
                    type: icon_button
                    summary: "Collapse/Expand group"
                    icon: "chevron_right"
                    style: { size: 14 }
                    behavior:
                      - event: click
                        effects:
                          - toggle: dock_group0_collapsed
                    bind:
                      icon: "{{state.dock_group0_collapsed}} == true ? chevron_left : chevron_right"
                  - id: dock_group_0_hamburger
                    type: dropdown
                    summary: "Panel menu"
                    icon: "hamburger"
                    style: { size: 14 }
                    items:
                      - { label: "Close Layers", action: close_panel, params: { panel: layers } }
                    bind:
                      visible: "not {{state.dock_group0_collapsed}}"

              - id: dock_group_0_body
                type: container
                summary: "Layers panel body"
                layout: column
                bind:
                  visible: "not {{state.dock_group0_collapsed}}"
                children:
                  # Content defined in workspace/panels/layers.yaml
                  - include: "panels/layers.yaml"

          - id: dock_group_separator
            type: separator
            bind:
              visible: "not {{state.dock_collapsed}} and {{state.layers_visible}} and ({{state.color_visible}} or {{state.stroke_visible}} or {{state.properties_visible}})"

          # Group 1: Color, Stroke, Properties
          # Visible when dock is expanded and at least one panel is visible
          - id: dock_group_1
            type: container
            summary: "Properties group"
            description: >
              Panel group with Color, Stroke, and Properties tabs. The
              header bar shows one tab button per visible panel, a collapse
              chevron, and a hamburger menu listing close options for each
              panel. Only one panel body is visible at a time, determined by
              dock_group1_active. Tab buttons for hidden panels are not
              shown. The group is hidden when the dock is collapsed or when
              all three panels are hidden. The chevron toggles
              dock_group1_collapsed.
            layout: column
            bind:
              visible: "not {{state.dock_collapsed}} and ({{state.color_visible}} or {{state.stroke_visible}} or {{state.properties_visible}})"
            children:
              - id: dock_group_1_header
                type: container
                layout: row
                style:
                  background: "{{theme.colors.pane_bg_dark}}"
                  padding: "2 4"
                  gap: 2
                  alignment: center
                children:
                  - id: dock_group_1_tab_color
                    type: button
                    label: "Color"
                    summary: "Color tab"
                    style: { padding: "1 6", font_size: 11 }
                    behavior:
                      - event: click
                        effects:
                          - set: { dock_group1_active: 0 }
                    bind:
                      visible: "{{state.color_visible}}"
                      active: "{{state.dock_group1_active}} == 0"
                  - id: dock_group_1_tab_stroke
                    type: button
                    label: "Stroke"
                    summary: "Stroke tab"
                    style: { padding: "1 6", font_size: 11 }
                    behavior:
                      - event: click
                        effects:
                          - set: { dock_group1_active: 1 }
                    bind:
                      visible: "{{state.stroke_visible}}"
                      active: "{{state.dock_group1_active}} == 1"
                  - id: dock_group_1_tab_properties
                    type: button
                    label: "Properties"
                    summary: "Properties tab"
                    style: { padding: "1 6", font_size: 11 }
                    behavior:
                      - event: click
                        effects:
                          - set: { dock_group1_active: 2 }
                    bind:
                      visible: "{{state.properties_visible}}"
                      active: "{{state.dock_group1_active}} == 2"
                  - type: spacer
                  - id: dock_group_1_chevron
                    type: icon_button
                    summary: "Collapse/Expand group"
                    icon: "chevron_right"
                    style: { size: 14 }
                    behavior:
                      - event: click
                        effects:
                          - toggle: dock_group1_collapsed
                    bind:
                      icon: "{{state.dock_group1_collapsed}} == true ? chevron_left : chevron_right"
                  - id: dock_group_1_hamburger
                    type: dropdown
                    summary: "Panel menu"
                    icon: "hamburger"
                    style: { size: 14 }
                    items:
                      - { label: "Close Color",      action: close_panel, params: { panel: color } }
                      - { label: "Close Stroke",     action: close_panel, params: { panel: stroke } }
                      - { label: "Close Properties", action: close_panel, params: { panel: properties } }
                    bind:
                      visible: "not {{state.dock_group1_collapsed}}"

              - id: dock_group_1_body
                type: container
                summary: "Active panel body"
                layout: column
                style: { flex: 1 }
                bind:
                  visible: "not {{state.dock_group1_collapsed}}"
                children:
                  # Content defined in workspace/panels/*.yaml
                  - include: "panels/color.yaml"
                    bind:
                      visible: "{{state.dock_group1_active}} == 0 and {{state.color_visible}}"
                  - include: "panels/stroke.yaml"
                    bind:
                      visible: "{{state.dock_group1_active}} == 1 and {{state.stroke_visible}}"
                  - include: "panels/properties.yaml"
                    bind:
                      visible: "{{state.dock_group1_active}} == 2 and {{state.properties_visible}}"
