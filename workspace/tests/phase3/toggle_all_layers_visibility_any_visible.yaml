      name: "A"
      common: { visibility: invisible, locked: false }
    - kind: Layer
      name: "B"
      common: { visibility: invisible, locked: false }
    - kind: Layer
      name: "C"
      common: { visibility: invisible, locked: false }
expected_snapshots: 1
