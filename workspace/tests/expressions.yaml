# Expression language conformance tests.
# Every interpreter MUST pass all test cases.
# See SCHEMA.md, Expression Language section.

tests:
  # Path resolution
  - expr: "state.x"
    state: { x: 5 }
    expected: 5
    type: number

  - expr: "state.missing"
    state: { x: 5 }
    expected: null
    type: "null"

  # Comparison — strict typed
  - expr: '5 == "5"'
    expected: false
    type: bool

  - expr: "5 == 5"
    expected: true
    type: bool

  - expr: "#ff0000 == #ff0000"
    expected: true
    type: bool

  - expr: '#ff0000 == "#ff0000"'
    expected: false
    type: bool
    note: "color vs string — different types"

  # Numeric comparison
  - expr: "state.count > 0"
    state: { count: 3 }
    expected: true
    type: bool

  - expr: "state.count > 0"
    state: { count: 0 }
    expected: false
    type: bool

  # Ternary
  - expr: "if state.flag then state.a else state.b"
    state: { flag: true, a: 10, b: 20 }
    expected: 10
    type: number

  - expr: "if state.flag then state.a else state.b"
    state: { flag: false, a: 10, b: 20 }
    expected: 20
    type: number

  # Null checks
  - expr: "state.color != null"
    state: { color: null }
    expected: false
    type: bool

  - expr: "state.color != null"
    state: { color: "#ff0000" }
    expected: true
    type: bool

  # Bool coercion
  - expr: "not state.x"
    state: { x: 0 }
    expected: true
    type: bool

  - expr: "not state.x"
    state: { x: "" }
    expected: true
    type: bool

  - expr: "not state.x"
    state: { x: "hello" }
    expected: false
    type: bool

  # Prefix NOT via ! — synonym for the `not` keyword (same Not token, same
  # precedence: binds tighter than ||). `!=` still wins via greedy two-char
  # lexing (see the != cases above).
  - expr: "!true"
    expected: false
    type: bool

  - expr: "!false"
    expected: true
    type: bool

  - expr: "!state.x"
    state: { x: 0 }
    expected: true
    type: bool
    note: "mirrors `not state.x`; 0 is falsy"

  - expr: "!(false || true)"
    expected: false
    type: bool
    note: "parens: !(false || true) = !true = false"

  - expr: "!false || false"
    expected: true
    type: bool
    note: "precedence: (!false) || false = true"

  # Logical operators — && / || are synonyms for the `and` / `or`
  # keywords: same And/Or tokens, same precedence (&& binds tighter
  # than ||, both looser than comparison and `not`). Pinned across all
  # 5 apps. Before this, the lexers had no && / || and the lenient
  # parsers (Rust/Swift) silently dropped everything after the first
  # operand while the strict ones (OCaml/Python) errored to null.
  - expr: "true && true"
    expected: true
    type: bool

  - expr: "true && false"
    expected: false
    type: bool

  - expr: "false || false"
    expected: false
    type: bool

  - expr: "false || true"
    expected: true
    type: bool

  - expr: "true && true && false"
    expected: false
    type: bool

  - expr: "false || false || true"
    expected: true
    type: bool

  # Precedence: && binds tighter than ||
  - expr: "true || false && false"
    expected: true
    type: bool
    note: "parses as true || (false && false)"

  - expr: "false && false || true"
    expected: true
    type: bool
    note: "parses as (false && false) || true"

  - expr: "false && (false || true)"
    expected: false
    type: bool
    note: "parens override precedence"

  # Precedence: comparison binds tighter than && / ||
  - expr: "1 < 2 && 3 < 4"
    expected: true
    type: bool

  - expr: "1 < 2 && 3 > 4"
    expected: false
    type: bool

  - expr: "1 > 2 || 3 > 1"
    expected: true
    type: bool
    note: "canonical case: lenient parsers previously truncated to (1 > 2) = false"

  # Precedence: `not` binds tighter than ||
  - expr: "not false || false"
    expected: true
    type: bool
    note: "parses as (not false) || false"

  # State operands
  - expr: "state.a && state.b"
    state: { a: true, b: false }
    expected: false
    type: bool

  - expr: "state.a || state.b"
    state: { a: false, b: true }
    expected: true
    type: bool

  # Strict parsing — a complete expression must consume all its tokens.
  # Trailing tokens mean malformed input, which evaluates to null in every
  # app. (Before strictness, lenient parsers returned the first operand:
  # "1 2" => 1, "true false" => true, "1 + 2 3" => 3.)
  - expr: "1 2"
    expected: null
    type: "null"
    note: "two numbers, no operator — rejected, not truncated to 1"

  - expr: "true false"
    expected: null
    type: "null"

  - expr: "1 + 2 3"
    expected: null
    type: "null"
    note: "valid (1 + 2) followed by garbage — rejected, not truncated to 3"

  # Function calls
  - expr: "hsb_h(#ff0000)"
    expected: 0
    type: number

  - expr: "rgb_r(#ff0000)"
    expected: 255
    type: number

  - expr: "hex(#ff0000)"
    expected: "ff0000"
    type: string

  # Function with ternary argument
  - expr: "hsb_h(if state.flag then state.a else state.b)"
    state: { flag: true, a: "#ff0000", b: "#00ff00" }
    expected: 0
    type: number

  - expr: "hsb_h(if state.flag then state.a else state.b)"
    state: { flag: false, a: "#ff0000", b: "#00ff00" }
    expected: 120
    type: number

  # Color construction
  - expr: "rgb(255, 0, 0)"
    expected: "#ff0000"
    type: color

  - expr: "hsb(120, 100, 100)"
    expected: "#00ff00"
    type: color

  # Hue wrapping — 360 is out of range, should clamp or wrap to 0
  - expr: "hsb_h(hsb(0, 100, 100))"
    expected: 0
    type: number

  - expr: "hsb_h(#ff0000)"
    expected: 0
    type: number
    note: "pure red hue is 0, never 360"

  # Method calls
  - expr: "state.items.length"
    state: { items: [1, 2, 3] }
    expected: 3
    type: number

  - expr: "state.items.length > 0"
    state: { items: [] }
    expected: false
    type: bool

  # Membership function
  - expr: 'mem("pen", state.tools)'
    state: { tools: ["pen", "rect", "ellipse"] }
    expected: true
    type: bool

  - expr: 'mem("brush", state.tools)'
    state: { tools: ["pen", "rect", "ellipse"] }
    expected: false
    type: bool

  - expr: "mem(3, state.ids)"
    state: { ids: [1, 2, 3] }
    expected: true
    type: bool

  # mem with non-list RHS
  - expr: 'mem("x", state.name)'
    state: { name: "hello" }
    expected: false
    type: bool
    note: "RHS is not a list — always false"

  # Logical operators
  - expr: "state.a and state.b"
    state: { a: true, b: false }
    expected: false
    type: bool

  - expr: "state.a or state.b"
    state: { a: false, b: true }
    expected: true
    type: bool

  # Dynamic indexing
  - expr: "data.libs[state.key].name"
    state: { key: "web" }
    data: { libs: { web: { name: "Web Colors" } } }
    expected: "Web Colors"
    type: string

  # Numeric list indexing via dot
  - expr: "state.colors.0"
    state: { colors: ["#ff0000", "#00ff00", "#0000ff"] }
    expected: "#ff0000"
    type: color

  # Error handling — missing key
  - expr: "state.missing.nested"
    state: {}
    expected: null
    type: "null"

  # Error handling — wrong type for comparison
  - expr: '"hello" > 5'
    expected: false
    type: bool

  # Nested ternary
  - expr: 'if state.x == 1 then "one" else if state.x == 2 then "two" else "other"'
    state: { x: 2 }
    expected: "two"
    type: string

  # Precedence: and binds tighter than or
  - expr: "state.a or state.b and state.c"
    state: { a: false, b: true, c: false }
    expected: false
    type: bool
    note: "b and c = false, then a or false = false"

  # Color literal equality
  - expr: "#fff == #ffffff"
    expected: true
    type: bool
    note: "3-digit shorthand normalized to 6-digit"

  # Color transformation — invert
  - expr: "invert(#ff0000)"
    expected: "#00ffff"
    type: color
    note: "255-255=0, 255-0=255, 255-0=255 → cyan"

  - expr: "invert(#000000)"
    expected: "#ffffff"
    type: color

  - expr: "invert(#ffffff)"
    expected: "#000000"
    type: color

  - expr: "invert(null)"
    expected: "#ffffff"
    type: color
    note: "null treated as #000000, inverted to white"

  # Color transformation — complement
  - expr: "complement(#ff0000)"
    expected: "#00ffff"
    type: color
    note: "hue 0 → 180 = cyan"

  - expr: "complement(#00ff00)"
    expected: "#ff00ff"
    type: color
    note: "hue 120 → 300 = magenta"

  - expr: "complement(#808080)"
    expected: "#808080"
    type: color
    note: "achromatic (s=0) — unchanged"

  # Invert/complement with ternary (the real-world pattern)
  - expr: "invert(if state.flag then state.a else state.b)"
    state: { flag: true, a: "#ff0000", b: "#00ff00" }
    expected: "#00ffff"
    type: color

  - expr: "complement(if state.flag then state.a else state.b)"
    state: { flag: false, a: "#ff0000", b: "#00ff00" }
    expected: "#ff00ff"
    type: color

  # ── Closures, let-bindings & lexical scoping ──
  # These pin the closure-capture contract across all interpreters. The
  # critical invariant: a closure sees its captured definition scope plus
  # its parameters — NEVER the caller's scope (lexical, not dynamic). Runtime
  # namespaces (state/data/...) stay fresh from the call site.

  - expr: "let x = 5 in x + 1"
    expected: 6
    type: number

  - expr: "let x = 3 in let y = 4 in x + y"
    expected: 7
    type: number

  - expr: "let x = 1 in let x = 2 in x"
    expected: 2
    type: number
    note: "inner let shadows outer"

  - expr: "let doubled = state.n * 2 in doubled + 1"
    state: { n: 10 }
    expected: 21
    type: number

  - expr: "(fun x -> x + 1)(5)"
    expected: 6
    type: number

  - expr: "(fun (x, y) -> x + y)(3, 4)"
    expected: 7
    type: number

  - expr: "(fun () -> 42)()"
    expected: 42
    type: number

  - expr: "let f = fun x -> x * 2 in f(7)"
    expected: 14
    type: number

  - expr: "let add = fun (a, b) -> a + b in add(add(1, 2), 3)"
    expected: 6
    type: number

  - expr: "(fun v -> let doubled = v * 2 in doubled + 1)(5)"
    expected: 11
    type: number

  - expr: "(fun x -> x + state.y)(10)"
    state: { y: 5 }
    expected: 15
    type: number
    note: "closure body reads a runtime namespace at call time"

  - expr: "let x = 1 in let f = fun _ -> x in let x = 2 in f(null)"
    expected: 1
    type: number
    note: "closure captures x=1 lexically; the later x=2 does not affect it"

  - expr: "let f = fun _ -> x in let x = 99 in f(null)"
    expected: null
    type: "null"
    note: "x is bound only in the caller's scope, never captured — lexical scoping yields null, not 99 (guards against the dynamic-scope leak)"

  - expr: "let f = fun _ -> state.x in f(null)"
    state: { x: 42 }
    expected: 42
    type: number
    note: "namespace reads inside a closure resolve against the live call-site context"

  # ── Geometry generators: trig (degrees), pow, range, fold ──
  # sin/cos/tan take DEGREES (the app's artist-facing convention; internal
  # geometry converts to radians). range(start, end[, step]) is end-exclusive.
  # fold(list, init, fn) is a left fold with fn(acc, item) — matching the
  # map(list, fn) argument order. List-returning generators are pinned by
  # reducing to a scalar (fold / map+fold) so the gate compares exact numbers.

  - expr: "sin(0)"
    expected: 0
    type: number

  - expr: "sin(90)"
    expected: 1
    type: number
    note: "degrees, not radians"

  - expr: "sin(30)"
    expected: 0.5
    type: number

  - expr: "cos(0)"
    expected: 1
    type: number

  - expr: "cos(180)"
    expected: -1
    type: number

  - expr: "cos(60)"
    expected: 0.5
    type: number

  - expr: "tan(45)"
    expected: 1
    type: number

  - expr: "pow(2, 10)"
    expected: 1024
    type: number

  - expr: "pow(9, 0.5)"
    expected: 3
    type: number
    note: "fractional exponent = square root"

  # atan2(y, x) returns DEGREES (the inverse of sin/cos; used by concept fitters
  # to recover a placement angle). Args are (y, x), matching libm order.
  - expr: "atan2(0, 1)"
    expected: 0
    type: number

  - expr: "atan2(1, 0)"
    expected: 90
    type: number

  - expr: "atan2(1, 1)"
    expected: 45
    type: number

  - expr: "atan2(0, -1)"
    expected: 180
    type: number

  - expr: "atan2(-1, 0)"
    expected: -90
    type: number

  - expr: "atan2(-1, -1)"
    expected: -135
    type: number

  - expr: "fold(range(0, 5), 0, fun (acc, i) -> acc + 1)"
    expected: 5
    type: number
    note: "range(0,5) has 5 elements (end-exclusive)"

  - expr: "fold(range(1, 5), 0, fun (acc, i) -> acc + i)"
    expected: 10
    type: number

  - expr: "fold(range(0, 10, 2), 0, fun (acc, i) -> acc + i)"
    expected: 20
    type: number
    note: "3-arg range with step: 0+2+4+6+8"

  - expr: "fold([10, 20, 30], 0, fun (acc, x) -> acc + x)"
    expected: 60
    type: number
    note: "fold over a list literal"

  - expr: "fold(map(range(1, 4), fun i -> i * i), 0, fun (acc, x) -> acc + x)"
    expected: 14
    type: number
    note: "map+range+fold: 1 + 4 + 9"

  - expr: "fold(map(range(0, 4), fun i -> cos(90 * i)), 0, fun (acc, x) -> acc + x)"
    expected: 0
    type: number
    note: "geometry composite: cos(0)+cos(90)+cos(180)+cos(270) = 1+0-1+0"

  # ── Integer math: floor and mod (parity primitives for gear/star) ──
  # mod(a, b) is floored: a - b * floor(a / b) (result takes the sign of b),
  # defined identically in every interpreter — NOT each language's native %,
  # whose sign convention differs. mod by 0 is null.

  - expr: "floor(3.7)"
    expected: 3
    type: number

  - expr: "floor(5)"
    expected: 5
    type: number

  - expr: "floor(-1.2)"
    expected: -2
    type: number
    note: "floor rounds toward negative infinity"

  - expr: "floor(7 / 4)"
    expected: 1
    type: number
    note: "the gear tooth index t = floor(k / 4)"

  - expr: "mod(7, 3)"
    expected: 1
    type: number

  - expr: "mod(8, 4)"
    expected: 0
    type: number

  - expr: "mod(5, 2)"
    expected: 1
    type: number
    note: "odd parity"

  - expr: "mod(0, 2)"
    expected: 0
    type: number
    note: "even parity"

  - expr: "mod(-1, 3)"
    expected: 2
    type: number
    note: "floored mod: -1 - 3*floor(-1/3) = -1 - 3*(-1) = 2"

  - expr: "mod(10, 0)"
    expected: null
    type: "null"
    note: "mod by zero is null"
