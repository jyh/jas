default_layouts:

  Default:
    panes:
      toolbar_pane: { left: 0, top: 0, width: 72, height: 900 }
      canvas_pane:  { left: 72, top: 0, width: 888, height: 900 }
      dock_pane:    { left: 960, top: 0, width: 240, height: 900 }
    state:
      canvas_maximized: false
      dock_collapsed: false
    dock:
      dock_main:
        groups:
          - panels: [color, swatches, brushes]
            active: 0
          - panels: [align, boolean]
            active: 0
          - panels: [character, paragraph]
            active: 0
          - panels: [stroke, properties]
            active: 0
          - panels: [artboards, layers]
            active: 0
    floating: []

