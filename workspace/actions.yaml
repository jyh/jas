actions:
  # ── File ──────────────────────────────────────────────────
  new_document:
    description: >
      Create a new untitled document. Adds a tab labeled "Untitled-N" to the
      canvas tab bar and a blank white canvas to the drawing surface. The new
      tab becomes active immediately. The tab's close button dispatches
      close_tab (which checks for unsaved changes). Tab index is captured at
      creation time via prop so click handlers remain correct as more tabs
      are added.
    category: file
    effects:
      - set: { active_tab: "state.tab_count" }
      # Create the tab button (with close x) in the tab bar.
      # prop.index is resolved once at creation time; state.*
      # references remain reactive.
      - create_child:
          parent: canvas_tab_bar
          props:
            index: "state.tab_count"
          element:
            id: "canvas_tab_{{prop.index}}"
            type: container
            layout: row
            style: { padding: "2 4 2 8", font_size: 11, gap: 4, alignment: center, background: "#4a4a4a", border: "1px solid #666" }
            behavior:
              - event: click
                effects:
                  - set: { active_tab: "prop.index" }
            bind:
              active: "state.active_tab == prop.index"
            children:
              - type: text
                content: "Untitled-{{prop.index}}"
              - type: icon_button
                icon: "close"
                summary: "Close tab"
                style: { size: 12 }
                behavior:
                  - event: click
                    stop_propagation: true
                    action: close_tab
                    params: { index: "prop.index" }
      # Create the canvas in the drawing surface
      - create_child:
          parent: drawing_surface
          props:
            index: "state.tab_count"
          element:
            id: "canvas_surface_{{prop.index}}"
            type: canvas
            summary: "Drawing surface"
            tier: 3
            style: { flex: 1, background: "#ffffff" }
            bind:
              visible: "state.active_tab == prop.index"
      - increment: { key: tab_count, by: 1 }
  open_file:
    description: >
      Show the native file-open dialog filtered to SVG files. If the chosen
      file is already open in a tab, switch to that tab instead of opening a
      duplicate. Otherwise create a new tab, parse the SVG, and display it
      on the canvas. The tab label shows the filename.
    category: file
    effects:
      - log: "open_file: show native file dialog"
  save:
    description: >
      Save the active document to its current file path. If the document has
      never been saved (no filename), dispatches save_as to show a Save As
      dialog instead. After a successful save, clears the document's modified
      flag and removes the * indicator from the tab label.
    category: file
    enabled_when: "state.tab_count > 0"
    effects:
      - if:
          condition: "not active_document.has_filename"
          then:
            - dispatch: save_as
          else:
            - log: "save: write to {{active_document.filename}}"
  save_as:
    description: >
      Show the native file-save dialog for the active document. The user
      chooses a filename and location. On confirm, writes the document as
      SVG, updates the tab label to the new filename, and clears the
      modified flag.
    category: file
    enabled_when: "state.tab_count > 0"
    effects:
      - log: "save_as: show native save dialog"
  revert:
    description: >
      Reload the active document from its file on disk, discarding all
      unsaved changes since the last save. The canvas re-renders with the
      file contents, the undo stack is cleared, and the modified flag is
      reset. Only enabled when the document has a filename and has been
      modified.
    category: file
    enabled_when: "active_document.is_modified and active_document.has_filename"
    effects:
      - log: "revert: reload {{active_document.filename}}"
  quit:
    description: >
      Close the application. If any open documents have unsaved changes,
      opens the save_changes_window dialog offering Save All, Save, Don't
      Save, or Cancel. If no documents are modified, closes immediately.
    category: file
    effects:
      - if:
          condition: "active_document.any_modified"
          then:
            - open_dialog: { id: save_changes_window }
          else:
            - log: "quit: close window"

  # ── Edit ──────────────────────────────────────────────────
  undo:
    description: >
      Undo the last editing operation on the active document. Pops the most
      recent entry from the undo stack, reverses its effect on the canvas,
      and pushes it onto the redo stack. The canvas re-renders to reflect the
      prior state. Disabled when the undo stack is empty.
    category: edit
    tier: 3
    enabled_when: "active_document.can_undo"
    effects:
      - log: "undo"
  redo:
    description: >
      Redo the last undone operation. Pops the most recent entry from the
      redo stack, re-applies its effect, and pushes it back onto the undo
      stack. Disabled when the redo stack is empty. Any new editing
      operation clears the redo stack.
    category: edit
    tier: 3
    enabled_when: "active_document.can_redo"
    effects:
      - log: "redo"
  cut:
    description: >
      Copy the selected objects to the clipboard as SVG markup, then delete
      them from the canvas. Equivalent to copy followed by delete_selection.
      Disabled when nothing is selected.
    category: edit
    tier: 3
    enabled_when: "active_document.has_selection"
    effects:
      - dispatch: copy
      - dispatch: delete_selection
  copy:
    description: >
      Copy the selected objects to the clipboard as SVG markup, preserving
      their positions, styles, and grouping. The original objects remain on
      the canvas. Disabled when nothing is selected.
    category: edit
    tier: 3
    enabled_when: "active_document.has_selection"
    effects:
      - log: "copy: selection to clipboard"
  paste:
    description: >
      Paste objects from the clipboard into the active document, offset 24
      points down and to the right from the original position. The pasted
      objects become the new selection. Repeated pastes stack with
      cumulative offsets. Disabled when no document is open.
    category: edit
    tier: 3
    enabled_when: "state.tab_count > 0"
    effects:
      - log: "paste: offset 24pt"
  paste_in_place:
    description: >
      Paste objects from the clipboard at their original coordinates (no
      offset). Useful for pasting objects into the same position in a
      different document or layer. The pasted objects become the new
      selection.
    category: edit
    tier: 3
    enabled_when: "state.tab_count > 0"
    effects:
      - log: "paste_in_place: offset 0"
  select_all:
    description: >
      Select all unlocked, visible objects in the active document. Hidden
      and locked objects are excluded from the selection.
    category: edit
    tier: 3
    enabled_when: "state.tab_count > 0"
    effects:
      - log: "select_all"
  delete_selection:
    description: >
      Delete the selected objects from the canvas. The deletion is recorded
      on the undo stack. After deletion, the selection becomes empty.
    category: edit
    tier: 3
    enabled_when: "active_document.has_selection"
    effects:
      - log: "delete_selection"

  # ── Object ────────────────────────────────────────────────
  group:
    description: >
      Wrap the selected objects in a new Group element. The group inherits
      the z-order position of the frontmost selected object. The selection
      changes to the new group. Requires at least 2 selected objects.
    category: object
    tier: 3
    enabled_when: "active_document.selection_count >= 2"
    effects:
      - log: "group"
  ungroup:
    description: >
      Ungroup the selected Group elements one level, replacing each group
      with its direct children at the group's z-order position. Non-group
      objects in the selection are left unchanged. The children become the
      new selection.
    category: object
    tier: 3
    enabled_when: "active_document.has_selection"
    effects:
      - log: "ungroup"
  ungroup_all:
    description: >
      Recursively ungroup every unlocked Group in the document until no
      groups remain (except locked ones). Operates on the entire document,
      not just the selection.
    category: object
    tier: 3
    enabled_when: "state.tab_count > 0"
    effects:
      - log: "ungroup_all"
  lock:
    description: >
      Lock the selected elements to prevent editing. Locked objects cannot
      be selected, moved, resized, or deleted until unlocked. They remain
      visible on the canvas and in the Layers panel (shown with a lock
      icon). The selection is cleared after locking.
    category: object
    tier: 3
    enabled_when: "active_document.has_selection"
    effects:
      - log: "lock"
  unlock_all:
    description: >
      Unlock all locked elements in the active document, making them
      selectable and editable again. The lock icon is removed from their
      Layers panel entries.
    category: object
    tier: 3
    enabled_when: "state.tab_count > 0"
    effects:
      - log: "unlock_all"
  hide_selection:
    description: >
      Hide the selected elements from the canvas. Hidden objects are not
      rendered and cannot be selected, but remain in the document and
      Layers panel (shown dimmed with a hidden-eye icon). The selection
      is cleared after hiding.
    category: object
    tier: 3
    enabled_when: "active_document.has_selection"
    effects:
      - log: "hide_selection"
  show_all:
    description: >
      Show all hidden elements in the active document, making them visible
      on the canvas and selectable again. Their eye icons are restored in
      the Layers panel.
    category: object
    tier: 3
    enabled_when: "state.tab_count > 0"
    effects:
      - log: "show_all"

  # ── View ──────────────────────────────────────────────────
  zoom_in:
    description: >
      Zoom the canvas in by one step (e.g. 150% -> 200%). Zoom is centered
      on the current viewport center. The zoom level is reflected in
      active_document.zoom_level.
    category: view
    tier: 3
    enabled_when: "state.tab_count > 0"
    effects:
      - log: "zoom_in"
  zoom_out:
    description: >
      Zoom the canvas out by one step (e.g. 200% -> 150%). Zoom is centered
      on the current viewport center.
    category: view
    tier: 3
    enabled_when: "state.tab_count > 0"
    effects:
      - log: "zoom_out"
  fit_in_window:
    description: >
      Adjust zoom and scroll so the bounding box of all objects in the
      document fits within the visible canvas area with a small margin.
      If the document is empty, resets to 100% zoom centered on the
      artboard origin.
    category: view
    tier: 3
    enabled_when: "state.tab_count > 0"
    effects:
      - log: "fit_in_window"

  # ── Tool ──────────────────────────────────────────────────
  select_tool:
    description: >
      Switch the active drawing tool. Updates active_tool state, which
      causes the corresponding toolbar button to show its checked style
      and changes the canvas cursor to match the tool. The previously
      active tool is deactivated.
    category: tool
    params:
      tool: { type: state_ref, ref: "active_tool" }
    effects:
      - set: { active_tool: "param.tool" }

  # ── Fill / Stroke ─────────────────────────────────────────
  swap_fill_stroke:
    description: >
      Swap the fill and stroke colors. The fill color becomes the stroke
      color and vice versa. Null values (no fill / no stroke) are swapped
      too. The toolbar swatches update immediately.
    category: fill_stroke
    effects:
      - swap: [fill_color, stroke_color]
  reset_fill_stroke:
    description: >
      Reset colors and stroke attributes to defaults: white fill (#ffffff),
      black stroke (#000000), 1pt stroke width, butt cap, miter join,
      limit 10, center alignment, no dashing, no arrowheads, 100% scale,
      tip-at-end alignment, uniform profile, and fill swatch on top. The
      toolbar swatches update immediately.
    category: fill_stroke
    effects:
      - set:
          fill_color: "#ffffff"
          stroke_color: "#000000"
          stroke_width: 1.0
          fill_on_top: true
          stroke_cap: butt
          stroke_join: miter
          stroke_miter_limit: 10
          stroke_align: center
          stroke_dashed: false
          stroke_dash_1: 12
          stroke_gap_1: 12
          stroke_dash_2: null
          stroke_gap_2: null
          stroke_dash_3: null
          stroke_gap_3: null
          stroke_start_arrowhead: none
          stroke_end_arrowhead: none
          stroke_start_arrowhead_scale: 100
          stroke_end_arrowhead_scale: 100
          stroke_link_arrowhead_scale: false
          stroke_arrow_align: tip_at_end
          stroke_profile: uniform
          stroke_profile_flipped: false
  toggle_fill_on_top:
    description: >
      Toggle which swatch is in front in the toolbar fill/stroke widget.
      The front swatch is the one that receives color changes and is
      targeted by the None button. Visually the swatches swap z-order.
    category: fill_stroke
    effects:
      - toggle: fill_on_top
  set_fill_none:
    description: >
      Remove the fill color (set to null). Objects with no fill are
      transparent — only their stroke is visible. The fill swatch shows
      a red diagonal line indicating "none".
    category: fill_stroke
    effects:
      - set: { fill_color: null }
  set_stroke_none:
    description: >
      Remove the stroke color (set to null). Objects with no stroke have
      no visible outline. The stroke swatch shows a red diagonal line
      indicating "none".
    category: fill_stroke
    effects:
      - set: { stroke_color: null }
  open_color_picker:
    description: >
      Open the modal color picker dialog for either the fill or stroke
      color (determined by the target param). The dialog initializes from
      the current color and commits back to the corresponding state
      variable when OK is pressed.
    category: fill_stroke
    params:
      target: { type: enum, values: [fill, stroke] }
    effects:
      - open_dialog: { id: color_picker, params: { target: "param.target" } }

  set_active_color:
    description: >
      Set the active color (fill or stroke, determined by fill_on_top) to
      the given hex color value. Adds the color to the front of the
      per-document recent_colors list (max 10). If the color is already
      present, it moves to front rather than duplicating. This action is
      the commit point for all color changes from the Color Panel: swatch
      clicks (fixed and recent), slider release, hex field Enter/Tab, and
      color bar pointer-up.
    category: fill_stroke
    params:
      color: { type: color }
    effects:
      - if:
          condition: "state.fill_on_top"
          then:
            - set: { fill_color: "param.color" }
          else:
            - set: { stroke_color: "param.color" }
      - list_push: { target: "panel.recent_colors", value: "param.color", unique: true, max_length: 10 }

  set_active_color_none:
    description: >
      Set the active attribute (fill or stroke, determined by fill_on_top)
      to none (null). Equivalent to set_fill_none when fill_on_top is true
      and set_stroke_none when false. The active attribute's swatch shows
      the none indicator (white square with red diagonal slash). Sliders
      and hex field in the Color Panel become disabled.
    category: fill_stroke
    effects:
      - if:
          condition: "state.fill_on_top"
          then:
            - set: { fill_color: null }
          else:
            - set: { stroke_color: null }

  set_fill_type_solid:
    description: >
      Sets the active attribute (fill or stroke, per fill_on_top) to solid
      color mode. If the active color is currently null, restores it to black
      (#000000). If it already has a solid color this is a no-op — the fill
      type is already solid.
    category: fill_stroke
    effects:
      - if:
          condition: "state.fill_on_top"
          then:
            - if:
                condition: "state.fill_color == null"
                then:
                  - set: { fill_color: "#000000" }
          else:
            - if:
                condition: "state.stroke_color == null"
                then:
                  - set: { stroke_color: "#000000" }

  set_fill_type_gradient:
    description: >
      Sets the active attribute (fill or stroke, per fill_on_top) to gradient
      fill mode. Currently a placeholder — gradient editing is not yet
      implemented.
    category: fill_stroke
    effects: []

  invert_active_color:
    description: >
      Invert the active color (fill or stroke, per fill_on_top) by computing
      (255 − R, 255 − G, 255 − B) in RGB. The result is committed via
      set_active_color, which adds it to recent colors. The current color
      mode is unchanged. Disabled when the active attribute is none.
      Enabled only when the active color is non-null.
    category: fill_stroke
    enabled_when: "if state.fill_on_top then state.fill_color != null else state.stroke_color != null"
    effects:
      - if:
          condition: "state.fill_on_top"
          then:
            - set: { fill_color: "invert(state.fill_color)" }
          else:
            - set: { stroke_color: "invert(state.stroke_color)" }

  complement_active_color:
    description: >
      Compute the complementary color of the active color (fill or stroke,
      per fill_on_top) by rotating the hue by 180° in HSB: result is
      ((H + 180) mod 360, S, B). The result is committed via
      set_active_color, which adds it to recent colors. The current color
      mode is unchanged. When saturation is 0 (achromatic gray), hue is
      undefined and the operation is a silent no-op — the color is
      unchanged. Disabled when the active attribute is none.
    category: fill_stroke
    enabled_when: "if state.fill_on_top then state.fill_color != null else state.stroke_color != null"
    effects:
      - if:
          condition: "state.fill_on_top"
          then:
            - set: { fill_color: "complement(state.fill_color)" }
          else:
            - set: { stroke_color: "complement(state.stroke_color)" }

  set_color_panel_mode:
    description: >
      Set the Color Panel's color mode (panel-local state). The mode
      determines which slider group is displayed: Grayscale (K only),
      RGB (R/G/B 0–255), HSB (H 0–360, S/B 0–100), CMYK (C/M/Y/K 0–100),
      or Web Safe RGB (R/G/B 0–255 snapping to steps of 51). Changing the
      mode does not change the current color — only the view changes.
      The panel checkmark in the Color Panel menu moves to the new mode.
    category: fill_stroke
    params:
      mode: { type: enum, values: [grayscale, rgb, hsb, cmyk, web_safe_rgb] }
    effects:
      - set_panel_state: { panel: color, key: mode, value: "param.mode" }

  # ── Window / Layout ──────────────────────────────────────
  toggle_pane:
    description: >
      Toggle a pane's visibility. When hidden, the pane is removed from
      the layout and adjacent panes may expand to fill the space. When
      shown, the pane reappears at its last position. Controlled via the
      Window menu checkmarks for Toolbar and Panels.
    category: window
    params:
      pane: { type: enum, values: [toolbar, canvas, dock] }
    effects:
      - toggle: "{{param.pane}}_visible"
  toggle_panel:
    description: >
      Show or hide a dock panel via the Window menu. When showing, the
      panel is added to the last group of the anchored dock (dock_main),
      the dock is made visible and expanded, and the panel is activated.
      When hiding, the panel is removed from its group via close_panel.
      If the group becomes empty it is removed automatically.
    category: window
    params:
      panel: { type: enum, values: [layers, color, stroke, properties, align] }
    effects:
      - log: "toggle_panel: {{param.panel}}"
  toggle_canvas_maximize:
    description: >
      Toggle the canvas pane between maximized (fills the entire viewport,
      title bar hidden) and its normal size within the pane layout.
    category: window
    effects:
      - toggle: canvas_maximized
  maximize_canvas:
    description: >
      Maximize the canvas pane to fill the entire viewport. The canvas
      title bar is hidden to maximize drawing space. Toolbar and dock
      panes float on top if visible. Double-click the canvas title bar
      or click the maximize button again to restore.
    category: window
    effects:
      - set: { canvas_maximized: true }
      - maximize: { target: canvas_pane, hide_title: true }
  restore_canvas:
    description: >
      Restore the canvas from maximized state to its normal pane size.
      The title bar reappears and all panes return to their default
      layout positions.
    category: window
    effects:
      - set: { canvas_maximized: false }
      - restore: { target: canvas_pane }
      - reset_layout: { container: main }
  toggle_dock_collapse:
    description: >
      Toggle the dock between expanded (showing full panel content) and
      collapsed (showing only the icon strip at collapsed_width).
    category: window
    effects:
      - toggle: dock_collapsed
  collapse_dock:
    description: >
      Collapse the dock to its narrow icon strip (collapsed_width). The
      dock_view switches to collapsed rendering: group headers and bodies
      are hidden, only the icon strip is shown. The chevron icon flips.
    category: window
    effects:
      - set: { dock_collapsed: true }
  expand_dock:
    description: >
      Expand the dock from the collapsed icon strip to full width. The
      dock_view switches to expanded rendering: group headers with tab
      bars, panel bodies, and separators are shown.
    category: window
    effects:
      - set: { dock_collapsed: false }
  tile_panes:
    description: >
      Tile all visible panes in a horizontal row filling the viewport.
      Panes with fixed_width keep their width. Panes with collapsed_width
      keep their current width. Flex panes split the remaining space
      equally (respecting min_width). All panes are set to full viewport
      height. Panes are sorted left-to-right by their current x position.
      Hidden panes are made visible.
    category: window
    effects:
      - tile: { container: main }

  # ── Workspace ─────────────────────────────────────────────
  save_workspace_as:
    description: >
      Open the workspace_save_as dialog prompting the user for a layout
      name. The dialog validates the name and warns about overwrites.
    category: workspace
    effects:
      - open_dialog: { id: workspace_save_as }
  save_workspace_confirm:
    description: >
      Confirm the workspace save. Reads the name from the dialog text
      input, captures all pane positions/sizes and layout_state variables,
      and writes them to browser storage. The saved layout appears in the
      Workspace menu with a checkmark. Closes the dialog on success.
    category: workspace
    effects:
      - save_layout: { container: main, name_input: ws_name_input }
      - close_dialog: null
  reset_workspace:
    description: >
      Reset all pane positions, sizes, and layout_state variables to
      their declared defaults from the workspace YAML. Clears the active
      layout name (no layout is active after reset).
    category: workspace
    effects:
      - reset_layout: { container: main }
  revert_workspace:
    description: >
      Revert the pane layout to the currently active saved layout,
      discarding any manual repositioning or resizing done since the
      layout was loaded. Only enabled when a saved layout is active.
    category: workspace
    effects:
      - revert_layout: { container: main }
  switch_workspace:
    description: >
      Load a named workspace layout from storage, applying its saved pane
      positions/sizes and layout_state values. The layout name becomes
      the active layout (shown with a checkmark in the Workspace menu).
    category: workspace
    params:
      name: { type: string }
    effects:
      - load_layout: { container: main, name: "param.name" }
  delete_workspace:
    description: >
      Delete a user-saved workspace layout from storage. The layout is
      removed from the Workspace menu. Default layouts cannot be deleted.
      If the deleted layout was active, the active layout name is cleared.
    category: workspace
    params:
      name: { type: string }
    effects:
      - delete_layout: { name: "param.name" }

  # ── Appearance ────────────────────────────────────────────
  switch_appearance:
    description: >
      Switch to a named appearance, updating all CSS variables to the
      new colors, fonts, and sizes. The appearance name is shown with
      a checkmark in the Appearance menu.
    category: appearance
    params:
      name: { type: string }
    effects:
      - switch_appearance: { name: "param.name" }
  save_appearance_as:
    description: >
      Open the appearance_save_as dialog prompting the user for an
      appearance name. The current resolved appearance is saved to
      browser storage as a user-defined appearance.
    category: appearance
    effects:
      - open_dialog: { id: appearance_save_as }
  save_appearance_confirm:
    description: >
      Confirm the appearance save. Reads the name from the dialog,
      saves the current resolved appearance to browser storage, and
      closes the dialog.
    category: appearance
    effects:
      - save_appearance: { name_input: appearance_name_input }
      - close_dialog: null

  # ── Tab ───────────────────────────────────────────────────
  close_tab:
    description: >
      Close a document tab. If the document has unsaved changes, opens the
      save_changes_tab dialog offering Save, Discard, or Cancel. If the
      document is unmodified, dispatches remove_tab immediately to remove
      the tab and canvas elements.
    category: tab
    params:
      index: { type: number }
    effects:
      - if:
          condition: "active_document.is_modified"
          then:
            - open_dialog: { id: save_changes_tab, params: { filename: "active_document.filename" } }
          else:
            - dispatch: { action: remove_tab, params: { index: "param.index" } }
  remove_tab:
    description: >
      Remove a tab and its canvas without prompting. Removes both the tab
      button and canvas surface elements, then selects an adjacent tab
      (prefer the tab to the left; if none, the tab to the right; if the
      last tab was closed, set active_tab to -1).
    category: tab
    params:
      index: { type: number }
    effects:
      - remove_child: "canvas_tab_{{param.index}}"
      - remove_child: "canvas_surface_{{param.index}}"
      - decrement: { key: tab_count, by: 1 }
      - if:
          condition: "state.tab_count == 0"
          then:
            - set: { active_tab: -1 }
          else:
            - if:
                condition: "param.index > 0"
                then:
                  - set: { active_tab: "param.index - 1" }
                else:
                  - set: { active_tab: 0 }

  # ── Panel / Dock ──────────────────────────────────────────
  close_panel:
    description: >
      Close (hide) a panel by removing it from its panel group. If the
      group becomes empty, it is removed from the dock. The panel can
      be shown again via the Window menu's panel toggle, which adds it
      back to the last group of the anchored dock.
    category: panel
    params:
      panel: { type: enum, values: [layers, color, stroke, properties, align] }
    effects:
      - close_panel: { panel: "param.panel" }

  show_panel:
    description: >
      Show a hidden panel by adding it to the last group of the anchored
      dock. Makes the dock visible and expanded, and activates the newly
      shown panel.
    category: panel
    params:
      panel: { type: enum, values: [layers, color, stroke, properties, align] }
    effects:
      - show_panel: { panel: "param.panel", target: dock_main }
      - set: { dock_visible: true, dock_collapsed: false }

  # ── Dialog ────────────────────────────────────────────────
  dismiss_dialog:
    description: >
      Dismiss the topmost modal dialog without taking any action. The
      dialog closes and focus returns to the main workspace.
    category: dialog
    effects:
      - close_dialog: null
  close_without_saving:
    description: >
      Close the tab or window without saving changes. Called from the
      save-changes dialog when the user clicks Discard or Don't Save.
      Closes the dialog first, then proceeds with the close operation,
      discarding any unsaved modifications.
    category: dialog
    effects:
      - close_dialog: null
      - log: "close_without_saving"
  save_and_close:
    description: >
      Save the active document and then close its tab. Called from the
      save-changes dialog when the user clicks Save. Dispatches the save
      action first (which may show Save As if untitled), then closes the
      dialog and removes the tab.
    category: dialog
    effects:
      - dispatch: save
      - close_dialog: null
      - log: "save_and_close"
  save_all_and_close:
    description: >
      Save all modified documents and then close the application window.
      Called from the save_changes_window dialog when the user clicks
      Save All. Iterates through all open tabs, saves any with unsaved
      changes, then closes the dialog and the application.
    category: dialog
    effects:
      - log: "save_all_and_close"
      - close_dialog: null


  new_swatch:
    description: >
      Create a new swatch in the active library using the current fill/stroke color (per fill_on_top). Opens the Swatch Options dialog in create mode, initialized from the active color.
    category: swatches
    effects:
      - open_dialog: { id: 'swatch_options', params: {'mode': 'create', 'color': 'if state.fill_on_top then state.fill_color else state.stroke_color', 'color_mode': 'rgb', 'swatch_name': ''} }

  duplicate_swatch:
    description: >
      Duplicate the currently selected swatch(es) in the active library. New swatches are inserted immediately after the originals with " copy" appended to the name.
    category: swatches
    effects:
      - log: "duplicate_swatch"

  delete_swatch:
    description: >
      Delete the currently selected swatch(es) from the active library. Selection is cleared after deletion.
    category: swatches
    effects:
      - log: "delete_swatch"

  select_all_unused_swatches:
    description: >
      Select all swatches in the panel whose color does not appear anywhere in the current document as a fill or stroke color.
    category: swatches
    effects:
      - log: "select_all_unused_swatches"

  add_used_colors:
    description: >
      Scan the active document for all unique fill and stroke colors in use and add swatches for any that are not already present in the active swatch library. New swatches are appended to the end of the library.
    category: swatches
    effects:
      - log: "add_used_colors"

  sort_swatches_by_name:
    description: >
      Permanently reorder swatches in the active library alphabetically by swatch name. This modifies the library data in place.
    category: swatches
    effects:
      - log: "sort_swatches_by_name"

  set_swatch_thumbnail_size:
    description: >
      Set the thumbnail display size for the Swatches panel. Small = 16px, Medium = 32px, Large = 64px. Panel-local state.
    category: swatches
    params:
      size: { type: enum, values: ['small', 'medium', 'large'] }
    effects:
      - set_panel_state: { panel: 'swatches', key: 'thumbnail_size', value: 'param.size' }

  open_swatch_options:
    description: >
      Open the Swatch Options dialog. In edit mode, populates fields from the selected swatch (passed via params: swatch_name, color, color_mode, library, index). In create mode, populates from the current active color.
    category: swatches
    params:
      mode: { type: enum, values: ['edit', 'create'] }
      swatch_name: { type: string, optional: True }
      color: { type: color, optional: True }
      color_mode: { type: string, optional: True }
      library: { type: string, optional: True }
      index: { type: number, optional: True }
    effects:
      - open_dialog: { id: 'swatch_options', params: {'mode': 'param.mode', 'swatch_name': 'param.swatch_name', 'color': 'param.color', 'color_mode': 'param.color_mode', 'library': 'param.library', 'index': 'param.index'} }

  swatch_options_confirm:
    description: >
      Confirm the Swatch Options dialog. In edit mode, updates the selected swatch with the dialog values. In create mode, appends a new swatch to the selected library. Closes the dialog.
    category: swatches
    effects:
      - log: "swatch_options_confirm"
      - close_dialog: None

  save_swatch_library:
    description: >
      Open the Save Swatch Library dialog prompting the user for a library name and saving the active library to workspace/swatches/.
    category: swatches
    effects:
      - open_dialog: { id: 'swatch_library_save' }

  save_swatch_library_confirm:
    description: >
      Confirm saving the swatch library under the entered name. Closes the dialog on success.
    category: swatches
    effects:
      - log: "save_swatch_library_confirm"
      - close_dialog: None

  # ── Stroke ───────────────────────────────────────────────
  set_stroke_cap:
    description: >
      Set the line cap style for the active stroke. Butt: flat at the
      endpoint. Round: semicircular beyond the endpoint. Square: extends
      beyond the endpoint by half the stroke weight. Updates both panel
      state and global state (which propagates to the selection).
    category: stroke
    params:
      cap: { type: enum, values: [butt, round, square] }
    effects:
      - set_panel_state: { panel: stroke, key: cap, value: "param.cap" }
      - set: { stroke_cap: "param.cap" }

  set_stroke_join:
    description: >
      Set the line join style for the active stroke. Miter: sharp pointed
      corner (subject to miter limit). Round: circular arc. Bevel: flat
      diagonal cut. Updates both panel state and global state.
    category: stroke
    params:
      join: { type: enum, values: [miter, round, bevel] }
    effects:
      - set_panel_state: { panel: stroke, key: join, value: "param.join" }
      - set: { stroke_join: "param.join" }

  set_stroke_align:
    description: >
      Set the stroke alignment relative to the path. Center: stroke
      straddles the path. Inside: stroke drawn inside closed paths.
      Outside: stroke drawn outside closed paths. Inside and outside
      behave as center on open paths. Updates both panel state and
      global state.
    category: stroke
    params:
      align: { type: enum, values: [center, inside, outside] }
    effects:
      - set_panel_state: { panel: stroke, key: align_stroke, value: "param.align" }
      - set: { stroke_align: "param.align" }

  toggle_dashed_line:
    description: >
      Toggle dashed stroke on or off. When disabled, the dash/gap fields
      are grayed out but retain their values. Updates both panel state
      and global state.
    category: stroke
    effects:
      - set_panel_state: { panel: stroke, key: dashed, value: "not panel.dashed" }
      - set: { stroke_dashed: "not state.stroke_dashed" }

  apply_dash_preset:
    description: >
      Apply a dash pattern preset, enabling dashing and filling in the
      dash/gap fields. The even_dash preset sets 12pt dash, 12pt gap
      (pair 1 only). The dash_dot preset sets 12pt dash, 6pt gap, 0pt
      dash (dot), 6pt gap (pairs 1 and 2). Updates both panel state
      and global state.
    category: stroke
    params:
      preset: { type: enum, values: [even_dash, dash_dot] }
    effects:
      - set_panel_state: { panel: stroke, key: dashed, value: true }
      - set: { stroke_dashed: true }
      - log: "apply_dash_preset: {{param.preset}}"

  swap_arrowheads:
    description: >
      Swap the start and end arrowhead selections, including both the
      shape and the scale values. Updates both panel state and global
      state.
    category: stroke
    effects:
      - swap_panel_state: { panel: stroke, keys: [start_arrowhead, end_arrowhead] }
      - swap_panel_state: { panel: stroke, keys: [start_arrowhead_scale, end_arrowhead_scale] }
      - swap: [stroke_start_arrowhead, stroke_end_arrowhead]
      - swap: [stroke_start_arrowhead_scale, stroke_end_arrowhead_scale]

  toggle_link_arrowhead_scale:
    description: >
      Toggle linked arrowhead scales. When linked, changing either
      start or end arrowhead scale updates both to the same value.
      Updates both panel state and global state.
    category: stroke
    effects:
      - set_panel_state: { panel: stroke, key: link_arrowhead_scale, value: "not panel.link_arrowhead_scale" }
      - set: { stroke_link_arrowhead_scale: "not state.stroke_link_arrowhead_scale" }

  set_arrow_align:
    description: >
      Set the arrow alignment mode. Tip-at-end: the arrowhead tip sits
      exactly at the path endpoint. Center-at-end: the arrowhead center
      sits at the endpoint, with the tip extending beyond. Updates both
      panel state and global state.
    category: stroke
    params:
      align: { type: enum, values: [tip_at_end, center_at_end] }
    effects:
      - set_panel_state: { panel: stroke, key: arrow_align, value: "param.align" }
      - set: { stroke_arrow_align: "param.align" }

  set_stroke_profile:
    description: >
      Set the variable-width stroke profile. Uniform: constant width.
      Taper_both: tapers at both ends. Taper_start/taper_end: tapers
      at one end. Bulge: wider in the middle. Pinch: narrower in the
      middle. Updates both panel state and global state.
    category: stroke
    params:
      profile: { type: enum, values: [uniform, taper_both, taper_start, taper_end, bulge, pinch] }
    effects:
      - set_panel_state: { panel: stroke, key: profile, value: "param.profile" }
      - set: { stroke_profile: "param.profile" }

  flip_stroke_profile:
    description: >
      Flip (mirror) the stroke profile along the path. Only visually
      meaningful for asymmetric profiles (taper_start, taper_end).
      Updates both panel state and global state.
    category: stroke
    effects:
      - set_panel_state: { panel: stroke, key: profile_flipped, value: "not panel.profile_flipped" }
      - set: { stroke_profile_flipped: "not state.stroke_profile_flipped" }

  reset_stroke_profile:
    description: >
      Reset the stroke profile to uniform and clear the flipped state.
      Updates both panel state and global state.
    category: stroke
    effects:
      - set_panel_state: { panel: stroke, key: profile, value: '"uniform"' }
      - set_panel_state: { panel: stroke, key: profile_flipped, value: false }
      - set: { stroke_profile: '"uniform"', stroke_profile_flipped: false }

  # ── Layers Panel ─────────────────────────────────────────────

  # Layer management

  new_layer:
    description: >
      Create a new layer and insert it immediately above the topmost
      panel-selected layer (or at the end if nothing is selected). The
      name is auto-generated as "Layer N", skipping numbers already in
      use. The new layer starts with default visibility (preview) and
      unlocked; one undo snapshot covers the operation.
    category: layers
    tier: 3
    enabled_when: "state.tab_count > 0"
    effects:
      - snapshot
      - doc.create_layer:
          name: "active_document.next_layer_name"
        as: new_layer
      - doc.insert_at:
          parent_path: "path()"
          index: "active_document.new_layer_insert_index"
          element: new_layer

  new_group:
    description: >
      Wrap the panel-selected elements in a new group at the position of
      the topmost panel-selected element. All panel-selected elements
      must share the same immediate parent container; the action is
      disabled otherwise. The new group is unnamed and inherits the
      parent container's properties. The panel selection changes to the
      new group.
    category: layers
    tier: 3
    enabled_when: "active_document.layers_panel_selection_count > 0"
    effects:
      - snapshot
      - doc.wrap_in_group:
          paths: "panel.layers_panel_selection"

  delete_layer_selection:
    description: >
      Delete the panel-selected elements from the document. Iterates in
      reverse path order to keep indices valid across deletions. Deleted
      elements are placed on the undo stack. After deletion, the panel
      selection becomes empty.
    category: layers
    tier: 3
    enabled_when: "active_document.layers_panel_selection_count > 0"
    effects:
      - snapshot
      - foreach:
          source: "reverse(panel.layers_panel_selection)"
          as: p
        do:
          - doc.delete_at: p
      - set_panel_state: { key: "layers_panel_selection", value: "[]" }

  duplicate_layer_selection:
    description: >
      Duplicate the panel-selected elements in place. Each duplicate is
      inserted immediately after its original in the same parent
      container. Iterates in reverse path order so each insert's indices
      stay valid for remaining iterations.
    category: layers
    tier: 3
    enabled_when: "active_document.layers_panel_selection_count > 0"
    effects:
      - snapshot
      - foreach:
          source: "reverse(panel.layers_panel_selection)"
          as: p
        do:
          - doc.clone_at: p
            as: clone
          - doc.insert_after: { path: p, element: clone }

  collect_in_new_layer:
    description: >
      Move all panel-selected items into a new layer placed above all
      existing layers. The items are removed from their original
      locations and maintain their relative order. The new layer's name
      and color follow the same auto-generation rules as new_layer.
      Disabled during isolation mode.
    category: layers
    tier: 3
    enabled_when: "active_document.layers_panel_selection_count > 0 and panel.isolation_stack.length == 0"
    effects:
      - snapshot
      - doc.wrap_in_layer:
          paths: "panel.layers_panel_selection"
          name: "active_document.next_layer_name"

  flatten_artwork:
    description: >
      Recursively unpack all groups in the panel-selected items until no
      groups remain. The children of each dissolved group take its
      position in the parent container. Enabled when the panel-selected
      items contain at least one group.
    category: layers
    tier: 3
    enabled_when: "active_document.layers_panel_selection_has_group"
    effects:
      - snapshot
      - foreach:
          source: "reverse(panel.layers_panel_selection)"
          as: p
        do:
          - doc.unpack_group_at: p
      - set_panel_state: { key: "layers_panel_selection", value: "[]" }

  # Bulk visibility and lock toggles

  toggle_all_layers_visibility:
    description: >
      Toggle all top-level layers between visible and invisible. If any
      layer is currently visible, all layers are set to invisible ("Hide
      All Layers"). If all layers are invisible, all layers are set to
      preview mode ("Show All Layers"). Takes one undo snapshot for the
      whole operation.
    category: layers
    tier: 3
    enabled_when: "state.tab_count > 0"
    effects:
      - let:
          target: >
            if any(active_document.top_level_layers,
                   fun l -> l.common.visibility != 'invisible')
              then 'invisible'
              else 'preview'
      - snapshot
      - foreach:
          source: active_document.top_level_layer_paths
          as: p
        do:
          - doc.set:
              path: p
              fields:
                common.visibility: target

  toggle_all_layers_outline:
    description: >
      Toggle all top-level layers between preview and outline mode. If
      any layer is in preview mode, all layers are set to outline
      ("Outline All Layers"). If all layers are in outline mode, all
      layers are set to preview ("Preview All Layers"). Takes one undo
      snapshot for the whole operation.
    category: layers
    tier: 3
    enabled_when: "state.tab_count > 0"
    effects:
      - let:
          target: >
            if any(active_document.top_level_layers,
                   fun l -> l.common.visibility == 'preview')
              then 'outline'
              else 'preview'
      - snapshot
      - foreach:
          source: active_document.top_level_layer_paths
          as: p
        do:
          - doc.set:
              path: p
              fields:
                common.visibility: target

  toggle_all_layers_lock:
    description: >
      Toggle all top-level layers between locked and unlocked. If any
      layer is unlocked, all layers are locked ("Lock All Layers"). If
      all layers are locked, all layers are unlocked ("Unlock All
      Layers"). Takes one undo snapshot for the whole operation.
    category: layers
    tier: 3
    enabled_when: "state.tab_count > 0"
    effects:
      - let:
          target: >
            any(active_document.top_level_layers,
                fun l -> l.common.locked == false)
      - snapshot
      - foreach:
          source: active_document.top_level_layer_paths
          as: p
        do:
          - doc.set:
              path: p
              fields:
                common.locked: target

  # Per-element row operations

  cycle_element_visibility:
    description: >
      Cycle the visibility of a single element through the three states:
      preview -> outline -> invisible -> preview. When applied to a
      container (layer or group), the visibility change affects all
      descendants.
    category: layers
    tier: 3
    params:
      element_id: { type: string }
    effects:
      - log: "cycle_element_visibility"

  solo_element_visibility:
    description: >
      Solo/unsolo an element's visibility among its siblings (triggered
      by Option-click on the eye button). On first Option-click, the
      clicked element becomes the only visible sibling; all other
      siblings at the same level are set to invisible, and their
      previous visibility states are saved. On second Option-click of
      the same element, all siblings are restored to their saved
      visibility states. If the user manually changes any sibling's
      visibility between the two Option-clicks, the saved state is
      discarded.
    category: layers
    tier: 3
    params:
      element_id: { type: string }
    effects:
      - log: "solo_element_visibility"

  toggle_element_lock:
    description: >
      Toggle the lock state of a single element. When locking a
      container, the container's direct children's current lock states
      are saved, then all children are locked. When unlocking a
      container, each direct child's lock state is restored to its
      saved value. Locked elements cannot be selected or edited on
      the canvas, but can be dragged/reparented in the layers panel.
    category: layers
    tier: 3
    params:
      element_id: { type: string }
    effects:
      - log: "toggle_element_lock"

  toggle_element_twirl:
    description: >
      Toggle the twirl-down (expand/collapse) state of a container
      element (layer or group). The twirl state persists across
      sessions. Expanding reveals the container's children in the tree;
      collapsing hides them. Leaf elements do not have a twirl button.
    category: layers
    tier: 3
    params:
      element_id: { type: string }
    effects:
      - log: "toggle_element_twirl"

  # Isolation mode

  enter_isolation_mode:
    description: >
      Enter isolation mode for a container (layer or group). All content
      outside the isolated container is dimmed to 10% opacity and becomes
      non-interactive. The current visibility state of every element is
      saved before entering. Isolation is a stack: entering isolation
      while already in isolation pushes a new level. Panel selection and
      element selection are constrained to descendants of the isolated
      container. New Layer and Collect in New Layer are disabled.
    category: layers
    tier: 3
    params:
      container_id: { type: string, nullable: true }
    enabled_when: "active_document.layers_panel_selection_count == 1 and active_document.layers_panel_selection_is_container"
    effects:
      # Resolve the target path: explicit container_id param takes
      # priority; otherwise fall back to the sole panel-selected path.
      - let:
          target: >
            if param.container_id != null
              then path_from_id(param.container_id)
            else if active_document.layers_panel_selection_count == 1
              then panel.layers_panel_selection[0]
            else null
      - if:
          condition: "target != null"
          then:
            - list_push:
                target: panel.isolation_stack
                value: target

  exit_isolation_mode:
    description: >
      Exit one level of isolation mode. The visibility states saved on
      entry to the current level are restored. If at the outermost
      isolation level, isolation mode is fully exited.
    category: layers
    tier: 3
    enabled_when: "panel.isolation_stack.length > 0"
    effects:
      - pop: panel.isolation_stack

  exit_isolation_to_level:
    description: >
      Exit isolation mode to a specific level, as triggered by clicking
      a breadcrumb segment. Pops all isolation levels above the target
      level, restoring saved visibility states for each popped level.
      A level_index of 0 exits isolation entirely.
    category: layers
    tier: 3
    params:
      level_index: { type: number }
    enabled_when: "panel.isolation_stack.length > 0"
    effects:
      - log: "exit_isolation_to_level"

  # Panel selection and element selection

  layers_panel_select:
    description: >
      Panel-select an element in the layers panel by clicking on its
      spacer, twirl-down gap, preview, or name area. Click selects the
      element and deselects all others. Shift-click extends the
      selection in visual (flattened) row order from the last-clicked
      element; selecting a collapsed group includes all its descendants.
      Command-click toggles the element in or out of the current
      selection. Panel selection is independent of element selection.
      In isolation mode, constrained to the isolated subtree.
    category: layers
    tier: 3
    params:
      element_id: { type: string }
    effects:
      - log: "layers_panel_select"

  layers_element_select:
    description: >
      Element-select via clicking the SELECT_SQUARE in the layers panel.
      Click selects the element and deselects all others. Shift-click
      extends the selection in visual row order; selecting a collapsed
      group includes all its descendants. Command-click toggles the
      element. Elements can be selected across layers. The SELECT_SQUARE
      is filled with the color of the element's nearest ancestor layer
      when selected, otherwise empty.
    category: layers
    tier: 3
    params:
      element_id: { type: string }
    effects:
      - log: "layers_element_select"

  layers_select_all:
    description: >
      Select all visible elements in the layers panel (Command-A).
      In isolation mode, selects all visible elements within the
      isolated subtree. Applies to panel selection.
    category: layers
    tier: 3
    effects:
      - log: "layers_select_all"

  layers_nav_up:
    description: >
      Move the panel-selection focus to the previous visible row in the
      layers panel. If at the first row, no-op.
    category: layers
    tier: 3
    effects:
      - log: "layers_nav_up"

  layers_nav_down:
    description: >
      Move the panel-selection focus to the next visible row in the
      layers panel. If at the last row, no-op.
    category: layers
    tier: 3
    effects:
      - log: "layers_nav_down"

  layers_nav_right:
    description: >
      If the focused row is a collapsed container, expand it. If it is
      an expanded container, move focus to its first child. If it is a
      leaf, no-op.
    category: layers
    tier: 3
    effects:
      - log: "layers_nav_right"

  layers_nav_left:
    description: >
      If the focused row is an expanded container, collapse it. If it
      is a collapsed container or a leaf, move focus to its parent.
      If already at a top-level layer, no-op.
    category: layers
    tier: 3
    effects:
      - log: "layers_nav_left"

  # Rename

  rename_element:
    description: >
      Begin inline renaming of the panel-selected element. Only
      available when exactly one element is panel-selected. The element
      name becomes an editable text field in place. Also triggered by
      double-clicking on the element name text.
    category: layers
    tier: 3
    params:
      element_id: { type: string }
    enabled_when: "active_document.layers_panel_selection_count == 1"
    effects:
      - log: "rename_element"

  confirm_rename:
    description: >
      Confirm the inline rename (triggered by Enter or click-outside).
      If the name is empty, the element reverts to its auto-generated
      type name. Duplicate names are allowed. The rename is a single
      undoable action.
    category: layers
    tier: 3
    effects:
      - log: "confirm_rename"

  cancel_rename:
    description: >
      Cancel the inline rename (triggered by Escape). The name reverts
      to its value before editing began.
    category: layers
    tier: 3
    effects:
      - log: "cancel_rename"

  # Search and filter

  set_layers_search:
    description: >
      Update the search query string for the layers panel. The tree is
      incrementally filtered to show elements whose name (or
      auto-generated type name) contains the query string,
      case-insensitive. Ancestor nodes of matching elements are shown
      for context but dimmed. Collapsed nodes are searched and
      auto-expanded to reveal matches. Drag-and-drop is disabled while
      a search string is active.
    category: layers
    tier: 3
    params:
      query: { type: string }
    effects:
      - set_panel_state: { panel: layers, key: search_query, value: "param.query" }

  toggle_layers_type_filter:
    description: >
      Toggle an element type in the layers panel type filter. The filter
      dropdown has checkboxes for each element type (Layer, Group, Path,
      Rectangle, Circle, Ellipse, Polyline, Polygon, Text, Text Path,
      Line). Unchecking a type hides all elements of that type.
      Filtering composes with the search field. Ancestor nodes are
      still shown for context.
    category: layers
    tier: 3
    params:
      element_type: { type: string }
    effects:
      - log: "toggle_layers_type_filter"

  # Layer Options dialog

  open_layer_options:
    description: >
      Open the Layer Options dialog for an existing layer (edit mode)
      or for creating a new layer (create mode). In edit mode, the
      target layer's current name / visibility / locked state are
      resolved via element_at(path_from_id(layer_id)) and passed as
      dialog params so the dialog's init: block populates the inputs.
      In create mode, layer_id is null and the dialog's defaults take
      effect (name "Layer N", color preset, visible+preview+unlocked).
    category: layers
    tier: 3
    params:
      mode: { type: enum, values: [create, edit] }
      layer_id: { type: string, nullable: true }
    effects:
      - let:
          layer_elem: >
            if param.layer_id != null
              then element_at(path_from_id(param.layer_id))
              else null
      - open_dialog:
          id: layer_options
          params:
            mode: "param.mode"
            layer_id: "param.layer_id"
            name: "if layer_elem != null then layer_elem.name else ''"
            lock: "if layer_elem != null then layer_elem.common.locked else false"
            show: "layer_elem == null or layer_elem.common.visibility != 'invisible'"
            preview: "layer_elem == null or layer_elem.common.visibility == 'preview'"

  layer_options_confirm:
    description: >
      Commit the Layer Options dialog. In create mode (param.layer_id
      is null) creates a new layer with the specified name,
      visibility, and lock state, inserted above the topmost
      panel-selected layer (or appended when nothing is selected). In
      edit mode (param.layer_id non-null) updates the existing layer
      at that path in place. Visibility is derived from the show and
      preview booleans: show=false maps to invisible; show=true with
      preview=true maps to preview; show=true with preview=false maps
      to outline. One undo snapshot covers the operation. Closes the
      dialog on success.
    category: layers
    tier: 3
    params:
      layer_id: { type: string, nullable: true }
      name: { type: string }
      lock: { type: bool }
      show: { type: bool }
      preview: { type: bool }
    effects:
      - snapshot
      - let:
          target_visibility: >
            if not param.show then 'invisible'
            else if param.preview then 'preview'
            else 'outline'
      - if:
          condition: "param.layer_id != null"
          then:
            - doc.set:
                path: "path_from_id(param.layer_id)"
                fields:
                  name: "param.name"
                  common.locked: "param.lock"
                  common.visibility: target_visibility
          else:
            - let:
                insert_index: "active_document.new_layer_insert_index"
            - doc.create_layer:
                name: "param.name"
              as: new_layer
            - doc.insert_at:
                parent_path: "path()"
                index: insert_index
                element: new_layer
            - doc.set:
                path: "path(insert_index)"
                fields:
                  common.locked: "param.lock"
                  common.visibility: target_visibility
      - close_dialog

  # Scrolling

  scroll_to_selected:
    description: >
      Auto-scroll the layers panel to reveal the element currently
      selected on the canvas. If the element is inside a collapsed
      group, the group and all ancestor groups are auto-expanded first.
      If multiple elements are selected, scrolls to the first selected
      element in document order.
    category: layers
    tier: 3
    effects:
      - log: "scroll_to_selected"

  # ── Paragraph panel ───────────────────────────────────────
  toggle_hanging_punctuation:
    description: >
      Toggle the Hanging Punctuation flag on the current paragraph
      selection. Flips panel.hanging_punctuation and writes the
      jas:hanging-punctuation attribute on every paragraph wrapper
      tspan in the selection (omitted when toggled off, per the
      identity-value rule).
    category: paragraph
    effects:
      - toggle_paragraph_field: hanging_punctuation
  open_paragraph_justification:
    description: >
      Open the Justification dialog from the Paragraph panel menu.
      Dialog content lives in workspace/dialogs/paragraph_justification.yaml.
    category: paragraph
    effects:
      - open_dialog: { id: paragraph_justification }
  paragraph_justification_confirm:
    description: >
      OK handler for the Justification dialog. The native apps
      intercept this action via apply_dialog_confirm, reading the 11
      dialog state fields (word/letter/glyph spacing min/desired/max
      + auto-leading + single-word-justify) and writing them as
      jas:* attributes onto every paragraph wrapper tspan in the
      selection. Then clears the preview snapshot so close_dialog
      doesn't restore (commits the user's edits) and closes the
      dialog. Per the identity-value rule, fields equal to their
      spec defaults (word-spacing 80/100/133, letter-spacing 0/0/0,
      glyph-scaling 100/100/100, auto-leading 120, single-word-
      justify 'justify') are omitted from the wrapper.
    category: paragraph
    effects:
      - clear_dialog_snapshot: null
      - close_dialog: null
  open_paragraph_hyphenation:
    description: >
      Open the Hyphenation dialog from the Paragraph panel menu.
      Dialog content lives in workspace/dialogs/paragraph_hyphenation.yaml.
    category: paragraph
    effects:
      - open_dialog: { id: paragraph_hyphenation }
  paragraph_hyphenation_confirm:
    description: >
      OK handler for the Hyphenation dialog. The native apps
      intercept this action via apply_dialog_confirm, reading the 7
      dialog state fields (min-word, after-first-N, before-last-N,
      hyphen-limit, zone, better/faster bias, capitalized-words) plus
      the master hyphenate toggle, and writing them as jas:hyphenate-*
      attributes onto every paragraph wrapper tspan in the selection.
      Also mirrors the master toggle to panel.hyphenate so the main
      Paragraph panel checkbox reflects the dialog commit. Then clears
      the preview snapshot so close_dialog does not restore (commits
      the user's edits) and closes the dialog. Per the identity-value
      rule, fields equal to their spec defaults (master off, min-word
      6, after-first 3, before-last 2, limit 0, zone 0, bias 0,
      capitalized off) are omitted from the wrapper.
    category: paragraph
    effects:
      - clear_dialog_snapshot: null
      - close_dialog: null
  reset_paragraph_panel:
    description: >
      Reset every Paragraph panel control to its default per
      PARAGRAPH.md §Reset Panel and remove the corresponding paragraph
      attributes (jas:* and text-*) from the paragraph wrapper tspans
      of the current selection. Per the identity-value rule, defaults
      appear as absence — the attributes are removed rather than
      written explicitly.
    category: paragraph
    effects:
      - reset_paragraph_panel: true

  # ── Align ────────────────────────────────────────────────
  # Action names match their ALIGN_*/DISTRIBUTE_* button IDs in
  # lowercase. Each operation action fires a platform effect of
  # the same name (e.g. align_left: true); each native app wires
  # the 14 handlers to its geometry engine. Flask ignores them.

  align_left:
    description: >
      ALIGN_LEFT_BUTTON. Move every element in the selection
      horizontally so their left bounding-box edges coincide with
      the Align-To reference. See ALIGN.md §Align To target.
    category: align
    effects:
      - snapshot
      - align_left: true

  align_horizontal_center:
    description: >
      ALIGN_HORIZONTAL_CENTER_BUTTON. Move every element
      horizontally so their horizontal centers coincide with the
      Align-To reference.
    category: align
    effects:
      - snapshot
      - align_horizontal_center: true

  align_right:
    description: >
      ALIGN_RIGHT_BUTTON. Move every element horizontally so
      their right bounding-box edges coincide with the Align-To
      reference.
    category: align
    effects:
      - snapshot
      - align_right: true

  align_top:
    description: >
      ALIGN_TOP_BUTTON. Move every element vertically so their
      top bounding-box edges coincide with the Align-To reference.
    category: align
    effects:
      - snapshot
      - align_top: true

  align_vertical_center:
    description: >
      ALIGN_VERTICAL_CENTER_BUTTON. Move every element vertically
      so their vertical centers coincide with the Align-To
      reference.
    category: align
    effects:
      - snapshot
      - align_vertical_center: true

  align_bottom:
    description: >
      ALIGN_BOTTOM_BUTTON. Move every element vertically so their
      bottom bounding-box edges coincide with the Align-To
      reference.
    category: align
    effects:
      - snapshot
      - align_bottom: true

  distribute_left:
    description: >
      DISTRIBUTE_LEFT_BUTTON. Redistribute elements horizontally
      so the left coordinates of their bounding boxes are evenly
      spaced along the horizontal extent of the Align-To
      reference.
    category: align
    effects:
      - snapshot
      - distribute_left: true

  distribute_horizontal_center:
    description: >
      DISTRIBUTE_HORIZONTAL_CENTER_BUTTON. Redistribute elements
      horizontally so their horizontal centers are evenly spaced.
    category: align
    effects:
      - snapshot
      - distribute_horizontal_center: true

  distribute_right:
    description: >
      DISTRIBUTE_RIGHT_BUTTON. Redistribute elements horizontally
      so the right coordinates of their bounding boxes are evenly
      spaced.
    category: align
    effects:
      - snapshot
      - distribute_right: true

  distribute_top:
    description: >
      DISTRIBUTE_TOP_BUTTON. Redistribute elements vertically so
      the top coordinates of their bounding boxes are evenly
      spaced.
    category: align
    effects:
      - snapshot
      - distribute_top: true

  distribute_vertical_center:
    description: >
      DISTRIBUTE_VERTICAL_CENTER_BUTTON. Redistribute elements
      vertically so their vertical centers are evenly spaced.
    category: align
    effects:
      - snapshot
      - distribute_vertical_center: true

  distribute_bottom:
    description: >
      DISTRIBUTE_BOTTOM_BUTTON. Redistribute elements vertically
      so the bottom coordinates of their bounding boxes are
      evenly spaced.
    category: align
    effects:
      - snapshot
      - distribute_bottom: true

  distribute_vertical_spacing:
    description: >
      DISTRIBUTE_VERTICAL_SPACING_BUTTON. Move elements
      vertically so gaps between them are uniform. When
      align_to == 'key_object' and a key has been designated,
      the gap equals panel.distribute_spacing_value; otherwise
      the two extremal elements hold and interior gaps average
      evenly. See ALIGN.md §Distribute Spacing.
    category: align
    effects:
      - snapshot
      - distribute_vertical_spacing: true

  distribute_horizontal_spacing:
    description: >
      DISTRIBUTE_HORIZONTAL_SPACING_BUTTON. Move elements
      horizontally so gaps between them are uniform. Semantics
      parallel distribute_vertical_spacing along the horizontal
      axis.
    category: align
    effects:
      - snapshot
      - distribute_horizontal_spacing: true

  set_align_to:
    description: >
      Switch the Align-To target mode. Writes panel.align_to and
      state.align_to in the dual-write pattern. Leaving key_object
      mode also clears the designated key object path so it does
      not linger. See ALIGN.md §Align To target.
    category: align
    params:
      target: { type: enum, values: [selection, artboard, key_object] }
    effects:
      - set_panel_state: { key: align_to, value: "param.target" }
      - set: { align_to: "param.target" }
      - if:
          condition: 'param.target != "key_object"'
          then:
            - set_panel_state: { key: key_object_path, value: "null" }
            - set: { align_key_object_path: "null" }

  toggle_use_preview_bounds:
    description: >
      Toggle the "Use Preview Bounds" flag from the panel menu.
      When checked, every Align / Distribute / Distribute Spacing
      operation reads preview (stroke-inclusive) bounds; when
      unchecked, geometric bounds. See ALIGN.md §Bounding box
      selection.
    category: align
    effects:
      - set_panel_state: { key: use_preview_bounds, value: "not panel.use_preview_bounds" }
      - set: { align_use_preview_bounds: "not state.align_use_preview_bounds" }

  reset_align_panel:
    description: >
      Reset every Align panel control to its default per ALIGN.md
      §Panel menu: align_to = selection, key_object_path cleared,
      distribute_spacing_value = 0, use_preview_bounds = false.
    category: align
    effects:
      - set_panel_state: { key: align_to, value: '"selection"' }
      - set: { align_to: '"selection"' }
      - set_panel_state: { key: key_object_path, value: "null" }
      - set: { align_key_object_path: "null" }
      - set_panel_state: { key: distribute_spacing_value, value: "0" }
      - set: { align_distribute_spacing: "0" }
      - set_panel_state: { key: use_preview_bounds, value: "false" }
      - set: { align_use_preview_bounds: "false" }

  # ── Boolean panel ─────────────────────────────────────────────

  boolean_union:
    description: >
      UNION_BUTTON. Destructively merge every selected element into a
      single path taking the union of their geometries. All operands
      are consumed; the result carries the frontmost operand's paint.
      See BOOLEAN.md §Operand and paint rules.
    category: boolean
    effects:
      - snapshot
      - boolean_union: true
      - set: { last_boolean_op: '"union"' }

  boolean_subtract_front:
    description: >
      SUBTRACT_FRONT_BUTTON. Subtract the frontmost selected element
      (the cutter) from each remaining element. Cutter is consumed;
      each remaining element keeps its own paint.
    category: boolean
    effects:
      - snapshot
      - boolean_subtract_front: true
      - set: { last_boolean_op: '"subtract_front"' }

  boolean_intersection:
    description: >
      INTERSECTION_BUTTON. Destructively reduce the selection to the
      region covered by every element. All operands are consumed;
      result carries the frontmost operand's paint.
    category: boolean
    effects:
      - snapshot
      - boolean_intersection: true
      - set: { last_boolean_op: '"intersection"' }

  boolean_exclude:
    description: >
      EXCLUDE_BUTTON. Destructively reduce the selection to the
      symmetric difference (region covered by exactly one operand).
      All operands are consumed; result carries the frontmost
      operand's paint.
    category: boolean
    effects:
      - snapshot
      - boolean_exclude: true
      - set: { last_boolean_op: '"exclude"' }

  boolean_crop:
    description: >
      CROP_BUTTON. Use the frontmost selected element as a mask and
      crop every other element to its interior. The mask is consumed;
      each cropped survivor keeps its own paint.
    category: boolean
    effects:
      - snapshot
      - boolean_crop: true
      - set: { last_boolean_op: '"crop"' }

  boolean_subtract_back:
    description: >
      SUBTRACT_BACK_BUTTON. Subtract the backmost selected element
      from each remaining element. Backmost is consumed; each
      remaining element keeps its own paint.
    category: boolean
    effects:
      - snapshot
      - boolean_subtract_back: true
      - set: { last_boolean_op: '"subtract_back"' }

  boolean_divide:
    description: >
      DIVIDE_BUTTON. Cut every selected element apart so no two
      overlap. Each resulting fragment inherits the paint of the
      frontmost original element that covered its area. All operands
      are consumed.
    category: boolean
    effects:
      - snapshot
      - boolean_divide: true
      - set: { last_boolean_op: '"divide"' }

  boolean_trim:
    description: >
      TRIM_BUTTON. Remove the parts of each element hidden behind
      elements in front of it. Each remaining element keeps its own
      paint. Frontmost operand is untouched.
    category: boolean
    effects:
      - snapshot
      - boolean_trim: true
      - set: { last_boolean_op: '"trim"' }

  boolean_merge:
    description: >
      MERGE_BUTTON. Perform TRIM, then union any two touching
      survivors whose fills are exactly equal (solid colors only;
      gradients, patterns, and None never match). The merged path
      carries the frontmost contributor's full paint. See BOOLEAN.md
      §Operand and paint rules for the merge predicate.
    category: boolean
    effects:
      - snapshot
      - boolean_merge: true
      - set: { last_boolean_op: '"merge"' }

  # Alt/Option+click variants of the four Shape Mode buttons. Same
  # semantics as Make Compound Shape but with the chosen operation
  # instead of UNION. See BOOLEAN.md §Compound shapes.
  boolean_union_compound:
    description: >
      Alt/Option+click UNION. Creates a live compound shape with the
      Union operation from the selection instead of applying UNION
      destructively.
    category: boolean
    effects:
      - snapshot
      - boolean_union_compound: true
      - set: { last_boolean_op: '"union_compound"' }

  boolean_subtract_front_compound:
    description: >
      Alt/Option+click SUBTRACT_FRONT. Creates a live compound shape
      with the SubtractFront operation from the selection.
    category: boolean
    effects:
      - snapshot
      - boolean_subtract_front_compound: true
      - set: { last_boolean_op: '"subtract_front_compound"' }

  boolean_intersection_compound:
    description: >
      Alt/Option+click INTERSECTION. Creates a live compound shape
      with the Intersection operation from the selection.
    category: boolean
    effects:
      - snapshot
      - boolean_intersection_compound: true
      - set: { last_boolean_op: '"intersection_compound"' }

  boolean_exclude_compound:
    description: >
      Alt/Option+click EXCLUDE. Creates a live compound shape with
      the Exclude operation from the selection.
    category: boolean
    effects:
      - snapshot
      - boolean_exclude_compound: true
      - set: { last_boolean_op: '"exclude_compound"' }

  reset_boolean_panel:
    description: >
      Reset the Boolean panel's transient state. Clears
      state.last_boolean_op so Repeat Boolean Operation becomes a
      no-op until the next op click. Does not touch the Boolean
      Options dialog values (precision / remove_redundant_points /
      divide_remove_unpainted); those are reset from the dialog's
      Defaults button instead. See BOOLEAN.md §Panel metadata.
    category: boolean
    effects:
      - reset_boolean_panel: true
      - set: { last_boolean_op: "null" }

  repeat_boolean_operation:
    description: >
      Re-apply the most-recent boolean operation on the current
      selection. Reads state.last_boolean_op (one of 13 enum values
      or null) and fires the matching destructive op or compound-
      creating variant. No-op when last_boolean_op is null. Make /
      Release / Expand Compound Shape are deliberately not
      repeatable. See BOOLEAN.md §Repeat state.
    category: boolean
    effects:
      - snapshot
      - repeat_boolean_operation: true

  open_boolean_options:
    description: >
      Open the Boolean Options dialog seeded with the current
      state.boolean_* values. OK writes the dialog's values back to
      document state; Cancel discards. See BOOLEAN.md §Boolean
      Options dialog.
    category: boolean
    effects:
      - open_dialog:
          id: boolean_options
          params:
            precision: "state.boolean_precision"
            remove_redundant_points: "state.boolean_remove_redundant_points"
            divide_remove_unpainted: "state.boolean_divide_remove_unpainted"

  boolean_options_confirm:
    description: >
      Commit the Boolean Options dialog. Writes precision, remove-
      redundant-points, and divide-remove-unpainted to document
      state and closes the dialog.
    category: boolean
    params:
      precision: { type: number }
      remove_redundant_points: { type: bool }
      divide_remove_unpainted: { type: bool }
    effects:
      - set:
          boolean_precision: "param.precision"
          boolean_remove_redundant_points: "param.remove_redundant_points"
          boolean_divide_remove_unpainted: "param.divide_remove_unpainted"
      - close_dialog: None

  make_compound_shape:
    description: >
      Equivalent to Alt+click on UNION. Replaces the current selection
      with a single compound shape (live, non-destructive) whose
      operand list is the selected elements in their original z-order
      and whose operation is Union. The new compound shape is selected
      and inserted at the frontmost operand's position. Enabled when
      selection_count >= 2. See BOOLEAN.md §Compound shapes.
    category: boolean
    effects:
      - snapshot
      - make_compound_shape: true

  release_compound_shape:
    description: >
      Inverse of Make. For every compound shape in the selection,
      replaces it with its operand children (each keeping its own
      paint). The compound shape's own paint is discarded. Enabled
      when the selection contains at least one compound shape.
    category: boolean
    effects:
      - snapshot
      - release_compound_shape: true

  expand_compound_shape:
    description: >
      Flattens every compound shape in the selection into static
      Polygon element(s) derived from its evaluated geometry, using
      the compound shape's own paint. The operand tree is discarded.
      Enabled when the selection contains at least one compound
      shape. See BOOLEAN.md §Expand and Release semantics.
    category: boolean
    effects:
      - snapshot
      - expand_compound_shape: true

  # ── Artboards (ARTBOARDS.md) ─────────────────────────────────

  new_artboard:
    description: >
      Create a new artboard silently (no dialogue). Size inherits
      from the current artboard (topmost panel-selected, else first).
      Position is (0,0) if panel-selection is empty, else offset
      (20,20) pt from the current artboard's top-left. Name is
      "Artboard N" with the smallest unused N.
    category: artboards
    effects:
      - snapshot
      - if:
          condition: "active_document.artboards_panel_selection_ids.length > 0"
          then:
            - doc.create_artboard:
                width: "active_document.current_artboard.width"
                height: "active_document.current_artboard.height"
                x: "active_document.current_artboard.x + 20"
                y: "active_document.current_artboard.y + 20"
          else:
            - doc.create_artboard:
                width: "active_document.current_artboard.width"
                height: "active_document.current_artboard.height"
                x: "0"
                y: "0"
      - set_panel_state:
          panel: artboards
          key: rearrange_dirty
          value: "true"

  duplicate_artboards:
    description: >
      Deep-copy each panel-selected artboard. Each duplicate gets a
      fresh id, the next unused "Artboard N" name, and is offset
      (20,20) pt from its source's top-left. Contained-element
      copying is not implemented in Flask (no element model); native
      ports override the doc.duplicate_artboard store method.
    category: artboards
    enabled_when: "active_document.artboards_panel_selection_ids.length > 0"
    effects:
      - snapshot
      - foreach:
          source: "active_document.artboards_panel_selection_ids"
          as: ab_id
        do:
          - doc.duplicate_artboard: ab_id
      - set_panel_state:
          panel: artboards
          key: rearrange_dirty
          value: "true"

  delete_artboards:
    description: >
      Delete panel-selected artboards. Elements inside them remain
      in the document — artboards are boundaries, not containers.
      The at-least-one-artboard invariant is enforced by the menu /
      footer / keyboard enabled_when predicates; this action assumes
      the precondition (selection non-empty AND size < total count).
    category: artboards
    enabled_when: "active_document.artboards_panel_selection_ids.length > 0 and active_document.artboards_panel_selection_ids.length < active_document.artboards_count"
    effects:
      - snapshot
      - foreach:
          source: "active_document.artboards_panel_selection_ids"
          as: ab_id
        do:
          - doc.delete_artboard_by_id: ab_id
      - set_panel_state:
          panel: artboards
          key: artboards_panel_selection
          value: "[]"
      - set_panel_state:
          panel: artboards
          key: panel_selection_anchor
          value: "null"
      - set_panel_state:
          panel: artboards
          key: rearrange_dirty
          value: "true"

  delete_empty_artboards:
    description: >
      Flask-side stub — element bounds aren't available server-side,
      so nothing is ever detected as empty. Native ports compute
      intersection against the element tree and delete artboards with
      no intersecting geometry, preserving position 1 if all are
      empty. Single undo op when native.
    category: artboards
    effects:
      - log: "delete_empty_artboards (Flask stub; native ports implement)"

  artboards_panel_select:
    description: >
      Panel-select an artboard by id. modifier=none replaces the
      selection with just this id (anchor becomes this id).
      modifier=shift extends the range from anchor to target in list
      order. modifier=meta toggles the target id in or out. Shift /
      meta semantics are wired in native apps; Flask phase-1 handles
      the common replace path.
    category: artboards
    params:
      artboard_id: { type: string }
      modifier: { type: string, default: "none" }
    effects:
      - if:
          condition: "param.modifier == 'none' or param.modifier == null"
          then:
            - set_panel_state:
                panel: artboards
                key: artboards_panel_selection
                value: "[param.artboard_id]"
            - set_panel_state:
                panel: artboards
                key: panel_selection_anchor
                value: "param.artboard_id"
          else:
            - log: "artboards_panel_select non-none modifier (sub-phase 4 / native)"

  artboards_select_all:
    description: >
      Select every artboard in the panel (Command-A). Reads the ids
      from active_document.artboards via map.
    category: artboards
    effects:
      - set_panel_state:
          panel: artboards
          key: artboards_panel_selection
          value: "map(active_document.artboards, fun ab -> ab.id)"

  rename_artboard:
    description: >
      Begin inline renaming of a single panel-selected artboard.
      Sets panel.renaming_artboard to the target id; the row template
      shows a text_input in place of the name label while the field
      is set. Triggered by F2, Enter (with single selection),
      click-and-wait on the name, or the Rename menu entry.
    category: artboards
    params:
      artboard_id: { type: string }
    enabled_when: "active_document.artboards_panel_selection_ids.length == 1"
    effects:
      - set_panel_state:
          panel: artboards
          key: renaming_artboard
          value: "param.artboard_id"

  confirm_artboard_rename:
    description: >
      Commit the inline rename. Trims leading / trailing whitespace;
      reverts to the prior name silently if the trimmed result is
      empty; truncates to 256 characters. Duplicate names are
      allowed. Single undo op. Triggered by Enter or blur on the
      rename input.
    category: artboards
    params:
      artboard_id: { type: string }
      new_name: { type: string }
    effects:
      - snapshot
      - doc.set_artboard_field:
          id: "param.artboard_id"
          field: "name"
          value: "param.new_name"
      - set_panel_state:
          panel: artboards
          key: renaming_artboard
          value: "null"

  cancel_artboard_rename:
    description: >
      Abandon the inline rename; the name reverts to its value before
      editing began. Triggered by Escape during rename.
    category: artboards
    effects:
      - set_panel_state:
          panel: artboards
          key: renaming_artboard
          value: "null"

  reset_artboards_panel:
    description: >
      Reset panel UI state (panel-selection cleared, scroll to top,
      reference-point preference restored to center). Does not
      modify document data.
    category: artboards
    effects:
      - set_panel_state:
          panel: artboards
          key: artboards_panel_selection
          value: "[]"
      - set_panel_state:
          panel: artboards
          key: panel_selection_anchor
          value: "null"
      - set_panel_state:
          panel: artboards
          key: reference_point
          value: "'center'"

  # Placeholders for sub-phase 4 (reorder) and sub-phase 5
  # (dialogue). Action names resolve so panel behaviors don't hit
  # missing-action errors.

  move_artboard_up:
    description: >
      Move panel-selected artboards one position earlier in the list.
      Applies the swap-with-neighbor-skipping-selected-neighbors rule:
      iterate top-to-bottom; each selected row swaps with the row
      above it, skipping rows already at position 1 or whose upper
      neighbor is itself selected. Preserves relative order within
      the selection. Example: selection {1, 3, 5} → result
      [1, 3, 2, 5, 4]. Single undo op.
    category: artboards
    enabled_when: "active_document.artboards_panel_selection_ids.length > 0"
    effects:
      - snapshot
      - doc.move_artboards_up: "active_document.artboards_panel_selection_ids"
      - set_panel_state:
          panel: artboards
          key: rearrange_dirty
          value: "true"

  move_artboard_down:
    description: >
      Move panel-selected artboards one position later in the list.
      Symmetric to move_artboard_up — iterate bottom-to-top; each
      selected row swaps with the row below it, skipping rows already
      at the end or whose lower neighbor is itself selected. Single
      undo op.
    category: artboards
    enabled_when: "active_document.artboards_panel_selection_ids.length > 0"
    effects:
      - snapshot
      - doc.move_artboards_down: "active_document.artboards_panel_selection_ids"
      - set_panel_state:
          panel: artboards
          key: rearrange_dirty
          value: "true"

  open_artboard_options:
    description: >
      Open the Artboard Options Dialogue for the artboard with the
      given id. The dialog's init expressions pull the artboard's
      fields and the document-global artboard_options into dialog
      state, so edits are local until OK.
    category: artboards
    params:
      artboard_id: { type: string }
    effects:
      - open_dialog:
          id: artboard_options
          params:
            artboard_id: "param.artboard_id"

  artboard_options_confirm:
    description: >
      Commit the Artboard Options Dialogue. Writes all per-artboard
      fields via doc.set_artboard_field, plus the two document-global
      fields via doc.set_artboard_options_field. Single undo op
      covers the batch; close_dialog dismisses.
    category: artboards
    params:
      artboard_id: { type: string }
      name: { type: string }
      x: { type: number }
      y: { type: number }
      width: { type: number }
      height: { type: number }
      fill: { type: string }
      show_center_mark: { type: bool }
      show_cross_hairs: { type: bool }
      show_video_safe_areas: { type: bool }
      video_ruler_pixel_aspect_ratio: { type: number }
      fade_region_outside_artboard: { type: bool }
      update_while_dragging: { type: bool }
    effects:
      - snapshot
      - doc.set_artboard_field: { id: "param.artboard_id", field: "name",   value: "param.name" }
      - doc.set_artboard_field: { id: "param.artboard_id", field: "x",      value: "param.x" }
      - doc.set_artboard_field: { id: "param.artboard_id", field: "y",      value: "param.y" }
      - doc.set_artboard_field: { id: "param.artboard_id", field: "width",  value: "param.width" }
      - doc.set_artboard_field: { id: "param.artboard_id", field: "height", value: "param.height" }
      - doc.set_artboard_field: { id: "param.artboard_id", field: "fill",   value: "param.fill" }
      - doc.set_artboard_field: { id: "param.artboard_id", field: "show_center_mark",      value: "param.show_center_mark" }
      - doc.set_artboard_field: { id: "param.artboard_id", field: "show_cross_hairs",      value: "param.show_cross_hairs" }
      - doc.set_artboard_field: { id: "param.artboard_id", field: "show_video_safe_areas", value: "param.show_video_safe_areas" }
      - doc.set_artboard_field: { id: "param.artboard_id", field: "video_ruler_pixel_aspect_ratio", value: "param.video_ruler_pixel_aspect_ratio" }
      - doc.set_artboard_options_field: { field: "fade_region_outside_artboard", value: "param.fade_region_outside_artboard" }
      - doc.set_artboard_options_field: { field: "update_while_dragging",        value: "param.update_while_dragging" }
      - clear_dialog_snapshot
      - close_dialog

  delete_artboard_from_dialog:
    description: >
      Delete the artboard the dialog is editing and close. Disabled
      in the dialog footer when the document has exactly one
      artboard (the at-least-one invariant).
    category: artboards
    params:
      artboard_id: { type: string }
    enabled_when: "active_document.artboards_count > 1"
    effects:
      - snapshot
      - doc.delete_artboard_by_id: "param.artboard_id"
      - clear_dialog_snapshot
      - close_dialog

  # Preset / chain-link / orientation / fill-preset / reference-point
  # helper actions. Log-only stubs in Flask; native apps override
  # with concrete dialog-state mutations.

  apply_artboard_preset:
    description: "Translate dialog.preset into dialog.width/height (native-app concrete; Flask log)."
    category: artboards
    params:
      preset: { type: string }
    effects:
      - log: "apply_artboard_preset (sub-phase follow-up / native)"

  toggle_artboard_chain_link:
    description: "Toggle dialog.chain_link_engaged; capture dialog.chain_link_ratio on engage."
    category: artboards
    effects:
      - log: "toggle_artboard_chain_link (native)"

  toggle_artboard_orientation:
    description: "Swap dialog.width <-> dialog.height around the current reference-point anchor."
    category: artboards
    effects:
      - log: "toggle_artboard_orientation (native)"

  set_artboard_fill_preset:
    description: "Translate dialog.fill dropdown selection into dialog.fill hex / transparent."
    category: artboards
    params:
      preset: { type: string }
    effects:
      - log: "set_artboard_fill_preset (native)"

  set_artboard_reference_point:
    description: "Update the panel.reference_point preference from the 3x3 widget."
    category: artboards
    params:
      anchor: { type: string }
    effects:
      - set_panel_state:
          panel: artboards
          key: reference_point
          value: "param.anchor"

  convert_to_artboards:
    description: "Phase-1 deferred. Grayed with 'Coming soon' tooltip."
    category: artboards
    enabled_when: "false"
    effects:
      - log: "convert_to_artboards (deferred)"

  rearrange_artboards:
    description: "Phase-1 deferred. Grayed with 'Coming soon' tooltip."
    category: artboards
    enabled_when: "false"
    effects:
      - log: "rearrange_artboards (deferred)"

  # ─── Brushes panel ───────────────────────────────────────
  # Action stubs for the Brushes panel and its menu. Phase 1
  # ships the panel YAML and minimal click semantics; most
  # actions log only until renderer / dialog / element-model
  # work lands in subsequent sub-phases.

  open_brush_options:
    description: >
      Open the Brush Options dialog. Mode is one of create,
      library_edit, instance_edit (see BRUSH_OPTIONS_DIALOG.md
      §Modes). Library + brush_slug parameters select the master
      brush; instance_edit reads the brush from the canvas
      selection's jas:stroke-brush attribute.
    category: brushes
    params:
      mode: { type: string }
      library: { type: string, optional: True }
      brush_slug: { type: string, optional: True }
    effects:
      - open_dialog:
          id: brush_options
          params:
            mode: "param.mode"
            library: "param.library"
            brush_slug: "param.brush_slug"

  brush_options_confirm:
    description: >
      Confirm the Brush Options dialog. Per-mode dispatch:

      create — assemble a new brush dict from dialog state (name,
        type, type-specific params), call brush.append on the
        selected library, close the dialog. The slug is generated
        from the brush_name (lowercased, non-alphanum stripped).
      library_edit — assemble a patch dict from the dialog state
        delta and open the Apply to Strokes confirm sub-dialog;
        the sub-dialog's Apply button triggers the actual
        brush.update + re-render.
      instance_edit — write the dialog state delta as
        stroke_brush_overrides JSON on the selected element via
        doc.set_attr_on_selection.

      Phase 1 wires create + instance_edit; library_edit defers the
      brush.update + re-render to the Apply sub-dialog so the user
      retains the chance to cancel between dialog confirms.
    category: brushes
    params:
      mode: { type: string }
      library: { type: string, optional: True }
      brush_slug: { type: string, optional: True }
    effects:
      # Per-app effect handlers implement brush.options_confirm
      # against the dialog scope. Each app reads dialog state +
      # action params and dispatches per mode (create | library_edit
      # | instance_edit). See per-app implementations in
      # interpreter/renderer.rs (Rust apply_dialog_confirm),
      # YamlToolEffects.swift / .ml / .py.
      - "brush.options_confirm": {}
      - close_dialog: None

  paintbrush_tool_options_confirm:
    description: >
      Commit the Paintbrush Tool Options dialog. Writes the five
      per-document options to state.paintbrush_* and closes the
      dialog. See PAINTBRUSH_TOOL.md §Tool options.
    category: brushes
    params:
      fidelity: { type: number }
      fill_new_strokes: { type: bool }
      keep_selected: { type: bool }
      edit_selected_paths: { type: bool }
      edit_within: { type: number }
    effects:
      - set:
          paintbrush_fidelity: "param.fidelity"
          paintbrush_fill_new_strokes: "param.fill_new_strokes"
          paintbrush_keep_selected: "param.keep_selected"
          paintbrush_edit_selected_paths: "param.edit_selected_paths"
          paintbrush_edit_within: "param.edit_within"
      - close_dialog: None

  paintbrush_tool_options_reset:
    description: >
      Restore the Paintbrush Tool Options dialog to factory
      defaults without committing. Writes defaults into dialog
      state; the user must still click OK for the values to
      persist to state.paintbrush_*. Defaults per
      PAINTBRUSH_TOOL.md §Tool options.
    category: brushes
    effects:
      - set:
          dialog.fidelity: 3
          dialog.fill_new_strokes: false
          dialog.keep_selected: true
          dialog.edit_selected_paths: true
          dialog.edit_within: 12

  apply_brush_changes_to_strokes:
    description: >
      Apply pending brush-edits to every element whose
      stroke_brush references the named library/slug. The
      brush_options_confirm action stashes the patch on dialog
      state before opening the Apply to Strokes confirm dialog;
      this action commits via brush.update and triggers a canvas
      re-render. Per BRUSH_OPTIONS_DIALOG.md §Apply to Strokes.
    category: brushes
    params:
      library: { type: string }
      brush_slug: { type: string }
    effects:
      # Wired to the per-app brush.update effect from Phase 6.5-6.8.
      # The patch dict comes from the parent Brush Options dialog's
      # captured state; per-app handlers reconstitute it.
      - log: "apply_brush_changes_to_strokes (library={{param.library}}, brush={{param.brush_slug}})"
      - close_dialog: None

  duplicate_brush:
    description: >
      Duplicate every brush in panel.selected_brushes within
      panel.selected_library. Copies are inserted immediately
      after their originals with " copy" appended to the name and
      a fresh slug. The copies become the new selection.
      Undoable.
    category: brushes
    effects:
      - "brush.duplicate_selected": {}

  delete_brush:
    description: >
      Permanently remove every brush in panel.selected_brushes
      from panel.selected_library. Any element with
      stroke_brush referencing a deleted brush re-renders as a
      plain stroke. Undoable.
    category: brushes
    effects:
      - "brush.delete_selected": {}

  select_all_unused_brushes:
    description: >
      Replace panel.selected_brushes with every brush in the
      panel whose slug does not appear as jas:stroke-brush on any
      element in the document.
    category: brushes
    effects:
      - log: "select_all_unused_brushes"

  sort_brushes_by_name:
    description: >
      Permanently reorder panel.selected_library's brushes
      alphabetically (case-sensitive, lexicographic). Slugs
      unchanged; selection preserved. Persisted on next
      save_brush_library.
    category: brushes
    effects:
      - "data.list_sort":
          path: "data.brush_libraries.${panel.selected_library}.brushes"
          key: "item.name"

  set_brush_view_mode:
    description: >
      Set panel.view_mode (thumbnail / list).
    category: brushes
    params:
      view_mode: { type: string }
    effects:
      - set_panel_state:
          panel: brushes
          key: view_mode
          value: "param.view_mode"
      - set: { brushes_view_mode: "param.view_mode" }

  set_brush_thumbnail_size:
    description: >
      Set panel.thumbnail_size (small / medium / large).
      Disabled when view_mode == list.
    category: brushes
    params:
      size: { type: string }
    effects:
      - set_panel_state:
          panel: brushes
          key: thumbnail_size
          value: "param.size"
      - set: { brushes_thumbnail_size: "param.size" }

  toggle_brush_category:
    description: >
      Toggle a brush type's membership in panel.category_filter.
      Unchecking all five hides every tile.
    category: brushes
    params:
      type: { type: string }
    effects:
      - log: "toggle_brush_category (type={{param.type}})"

  toggle_brush_library_persistent:
    description: >
      Toggle panel.selected_library's slug in the user's
      preferences.brushes.persistent_libraries list. Persistent
      libraries auto-open on app launch.
    category: brushes
    effects:
      - log: "toggle_brush_library_persistent"

  save_brush_library:
    description: >
      Open the Save Brush Library dialog, prompting for a name.
      The selected library's manifest and artwork files are
      written to workspace/brushes/<new_slug>/.
    category: brushes
    effects:
      - log: "save_brush_library"

  open_brush_libraries_menu:
    description: >
      Show the dynamic Open Brush Library submenu listing all
      libraries discovered under workspace/brushes/. Selecting an
      unopened library appends to panel.open_libraries; selecting
      an already-open library closes it.
    category: brushes
    effects:
      - log: "open_brush_libraries_menu"

  apply_brush_to_selection:
    description: >
      Apply a brush to every path in the canvas selection.
      Sets stroke_brush to "<library>/<brush_slug>" on each
      element; clears any per-element stroke_brush_overrides.
      Single-click on a panel tile fires this action plus the
      state.stroke_brush write in one transaction.
    category: brushes
    params:
      library: { type: string }
      brush_slug: { type: string }
    effects:
      - "doc.snapshot": {}
      - "doc.set_attr_on_selection":
          attr: "stroke_brush"
          value: '"{{param.library}}/{{param.brush_slug}}"'
      - "doc.set_attr_on_selection":
          attr: "stroke_brush_overrides"
          value: "null"

  remove_brush_from_selection:
    description: >
      Strip stroke_brush and stroke_brush_overrides from every
      selected element. The element re-renders with the native
      stroke pipeline.
    category: brushes
    effects:
      - "doc.snapshot": {}
      - "doc.set_attr_on_selection":
          attr: "stroke_brush"
          value: "null"
      - "doc.set_attr_on_selection":
          attr: "stroke_brush_overrides"
          value: "null"
