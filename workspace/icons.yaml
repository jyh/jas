  # ── Paragraph panel icons ──────────────────────────────────
  # Standard convention: 4 horizontal "text lines" at y=4/7/10/13,
  # stroke-width 1.4, currentColor, rounded line caps. Margin /
  # divider guides at stroke-width 0.5–1.5 and 0.5–0.6 opacity.

  para_align_left:        # 4 lines flush-left, ragged right
    viewbox: "0 0 16 16"
    svg: >
      <line x1="2" y1="4" x2="13" y2="4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="2" y1="7" x2="10" y2="7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="2" y1="10" x2="14" y2="10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="2" y1="13" x2="8" y2="13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>

  para_align_center:      # 4 lines centered, both edges ragged
    viewbox: "0 0 16 16"
    svg: >
      <line x1="2" y1="4" x2="14" y2="4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="4" y1="7" x2="12" y2="7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="2" y1="10" x2="14" y2="10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="5" y1="13" x2="11" y2="13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>

  para_align_right:       # 4 lines flush-right, ragged left
    viewbox: "0 0 16 16"
    svg: >
      <line x1="3" y1="4" x2="14" y2="4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="6" y1="7" x2="14" y2="7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="2" y1="10" x2="14" y2="10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="8" y1="13" x2="14" y2="13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>

  para_justify_left:      # 3 full lines + last short flush-left
    viewbox: "0 0 16 16"
    svg: >
      <line x1="2" y1="4" x2="14" y2="4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="2" y1="7" x2="14" y2="7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="2" y1="10" x2="14" y2="10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="2" y1="13" x2="8" y2="13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>

  para_justify_center:    # 3 full lines + last short centered
    viewbox: "0 0 16 16"
    svg: >
      <line x1="2" y1="4" x2="14" y2="4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="2" y1="7" x2="14" y2="7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="2" y1="10" x2="14" y2="10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="5" y1="13" x2="11" y2="13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>

  para_justify_right:     # 3 full lines + last short flush-right
    viewbox: "0 0 16 16"
    svg: >
      <line x1="2" y1="4" x2="14" y2="4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="2" y1="7" x2="14" y2="7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="2" y1="10" x2="14" y2="10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="8" y1="13" x2="14" y2="13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>

  para_justify_all:       # 4 full lines, every line edge-to-edge
    viewbox: "0 0 16 16"
    svg: >
      <line x1="2" y1="4" x2="14" y2="4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="2" y1="7" x2="14" y2="7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="2" y1="10" x2="14" y2="10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="2" y1="13" x2="14" y2="13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>

  para_left_indent:       # left margin bar + lines indented from it
    viewbox: "0 0 16 16"
    svg: >
      <line x1="2" y1="2" x2="2" y2="14" stroke="currentColor" stroke-width="1.5" opacity="0.6"/>
      <line x1="6" y1="4" x2="14" y2="4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="6" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="6" y1="10" x2="14" y2="10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="6" y1="13" x2="12" y2="13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>

  para_right_indent:      # right margin bar + lines indented from it
    viewbox: "0 0 16 16"
    svg: >
      <line x1="14" y1="2" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" opacity="0.6"/>
      <line x1="2" y1="4" x2="10" y2="4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="3" y1="7" x2="10" y2="7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="2" y1="10" x2="10" y2="10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="4" y1="13" x2="10" y2="13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>

  para_first_line_indent: # first line starts indented; rest flush-left
    viewbox: "0 0 16 16"
    svg: >
      <polygon points="2,2.5 5,4 2,5.5" fill="currentColor" opacity="0.7"/>
      <line x1="6" y1="4" x2="14" y2="4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="2" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="2" y1="10" x2="14" y2="10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="2" y1="13" x2="11" y2="13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>

  para_space_before:      # divider on top, down-arrow into a paragraph below
    viewbox: "0 0 16 16"
    svg: >
      <line x1="2" y1="2" x2="14" y2="2" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>
      <polyline points="6,4 8,7 10,4" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="2" y1="10" x2="13" y2="10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="2" y1="13" x2="11" y2="13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>

  para_space_after:       # paragraph on top, down-arrow into divider below
    viewbox: "0 0 16 16"
    svg: >
      <line x1="2" y1="3" x2="13" y2="3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="2" y1="6" x2="11" y2="6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <polyline points="6,9 8,12 10,9" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="2" y1="14" x2="14" y2="14" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>

  para_bullets:           # 3 rows of bullet + line, identifies the bullet selector
    viewbox: "0 0 16 16"
    svg: >
      <circle cx="2.5" cy="4" r="1.2" fill="currentColor"/>
      <line x1="5" y1="4" x2="14" y2="4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <circle cx="2.5" cy="8" r="1.2" fill="currentColor"/>
      <line x1="5" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <circle cx="2.5" cy="12" r="1.2" fill="currentColor"/>
      <line x1="5" y1="12" x2="14" y2="12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>

  para_numbered:          # 3 rows of "1./2./3." marker + line
    viewbox: "0 0 16 16"
    svg: >
      <text x="0.5" y="5.7" font-size="4.5" font-family="sans-serif" font-weight="600" fill="currentColor">1.</text>
      <line x1="5" y1="4" x2="14" y2="4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <text x="0.5" y="9.7" font-size="4.5" font-family="sans-serif" font-weight="600" fill="currentColor">2.</text>
      <line x1="5" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <text x="0.5" y="13.7" font-size="4.5" font-family="sans-serif" font-weight="600" fill="currentColor">3.</text>
      <line x1="5" y1="12" x2="14" y2="12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>

  # ── Align panel ────────────────────────────────────────────
  # Row/column alignment and distribution glyphs in a 16x16 grid.
  # Reference lines are solid; center-axis references are dashed.
  # Distribute glyphs show three bars with the marker dimension
  # (left edge / center / right edge) matching the operation.

  align_left:
    viewbox: "0 0 16 16"
    svg: >
      <line x1="2" y1="2" x2="2" y2="14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <rect x="2" y="3" width="10" height="2.2" fill="currentColor"/>
      <rect x="2" y="7" width="7" height="2.2" fill="currentColor"/>
      <rect x="2" y="11" width="12" height="2.2" fill="currentColor"/>

  align_horizontal_center:
    viewbox: "0 0 16 16"
    svg: >
      <line x1="8" y1="2" x2="8" y2="14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-dasharray="2 1"/>
      <rect x="3" y="3" width="10" height="2.2" fill="currentColor"/>
      <rect x="4.5" y="7" width="7" height="2.2" fill="currentColor"/>
      <rect x="2" y="11" width="12" height="2.2" fill="currentColor"/>

  align_right:
    viewbox: "0 0 16 16"
    svg: >
      <line x1="14" y1="2" x2="14" y2="14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <rect x="4" y="3" width="10" height="2.2" fill="currentColor"/>
      <rect x="7" y="7" width="7" height="2.2" fill="currentColor"/>
      <rect x="2" y="11" width="12" height="2.2" fill="currentColor"/>

  align_top:
    viewbox: "0 0 16 16"
    svg: >
      <line x1="2" y1="2" x2="14" y2="2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <rect x="3" y="2" width="2.2" height="10" fill="currentColor"/>
      <rect x="7" y="2" width="2.2" height="7" fill="currentColor"/>
      <rect x="11" y="2" width="2.2" height="12" fill="currentColor"/>

  align_vertical_center:
    viewbox: "0 0 16 16"
    svg: >
      <line x1="2" y1="8" x2="14" y2="8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-dasharray="2 1"/>
      <rect x="3" y="3" width="2.2" height="10" fill="currentColor"/>
      <rect x="7" y="4.5" width="2.2" height="7" fill="currentColor"/>
      <rect x="11" y="2" width="2.2" height="12" fill="currentColor"/>

  align_bottom:
    viewbox: "0 0 16 16"
    svg: >
      <line x1="2" y1="14" x2="14" y2="14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <rect x="3" y="4" width="2.2" height="10" fill="currentColor"/>
      <rect x="7" y="7" width="2.2" height="7" fill="currentColor"/>
      <rect x="11" y="2" width="2.2" height="12" fill="currentColor"/>

  distribute_left:
    viewbox: "0 0 16 16"
    svg: >
      <rect x="1" y="3" width="2.2" height="10" fill="currentColor"/>
      <rect x="7" y="3" width="2.2" height="10" fill="currentColor"/>
      <rect x="13" y="3" width="2.2" height="10" fill="currentColor"/>

  distribute_horizontal_center:
    viewbox: "0 0 16 16"
    svg: >
      <rect x="2" y="3" width="2.2" height="10" fill="currentColor"/>
      <rect x="6.9" y="3" width="2.2" height="10" fill="currentColor"/>
      <rect x="11.8" y="3" width="2.2" height="10" fill="currentColor"/>
      <line x1="3.1" y1="15" x2="3.1" y2="15.5" stroke="currentColor" stroke-width="0.8"/>
      <line x1="8" y1="15" x2="8" y2="15.5" stroke="currentColor" stroke-width="0.8"/>
      <line x1="12.9" y1="15" x2="12.9" y2="15.5" stroke="currentColor" stroke-width="0.8"/>

  distribute_right:
    viewbox: "0 0 16 16"
    svg: >
      <rect x="0.8" y="3" width="2.2" height="10" fill="currentColor"/>
      <rect x="6.8" y="3" width="2.2" height="10" fill="currentColor"/>
      <rect x="12.8" y="3" width="2.2" height="10" fill="currentColor"/>

  distribute_top:
    viewbox: "0 0 16 16"
    svg: >
      <rect x="3" y="1" width="10" height="2.2" fill="currentColor"/>
      <rect x="3" y="7" width="10" height="2.2" fill="currentColor"/>
      <rect x="3" y="13" width="10" height="2.2" fill="currentColor"/>

  distribute_vertical_center:
    viewbox: "0 0 16 16"
    svg: >
      <rect x="3" y="2" width="10" height="2.2" fill="currentColor"/>
      <rect x="3" y="6.9" width="10" height="2.2" fill="currentColor"/>
      <rect x="3" y="11.8" width="10" height="2.2" fill="currentColor"/>

  distribute_bottom:
    viewbox: "0 0 16 16"
    svg: >
      <rect x="3" y="0.8" width="10" height="2.2" fill="currentColor"/>
      <rect x="3" y="6.8" width="10" height="2.2" fill="currentColor"/>
      <rect x="3" y="12.8" width="10" height="2.2" fill="currentColor"/>

  distribute_spacing_vertical:
    viewbox: "0 0 16 16"
    svg: >
      <rect x="2" y="2" width="10" height="2.2" fill="currentColor"/>
      <rect x="2" y="6.9" width="10" height="2.2" fill="currentColor"/>
      <rect x="2" y="11.8" width="10" height="2.2" fill="currentColor"/>
      <line x1="14" y1="4.2" x2="14" y2="6.9" stroke="currentColor" stroke-width="0.8" stroke-linecap="round"/>
      <line x1="14" y1="9.1" x2="14" y2="11.8" stroke="currentColor" stroke-width="0.8" stroke-linecap="round"/>

  distribute_spacing_horizontal:
    viewbox: "0 0 16 16"
    svg: >
      <rect x="2" y="2" width="2.2" height="10" fill="currentColor"/>
      <rect x="6.9" y="2" width="2.2" height="10" fill="currentColor"/>
      <rect x="11.8" y="2" width="2.2" height="10" fill="currentColor"/>
      <line x1="4.2" y1="14" x2="6.9" y2="14" stroke="currentColor" stroke-width="0.8" stroke-linecap="round"/>
      <line x1="9.1" y1="14" x2="11.8" y2="14" stroke="currentColor" stroke-width="0.8" stroke-linecap="round"/>

  align_to_artboard:
    viewbox: "0 0 16 16"
    svg: >
      <rect x="2" y="2" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.4"/>
      <line x1="2" y1="5" x2="14" y2="5" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>

  align_to_selection:
    viewbox: "0 0 16 16"
    svg: >
      <rect x="2" y="2" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-dasharray="1.8 1.2"/>
      <rect x="1" y="1" width="2" height="2" fill="currentColor"/>
      <rect x="13" y="1" width="2" height="2" fill="currentColor"/>
      <rect x="1" y="13" width="2" height="2" fill="currentColor"/>
      <rect x="13" y="13" width="2" height="2" fill="currentColor"/>

  align_to_key_object:
    viewbox: "0 0 16 16"
    svg: >
      <rect x="1.5" y="1.5" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="1.4 1"/>
      <rect x="5" y="5" width="6" height="6" fill="currentColor"/>

  # ── Boolean panel icons ──────────────────────────────────────
  # All boolean-op icons share a two-square motif: rect A at (2,4,8,8)
  # and rect B at (6,2,8,8) overlapping in (6..10, 4..10). Different
  # fills / strokes distinguish the nine operations visually.

  boolean_union:
    viewbox: "0 0 16 16"
    svg: >
      <path d="M2,4 H10 V12 H2 Z M6,2 H14 V10 H6 Z" fill="currentColor"/>

  boolean_subtract_front:
    viewbox: "0 0 16 16"
    svg: >
      <path d="M2,4 H10 V12 H2 Z M6,4 H10 V10 H6 Z" fill="currentColor" fill-rule="evenodd"/>
      <rect x="6" y="2" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="1.2 1"/>

  boolean_intersection:
    viewbox: "0 0 16 16"
    svg: >
      <rect x="2" y="4" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1.2"/>
      <rect x="6" y="2" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1.2"/>
      <rect x="6" y="4" width="4" height="6" fill="currentColor"/>

  boolean_exclude:
    viewbox: "0 0 16 16"
    svg: >
      <path d="M2,4 H10 V12 H2 Z M6,4 H10 V10 H6 Z" fill="currentColor" fill-rule="evenodd"/>
      <path d="M6,2 H14 V10 H6 Z M6,4 H10 V10 H6 Z" fill="currentColor" fill-rule="evenodd"/>

  boolean_divide:
    viewbox: "0 0 16 16"
    svg: >
      <rect x="2" y="4" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1.2"/>
      <rect x="6" y="2" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1.2"/>
      <line x1="6" y1="4" x2="6" y2="12" stroke="currentColor" stroke-width="1"/>
      <line x1="10" y1="4" x2="10" y2="10" stroke="currentColor" stroke-width="1"/>
      <line x1="2" y1="10" x2="10" y2="10" stroke="currentColor" stroke-width="1"/>

  boolean_trim:
    viewbox: "0 0 16 16"
    svg: >
      <path d="M2,4 H10 V12 H2 Z M6,4 H10 V10 H6 Z" fill="currentColor" fill-rule="evenodd"/>
      <rect x="6" y="2" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1.2"/>

  boolean_merge:
    viewbox: "0 0 16 16"
    svg: >
      <path d="M2,4 H14 V10 H2 Z" fill="currentColor"/>
      <rect x="2" y="4" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1"/>
      <rect x="6" y="2" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1"/>

  boolean_crop:
    viewbox: "0 0 16 16"
    svg: >
      <rect x="2" y="4" width="8" height="8" fill="currentColor" opacity="0.35"/>
      <rect x="6" y="2" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1.4"/>
      <rect x="6" y="4" width="4" height="6" fill="currentColor"/>

  boolean_subtract_back:
    viewbox: "0 0 16 16"
    svg: >
      <rect x="2" y="4" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="1.2 1"/>
      <path d="M6,2 H14 V10 H6 Z M6,4 H10 V10 H6 Z" fill="currentColor" fill-rule="evenodd"/>

  boolean_expand:
    viewbox: "0 0 16 16"
    svg: >
      <rect x="2" y="2" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-dasharray="1.4 1"/>
      <polygon points="5,8 11,8 8,5" fill="currentColor"/>
      <polygon points="5,8 11,8 8,11" fill="currentColor"/>

  # Opacity panel LINK_INDICATOR, linked state: two chain-link
  # loops joined by a short connecting bar — the element's mask
  # follows the element's transform.
  link_linked:
    viewbox: "0 0 16 16"
    svg: >
      <path d="M2.5,11.5 a2.5,2.5 0 0 1 0,-3.5 l2,-2"
            fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <path d="M13.5,4.5 a2.5,2.5 0 0 1 0,3.5 l-2,2"
            fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="5.5" y1="8.5" x2="10.5" y2="7.5"
            stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>

  # Opacity panel LINK_INDICATOR, unlinked state: same two loops
  # but separated by a diagonal break — the mask keeps its own
  # (captured) transform.
  link_unlinked:
    viewbox: "0 0 16 16"
    svg: >
      <path d="M2.5,11.5 a2.5,2.5 0 0 1 0,-3.5 l2,-2"
            fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <path d="M13.5,4.5 a2.5,2.5 0 0 1 0,3.5 l-2,2"
            fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="6" y1="11" x2="10" y2="5"
            stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>

  # ── Brushes panel: bottom toolbar ────────────────────────
  # Bookshelf icon — opens the Brush Libraries dynamic submenu.
  brush_libraries_menu:
    viewbox: "0 0 16 16"
    svg: >
      <rect x="2" y="3" width="2" height="11" fill="none" stroke="currentColor" stroke-width="1.2"/>
      <rect x="5" y="3" width="2" height="11" fill="none" stroke="currentColor" stroke-width="1.2"/>
      <rect x="8.5" y="3" width="2" height="11" fill="none" stroke="currentColor" stroke-width="1.2" transform="rotate(8 9.5 8.5)"/>
      <rect x="11.5" y="5" width="2.5" height="9" fill="none" stroke="currentColor" stroke-width="1.2"/>

  # White square with red stroke and slash — strips brush off a path.
  remove_brush_stroke:
    viewbox: "0 0 16 16"
    svg: >
      <rect x="2.5" y="2.5" width="11" height="11" fill="#fff" stroke="currentColor" stroke-width="1.2"/>
      <line x1="3" y1="13" x2="13" y2="3" stroke="#d22" stroke-width="1.6" stroke-linecap="round"/>

  # Cog over a small stroke — per-instance brush options.
  brush_options_for_selection:
    viewbox: "0 0 16 16"
    svg: >
      <path d="M2,11 q3,-2 6,0 t6,0" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <circle cx="11" cy="5" r="2.6" fill="none" stroke="currentColor" stroke-width="1.2"/>
      <line x1="11" y1="1.5" x2="11" y2="2.8" stroke="currentColor" stroke-width="1.2"/>
      <line x1="11" y1="7.2" x2="11" y2="8.5" stroke="currentColor" stroke-width="1.2"/>
      <line x1="7.5" y1="5" x2="8.8" y2="5" stroke="currentColor" stroke-width="1.2"/>
      <line x1="13.2" y1="5" x2="14.5" y2="5" stroke="currentColor" stroke-width="1.2"/>

  # Plus on a tile — create a new brush from the canvas selection.
  new_brush:
    viewbox: "0 0 16 16"
    svg: >
      <rect x="2" y="2" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1.2"/>
      <line x1="11.5" y1="11.5" x2="11.5" y2="14.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      <line x1="10" y1="13" x2="13" y2="13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>

  # Trash can — delete selected brush from the library.
  delete_brush:
    viewbox: "0 0 16 16"
    svg: >
      <line x1="2" y1="4" x2="14" y2="4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="6" y1="2.5" x2="10" y2="2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <path d="M3.5,4 L4.5,14 L11.5,14 L12.5,4" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
      <line x1="6.5" y1="6.5" x2="6.5" y2="12" stroke="currentColor" stroke-width="1"/>
      <line x1="9.5" y1="6.5" x2="9.5" y2="12" stroke="currentColor" stroke-width="1"/>

  # ── Brushes panel: type-indicator decorators ─────────────
  # Calligraphic: an oval pen tip stroke.
  brush_type_calligraphic:
    viewbox: "0 0 12 12"
    svg: >
      <ellipse cx="6" cy="6" rx="4.5" ry="2" fill="currentColor" transform="rotate(-30 6 6)"/>

  # Scatter: three loose dots — implies discrete stamps.
  brush_type_scatter:
    viewbox: "0 0 12 12"
    svg: >
      <circle cx="3" cy="9" r="1.4" fill="currentColor"/>
      <circle cx="6.5" cy="5" r="1.4" fill="currentColor"/>
      <circle cx="10" cy="8" r="1.4" fill="currentColor"/>

  # Art: a tapered ribbon stretched along a curve.
  brush_type_art:
    viewbox: "0 0 12 12"
    svg: >
      <path d="M1,9 Q6,1 11,5 L11,7 Q6,3 1,11 Z" fill="currentColor"/>

  # Pattern: three repeated tiles in a row.
  brush_type_pattern:
    viewbox: "0 0 12 12"
    svg: >
      <rect x="0.5" y="4" width="3" height="4" fill="currentColor"/>
      <rect x="4.5" y="4" width="3" height="4" fill="currentColor"/>
      <rect x="8.5" y="4" width="3" height="4" fill="currentColor"/>

  # Bristle: short fanned strokes — implies multi-bristle texture.
  brush_type_bristle:
    viewbox: "0 0 12 12"
    svg: >
      <line x1="6" y1="2" x2="3" y2="11" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
      <line x1="6" y1="2" x2="5" y2="11" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
      <line x1="6" y1="2" x2="7" y2="11" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
      <line x1="6" y1="2" x2="9" y2="11" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>

  # ── Artboards panel footer + row icons ────────────────────────

  # Up-arrow with stem — used by Layers / Artboards panels for
  # "Move Up" footer action.
  arrow_up:
    viewbox: "0 0 16 16"
    svg: >
      <line x1="8" y1="3" x2="8" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M3,8 L8,3 L13,8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  # Down-arrow with stem — used by Layers / Artboards panels for
  # "Move Down" footer action.
  arrow_down:
    viewbox: "0 0 16 16"
    svg: >
      <line x1="8" y1="3" x2="8" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M3,8 L8,13 L13,8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  # New artboard: page rectangle + plus sign on the right.
  artboard_new:
    viewbox: "0 0 16 16"
    svg: >
      <path d="M2,3 L9,3 L9,13 L2,13 Z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="miter"/>
      <line x1="13" y1="5" x2="13" y2="11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="10" y1="8" x2="16" y2="8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>

  # New Symbol: a symbol diamond with a plus — promote the selection
  # to a master in the Symbols panel footer.
  symbol_new:
    viewbox: "0 0 16 16"
    svg: >
      <path d="M6,2 L10,6 L6,10 L2,6 Z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      <line x1="12" y1="9" x2="12" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="9" y1="12" x2="15" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>

  # Place Instance: a symbol diamond with a small down-arrow — drop a
  # new instance onto the canvas from the Symbols panel footer.
  symbol_place:
    viewbox: "0 0 16 16"
    svg: >
      <path d="M6,1 L10,5 L6,9 L2,5 Z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      <line x1="12" y1="8" x2="12" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M10,12 L12,14 L14,12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  # Artboard options: three vertical dots ("more") — opens the
  # Artboard Options dialog from a row.
  artboard_options:
    viewbox: "0 0 16 16"
    svg: >
      <circle cx="8" cy="3" r="1.4" fill="currentColor"/>
      <circle cx="8" cy="8" r="1.4" fill="currentColor"/>
      <circle cx="8" cy="13" r="1.4" fill="currentColor"/>

  # Rearrange: two opposing horizontal arrows — implies reorder.
  rearrange:
    viewbox: "0 0 16 16"
    svg: >
      <line x1="3" y1="5" x2="13" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M11,3 L13,5 L11,7" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="3" y1="11" x2="13" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M5,9 L3,11 L5,13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  # Portrait page — taller than wide. Used by Artboard Options
  # dialog's orientation icon_button_group.
  orientation_portrait:
    viewbox: "0 0 16 16"
    svg: >
      <rect x="4" y="2" width="8" height="12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="miter"/>

  # Landscape page — wider than tall.
  orientation_landscape:
    viewbox: "0 0 16 16"
    svg: >
      <rect x="2" y="4" width="12" height="8" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="miter"/>

  # Trash can outline — used by Layers / Artboards panels for
  # "Delete" footer action.
  trash:
    viewbox: "0 0 16 16"
    svg: >
      <line x1="2" y1="4" x2="14" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="6" y1="2" x2="10" y2="2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M4,4 L4.5,13 L11.5,13 L12,4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="7" y1="7" x2="7" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="9" y1="7" x2="9" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
