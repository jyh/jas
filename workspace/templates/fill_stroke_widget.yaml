fill_stroke_widget:
  description: >
    Overlapping fill/stroke color swatches with swap and reset buttons,
    plus Color/Gradient/None mode buttons at the bottom. All positions
    and sizes are derived from a single 'size' parameter.
  params:
    id_prefix: { type: string, default: "" }
    size: { type: number, default: 66 }
    # Derived params — computed from size if not overridden
    swatch_size: { type: number, default: "${size} * 55 / 100" }
    fill_x: { type: number, default: "${size} * 9 / 100" }
    fill_y: { type: number, default: "${size} * 9 / 100" }
    stroke_x: { type: number, default: "${size} * 33 / 100" }
    stroke_y: { type: number, default: "${size} * 33 / 100" }
    swap_size: { type: number, default: "${size} * 30 / 100" }
    swap_x: { type: number, default: "${size} * 64 / 100" }
    swap_y: { type: number, default: "${size} * 3 / 100" }
    reset_size: { type: number, default: "${size} * 30 / 100" }
    reset_x: { type: number, default: "${size} * 3 / 100" }
    reset_y: { type: number, default: "${size} * 68 / 100" }
    mode_btn_size: { type: number, default: "${size} * 24 / 100" }
    mode_x: { type: number, default: "${size} * 6 / 100" }
    mode_y: { type: number, default: "${size} * 94 / 100" }
    total_height: { type: number, default: "${size} * 124 / 100" }
  content:
    type: container
    layout: column
    style:
      width: "${size}"
      height: "${total_height}"
    children:
      - id: "${id_prefix}fill_swatch"
        type: color_swatch
        summary: "Fill color"
        style: { size: "${swatch_size}", position: { x: "${fill_x}", y: "${fill_y}" } }
        bind:
          color: "state.fill_color"
          z_index: "if state.fill_on_top then 2 else 1"
        behavior:
          - event: click
            effects:
              - set: { fill_on_top: "true" }
          - event: double_click
            action: open_color_picker
            params: { target: fill }
      - id: "${id_prefix}stroke_swatch"
        type: color_swatch
        summary: "Stroke color"
        hollow: true
        style: { size: "${swatch_size}", position: { x: "${stroke_x}", y: "${stroke_y}" } }
        bind:
          color: "state.stroke_color"
          z_index: "if state.fill_on_top then 1 else 2"
        behavior:
          - event: click
            effects:
              - set: { fill_on_top: "false" }
          - event: double_click
            action: open_color_picker
            params: { target: stroke }
      - id: "${id_prefix}swap_btn"
        type: icon_button
        summary: "Swap"
        icon: swap_arrows
        style: { size: "${swap_size}", position: { x: "${swap_x}", y: "${swap_y}" } }
        behavior:
          - event: click
            action: swap_fill_stroke
      - id: "${id_prefix}reset_btn"
        type: icon_button
        summary: "Default"
        icon: default_colors
        style: { size: "${reset_size}", position: { x: "${reset_x}", y: "${reset_y}" } }
        behavior:
          - event: click
            action: reset_fill_stroke
      # Mode buttons: Color / Gradient / None
      - id: "${id_prefix}mode_btns"
        type: container
        layout: row
        style: { position: { x: "${mode_x}", y: "${mode_y}" }, gap: 2 }
        children:
          - id: "${id_prefix}solid_btn"
            type: icon_button
            summary: "Color"
            icon: fill_solid
            style: { size: "${mode_btn_size}" }
            behavior:
              - event: click
                action: set_fill_type_solid
          - id: "${id_prefix}gradient_btn"
            type: icon_button
            summary: "Gradient"
            icon: fill_gradient
            style: { size: "${mode_btn_size}" }
            behavior:
              - event: click
                action: set_fill_type_gradient
          - id: "${id_prefix}none_btn"
            type: icon_button
            summary: "None"
            icon: color_none
            style: { size: "${mode_btn_size}" }
            behavior:
              - event: click
                action: set_fill_none
                condition: "state.fill_on_top"
              - event: click
                action: set_stroke_none
                condition: "not state.fill_on_top"
