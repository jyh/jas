# Partial Selection tool — select individual control points and drag
# Bezier handles.
#
# State machine:
#   idle             — waiting for input
#   marquee          — rubber-band selection rectangle
#   moving_pending   — pressed on a CP; waiting for drag_threshold before
#                      committing to a move
#   moving           — actively translating selected CPs by frame deltas
#   handle           — dragging a Bezier handle (in or out) on a selected
#                      Path
#
# on_mousedown dispatches to doc.path.probe_partial_hit which sets the
# initial mode and latches handle info when applicable. Subsequent
# mousemove applies live deltas via doc.translate_selection (moving)
# or doc.move_path_handle (handle); mouseup commits the marquee rect
# via doc.path.commit_partial_marquee.
#
# Validated against schema/tool.schema.json.

id: partial_selection
cursor: hollow_arrow
menu_label: "Partial Selection Tool"
shortcut: "A"

state:
  mode:
    default: "idle"
    enum: [idle, marquee, moving_pending, moving, handle]
  # Screen-space marquee track for the overlay.
  marquee_start_x: { default: 0 }
  marquee_start_y: { default: 0 }
  marquee_cur_x: { default: 0 }
  marquee_cur_y: { default: 0 }
  # Document-space marquee bounds for commit_partial_marquee.
  doc_marquee_start_x: { default: 0 }
  doc_marquee_start_y: { default: 0 }
  doc_marquee_cur_x: { default: 0 }
  doc_marquee_cur_y: { default: 0 }
  # Document-space drag anchors — translate / move_handle deltas
  # apply to elements (which live in document-space), so anchors
  # need to as well.
  drag_start_x: { default: 0 }
  drag_start_y: { default: 0 }
  drag_last_x: { default: 0 }
  drag_last_y: { default: 0 }
  snapshotted: { default: false }
  copied: { default: false }
  alt_held: { default: false }
  # Mid-drag Alt preview state: when the user starts a plain CP drag
  # and presses Alt mid-drag, the original "snaps back" to its press
  # position via doc.preview.restore and we hold a "potential copy"
  # mode. Releasing Alt resumes the move; releasing the mouse with
  # Alt still held commits a copy at the cursor's release position.
  # Mirrors selection.yaml's mid-drag-Alt flow.
  alt_preview: { default: false }
  # Latched by probe_partial_hit when a handle is hit.
  handle_path: { default: null }
  handle_anchor_idx: { default: 0 }
  handle_type: { default: "" }

handlers:

  on_enter:
    - set: { tool.partial_selection.mode: "'idle'" }

  on_leave:
    - set: { tool.partial_selection.mode: "'idle'" }

  on_mousedown:
    - "doc.path.probe_partial_hit":
        x: "event.doc_x"
        y: "event.doc_y"
        hit_radius: "8"
        shift: "event.modifiers.shift"
    # Seed coordinates the subsequent handlers read.
    - if: "tool.partial_selection.mode == 'marquee'"
      then:
        - set: { tool.partial_selection.marquee_start_x: "event.x" }
        - set: { tool.partial_selection.marquee_start_y: "event.y" }
        - set: { tool.partial_selection.marquee_cur_x: "event.x" }
        - set: { tool.partial_selection.marquee_cur_y: "event.y" }
        - set: { tool.partial_selection.doc_marquee_start_x: "event.doc_x" }
        - set: { tool.partial_selection.doc_marquee_start_y: "event.doc_y" }
        - set: { tool.partial_selection.doc_marquee_cur_x: "event.doc_x" }
        - set: { tool.partial_selection.doc_marquee_cur_y: "event.doc_y" }
    - if: "tool.partial_selection.mode == 'moving_pending' or tool.partial_selection.mode == 'handle'"
      then:
        - set: { tool.partial_selection.drag_start_x: "event.doc_x" }
        - set: { tool.partial_selection.drag_start_y: "event.doc_y" }
        - set: { tool.partial_selection.drag_last_x: "event.doc_x" }
        - set: { tool.partial_selection.drag_last_y: "event.doc_y" }
        - set: { tool.partial_selection.snapshotted: "false" }
        - set: { tool.partial_selection.copied: "false" }
        - set: { tool.partial_selection.alt_held: "event.modifiers.alt" }
        - set: { tool.partial_selection.alt_preview: "false" }

  on_mousemove:
    - if: "tool.partial_selection.mode == 'marquee'"
      then:
        - set: { tool.partial_selection.marquee_cur_x: "event.x" }
        - set: { tool.partial_selection.marquee_cur_y: "event.y" }
        - set: { tool.partial_selection.doc_marquee_cur_x: "event.doc_x" }
        - set: { tool.partial_selection.doc_marquee_cur_y: "event.doc_y" }

    - if: "tool.partial_selection.mode == 'moving_pending' or tool.partial_selection.mode == 'moving'"
      then:
        # First move past DRAG_THRESHOLD (4 px doc) snapshots + transitions.
        # doc.preview.capture pairs with the snapshot so the mid-drag-Alt
        # preview can revert just the live translation without touching
        # the undo stack.
        - if: "not tool.partial_selection.snapshotted and hypot(event.doc_x - tool.partial_selection.drag_start_x, event.doc_y - tool.partial_selection.drag_start_y) > 4"
          then:
            - "doc.snapshot": {}
            - "doc.preview.capture": {}
            - set: { tool.partial_selection.snapshotted: "true" }
            - set: { tool.partial_selection.mode: "'moving'" }
        - if: "tool.partial_selection.mode == 'moving'"
          then:
            # Two gesture flavors mirror selection.yaml:
            #
            # (A) Alt held at mousedown — copy-on-first-move semantics.
            #     Releasing Alt mid-drag does not flip back to translate.
            #
            # (B) No Alt at mousedown — normal translate with mid-drag
            #     Alt-preview support. Pressing Alt mid-drag snaps the
            #     original back to the press position via preview restore.
            #     Releasing Alt resumes the translate from the cursor.
            #     Releasing the mouse with Alt held commits the copy in
            #     on_mouseup.
            - if: "tool.partial_selection.alt_held"
              then:
                # (A) at-press copy path
                - if: "not tool.partial_selection.copied"
                  then:
                    - "doc.copy_selection":
                        dx: "event.doc_x - tool.partial_selection.drag_last_x"
                        dy: "event.doc_y - tool.partial_selection.drag_last_y"
                    - set: { tool.partial_selection.copied: "true" }
                  else:
                    - "doc.translate_selection":
                        dx: "event.doc_x - tool.partial_selection.drag_last_x"
                        dy: "event.doc_y - tool.partial_selection.drag_last_y"
              else:
                # (B) no-alt-at-press: live preview transitions.
                # Nested if/else (not three sibling ifs) so the "set"
                # mutations inside a branch don't cause sibling branches
                # to also fire in the same frame.
                - if: "event.modifiers.alt"
                  then:
                    - if: "not tool.partial_selection.alt_preview"
                      then:
                        # Entering preview: revert any translations so
                        # the original snaps back to the press position.
                        - "doc.preview.restore": {}
                        - set: { tool.partial_selection.alt_preview: "true" }
                    # else: already in preview — original stays put,
                    # no translate this frame.
                  else:
                    - if: "tool.partial_selection.alt_preview"
                      then:
                        # Exiting preview: re-apply cumulative translate
                        # from press so the original lands at the cursor.
                        - "doc.translate_selection":
                            dx: "event.doc_x - tool.partial_selection.drag_start_x"
                            dy: "event.doc_y - tool.partial_selection.drag_start_y"
                        - set: { tool.partial_selection.alt_preview: "false" }
                      else:
                        # Normal move: incremental delta from last cursor.
                        - "doc.translate_selection":
                            dx: "event.doc_x - tool.partial_selection.drag_last_x"
                            dy: "event.doc_y - tool.partial_selection.drag_last_y"
            - set: { tool.partial_selection.drag_last_x: "event.doc_x" }
            - set: { tool.partial_selection.drag_last_y: "event.doc_y" }

    - if: "tool.partial_selection.mode == 'handle'"
      then:
        # Handle-drag threshold is much smaller (native 0.5).
        - if: "not tool.partial_selection.snapshotted and hypot(event.doc_x - tool.partial_selection.drag_start_x, event.doc_y - tool.partial_selection.drag_start_y) > 0.5"
          then:
            - "doc.snapshot": {}
            - set: { tool.partial_selection.snapshotted: "true" }
        - if: "tool.partial_selection.snapshotted"
          then:
            - "doc.move_path_handle":
                dx: "event.doc_x - tool.partial_selection.drag_last_x"
                dy: "event.doc_y - tool.partial_selection.drag_last_y"
            - set: { tool.partial_selection.drag_last_x: "event.doc_x" }
            - set: { tool.partial_selection.drag_last_y: "event.doc_y" }

  on_mouseup:
    - if: "tool.partial_selection.mode == 'marquee'"
      then:
        - "doc.path.commit_partial_marquee":
            x1: "tool.partial_selection.doc_marquee_start_x"
            y1: "tool.partial_selection.doc_marquee_start_y"
            x2: "tool.partial_selection.doc_marquee_cur_x"
            y2: "tool.partial_selection.doc_marquee_cur_y"
            additive: "event.modifiers.shift"
    # Mid-drag Alt commit: if the drag started without Alt and Alt is
    # still held at release, commit a copy at the cursor's release
    # position. The original is currently at the press position
    # (preview-restored during the alt_preview transition); copy_selection
    # adds the new copies offset by (cursor - press) so they land at
    # the cursor.
    - if: "tool.partial_selection.mode == 'moving' and not tool.partial_selection.alt_held and event.modifiers.alt"
      then:
        - "doc.copy_selection":
            dx: "event.doc_x - tool.partial_selection.drag_start_x"
            dy: "event.doc_y - tool.partial_selection.drag_start_y"
    # Drop the preview snapshot on drag end — no longer load-bearing.
    - if: "tool.partial_selection.mode == 'moving' or tool.partial_selection.mode == 'handle'"
      then:
        - "doc.preview.clear": {}
    - set: { tool.partial_selection.mode: "'idle'" }
    - set: { tool.partial_selection.alt_preview: "false" }

overlay:
  # Always render — draws selected-path handles regardless of mode,
  # plus the marquee rect when mode == "marquee". The render fn
  # takes care of both.
  if: "true"
  render:
    type: partial_selection_overlay
    mode: "tool.partial_selection.mode"
    marquee_start_x: "tool.partial_selection.marquee_start_x"
    marquee_start_y: "tool.partial_selection.marquee_start_y"
    marquee_cur_x: "tool.partial_selection.marquee_cur_x"
    marquee_cur_y: "tool.partial_selection.marquee_cur_y"
