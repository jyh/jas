# Rotate tool — pivots the selection around a configurable
# reference point. The angle is set by an interactive drag on
# canvas or by typing a degree value into the Rotate Options
# dialog.
#
# Gestures per ROTATE_TOOL.md §Gestures:
#   plain click  → set transform_reference_point at click coord
#   Alt+click    → set ref + open Rotate Options dialog
#   drag         → apply rotation; θ = atan2(cursor−ref) −
#                  atan2(press−ref); Shift = nearest 45° tick
#   Escape       → cancel in-progress drag; revert
#   dblclick toolbar icon → open Rotate Options dialog (handled by
#                           toolbar dispatcher via tool_options_dialog)
#
# Shared with Scale and Shear: state.transform_reference_point
# (cleared on selection change); reference_point_cross overlay;
# tool_options_dialog_on_alt_click toolbar dispatcher.

id: rotate
cursor: crosshair
menu_label: "Rotate Tool"
shortcut: "R"
tool_options_dialog: "rotate_options"
tool_options_dialog_on_alt_click: true

state:
  mode:
    default: "idle"
    enum: [idle, rotating]
  press_x:    { default: 0.0 }
  press_y:    { default: 0.0 }
  cursor_x:   { default: 0.0 }
  cursor_y:   { default: 0.0 }
  alt_held:   { default: false }
  shift_held: { default: false }
  moved:      { default: false }

handlers:

  on_enter:
    - set: { tool.rotate.mode: "'idle'" }
    - set: { tool.rotate.moved: "false" }

  on_leave:
    - set: { tool.rotate.mode: "'idle'" }
    - set: { tool.rotate.moved: "false" }

  on_mousedown:
    - "doc.snapshot": {}
    - set: { tool.rotate.press_x:    "event.x" }
    - set: { tool.rotate.press_y:    "event.y" }
    - set: { tool.rotate.cursor_x:   "event.x" }
    - set: { tool.rotate.cursor_y:   "event.y" }
    - set: { tool.rotate.alt_held:   "event.modifiers.alt" }
    - set: { tool.rotate.shift_held: "event.modifiers.shift" }
    - set: { tool.rotate.moved:      "false" }
    - set: { tool.rotate.mode:       "'rotating'" }

  on_mousemove:
    - if: "tool.rotate.mode == 'rotating'"
      then:
        - set: { tool.rotate.cursor_x:   "event.x" }
        - set: { tool.rotate.cursor_y:   "event.y" }
        - set: { tool.rotate.shift_held: "event.modifiers.shift" }
        - if: "abs(event.x - tool.rotate.press_x) > 2 || abs(event.y - tool.rotate.press_y) > 2"
          then:
            - set: { tool.rotate.moved: "true" }

  on_mouseup:
    - if: "tool.rotate.mode == 'rotating'"
      then:
        - if: "tool.rotate.moved"
          then:
            - "doc.rotate.apply":
                press_x: "tool.rotate.press_x"
                press_y: "tool.rotate.press_y"
                cursor_x: "event.x"
                cursor_y: "event.y"
                shift:   "event.modifiers.shift"
                copy:    "false"
          else:
            - set: { transform_reference_point: "[event.x, event.y]" }
            - if: "tool.rotate.alt_held"
              then:
                - "open_dialog": { id: "rotate_options" }
    - set: { tool.rotate.mode:  "'idle'" }
    - set: { tool.rotate.moved: "false" }

  on_keydown:
    - if: "event.key == 'Escape' && tool.rotate.mode == 'rotating'"
      then:
        - "doc.snapshot.restore": {}
        - set: { tool.rotate.mode:  "'idle'" }
        - set: { tool.rotate.moved: "false" }

# Two overlays as a list (same shape as scale.yaml):
#   1. reference_point_cross — drawn whenever a selection exists.
#   2. bbox_ghost (transform_kind = 'rotate') — drawn during drag.
overlay:
  - if: "selection_exists()"
    render:
      type: reference_point_cross
      ref_point: "state.transform_reference_point"
  - if: "tool.rotate.mode == 'rotating' && tool.rotate.moved"
    render:
      type: bbox_ghost
      transform_kind: "'rotate'"
      ref_point:  "state.transform_reference_point"
      press_x:    "tool.rotate.press_x"
      press_y:    "tool.rotate.press_y"
      cursor_x:   "tool.rotate.cursor_x"
      cursor_y:   "tool.rotate.cursor_y"
      shift_held: "tool.rotate.shift_held"
