# Delete Anchor Point tool.
#
# Click on an existing path anchor to remove it. The two adjacent
# segments merge into one, preserving the outer control handles
# (geometry/path_ops.rs::delete_anchor_from_path). If the path would
# end up with fewer than 2 anchors the whole element is removed.
#
# Validated against schema/tool.schema.json.

id: delete_anchor_point
cursor: crosshair
menu_label: "Delete Anchor Point Tool"
shortcut: "-"

handlers:

  on_mousedown:
    # doc.path.delete_anchor_near does the hit-test + snapshot +
    # element mutation / removal in one step. No-op if no anchor is
    # within hit_radius of the click.
    - "doc.path.delete_anchor_near":
        x: "event.x"
        y: "event.y"
        hit_radius: "8"
