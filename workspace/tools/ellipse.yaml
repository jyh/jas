# Ellipse tool.
#
# Press-drag-release drawing: mousedown captures the starting corner of
# the bounding rectangle, mousemove tracks the current corner (drives
# the overlay preview), and mouseup commits a new ellipse fitted into
# that bounding rectangle if the final box is at least 1 pixel in each
# dimension. Zero-size boxes are suppressed so a stray click doesn't
# deposit an invisible shape.
#
# The committed element is `ellipse` with cx, cy at the bounding-box
# center and rx, ry as half the box dimensions. Holding Shift to
# constrain to a circle and Alt to draw from the center are reserved
# for a later phase — Phase 1 mirrors rect.yaml's straight drag.
#
# Fill and stroke are intentionally omitted from the add_element spec —
# doc.add_element falls through to model.default_fill and
# model.default_stroke (driven by the app's color panel). Matches
# rect.yaml / line.yaml convention.
#
# Validated against schema/tool.schema.json.

id: ellipse
cursor: crosshair
menu_label: "Ellipse Tool"
shortcut: "L"

state:
  # States: idle | drawing
  mode:
    default: "idle"
    enum: [idle, drawing]
  # Screen-space (viewport-pixel) anchors. The overlay reads these
  # to draw the dashed preview post-restore in screen-space.
  start_x: { default: 0 }
  start_y: { default: 0 }
  cur_x: { default: 0 }
  cur_y: { default: 0 }
  # Document-space anchor captured at mousedown. Used at commit
  # time so the new element lands at the correct location even
  # when the canvas has a non-zero pan / zoom transform.
  doc_start_x: { default: 0 }
  doc_start_y: { default: 0 }

handlers:

  on_enter:
    - set: { tool.ellipse.mode: "'idle'" }

  on_leave:
    - set: { tool.ellipse.mode: "'idle'" }

  on_mousedown:
    - set: { tool.ellipse.mode: "'drawing'" }
    - set: { tool.ellipse.start_x: "event.x" }
    - set: { tool.ellipse.start_y: "event.y" }
    - set: { tool.ellipse.cur_x: "event.x" }
    - set: { tool.ellipse.cur_y: "event.y" }
    - set: { tool.ellipse.doc_start_x: "event.doc_x" }
    - set: { tool.ellipse.doc_start_y: "event.doc_y" }

  on_mousemove:
    - if: "tool.ellipse.mode == 'drawing'"
      then:
        - set: { tool.ellipse.cur_x: "event.x" }
        - set: { tool.ellipse.cur_y: "event.y" }

  on_mouseup:
    - if: "tool.ellipse.mode == 'drawing'"
      then:
        # Zero-size suppression matches rect.yaml: a plain click
        # (release at the same point as press) should not create a
        # shape. 1-pixel threshold on both dimensions, screen-space.
        - if: "abs(event.x - tool.ellipse.start_x) > 1 and abs(event.y - tool.ellipse.start_y) > 1"
          then:
            - "doc.snapshot": {}
            - "doc.add_element":
                element:
                  type: ellipse
                  cx: "(tool.ellipse.doc_start_x + event.doc_x) / 2"
                  cy: "(tool.ellipse.doc_start_y + event.doc_y) / 2"
                  rx: "abs(event.doc_x - tool.ellipse.doc_start_x) / 2"
                  ry: "abs(event.doc_y - tool.ellipse.doc_start_y) / 2"
    - set: { tool.ellipse.mode: "'idle'" }

  on_keydown:
    - if: "event.key == 'Escape'"
      then:
        - set: { tool.ellipse.mode: "'idle'" }

# Dashed preview ellipse tracking the current drag. Matches rect.yaml's
# preview style: 1-px black stroke at 50% opacity, 4/4 dash, no fill.
# Renders only while drawing is in progress. Computed cx/cy/rx/ry
# place the ellipse inside the bounding box defined by the start and
# current cursor positions.
overlay:
  if: "tool.ellipse.mode == 'drawing'"
  render:
    type: ellipse
    cx: "(tool.ellipse.start_x + tool.ellipse.cur_x) / 2"
    cy: "(tool.ellipse.start_y + tool.ellipse.cur_y) / 2"
    rx: "abs(tool.ellipse.cur_x - tool.ellipse.start_x) / 2"
    ry: "abs(tool.ellipse.cur_y - tool.ellipse.start_y) / 2"
    style: "stroke: rgba(0,0,0,0.5); stroke-width: 1; stroke-dasharray: 4 4; fill: none;"
