# Selection tool — canonical example of the tool schema shape.
#
# Validated against schema/tool.schema.json. Runtime dispatcher lives in
# jas_flask/static/js/engine/tools.mjs.
#
# Effect syntax conventions (match actions.yaml):
#   - set: { target_path: value_expression }     # dict form
#   - if: "<guard>", then: [...], else: [...]   # conditional
#   - let: { name: expr }, in: [...]             # local bindings
#
# Value expressions use the workspace expression language. String
# literals inside expressions are quoted ('idle', "selection"). Bare
# identifiers resolve as scope-path lookups.
#
# States (informal):
#   idle             → nothing happening; cursor shows arrow
#   marquee          → dragging an empty-space rectangle to select within
#   drag_move        → dragging a selected element
#
# Transitions are guarded on tool.selection.mode in each handler.

id: selection
cursor: arrow
menu_label: "Selection Tool"
shortcut: "V"

# Tool-local state. Namespaced as tool.selection.* in expressions.
state:
  mode:
    default: "idle"
    enum: [idle, marquee, drag_move]
  # Screen-space marquee track for the overlay rectangle.
  marquee_start_x: { default: 0 }
  marquee_start_y: { default: 0 }
  marquee_end_x: { default: 0 }
  marquee_end_y: { default: 0 }
  # Document-space marquee bounds — what doc.select_in_rect actually
  # tests against. Captured in parallel with marquee_*.
  doc_marquee_start_x: { default: 0 }
  doc_marquee_start_y: { default: 0 }
  doc_marquee_end_x: { default: 0 }
  doc_marquee_end_y: { default: 0 }
  # Document-space drag anchor — translate_selection deltas work
  # in document-space (elements live there), so the running anchor
  # has to as well. drag_start_x/y is the LAST cursor position
  # (updated each move) for incremental delta math. press_doc_x/y
  # is the original mousedown position (frozen) — used by the
  # mid-drag-Alt preview to revert with cumulative-from-press
  # translation, and by the at-release commit to compute the
  # copy offset.
  drag_start_x: { default: 0 }
  drag_start_y: { default: 0 }
  press_doc_x:   { default: 0 }
  press_doc_y:   { default: 0 }
  # Was Alt held when the drag started? Frozen at mousedown.
  # alt_held=true uses the at-press semantics: copy on first move,
  # then translate copies on subsequent moves (Alt-state changes
  # mid-drag don't flip back to translate).
  alt_held: { default: false }
  # Mid-drag Alt preview state: when the user starts a plain drag
  # and presses Alt mid-drag, the original "snaps back" to the
  # press position (preview-restored) and we hold a "potential
  # copy" mode. Releasing Alt resumes normal move; releasing
  # the mouse with Alt still held commits the copy at the
  # cursor's release position.
  alt_preview: { default: false }
  # Has the Alt+drag already produced a copy this drag? Tracks
  # the at-press path (alt_held=true): the first mousemove fires
  # doc.copy_selection (which replaces selection with the new
  # copies); subsequent moves translate those copies instead of
  # copying again.
  copied: { default: false }

handlers:

  on_enter:
    - set: { tool.selection.mode: "'idle'" }

  on_leave:
    - set: { tool.selection.mode: "'idle'" }

  on_mousedown:
    - let:
        hit: "hit_test(event.doc_x, event.doc_y)"
      in:
        - if: "hit == null"
          then:
            - if: "not event.modifiers.shift"
              then:
                - "doc.clear_selection": {}
            - set: { tool.selection.mode: "'marquee'" }
            - set: { tool.selection.marquee_start_x: "event.x" }
            - set: { tool.selection.marquee_start_y: "event.y" }
            - set: { tool.selection.marquee_end_x: "event.x" }
            - set: { tool.selection.marquee_end_y: "event.y" }
            - set: { tool.selection.doc_marquee_start_x: "event.doc_x" }
            - set: { tool.selection.doc_marquee_start_y: "event.doc_y" }
            - set: { tool.selection.doc_marquee_end_x: "event.doc_x" }
            - set: { tool.selection.doc_marquee_end_y: "event.doc_y" }
          else:
            - "doc.snapshot": {}
            - "doc.preview.capture": {}
            - if: "event.modifiers.shift"
              then:
                - "doc.toggle_selection": "hit"
              else:
                # Only replace selection when the clicked element is
                # NOT already part of it -- otherwise a click on any
                # selected element after Cmd+A drops the rest of the
                # selection and a multi-element drag becomes a
                # single-element drag. Per SELECTION_TOOL.md
                # §Click-on-selected-element.
                - if: "not selection_contains(hit)"
                  then:
                    - "doc.set_selection": { paths: [hit] }
            - set: { tool.selection.mode: "'drag_move'" }
            - set: { tool.selection.press_doc_x: "event.doc_x" }
            - set: { tool.selection.press_doc_y: "event.doc_y" }
            - set: { tool.selection.alt_preview: "false" }
            - set: { tool.selection.drag_start_x: "event.doc_x" }
            - set: { tool.selection.drag_start_y: "event.doc_y" }
            # Capture Alt at press time — if the user releases Alt
            # partway through the drag, the drag still "copies on
            # first move" because they started the drag with Alt.
            - set: { tool.selection.alt_held: "event.modifiers.alt" }
            - set: { tool.selection.copied: "false" }

  on_mousemove:
    - if: "tool.selection.mode == 'marquee'"
      then:
        - set: { tool.selection.marquee_end_x: "event.x" }
        - set: { tool.selection.marquee_end_y: "event.y" }
        - set: { tool.selection.doc_marquee_end_x: "event.doc_x" }
        - set: { tool.selection.doc_marquee_end_y: "event.doc_y" }
    - if: "tool.selection.mode == 'drag_move'"
      then:
        # Two distinct gesture flavors:
        #
        # (A) Alt held at mousedown -- "drag-to-copy" (existing
        #     SEL-052 / SEL-053 path). First mousemove fires
        #     doc.copy_selection (which replaces selection with
        #     new copies); subsequent moves translate the copies.
        #     Releasing Alt mid-drag doesn't flip back -- the
        #     gesture started as copy and stays copy.
        #
        # (B) No Alt at mousedown -- normal move with mid-drag
        #     Alt-preview support. Pressing Alt mid-drag snaps the
        #     original back to the press position (preview restore)
        #     and we wait. Releasing Alt resumes the move from
        #     where the cursor is now. Releasing the mouse with Alt
        #     still held commits a copy in on_mouseup.
        - if: "tool.selection.alt_held"
          then:
            # (A) at-press copy path
            - if: "not tool.selection.copied"
              then:
                - "doc.copy_selection":
                    dx: "event.doc_x - tool.selection.drag_start_x"
                    dy: "event.doc_y - tool.selection.drag_start_y"
                - set: { tool.selection.copied: "true" }
              else:
                - "doc.translate_selection":
                    dx: "event.doc_x - tool.selection.drag_start_x"
                    dy: "event.doc_y - tool.selection.drag_start_y"
            - set: { tool.selection.drag_start_x: "event.doc_x" }
            - set: { tool.selection.drag_start_y: "event.doc_y" }
          else:
            # (B) no-alt-at-press: live preview transitions
            - if: "event.modifiers.alt and not tool.selection.alt_preview"
              then:
                # Entering preview: revert any translations so the
                # original snaps back to the press position. The
                # cursor position is the would-be copy location.
                - "doc.preview.restore": {}
                - set: { tool.selection.alt_preview: "true" }
            - if: "not event.modifiers.alt and tool.selection.alt_preview"
              then:
                # Exiting preview: re-apply the cumulative translate
                # from press so the original lands at the cursor as
                # if the preview never happened.
                - "doc.translate_selection":
                    dx: "event.doc_x - tool.selection.press_doc_x"
                    dy: "event.doc_y - tool.selection.press_doc_y"
                - set: { tool.selection.alt_preview: "false" }
            - if: "not event.modifiers.alt and not tool.selection.alt_preview"
              then:
                # Normal move: incremental delta from last cursor.
                - "doc.translate_selection":
                    dx: "event.doc_x - tool.selection.drag_start_x"
                    dy: "event.doc_y - tool.selection.drag_start_y"
            # In preview mode (Alt held, alt_preview true) the
            # original stays at start -- no translate this frame.
            # Always update drag_start so the next "normal move"
            # frame computes the right incremental delta.
            - set: { tool.selection.drag_start_x: "event.doc_x" }
            - set: { tool.selection.drag_start_y: "event.doc_y" }

  on_mouseup:
    - if: "tool.selection.mode == 'marquee'"
      then:
        - "doc.select_in_rect":
            x1: "min(tool.selection.doc_marquee_start_x, tool.selection.doc_marquee_end_x)"
            y1: "min(tool.selection.doc_marquee_start_y, tool.selection.doc_marquee_end_y)"
            x2: "max(tool.selection.doc_marquee_start_x, tool.selection.doc_marquee_end_x)"
            y2: "max(tool.selection.doc_marquee_start_y, tool.selection.doc_marquee_end_y)"
            additive: "event.modifiers.shift"
    # Mid-drag Alt commit: if we were in the no-alt-at-press path
    # AND Alt is still held at release, commit a copy at the
    # cursor's release position. The original is currently at the
    # press position (preview-restored during the alt_preview
    # transition); doc.copy_selection adds the new copies offset
    # by (cursor - press) so they land at the cursor.
    - if: "tool.selection.mode == 'drag_move' and not tool.selection.alt_held and event.modifiers.alt"
      then:
        - "doc.copy_selection":
            dx: "event.doc_x - tool.selection.press_doc_x"
            dy: "event.doc_y - tool.selection.press_doc_y"
    # Always drop the preview snapshot on drag end -- it's no
    # longer load-bearing once the gesture commits.
    - if: "tool.selection.mode == 'drag_move'"
      then:
        - "doc.preview.clear": {}
    - set: { tool.selection.mode: "'idle'" }
    - set: { tool.selection.alt_preview: "false" }

  on_keydown:
    - if: "event.key == 'Escape'"
      then:
        - set: { tool.selection.mode: "'idle'" }

# Tool-overlay rendering. The overlay block accepts either a
# single {if, render} entry or a list of them; using the list
# form here so we can render the marquee rect AND the mid-drag
# Alt-preview ghost from the same tool.
overlay:
  - if: "tool.selection.mode == 'marquee'"
    render:
      type: rect
      x: "min(tool.selection.marquee_start_x, tool.selection.marquee_end_x)"
      y: "min(tool.selection.marquee_start_y, tool.selection.marquee_end_y)"
      width: "abs(tool.selection.marquee_end_x - tool.selection.marquee_start_x)"
      height: "abs(tool.selection.marquee_end_y - tool.selection.marquee_start_y)"
      style: "stroke: #4a90d9; stroke-width: 1; stroke-dasharray: 4 4; fill: rgba(74,144,217,0.08);"
  # Mid-drag Alt-preview ghost: the originals snap back to the
  # press position; this overlay shows where the would-be copies
  # will land if the user releases the mouse with Alt still
  # held. Translation = cursor - press, in document space.
  - if: "tool.selection.mode == 'drag_move' and tool.selection.alt_preview"
    render:
      type: selection_translate_ghost
      dx: "tool.selection.drag_start_x - tool.selection.press_doc_x"
      dy: "tool.selection.drag_start_y - tool.selection.press_doc_y"
