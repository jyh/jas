# Selection tool — canonical example of the tool schema shape.
#
# Validated against schema/tool.schema.json. Runtime dispatcher lives in
# jas_flask/static/js/engine/tools.mjs.
#
# Effect syntax conventions (match actions.yaml):
#   - set: { target_path: value_expression }     # dict form
#   - if: "<guard>", then: [...], else: [...]   # conditional
#   - let: { name: expr }, in: [...]             # local bindings
#
# Value expressions use the workspace expression language. String
# literals inside expressions are quoted ('idle', "selection"). Bare
# identifiers resolve as scope-path lookups.
#
# States (informal):
#   idle             → nothing happening; cursor shows arrow
#   marquee          → dragging an empty-space rectangle to select within
#   drag_move        → dragging a selected element
#
# Transitions are guarded on tool.selection.mode in each handler.

id: selection
cursor: arrow
menu_label: "Selection Tool"
shortcut: "V"

# Tool-local state. Namespaced as tool.selection.* in expressions.
state:
  mode:
    default: "idle"
    enum: [idle, marquee, drag_move]
  marquee_start_x: { default: 0 }
  marquee_start_y: { default: 0 }
  marquee_end_x: { default: 0 }
  marquee_end_y: { default: 0 }
  drag_start_x: { default: 0 }
  drag_start_y: { default: 0 }

handlers:

  on_enter:
    - set: { tool.selection.mode: "'idle'" }

  on_leave:
    - set: { tool.selection.mode: "'idle'" }

  on_mousedown:
    - let:
        hit: "hit_test(event.x, event.y)"
      in:
        - if: "hit == null"
          then:
            - if: "not event.modifiers.shift"
              then:
                - "doc.clear_selection": {}
            - set: { tool.selection.mode: "'marquee'" }
            - set: { tool.selection.marquee_start_x: "event.x" }
            - set: { tool.selection.marquee_start_y: "event.y" }
            - set: { tool.selection.marquee_end_x: "event.x" }
            - set: { tool.selection.marquee_end_y: "event.y" }
          else:
            - "doc.snapshot": {}
            - if: "event.modifiers.shift"
              then:
                - "doc.toggle_selection": "hit"
              else:
                - "doc.set_selection": { paths: [hit] }
            - set: { tool.selection.mode: "'drag_move'" }
            - set: { tool.selection.drag_start_x: "event.x" }
            - set: { tool.selection.drag_start_y: "event.y" }

  on_mousemove:
    - if: "tool.selection.mode == 'marquee'"
      then:
        - set: { tool.selection.marquee_end_x: "event.x" }
        - set: { tool.selection.marquee_end_y: "event.y" }
    - if: "tool.selection.mode == 'drag_move'"
      then:
        - "doc.translate_selection":
            dx: "event.x - tool.selection.drag_start_x"
            dy: "event.y - tool.selection.drag_start_y"
        - set: { tool.selection.drag_start_x: "event.x" }
        - set: { tool.selection.drag_start_y: "event.y" }

  on_mouseup:
    - if: "tool.selection.mode == 'marquee'"
      then:
        - "doc.select_in_rect":
            x1: "min(tool.selection.marquee_start_x, tool.selection.marquee_end_x)"
            y1: "min(tool.selection.marquee_start_y, tool.selection.marquee_end_y)"
            x2: "max(tool.selection.marquee_start_x, tool.selection.marquee_end_x)"
            y2: "max(tool.selection.marquee_start_y, tool.selection.marquee_end_y)"
            additive: "event.modifiers.shift"
    - set: { tool.selection.mode: "'idle'" }

  on_keydown:
    - if: "event.key == 'Escape'"
      then:
        - set: { tool.selection.mode: "'idle'" }

# Tool-overlay rendering. Only drawn when the if-guard is truthy.
# Rendered into the overlay-layer SVG by the canvas renderer.
overlay:
  if: "tool.selection.mode == 'marquee'"
  render:
    type: rect
    x: "min(tool.selection.marquee_start_x, tool.selection.marquee_end_x)"
    y: "min(tool.selection.marquee_start_y, tool.selection.marquee_end_y)"
    width: "abs(tool.selection.marquee_end_x - tool.selection.marquee_start_x)"
    height: "abs(tool.selection.marquee_end_y - tool.selection.marquee_start_y)"
    style: "stroke: #4a90d9; stroke-width: 1; stroke-dasharray: 4 4; fill: rgba(74,144,217,0.08);"
