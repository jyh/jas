# Selection tool — canonical example of the tool schema shape.
#
# This file validates the tool schema (see schema/tool.schema.json) with a
# complete, fully-specified tool. The runtime that dispatches these
# handlers (JS side) is not yet implemented; this file is design-only until
# the `doc.*`, `hit_test`, and tool dispatcher lands.
#
# States (informal):
#   idle             → nothing happening; cursor shows arrow
#   marquee          → dragging an empty-space rectangle to select within
#   drag_move        → dragging a selected element
#
# Transitions are guarded on $tool.selection.mode in the handlers below.

id: selection
cursor: arrow
menu_label: "Selection Tool"
shortcut: "V"

# Tool-local state. Namespaced as $tool.selection.* in expressions.
state:
  mode:
    default: "idle"
    enum: [idle, marquee, drag_move]
  marquee_start_x: { default: 0 }
  marquee_start_y: { default: 0 }
  marquee_end_x: { default: 0 }
  marquee_end_y: { default: 0 }
  drag_start_x: { default: 0 }
  drag_start_y: { default: 0 }

# Event handlers. The dispatcher (JS) populates $event.* before running
# the matching handler. Effects execute in order.
handlers:

  on_enter:
    - set: $tool.selection.mode
      value: "idle"

  on_leave:
    # Cancel any in-progress interaction.
    - set: $tool.selection.mode
      value: "idle"

  on_mousedown:
    # First: hit-test under the cursor. hit_test returns a path or null.
    # The result is bound into scope via `let:` so subsequent effects
    # see the same hit.
    - let:
        hit: "hit_test($event.x, $event.y)"
      in:
        - if: "$hit == null"
          then:
            # Empty space — start a marquee.
            - if: "not $event.modifiers.shift"
              then:
                - doc.clear_selection: {}
            - set: $tool.selection.mode
              value: "marquee"
            - set: $tool.selection.marquee_start_x
              value: "$event.x"
            - set: $tool.selection.marquee_start_y
              value: "$event.y"
            - set: $tool.selection.marquee_end_x
              value: "$event.x"
            - set: $tool.selection.marquee_end_y
              value: "$event.y"
          else:
            # Hit an element — prepare to drag it.
            - doc.snapshot: {}
            - if: "$event.modifiers.shift"
              then:
                - doc.toggle_selection: "$hit"
              else:
                - if: "not selection_contains($hit)"
                  then:
                    - doc.set_selection:
                        paths: ["$hit"]
            - set: $tool.selection.mode
              value: "drag_move"
            - set: $tool.selection.drag_start_x
              value: "$event.x"
            - set: $tool.selection.drag_start_y
              value: "$event.y"

  on_mousemove:
    - if: "$tool.selection.mode == 'marquee'"
      then:
        - set: $tool.selection.marquee_end_x
          value: "$event.x"
        - set: $tool.selection.marquee_end_y
          value: "$event.y"
    - if: "$tool.selection.mode == 'drag_move'"
      then:
        - doc.translate_selection:
            dx: "$event.x - $tool.selection.drag_start_x"
            dy: "$event.y - $tool.selection.drag_start_y"
        - set: $tool.selection.drag_start_x
          value: "$event.x"
        - set: $tool.selection.drag_start_y
          value: "$event.y"

  on_mouseup:
    - if: "$tool.selection.mode == 'marquee'"
      then:
        - doc.select_in_rect:
            x1: "min($tool.selection.marquee_start_x, $tool.selection.marquee_end_x)"
            y1: "min($tool.selection.marquee_start_y, $tool.selection.marquee_end_y)"
            x2: "max($tool.selection.marquee_start_x, $tool.selection.marquee_end_x)"
            y2: "max($tool.selection.marquee_start_y, $tool.selection.marquee_end_y)"
            additive: "$event.modifiers.shift"
    - set: $tool.selection.mode
      value: "idle"

  on_keydown:
    - if: "$event.key == 'Escape'"
      then:
        - set: $tool.selection.mode
          value: "idle"
    - if: "$event.key == 'Delete' or $event.key == 'Backspace'"
      then:
        - if: "not selection_empty()"
          then:
            - doc.snapshot: {}
            - doc.delete_selection: {}

# Tool-overlay rendering. Only drawn when the if-guard is truthy.
# Rendered into the overlay-layer SVG by the canvas renderer.
overlay:
  if: "$tool.selection.mode == 'marquee'"
  render:
    type: rect
    x: "min($tool.selection.marquee_start_x, $tool.selection.marquee_end_x)"
    y: "min($tool.selection.marquee_start_y, $tool.selection.marquee_end_y)"
    width: "abs($tool.selection.marquee_end_x - $tool.selection.marquee_start_x)"
    height: "abs($tool.selection.marquee_end_y - $tool.selection.marquee_start_y)"
    style: "stroke: #4a90d9; stroke-width: 1; stroke-dasharray: 4 4; fill: rgba(74,144,217,0.08);"
