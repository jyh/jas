version: 1
# Workspace-schema version stamp. Checked by the compiler's validator.
# Bump the major version for breaking schema changes; minor for additive.
# See FLASK_PARITY.md §12 and schema/README.md.
schema_version: "2.0"
app:
  name: "Jas"
  description: >
    Vector illustration application with draggable pane-based workspace,
    multi-document tabbed canvas, toolbar with tool slots and long-press
    alternates, and a collapsible dock with panel groups. Designed to be
    rendered by a generic web app using Bootstrap for layout and JavaScript
    for interaction.
  window:
    width: 1200
    height: 900
    min_width: 800
    min_height: 600
  brand:
    logo: "assets/brand/logo.svg"
    logo_small: "assets/brand/logo-small.svg"
    color: "#C9900A"
    color_light: "#42210b"
