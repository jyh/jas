shortcuts:
  # File
  - { key: "Ctrl+N",       action: new_document }
  - { key: "Ctrl+O",       action: open_file }
  - { key: "Ctrl+S",       action: save }
  - { key: "Ctrl+Shift+S", action: save_as }
  - { key: "Ctrl+P",       action: open_print_dialog }
  - { key: "Ctrl+Q",       action: quit }
  # Edit
  - { key: "Ctrl+Z",       action: undo }
  - { key: "Ctrl+Shift+Z", action: redo }
  - { key: "Ctrl+X",       action: cut }
  - { key: "Ctrl+C",       action: copy }
  - { key: "Ctrl+V",       action: paste }
  - { key: "Ctrl+Shift+V", action: paste_in_place }
  - { key: "Ctrl+A",       action: select_all }
  - { key: "Delete",       action: delete_selection }
  - { key: "Backspace",    action: delete_selection }
  # Object
  - { key: "Ctrl+G",       action: group }
  - { key: "Ctrl+Shift+G", action: ungroup }
  - { key: "Ctrl+2",       action: lock }
  - { key: "Ctrl+Alt+2",   action: unlock_all }
  - { key: "Ctrl+3",       action: hide_selection }
  - { key: "Ctrl+Alt+3",   action: show_all }
  # View
  - { key: "Ctrl+=",       action: zoom_in }
  - { key: "Ctrl+-",       action: zoom_out }
  - { key: "Ctrl+0",       action: fit_active_artboard }
  - { key: "Ctrl+Alt+0",   action: fit_all_artboards }
  - { key: "Ctrl+1",       action: zoom_to_actual_size }
  # Tools — `tool` is the active_tool ROUTING id (the string dispatched by
  # `set: { active_tool: ... }`, as in dialogs/tool_alternates.yaml), which for
  # the anchor tools is the short `add_anchor`/`delete_anchor` rather than the
  # tool-definition id `add_anchor_point`/`delete_anchor_point`; `type` is the
  # native Type tool (NATIVE_BOUNDARY.md §6). These are the single authoritative
  # source for tool KEYS; workspace/tools/*.yaml `shortcut:` fields are display
  # hints that must agree with this table on the key.
  - { key: "V",            action: select_tool,      params: { tool: selection } }
  - { key: "A",            action: select_tool,      params: { tool: partial_selection } }
  - { key: "P",            action: select_tool,      params: { tool: pen } }
  - { key: "C",            action: select_tool,      params: { tool: anchor_point } }
  - { key: "=",            action: select_tool,      params: { tool: add_anchor } }
  - { key: "-",            action: select_tool,      params: { tool: delete_anchor } }
  - { key: "T",            action: select_tool,      params: { tool: type } }
  - { key: "\\",           action: select_tool,      params: { tool: line } }
  - { key: "M",            action: select_tool,      params: { tool: rect } }
  - { key: "L",            action: select_tool,      params: { tool: ellipse } }
  - { key: "N",            action: select_tool,      params: { tool: pencil } }
  - { key: "B",            action: select_tool,      params: { tool: paintbrush } }
  - { key: "Shift+B",      action: select_tool,      params: { tool: blob_brush } }
  - { key: "Shift+E",      action: select_tool,      params: { tool: path_eraser } }
  - { key: "Q",            action: select_tool,      params: { tool: lasso } }
  - { key: "Y",            action: select_tool,      params: { tool: magic_wand } }
  - { key: "S",            action: select_tool,      params: { tool: scale } }
  - { key: "R",            action: select_tool,      params: { tool: rotate } }
  - { key: "I",            action: select_tool,      params: { tool: eyedropper } }
  - { key: "Z",            action: select_tool,      params: { tool: zoom } }
  - { key: "H",            action: select_tool,      params: { tool: hand } }
  - { key: "Shift+O",      action: select_tool,      params: { tool: artboard } }
  - { key: "O",            action: select_tool,      params: { tool: artboard } }   # alias
  # Fill / Stroke
  - { key: "D",            action: reset_fill_stroke }
  - { key: "X",            action: toggle_fill_on_top }
  - { key: "Shift+X",      action: swap_fill_stroke }
