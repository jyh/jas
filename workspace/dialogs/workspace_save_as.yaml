workspace_save_as:
  summary: "Save Workspace As"
  description: >
    Text input dialog for naming a workspace layout. Warns if the name
    "Workspace" is used (reserved system name) or if overwriting an
    existing layout.
  modal: true
  state:
    name: { type: string, default: "", description: "User-entered workspace name" }
  content:
    type: container
    layout: column
    style: { gap: 12, padding: 16 }
    children:
      - { type: text, content: "Workspace name:" }
      - id: ws_name_input
        type: text_input
        placeholder: "My Layout"
        bind: "dialog.name"
      - type: row
        style: { justify: end, gap: 8 }
        children:
          - { type: button, label: "Cancel", action: dismiss_dialog }
          - { type: button, label: "Save",   action: save_workspace_confirm, variant: primary }
