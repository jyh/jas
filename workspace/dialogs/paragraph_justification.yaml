paragraph_justification:
  summary: "Justification"
  description: >
    Modal dialog for fine-grained paragraph justification controls
    per PARAGRAPH.md §Justification Dialog. Opened from the Paragraph
    panel menu (Justification…).

    Layout (top to bottom):
    - 3×3 grid: Word Spacing / Letter Spacing / Glyph Scaling rows
      × Minimum / Desired / Maximum columns
    - separator (spec's `.hr`)
    - Auto Leading: row (label col-6 + numeric input col-3)
    - Single Word Justification: row (label col-6 + dropdown col-4)
    - Footer: Preview checkbox (left) + Cancel button + OK button
      (right-aligned)

    Phase 2 stores all values in dialog-local state. The Preview
    checkbox is wired through the Phase 0 preview snapshot/restore
    harness; preview_targets is empty until Phase 8 wires per-paragraph
    document writes (jas:word-spacing-min etc. on the wrapper tspan).

    Defaults match examples/justification.png (Adobe parity):
    word spacing 80 / 100 / 133 %; letter spacing 0 / 0 / 0 %;
    glyph scaling 100 / 100 / 100 %; auto leading 120 %; single word
    justification = Full Justify.
  modal: true
  width: 460
  state:
    word_spacing_min:
      type: number
      default: 80
      min: 0
      max: 1000
      description: "WORD_SPACING_MIN_VALUE — percent. Stored as jas:word-spacing-min in Phase 8."
    word_spacing_desired:
      type: number
      default: 100
      min: 0
      max: 1000
      description: "WORD_SPACING_DESIRED_VALUE — percent. jas:word-spacing-desired."
    word_spacing_max:
      type: number
      default: 133
      min: 0
      max: 1000
      description: "WORD_SPACING_MAX_VALUE — percent. jas:word-spacing-max."
    letter_spacing_min:
      type: number
      default: 0
      min: -100
      max: 500
      description: "LETTER_SPACING_MIN_VALUE — percent, signed. jas:letter-spacing-min."
    letter_spacing_desired:
      type: number
      default: 0
      min: -100
      max: 500
      description: "LETTER_SPACING_DESIRED_VALUE — percent, signed. jas:letter-spacing-desired."
    letter_spacing_max:
      type: number
      default: 0
      min: -100
      max: 500
      description: "LETTER_SPACING_MAX_VALUE — percent, signed. jas:letter-spacing-max."
    glyph_scaling_min:
      type: number
      default: 100
      min: 50
      max: 200
      description: "GLYPH_SCALING_MIN_VALUE — percent. jas:glyph-scaling-min."
    glyph_scaling_desired:
      type: number
      default: 100
      min: 50
      max: 200
      description: "GLYPH_SCALING_DESIRED_VALUE — percent. jas:glyph-scaling-desired."
    glyph_scaling_max:
      type: number
      default: 100
      min: 50
      max: 200
      description: "GLYPH_SCALING_MAX_VALUE — percent. jas:glyph-scaling-max."
    auto_leading:
      type: number
      default: 120
      min: 0
      max: 500
      description: >
        AUTO_LEADING_VALUE — percent of font size for Auto leading.
        Overrides the global 120% default from CHARACTER.md on the
        paragraphs in the current selection. Stored as jas:auto-leading.
    single_word_justify:
      type: enum
      values: [justify, left, center, right]
      default: justify
      description: >
        SINGLE_WORD_JUSTIFY_DROPDOWN — how to render a justified line
        containing only one word. Default Full Justify (stretches the
        single word across the full width). Stored as jas:single-word-justify.
    preview:
      type: bool
      default: false
      description: >
        Preview checkbox. When on, every edit live-applies to the
        selected paragraphs. Cancel always rolls back to the on-open
        snapshot via the Phase 0 preview snapshot/restore harness.
        Defaults to off each time the dialog opens.

  # Preview snapshot/restore wiring (Phase 0 schema slot). Empty for
  # Phase 2 because there is no selection / document write path yet —
  # Phase 8 populates this with the dialog-state-key → document-state-path
  # mapping for each justification attribute.
  preview_targets: {}

  content:
    type: container
    layout: column
    style: { gap: 8, padding: 16 }
    children:

      # ── Header row: empty | Minimum | Desired | Maximum ──
      - type: row
        children:
          - type: col
            col: 3
            children: []
          - type: col
            col: 3
            children:
              - { type: text, content: "Minimum",
                  style: { font_size: 11, alignment: center } }
          - type: col
            col: 3
            children:
              - { type: text, content: "Desired",
                  style: { font_size: 11, alignment: center } }
          - type: col
            col: 3
            children:
              - { type: text, content: "Maximum",
                  style: { font_size: 11, alignment: center } }

      # ── Word Spacing row ──
      - type: row
        children:
          - type: col
            col: 3
            children:
              - { type: text, content: "Word Spacing:",
                  style: { font_size: 11 } }
          - type: col
            col: 3
            children:
              - id: pj_word_spacing_min
                type: number_input
                min: 0
                max: 1000
                style: { width: "100%" }
                bind:
                  value: "dialog.word_spacing_min"
          - type: col
            col: 3
            children:
              - id: pj_word_spacing_desired
                type: number_input
                min: 0
                max: 1000
                style: { width: "100%" }
                bind:
                  value: "dialog.word_spacing_desired"
          - type: col
            col: 3
            children:
              - id: pj_word_spacing_max
                type: number_input
                min: 0
                max: 1000
                style: { width: "100%" }
                bind:
                  value: "dialog.word_spacing_max"

      # ── Letter Spacing row ──
      - type: row
        children:
          - type: col
            col: 3
            children:
              - { type: text, content: "Letter Spacing:",
                  style: { font_size: 11 } }
          - type: col
            col: 3
            children:
              - id: pj_letter_spacing_min
                type: number_input
                min: -100
                max: 500
                style: { width: "100%" }
                bind:
                  value: "dialog.letter_spacing_min"
          - type: col
            col: 3
            children:
              - id: pj_letter_spacing_desired
                type: number_input
                min: -100
                max: 500
                style: { width: "100%" }
                bind:
                  value: "dialog.letter_spacing_desired"
          - type: col
            col: 3
            children:
              - id: pj_letter_spacing_max
                type: number_input
                min: -100
                max: 500
                style: { width: "100%" }
                bind:
                  value: "dialog.letter_spacing_max"

      # ── Glyph Scaling row ──
      - type: row
        children:
          - type: col
            col: 3
            children:
              - { type: text, content: "Glyph Scaling:",
                  style: { font_size: 11 } }
          - type: col
            col: 3
            children:
              - id: pj_glyph_scaling_min
                type: number_input
                min: 50
                max: 200
                style: { width: "100%" }
                bind:
                  value: "dialog.glyph_scaling_min"
          - type: col
            col: 3
            children:
              - id: pj_glyph_scaling_desired
                type: number_input
                min: 50
                max: 200
                style: { width: "100%" }
                bind:
                  value: "dialog.glyph_scaling_desired"
          - type: col
            col: 3
            children:
              - id: pj_glyph_scaling_max
                type: number_input
                min: 50
                max: 200
                style: { width: "100%" }
                bind:
                  value: "dialog.glyph_scaling_max"

      # ── Separator (spec's `.hr`) ──
      - type: separator

      # ── Auto Leading row ──
      - type: row
        children:
          - type: col
            col: 6
            children:
              - { type: text, content: "Auto Leading:",
                  style: { font_size: 11 } }
          - type: col
            col: 3
            children:
              - id: pj_auto_leading
                type: number_input
                min: 0
                max: 500
                style: { width: "100%" }
                bind:
                  value: "dialog.auto_leading"
          - type: col
            col: 3
            children: []

      # ── Single Word Justification row ──
      - type: row
        children:
          - type: col
            col: 6
            children:
              - { type: text, content: "Single Word Justification:",
                  style: { font_size: 11 } }
          - type: col
            col: 4
            children:
              - id: pj_single_word_justify
                type: select
                style: { width: "100%" }
                options:
                  - { value: "justify", label: "Full Justify" }
                  - { value: "left",    label: "Align Left" }
                  - { value: "center",  label: "Align Center" }
                  - { value: "right",   label: "Align Right" }
                bind:
                  value: "dialog.single_word_justify"
          - type: col
            col: 2
            children: []

      # ── Footer: Preview | Cancel | OK ──
      - type: container
        layout: row
        style: { gap: 8, alignment: center, justify: end }
        children:
          - id: pj_preview
            type: toggle
            label: "Preview"
            bind:
              checked: "dialog.preview"
          - type: spacer
            style: { flex: 1 }
          - { type: button, label: "Cancel", action: dismiss_dialog }
          - { type: button, label: "OK", action: paragraph_justification_confirm,
              variant: primary }
