swatch_library_save:
  summary: "Save Swatch Library"
  description: >
    Modal dialog for saving the selected swatch library to a file. The
    dialog presents a single text input for the library name. On confirm
    (Save button, dispatches save_swatch_library_confirm), the selected
    library's complete data (name, description, and all swatches with
    their name, color, color_mode, color_type, and global fields) is
    serialized to JSON and written to workspace/swatches/<name>.json.

    The selected library is determined by panel.selected_library in the
    Swatches panel state (the library containing the most recently
    selected swatch). Cancel dismisses the dialog without saving.

    Layout follows the appearance_save_as dialog pattern: a label, a
    text input bound to dialog.name, and a right-justified row with
    Cancel and Save buttons.
  modal: true
  state:
    name: { type: string, default: "", description: "User-entered library name" }
  content:
    type: container
    layout: column
    style: { gap: 12, padding: 16 }
    children:
      - { type: text, content: "Library name:" }
      - id: swatch_lib_name_input
        type: text_input
        placeholder: "My Swatches"
        bind: "dialog.name"
      - type: row
        style: { justify: end, gap: 8 }
        children:
          - { type: button, label: "Cancel", action: dismiss_dialog }
          - { type: button, label: "Save",   action: save_swatch_library_confirm, variant: primary }
