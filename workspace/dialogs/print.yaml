print:
  summary: "Print"
  description: >
    Modal Print dialog (PRINT.md §Phase 1B). Six-tab structure: only
    the General tab is populated in Phase 1B; tabs 2–6 hold short
    placeholder copy noting the phase that will fill them in.

    The General tab maps 1:1 onto the 23 PrintPreferences fields per
    PRINT.md. Edits are batched: changes don't apply until Print or
    Done; Cancel discards. The Print button triggers PDF generation
    and a browser download of the resulting bytes (Phase 1B's
    PDF-first architecture; OS print panel hookup waits for a later
    phase).

    Phase 1B deferrals:
    - The Tiling sub-section (tile_overlap_*, tile_range) — fields
      reserved in PrintPreferences but hidden until Phase 7+.
    - "Page Setup..." and "Setup..." footer buttons — disabled
      placeholders until OS-driver hookup lands.
    - Live preview pane on the left of the General tab — not yet
      drawn; Phase 1B ships text-only.

  modal: true
  width: 720

  state:
    active_tab:
      type: string
      default: "general"
    preset_name:
      type: string
      default: "[Default]"
    copies:
      type: number
      default: 1
    collate:
      type: bool
      default: false
    reverse_order:
      type: bool
      default: false
    artboard_range_mode:
      type: enum
      values: [all, range]
      default: all
    artboard_range:
      type: string
      default: ""
    ignore_artboards:
      type: bool
      default: false
    skip_blank_artboards:
      type: bool
      default: false
    media_size:
      type: enum
      values: [defined_by_driver, letter, legal, tabloid, a3, a4, a5, custom]
      default: defined_by_driver
    media_width:
      type: number
      default: 612
    media_height:
      type: number
      default: 792
    orientation:
      type: enum
      values: [portrait, landscape]
      default: portrait
    auto_rotate:
      type: bool
      default: true
    transverse:
      type: bool
      default: false
    print_layers:
      type: enum
      values: [visible_printable, visible, all]
      default: visible_printable
    placement_x:
      type: number
      default: 0
    placement_y:
      type: number
      default: 0
    scaling_mode:
      type: enum
      values: [do_not_scale, fit_to_page, custom]
      default: do_not_scale
    custom_scale:
      type: number
      default: 100.0
    # Marks-and-bleed sub-record (PRINT.md §Phase 2). Each field is
    # prefixed ``mab_`` in dialog state to avoid name collisions with
    # the document-level bleed_* on DocumentSetup; the OK/Done/Print
    # actions strip the prefix when writing back.
    mab_all_printer_marks:    { type: bool,   default: false }
    mab_trim_marks:           { type: bool,   default: false }
    mab_registration_marks:   { type: bool,   default: false }
    mab_color_bars:           { type: bool,   default: false }
    mab_page_information:     { type: bool,   default: false }
    mab_printer_mark_type:
      type: enum
      values: [roman, japanese]
      default: roman
    mab_trim_mark_weight:     { type: number, default: 0.25 }
    mab_mark_offset:          { type: number, default: 6.0 }
    mab_use_document_bleed:   { type: bool,   default: true }
    mab_bleed_top:            { type: number, default: 0.0 }
    mab_bleed_right:          { type: number, default: 0.0 }
    mab_bleed_bottom:         { type: number, default: 0.0 }
    mab_bleed_left:           { type: number, default: 0.0 }
    # Output sub-record (PRINT.md §Phase 3). Scalar fields prefixed
    # ``out_`` to avoid collisions; the per-ink table editing the
    # four CMYK process inks uses ``out_inkN_`` for row N (0..3).
    # Spot inks are round-tripped through the data model but not yet
    # editable in this dialog (Phase 3.5 follow-up).
    out_mode:
      type: enum
      values: [composite, separations]
      default: composite
    out_emulsion:
      type: enum
      values: [up_right, down_right]
      default: up_right
    out_image_polarity:
      type: enum
      values: [positive, negative]
      default: positive
    out_printer_resolution:
      type: string
      default: "75 lpi / 600 dpi"
    out_convert_spot_to_process: { type: bool, default: false }
    out_overprint_black:         { type: bool, default: false }
    # Ink row 0 — Process Cyan
    out_ink0_print:     { type: bool,   default: true }
    out_ink0_frequency: { type: number, default: 75.0 }
    out_ink0_angle:     { type: number, default: 105.0 }
    out_ink0_dot_shape:
      type: enum
      values: [round, square, ellipse, diamond, line, cross, euclidean]
      default: round
    # Ink row 1 — Process Magenta
    out_ink1_print:     { type: bool,   default: true }
    out_ink1_frequency: { type: number, default: 75.0 }
    out_ink1_angle:     { type: number, default: 75.0 }
    out_ink1_dot_shape:
      type: enum
      values: [round, square, ellipse, diamond, line, cross, euclidean]
      default: round
    # Ink row 2 — Process Yellow
    out_ink2_print:     { type: bool,   default: true }
    out_ink2_frequency: { type: number, default: 75.0 }
    out_ink2_angle:     { type: number, default: 90.0 }
    out_ink2_dot_shape:
      type: enum
      values: [round, square, ellipse, diamond, line, cross, euclidean]
      default: round
    # Ink row 3 — Process Black
    out_ink3_print:     { type: bool,   default: true }
    out_ink3_frequency: { type: number, default: 75.0 }
    out_ink3_angle:     { type: number, default: 45.0 }
    out_ink3_dot_shape:
      type: enum
      values: [round, square, ellipse, diamond, line, cross, euclidean]
      default: round
    # Graphics sub-record (PRINT.md §Phase 4). Scalar fields prefixed
    # ``gfx_`` to avoid collisions with the rest of the dialog state.
    gfx_flatness: { type: number, default: 1.0 }
    gfx_font_download:
      type: enum
      values: [none, subset, complete]
      default: subset
    gfx_postscript_level:
      type: enum
      values: [level_2, level_3]
      default: level_3
    gfx_data_format:
      type: enum
      values: [ascii, binary]
      default: binary
    gfx_compatible_gradient_printing: { type: bool, default: false }
    gfx_raster_effects_resolution:    { type: number, default: 300.0 }
    # Color Management sub-record (PRINT.md §Phase 5). Scalar fields
    # prefixed ``cm_`` to avoid collisions.
    cm_document_profile: { type: string, default: "sRGB IEC61966-2.1" }
    cm_color_handling:
      type: enum
      values: [let_app_determine, let_printer_determine, postscript_color_management]
      default: let_app_determine
    cm_printer_profile: { type: string, default: "" }
    cm_rendering_intent:
      type: enum
      values: [perceptual, relative_colorimetric, saturation, absolute_colorimetric]
      default: relative_colorimetric
    cm_preserve_rgb_numbers: { type: bool, default: false }

  init:
    preset_name:          "active_document.print_preferences.preset_name"
    copies:               "active_document.print_preferences.copies"
    collate:              "active_document.print_preferences.collate"
    reverse_order:        "active_document.print_preferences.reverse_order"
    artboard_range_mode:  "active_document.print_preferences.artboard_range_mode"
    artboard_range:       "active_document.print_preferences.artboard_range"
    ignore_artboards:     "active_document.print_preferences.ignore_artboards"
    skip_blank_artboards: "active_document.print_preferences.skip_blank_artboards"
    media_size:           "active_document.print_preferences.media_size"
    media_width:          "active_document.print_preferences.media_width"
    media_height:         "active_document.print_preferences.media_height"
    orientation:          "active_document.print_preferences.orientation"
    auto_rotate:          "active_document.print_preferences.auto_rotate"
    transverse:           "active_document.print_preferences.transverse"
    print_layers:         "active_document.print_preferences.print_layers"
    placement_x:          "active_document.print_preferences.placement_x"
    placement_y:          "active_document.print_preferences.placement_y"
    scaling_mode:         "active_document.print_preferences.scaling_mode"
    custom_scale:         "active_document.print_preferences.custom_scale"
    mab_all_printer_marks:  "active_document.print_preferences.marks_and_bleed.all_printer_marks"
    mab_trim_marks:         "active_document.print_preferences.marks_and_bleed.trim_marks"
    mab_registration_marks: "active_document.print_preferences.marks_and_bleed.registration_marks"
    mab_color_bars:         "active_document.print_preferences.marks_and_bleed.color_bars"
    mab_page_information:   "active_document.print_preferences.marks_and_bleed.page_information"
    mab_printer_mark_type:  "active_document.print_preferences.marks_and_bleed.printer_mark_type"
    mab_trim_mark_weight:   "active_document.print_preferences.marks_and_bleed.trim_mark_weight"
    mab_mark_offset:        "active_document.print_preferences.marks_and_bleed.mark_offset"
    mab_use_document_bleed: "active_document.print_preferences.marks_and_bleed.use_document_bleed"
    mab_bleed_top:          "active_document.print_preferences.marks_and_bleed.bleed_top"
    mab_bleed_right:        "active_document.print_preferences.marks_and_bleed.bleed_right"
    mab_bleed_bottom:       "active_document.print_preferences.marks_and_bleed.bleed_bottom"
    mab_bleed_left:         "active_document.print_preferences.marks_and_bleed.bleed_left"
    out_mode:                    "active_document.print_preferences.output.mode"
    out_emulsion:                "active_document.print_preferences.output.emulsion"
    out_image_polarity:          "active_document.print_preferences.output.image_polarity"
    out_printer_resolution:      "active_document.print_preferences.output.printer_resolution"
    out_convert_spot_to_process: "active_document.print_preferences.output.convert_spot_to_process"
    out_overprint_black:         "active_document.print_preferences.output.overprint_black"
    out_ink0_print:     "active_document.print_preferences.output.inks[0].print"
    out_ink0_frequency: "active_document.print_preferences.output.inks[0].frequency"
    out_ink0_angle:     "active_document.print_preferences.output.inks[0].angle"
    out_ink0_dot_shape: "active_document.print_preferences.output.inks[0].dot_shape"
    out_ink1_print:     "active_document.print_preferences.output.inks[1].print"
    out_ink1_frequency: "active_document.print_preferences.output.inks[1].frequency"
    out_ink1_angle:     "active_document.print_preferences.output.inks[1].angle"
    out_ink1_dot_shape: "active_document.print_preferences.output.inks[1].dot_shape"
    out_ink2_print:     "active_document.print_preferences.output.inks[2].print"
    out_ink2_frequency: "active_document.print_preferences.output.inks[2].frequency"
    out_ink2_angle:     "active_document.print_preferences.output.inks[2].angle"
    out_ink2_dot_shape: "active_document.print_preferences.output.inks[2].dot_shape"
    out_ink3_print:     "active_document.print_preferences.output.inks[3].print"
    out_ink3_frequency: "active_document.print_preferences.output.inks[3].frequency"
    out_ink3_angle:     "active_document.print_preferences.output.inks[3].angle"
    out_ink3_dot_shape: "active_document.print_preferences.output.inks[3].dot_shape"
    gfx_flatness:                     "active_document.print_preferences.graphics.flatness"
    gfx_font_download:                "active_document.print_preferences.graphics.font_download"
    gfx_postscript_level:             "active_document.print_preferences.graphics.postscript_level"
    gfx_data_format:                  "active_document.print_preferences.graphics.data_format"
    gfx_compatible_gradient_printing: "active_document.print_preferences.graphics.compatible_gradient_printing"
    gfx_raster_effects_resolution:    "active_document.print_preferences.graphics.raster_effects_resolution"
    cm_document_profile:     "active_document.print_preferences.color_management.document_profile"
    cm_color_handling:       "active_document.print_preferences.color_management.color_handling"
    cm_printer_profile:      "active_document.print_preferences.color_management.printer_profile"
    cm_rendering_intent:     "active_document.print_preferences.color_management.rendering_intent"
    cm_preserve_rgb_numbers: "active_document.print_preferences.color_management.preserve_rgb_numbers"

  content:
    type: container
    layout: column
    style: { gap: 0, padding: 0 }
    children:
      - id: print_tabs
        type: tabs
        bind:
          value: "dialog.active_tab"
        tabs:

          # ── General ─────────────────────────────────
          - id: general
            label: "General"
            content:
              type: container
              layout: column
              style: { gap: 12, padding: 4 }
              children:

                # Preset row
                - type: row
                  children:
                    - type: col
                      col: 3
                      children:
                        - { type: text, content: "Print Preset:", style: { font_size: 11 } }
                    - type: col
                      col: 9
                      children:
                        - id: pr_preset
                          type: select
                          options:
                            - { label: "[Default]", value: "[Default]" }
                          bind:
                            value: "dialog.preset_name"

                # Copies / Collate / Reverse
                - type: separator
                  orientation: horizontal
                - type: text
                  content: "Copies"
                  style: { font_size: 11, font_weight: bold }

                - type: row
                  children:
                    - type: col
                      col: 3
                      children:
                        - { type: text, content: "Copies:", style: { font_size: 11 } }
                    - type: col
                      col: 3
                      children:
                        - id: pr_copies
                          type: number_input
                          min: 1
                          style: { width: 80 }
                          bind:
                            value: "dialog.copies"
                    - type: col
                      col: 6
                      children: []

                - id: pr_collate
                  type: toggle
                  label: "Collate"
                  bind:
                    checked: "dialog.collate"

                - id: pr_reverse
                  type: toggle
                  label: "Reverse Order"
                  bind:
                    checked: "dialog.reverse_order"

                # Artboards section
                - type: separator
                  orientation: horizontal
                - type: text
                  content: "Artboards"
                  style: { font_size: 11, font_weight: bold }

                - type: row
                  children:
                    - type: col
                      col: 3
                      children:
                        - { type: text, content: "Range:", style: { font_size: 11 } }
                    - type: col
                      col: 3
                      children:
                        - id: pr_range_mode
                          type: select
                          options:
                            - { label: "All",   value: all }
                            - { label: "Range", value: range }
                          bind:
                            value: "dialog.artboard_range_mode"
                    - type: col
                      col: 6
                      children:
                        - id: pr_range_input
                          type: text_input
                          placeholder: "1-3, 5"
                          bind:
                            value: "dialog.artboard_range"
                            disabled: "dialog.artboard_range_mode != 'range'"

                - id: pr_ignore_artboards
                  type: toggle
                  label: "Ignore Artboards"
                  bind:
                    checked: "dialog.ignore_artboards"

                - id: pr_skip_blank
                  type: toggle
                  label: "Skip Blank Artboards"
                  bind:
                    checked: "dialog.skip_blank_artboards"

                # Media section
                - type: separator
                  orientation: horizontal
                - type: text
                  content: "Media"
                  style: { font_size: 11, font_weight: bold }

                - type: row
                  children:
                    - type: col
                      col: 3
                      children:
                        - { type: text, content: "Size:", style: { font_size: 11 } }
                    - type: col
                      col: 9
                      children:
                        - id: pr_media_size
                          type: select
                          options:
                            - { label: "Defined by Driver", value: defined_by_driver }
                            - { label: "Letter (612 × 792)", value: letter }
                            - { label: "Legal (612 × 1008)", value: legal }
                            - { label: "Tabloid (792 × 1224)", value: tabloid }
                            - { label: "A3 (842 × 1191)", value: a3 }
                            - { label: "A4 (595 × 842)", value: a4 }
                            - { label: "A5 (420 × 595)", value: a5 }
                            - { label: "Custom", value: custom }
                          bind:
                            value: "dialog.media_size"

                - type: row
                  children:
                    - type: col
                      col: 3
                      children:
                        - { type: text, content: "Width:", style: { font_size: 11 } }
                    - type: col
                      col: 3
                      children:
                        - id: pr_media_width
                          type: number_input
                          min: 1
                          style: { width: 80 }
                          bind:
                            value: "dialog.media_width"
                            disabled: "dialog.media_size != 'custom'"
                    - type: col
                      col: 3
                      children:
                        - { type: text, content: "Height:", style: { font_size: 11 } }
                    - type: col
                      col: 3
                      children:
                        - id: pr_media_height
                          type: number_input
                          min: 1
                          style: { width: 80 }
                          bind:
                            value: "dialog.media_height"
                            disabled: "dialog.media_size != 'custom'"

                - type: row
                  children:
                    - type: col
                      col: 3
                      children:
                        - { type: text, content: "Orientation:", style: { font_size: 11 } }
                    - type: col
                      col: 9
                      children:
                        - id: pr_orientation
                          type: select
                          options:
                            - { label: "Portrait", value: portrait }
                            - { label: "Landscape", value: landscape }
                          bind:
                            value: "dialog.orientation"

                - id: pr_auto_rotate
                  type: toggle
                  label: "Auto-Rotate"
                  bind:
                    checked: "dialog.auto_rotate"

                - id: pr_transverse
                  type: toggle
                  label: "Transverse"
                  bind:
                    checked: "dialog.transverse"

                # Options section
                - type: separator
                  orientation: horizontal
                - type: text
                  content: "Options"
                  style: { font_size: 11, font_weight: bold }

                - type: row
                  children:
                    - type: col
                      col: 3
                      children:
                        - { type: text, content: "Print Layers:", style: { font_size: 11 } }
                    - type: col
                      col: 9
                      children:
                        - id: pr_print_layers
                          type: select
                          options:
                            - { label: "Visible & Printable Layers", value: visible_printable }
                            - { label: "Visible Layers",             value: visible }
                            - { label: "All Layers",                 value: all }
                          bind:
                            value: "dialog.print_layers"

                - type: row
                  children:
                    - type: col
                      col: 3
                      children:
                        - { type: text, content: "Placement X:", style: { font_size: 11 } }
                    - type: col
                      col: 3
                      children:
                        - id: pr_placement_x
                          type: number_input
                          style: { width: 80 }
                          bind:
                            value: "dialog.placement_x"
                    - type: col
                      col: 3
                      children:
                        - { type: text, content: "Placement Y:", style: { font_size: 11 } }
                    - type: col
                      col: 3
                      children:
                        - id: pr_placement_y
                          type: number_input
                          style: { width: 80 }
                          bind:
                            value: "dialog.placement_y"

                - type: row
                  children:
                    - type: col
                      col: 3
                      children:
                        - { type: text, content: "Scaling:", style: { font_size: 11 } }
                    - type: col
                      col: 6
                      children:
                        - id: pr_scaling_mode
                          type: select
                          options:
                            - { label: "Do Not Scale",       value: do_not_scale }
                            - { label: "Fit to Page",        value: fit_to_page }
                            - { label: "Custom Scale",       value: custom }
                          bind:
                            value: "dialog.scaling_mode"
                    - type: col
                      col: 3
                      children:
                        - id: pr_custom_scale
                          type: number_input
                          min: 1
                          style: { width: 80 }
                          bind:
                            value: "dialog.custom_scale"
                            disabled: "dialog.scaling_mode != 'custom'"

          # ── Marks and Bleed (PRINT.md §Phase 2) ──────
          - id: marks_and_bleed
            label: "Marks and Bleed"
            content:
              type: container
              layout: column
              style: { gap: 12, padding: 4 }
              children:

                # Marks section header
                - type: text
                  content: "Marks"
                  style: { font_size: 11, font_weight: bold }

                - id: pr_all_printer_marks
                  type: toggle
                  label: "All Printer's Marks"
                  bind:
                    checked: "dialog.mab_all_printer_marks"

                - id: pr_trim_marks
                  type: toggle
                  label: "Trim Marks"
                  bind:
                    checked: "dialog.mab_trim_marks"

                - id: pr_registration_marks
                  type: toggle
                  label: "Registration Marks"
                  bind:
                    checked: "dialog.mab_registration_marks"

                - id: pr_color_bars
                  type: toggle
                  label: "Color Bars"
                  bind:
                    checked: "dialog.mab_color_bars"

                - id: pr_page_information
                  type: toggle
                  label: "Page Information"
                  bind:
                    checked: "dialog.mab_page_information"

                # Mark style: type + weight + offset
                - type: row
                  children:
                    - type: col
                      col: 4
                      children:
                        - { type: text, content: "Printer Mark Type:",
                            style: { font_size: 11 } }
                    - type: col
                      col: 8
                      children:
                        - id: pr_printer_mark_type
                          type: select
                          options:
                            - { label: "Roman",    value: roman }
                            - { label: "Japanese", value: japanese }
                          bind:
                            value: "dialog.mab_printer_mark_type"

                - type: row
                  children:
                    - type: col
                      col: 4
                      children:
                        - { type: text, content: "Trim Mark Weight (pt):",
                            style: { font_size: 11 } }
                    - type: col
                      col: 8
                      children:
                        - id: pr_trim_mark_weight
                          type: number_input
                          min: 0
                          style: { width: 80 }
                          bind:
                            value: "dialog.mab_trim_mark_weight"

                - type: row
                  children:
                    - type: col
                      col: 4
                      children:
                        - { type: text, content: "Offset (pt):",
                            style: { font_size: 11 } }
                    - type: col
                      col: 8
                      children:
                        - id: pr_mark_offset
                          type: number_input
                          min: 0
                          style: { width: 80 }
                          bind:
                            value: "dialog.mab_mark_offset"

                # Bleed section header + per-print bleed override
                - type: separator
                  orientation: horizontal
                - type: text
                  content: "Bleed"
                  style: { font_size: 11, font_weight: bold }

                - id: pr_use_document_bleed
                  type: toggle
                  label: "Use Document Bleed"
                  bind:
                    checked: "dialog.mab_use_document_bleed"

                - type: row
                  children:
                    - type: col
                      col: 3
                      children:
                        - { type: text, content: "Top:",
                            style: { font_size: 11 } }
                    - type: col
                      col: 3
                      children:
                        - id: pr_mab_bleed_top
                          type: number_input
                          min: 0
                          style: { width: 80 }
                          bind:
                            value: "dialog.mab_bleed_top"
                            disabled: "dialog.mab_use_document_bleed"
                    - type: col
                      col: 3
                      children:
                        - { type: text, content: "Bottom:",
                            style: { font_size: 11 } }
                    - type: col
                      col: 3
                      children:
                        - id: pr_mab_bleed_bottom
                          type: number_input
                          min: 0
                          style: { width: 80 }
                          bind:
                            value: "dialog.mab_bleed_bottom"
                            disabled: "dialog.mab_use_document_bleed"

                - type: row
                  children:
                    - type: col
                      col: 3
                      children:
                        - { type: text, content: "Left:",
                            style: { font_size: 11 } }
                    - type: col
                      col: 3
                      children:
                        - id: pr_mab_bleed_left
                          type: number_input
                          min: 0
                          style: { width: 80 }
                          bind:
                            value: "dialog.mab_bleed_left"
                            disabled: "dialog.mab_use_document_bleed"
                    - type: col
                      col: 3
                      children:
                        - { type: text, content: "Right:",
                            style: { font_size: 11 } }
                    - type: col
                      col: 3
                      children:
                        - id: pr_mab_bleed_right
                          type: number_input
                          min: 0
                          style: { width: 80 }
                          bind:
                            value: "dialog.mab_bleed_right"
                            disabled: "dialog.mab_use_document_bleed"

          # ── Output (PRINT.md §Phase 3) ───────────────
          - id: output
            label: "Output"
            content:
              type: container
              layout: column
              style: { gap: 12, padding: 4 }
              children:
                # Mode + emulsion + polarity row
                - type: row
                  children:
                    - type: col
                      col: 3
                      children:
                        - { type: text, content: "Mode:", style: { font_size: 11 } }
                    - type: col
                      col: 9
                      children:
                        - id: pr_out_mode
                          type: select
                          options:
                            - { label: "Composite",   value: "composite" }
                            - { label: "Separations", value: "separations" }
                          bind:
                            value: "dialog.out_mode"

                - type: row
                  children:
                    - type: col
                      col: 3
                      children:
                        - { type: text, content: "Emulsion:", style: { font_size: 11 } }
                    - type: col
                      col: 9
                      children:
                        - id: pr_out_emulsion
                          type: select
                          options:
                            - { label: "Up Right",   value: "up_right" }
                            - { label: "Down Right", value: "down_right" }
                          bind:
                            value: "dialog.out_emulsion"

                - type: row
                  children:
                    - type: col
                      col: 3
                      children:
                        - { type: text, content: "Image:", style: { font_size: 11 } }
                    - type: col
                      col: 9
                      children:
                        - id: pr_out_image_polarity
                          type: select
                          options:
                            - { label: "Positive", value: "positive" }
                            - { label: "Negative", value: "negative" }
                          bind:
                            value: "dialog.out_image_polarity"

                - type: row
                  children:
                    - type: col
                      col: 3
                      children:
                        - { type: text, content: "Printer Resolution:", style: { font_size: 11 } }
                    - type: col
                      col: 9
                      children:
                        - id: pr_out_printer_resolution
                          type: text_input
                          bind:
                            value: "dialog.out_printer_resolution"

                - type: separator
                  orientation: horizontal

                - type: row
                  children:
                    - type: col
                      col: 12
                      children:
                        - id: pr_out_convert_spot_to_process
                          type: checkbox
                          label: "Convert All Spot Colors to Process"
                          bind:
                            checked: "dialog.out_convert_spot_to_process"

                - type: row
                  children:
                    - type: col
                      col: 12
                      children:
                        - id: pr_out_overprint_black
                          type: checkbox
                          label: "Overprint Black"
                          bind:
                            checked: "dialog.out_overprint_black"

                - type: separator
                  orientation: horizontal

                # Per-ink table header
                - { type: text, content: "Document Ink Options",
                    style: { font_size: 11, font_weight: bold } }

                - type: row
                  style: { gap: 8 }
                  children:
                    - type: col
                      col: 1
                      children: [{ type: text, content: "Print", style: { font_size: 10, font_weight: bold } }]
                    - type: col
                      col: 4
                      children: [{ type: text, content: "Ink", style: { font_size: 10, font_weight: bold } }]
                    - type: col
                      col: 2
                      children: [{ type: text, content: "Frequency", style: { font_size: 10, font_weight: bold } }]
                    - type: col
                      col: 2
                      children: [{ type: text, content: "Angle", style: { font_size: 10, font_weight: bold } }]
                    - type: col
                      col: 3
                      children: [{ type: text, content: "Dot Shape", style: { font_size: 10, font_weight: bold } }]

                # Process Cyan
                - type: row
                  style: { gap: 8 }
                  children:
                    - type: col
                      col: 1
                      children:
                        - id: pr_out_ink0_print
                          type: checkbox
                          bind:
                            checked: "dialog.out_ink0_print"
                    - type: col
                      col: 4
                      children: [{ type: text, content: "Process Cyan", style: { font_size: 11 } }]
                    - type: col
                      col: 2
                      children:
                        - id: pr_out_ink0_frequency
                          type: number_input
                          min: 0
                          style: { width: 70 }
                          bind:
                            value: "dialog.out_ink0_frequency"
                    - type: col
                      col: 2
                      children:
                        - id: pr_out_ink0_angle
                          type: number_input
                          style: { width: 70 }
                          bind:
                            value: "dialog.out_ink0_angle"
                    - type: col
                      col: 3
                      children:
                        - id: pr_out_ink0_dot_shape
                          type: select
                          options:
                            - { label: "Round",     value: "round" }
                            - { label: "Square",    value: "square" }
                            - { label: "Ellipse",   value: "ellipse" }
                            - { label: "Diamond",   value: "diamond" }
                            - { label: "Line",      value: "line" }
                            - { label: "Cross",     value: "cross" }
                            - { label: "Euclidean", value: "euclidean" }
                          bind:
                            value: "dialog.out_ink0_dot_shape"

                # Process Magenta
                - type: row
                  style: { gap: 8 }
                  children:
                    - type: col
                      col: 1
                      children:
                        - id: pr_out_ink1_print
                          type: checkbox
                          bind:
                            checked: "dialog.out_ink1_print"
                    - type: col
                      col: 4
                      children: [{ type: text, content: "Process Magenta", style: { font_size: 11 } }]
                    - type: col
                      col: 2
                      children:
                        - id: pr_out_ink1_frequency
                          type: number_input
                          min: 0
                          style: { width: 70 }
                          bind:
                            value: "dialog.out_ink1_frequency"
                    - type: col
                      col: 2
                      children:
                        - id: pr_out_ink1_angle
                          type: number_input
                          style: { width: 70 }
                          bind:
                            value: "dialog.out_ink1_angle"
                    - type: col
                      col: 3
                      children:
                        - id: pr_out_ink1_dot_shape
                          type: select
                          options:
                            - { label: "Round",     value: "round" }
                            - { label: "Square",    value: "square" }
                            - { label: "Ellipse",   value: "ellipse" }
                            - { label: "Diamond",   value: "diamond" }
                            - { label: "Line",      value: "line" }
                            - { label: "Cross",     value: "cross" }
                            - { label: "Euclidean", value: "euclidean" }
                          bind:
                            value: "dialog.out_ink1_dot_shape"

                # Process Yellow
                - type: row
                  style: { gap: 8 }
                  children:
                    - type: col
                      col: 1
                      children:
                        - id: pr_out_ink2_print
                          type: checkbox
                          bind:
                            checked: "dialog.out_ink2_print"
                    - type: col
                      col: 4
                      children: [{ type: text, content: "Process Yellow", style: { font_size: 11 } }]
                    - type: col
                      col: 2
                      children:
                        - id: pr_out_ink2_frequency
                          type: number_input
                          min: 0
                          style: { width: 70 }
                          bind:
                            value: "dialog.out_ink2_frequency"
                    - type: col
                      col: 2
                      children:
                        - id: pr_out_ink2_angle
                          type: number_input
                          style: { width: 70 }
                          bind:
                            value: "dialog.out_ink2_angle"
                    - type: col
                      col: 3
                      children:
                        - id: pr_out_ink2_dot_shape
                          type: select
                          options:
                            - { label: "Round",     value: "round" }
                            - { label: "Square",    value: "square" }
                            - { label: "Ellipse",   value: "ellipse" }
                            - { label: "Diamond",   value: "diamond" }
                            - { label: "Line",      value: "line" }
                            - { label: "Cross",     value: "cross" }
                            - { label: "Euclidean", value: "euclidean" }
                          bind:
                            value: "dialog.out_ink2_dot_shape"

                # Process Black
                - type: row
                  style: { gap: 8 }
                  children:
                    - type: col
                      col: 1
                      children:
                        - id: pr_out_ink3_print
                          type: checkbox
                          bind:
                            checked: "dialog.out_ink3_print"
                    - type: col
                      col: 4
                      children: [{ type: text, content: "Process Black", style: { font_size: 11 } }]
                    - type: col
                      col: 2
                      children:
                        - id: pr_out_ink3_frequency
                          type: number_input
                          min: 0
                          style: { width: 70 }
                          bind:
                            value: "dialog.out_ink3_frequency"
                    - type: col
                      col: 2
                      children:
                        - id: pr_out_ink3_angle
                          type: number_input
                          style: { width: 70 }
                          bind:
                            value: "dialog.out_ink3_angle"
                    - type: col
                      col: 3
                      children:
                        - id: pr_out_ink3_dot_shape
                          type: select
                          options:
                            - { label: "Round",     value: "round" }
                            - { label: "Square",    value: "square" }
                            - { label: "Ellipse",   value: "ellipse" }
                            - { label: "Diamond",   value: "diamond" }
                            - { label: "Line",      value: "line" }
                            - { label: "Cross",     value: "cross" }
                            - { label: "Euclidean", value: "euclidean" }
                          bind:
                            value: "dialog.out_ink3_dot_shape"

          # ── Graphics (PRINT.md §Phase 4) ─────────────
          - id: graphics
            label: "Graphics"
            content:
              type: container
              layout: column
              style: { gap: 12, padding: 4 }
              children:

                # Path flatness — Quality ↔ Speed
                - { type: text, content: "Paths",
                    style: { font_size: 11, font_weight: bold } }
                - type: row
                  children:
                    - type: col
                      col: 3
                      children:
                        - { type: text, content: "Flatness:", style: { font_size: 11 } }
                    - type: col
                      col: 9
                      children:
                        - id: pr_gfx_flatness
                          type: number_input
                          min: 0.2
                          style: { width: 80 }
                          bind:
                            value: "dialog.gfx_flatness"
                - { type: text,
                    content: "Lower = higher curve quality (slower). Higher = coarser approximation (faster). Range 0.2–10.",
                    style: { font_size: 10, color: "var(--jas-text-dim,#888)" } }

                - type: separator
                  orientation: horizontal

                # Fonts
                - { type: text, content: "Fonts",
                    style: { font_size: 11, font_weight: bold } }
                - type: row
                  children:
                    - type: col
                      col: 3
                      children:
                        - { type: text, content: "Download:", style: { font_size: 11 } }
                    - type: col
                      col: 9
                      children:
                        - id: pr_gfx_font_download
                          type: select
                          options:
                            - { label: "None",     value: "none" }
                            - { label: "Subset",   value: "subset" }
                            - { label: "Complete", value: "complete" }
                          bind:
                            value: "dialog.gfx_font_download"

                - type: separator
                  orientation: horizontal

                # PostScript options (stored but not applied for PDF output)
                - { type: text, content: "Options",
                    style: { font_size: 11, font_weight: bold } }
                - type: row
                  children:
                    - type: col
                      col: 3
                      children:
                        - { type: text, content: "PostScript:", style: { font_size: 11 } }
                    - type: col
                      col: 9
                      children:
                        - id: pr_gfx_postscript_level
                          type: select
                          options:
                            - { label: "Level 2", value: "level_2" }
                            - { label: "Level 3", value: "level_3" }
                          bind:
                            value: "dialog.gfx_postscript_level"

                - type: row
                  children:
                    - type: col
                      col: 3
                      children:
                        - { type: text, content: "Data Format:", style: { font_size: 11 } }
                    - type: col
                      col: 9
                      children:
                        - id: pr_gfx_data_format
                          type: select
                          options:
                            - { label: "ASCII",  value: "ascii" }
                            - { label: "Binary", value: "binary" }
                          bind:
                            value: "dialog.gfx_data_format"

                - type: row
                  children:
                    - type: col
                      col: 12
                      children:
                        - id: pr_gfx_compatible_gradient_printing
                          type: checkbox
                          label: "Compatible Gradient and Gradient Mesh Printing"
                          bind:
                            checked: "dialog.gfx_compatible_gradient_printing"

                - type: separator
                  orientation: horizontal

                # Raster effects
                - { type: text, content: "Raster Effects",
                    style: { font_size: 11, font_weight: bold } }
                - type: row
                  children:
                    - type: col
                      col: 3
                      children:
                        - { type: text, content: "Resolution (dpi):", style: { font_size: 11 } }
                    - type: col
                      col: 9
                      children:
                        - id: pr_gfx_raster_effects_resolution
                          type: number_input
                          min: 0
                          style: { width: 80 }
                          bind:
                            value: "dialog.gfx_raster_effects_resolution"

          # ── Color Management (PRINT.md §Phase 5) ─────
          - id: color_management
            label: "Color Management"
            content:
              type: container
              layout: column
              style: { gap: 12, padding: 4 }
              children:
                - { type: text, content: "Profiles",
                    style: { font_size: 11, font_weight: bold } }

                - type: row
                  children:
                    - type: col
                      col: 4
                      children:
                        - { type: text, content: "Document Profile:", style: { font_size: 11 } }
                    - type: col
                      col: 8
                      children:
                        - id: pr_cm_document_profile
                          type: text_input
                          bind:
                            value: "dialog.cm_document_profile"

                - type: row
                  children:
                    - type: col
                      col: 4
                      children:
                        - { type: text, content: "Printer Profile:", style: { font_size: 11 } }
                    - type: col
                      col: 8
                      children:
                        - id: pr_cm_printer_profile
                          type: text_input
                          bind:
                            value: "dialog.cm_printer_profile"
                - { type: text,
                    content: "ICC profile names are stored on save but not yet embedded in the PDF — that lands in a follow-up.",
                    style: { font_size: 10, color: "var(--jas-text-dim,#888)" } }

                - type: separator
                  orientation: horizontal

                - { type: text, content: "Handling",
                    style: { font_size: 11, font_weight: bold } }

                - type: row
                  children:
                    - type: col
                      col: 4
                      children:
                        - { type: text, content: "Color Handling:", style: { font_size: 11 } }
                    - type: col
                      col: 8
                      children:
                        - id: pr_cm_color_handling
                          type: select
                          options:
                            - { label: "Let App Determine Colors",      value: "let_app_determine" }
                            - { label: "Let Printer Determine Colors",  value: "let_printer_determine" }
                            - { label: "PostScript Color Management",   value: "postscript_color_management" }
                          bind:
                            value: "dialog.cm_color_handling"

                - type: row
                  children:
                    - type: col
                      col: 4
                      children:
                        - { type: text, content: "Rendering Intent:", style: { font_size: 11 } }
                    - type: col
                      col: 8
                      children:
                        - id: pr_cm_rendering_intent
                          type: select
                          options:
                            - { label: "Perceptual",             value: "perceptual" }
                            - { label: "Relative Colorimetric",  value: "relative_colorimetric" }
                            - { label: "Saturation",             value: "saturation" }
                            - { label: "Absolute Colorimetric",  value: "absolute_colorimetric" }
                          bind:
                            value: "dialog.cm_rendering_intent"

                - type: row
                  children:
                    - type: col
                      col: 12
                      children:
                        - id: pr_cm_preserve_rgb_numbers
                          type: checkbox
                          label: "Preserve RGB Numbers"
                          bind:
                            checked: "dialog.cm_preserve_rgb_numbers"

          # ── Advanced (Phase 6 placeholder) ───────────
          - id: advanced
            label: "Advanced"
            content:
              type: container
              layout: column
              style: { gap: 12, padding: 4 }
              children:
                - { type: text, content: "Advanced",
                    style: { font_size: 13, font_weight: bold } }
                - { type: text,
                    content: "Available in Phase 6 (PRINT.md §Phase 6). Print as bitmap, overprint flattener preset; also re-houses Document Setup transparency / overprint settings.",
                    style: { font_size: 11, color: "var(--jas-text-dim,#888)" } }

      # ── Footer strip ─────────────────────────────────
      - type: container
        layout: row
        style: { gap: 8, padding: 12, alignment: center, justify: end, border_top: "1px solid var(--jas-border,#555)" }
        children:
          - type: button
