              out_ink0_frequency: "dialog.out_ink0_frequency"
              out_ink0_angle:     "dialog.out_ink0_angle"
              out_ink0_dot_shape: "dialog.out_ink0_dot_shape"
              out_ink1_print:     "dialog.out_ink1_print"
              out_ink1_frequency: "dialog.out_ink1_frequency"
