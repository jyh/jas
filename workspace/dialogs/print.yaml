              out_ink2_frequency: "dialog.out_ink2_frequency"
              out_ink2_angle:     "dialog.out_ink2_angle"
              out_ink2_dot_shape: "dialog.out_ink2_dot_shape"
              out_ink3_print:     "dialog.out_ink3_print"
              out_ink3_frequency: "dialog.out_ink3_frequency"
              out_ink3_angle:     "dialog.out_ink3_angle"
              out_ink3_dot_shape: "dialog.out_ink3_dot_shape"
