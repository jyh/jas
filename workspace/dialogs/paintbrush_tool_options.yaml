paintbrush_tool_options:
  summary: "Paintbrush Tool Options"
  description: >
    Modal dialog opened by double-clicking the Paintbrush icon in
    the toolbar. Edits five per-document options that drive the
    Paintbrush tool's drawing and edit gestures:

    - Fidelity: 5-stop slider (Accurate ↔ Smooth) that maps to the
      fit_curve tolerance (pt) used on release. Tick 1 = 0.5,
      tick 3 (default) = 5.0, tick 5 = 10.0. See
      PAINTBRUSH_TOOL.md §Tool options.
    - Fill new brush strokes: when on, new paths get fill =
      state.fill_color. When off, fill = none. Does not affect
      edit-gesture commits.
    - Keep Selected: when on, the new path becomes the canvas
      selection after commit.
    - Edit Selected Paths: when on, Option/Alt-drag within
      `edit_within` px of a selected path rewrites the nearest
      sub-segment of that path instead of starting a new stroke.
    - Within: proximity threshold (px) for the edit gesture;
      dual-bound slider + number input.

    Reset restores defaults without committing. Cancel discards
    edits. OK writes all five values to state.paintbrush_*. See
    PAINTBRUSH_TOOL.md.
  modal: true
  width: 420
  params: {}
  state:
    fidelity:
      type: number
      default: 3
      description: "5-stop slider position (1-5); maps to fit_error via PAINTBRUSH_TOOL.md §Fidelity → fit_error mapping"
    fill_new_strokes:
      type: bool
      default: false
      description: "New strokes get fill = state.fill_color when true"
    keep_selected:
      type: bool
      default: true
      description: "New path becomes the canvas selection after commit"
    edit_selected_paths:
      type: bool
      default: true
      description: "Option/Alt-drag near a selected path rewrites it"
    edit_within:
      type: number
      default: 12
      description: "Proximity threshold (px) for the edit gesture"
  init:
    fidelity: "state.paintbrush_fidelity"
    fill_new_strokes: "state.paintbrush_fill_new_strokes"
    keep_selected: "state.paintbrush_keep_selected"
    edit_selected_paths: "state.paintbrush_edit_selected_paths"
    edit_within: "state.paintbrush_edit_within"
  content:
    type: container
    layout: column
    style: { gap: 12, padding: 16 }
    children:

      # ── Fidelity section ──
      - type: container
        layout: column
        style: { gap: 6, padding: 10, border: "1px solid panel-border" }
        children:
          - { type: text, content: "Fidelity", style: { font_size: 12, weight: bold } }
          - type: row
            children:
              - type: col
                col: 12
                children:
                  - id: pto_fidelity
                    type: slider
                    min: 1
                    max: 5
                    step: 1
                    bind:
                      value: "dialog.fidelity"
          - type: row
            children:
              - type: col
                col: 6
                children:
                  - { type: text, content: "Accurate", style: { font_size: 10 } }
              - type: col
                col: 6
                children:
                  - { type: text, content: "Smooth", style: { font_size: 10, alignment: end } }

      # ── Options section ──
      - type: container
        layout: column
        style: { gap: 6, padding: 10, border: "1px solid panel-border" }
        children:
          - { type: text, content: "Options", style: { font_size: 12, weight: bold } }

          - id: pto_fill_new_strokes
            type: toggle
            label: "Fill new brush strokes"
            bind:
              checked: "dialog.fill_new_strokes"

          - id: pto_keep_selected
            type: toggle
            label: "Keep Selected"
            bind:
              checked: "dialog.keep_selected"

          - id: pto_edit_selected_paths
            type: toggle
            label: "Edit Selected Paths"
            bind:
              checked: "dialog.edit_selected_paths"

          # ── Within: slider + number_input (via slider_row template) ──
          - type: row
            children:
              - type: col
                col: 2
                children:
                  - { type: text, content: "Within:", style: { font_size: 11 } }
              - type: col
                col: 7
                children:
                  - id: pto_edit_within
                    type: slider
                    min: 1
                    max: 50
                    step: 1
                    bind:
                      value: "dialog.edit_within"
                      disabled: "not dialog.edit_selected_paths"
              - type: col
                col: 2
                children:
                  - id: pto_edit_within_val
                    type: number_input
                    min: 1
                    max: 50
                    step: 1
                    bind:
                      value: "dialog.edit_within"
                      disabled: "not dialog.edit_selected_paths"
              - type: col
                col: 1
                children:
                  - { type: text, content: "pixels", style: { font_size: 10 } }

      # ── Reset + Cancel + OK ──
      - type: container
        layout: row
        style: { gap: 8, alignment: center, justify: space-between }
        children:
          - type: button
            label: "Reset"
            action: paintbrush_tool_options_reset
          - type: container
            layout: row
            style: { gap: 8 }
            children:
              - { type: button, label: "Cancel", action: dismiss_dialog }
              - type: button
                label: "OK"
                action: paintbrush_tool_options_confirm
                variant: primary
                params:
                  fidelity: "dialog.fidelity"
                  fill_new_strokes: "dialog.fill_new_strokes"
                  keep_selected: "dialog.keep_selected"
                  edit_selected_paths: "dialog.edit_selected_paths"
                  edit_within: "dialog.edit_within"
