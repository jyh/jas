paragraph_hyphenation:
  summary: "Hyphenation"
  description: >
    Modal dialog for fine-grained hyphenation controls per
    PARAGRAPH.md §Hyphenation Dialog. Opened from the Paragraph panel
    menu (Hyphenation…).

    Layout (top to bottom):
    - Master checkbox: "Hyphenation" (gates the rest of the dialog —
      when off, all sibling controls render dimmed/non-interactive
      via bind.disabled = "not dialog.hyphenate")
    - 5 numeric input rows: Words Longer Than / After First /
      Before Last / Hyphen Limit / Hyphenation Zone
    - 7-step discrete slider with endpoint labels (Better Spacing /
      Fewer Hyphens)
    - Hyphenate Capitalized Words checkbox
    - Footer: Preview | Cancel | OK

    The master HYPHENATE_MASTER_CHECKBOX mirrors the Paragraph
    panel's HYPHENATE_CHECKBOX (both write panel.hyphenate). The
    OK action commits the master and the 7 sub-fields onto every
    paragraph wrapper tspan in the selection (per-app
    apply_hyphenation_dialog_to_selection handles the identity-
    value rule, omitting attrs that match the spec defaults). The
    apply path also writes the master back to panel.hyphenate so
    the main panel checkbox reflects the dialog commit. Cancel
    closes without committing.

    Preview-on rollback is still on the to-do list: the Phase 0
    snapshot harness only captures top-level state keys, and this
    dialog needs a per-wrapper attr snapshot so Cancel can restore
    live-applied edits. Until that lands, leave Preview off when
    you might want to bail out.

    Defaults per PARAGRAPH.md §Reset Panel: master off, 3 / 1 / 1
    letters, 0 hyphens (unlimited), 0 pt zone, bias 0 (Better
    Spacing), capitalized off.

    The hyphenation language is inherited from the character-level
    xml:lang (set via LANGUAGE_DROPDOWN in CHARACTER.md); this dialog
    has no language control of its own.
  modal: true
  width: 460
  state:
    hyphenate:
      type: bool
      default: false
      description: >
        HYPHENATE_MASTER_CHECKBOX — master switch. When off, every
        other field in the dialog renders dimmed/non-interactive
        (via bind.disabled). The apply pipeline mirrors this back
        to panel.hyphenate so the main Paragraph panel checkbox
        stays in sync with the dialog commit.
    hyphenate_min_word:
      type: number
      default: 3
      min: 2
      max: 25
      description: "Words Longer Than N letters. jas:hyphenate-min-word."
    hyphenate_min_before:
      type: number
      default: 1
      min: 1
      max: 10
      description: "After First N letters. jas:hyphenate-min-before."
    hyphenate_min_after:
      type: number
      default: 1
      min: 1
      max: 10
      description: "Before Last N letters. jas:hyphenate-min-after."
    hyphenate_limit:
      type: number
      default: 0
      min: 0
      max: 25
      description: "Hyphen Limit (0 = unlimited). jas:hyphenate-limit."
    hyphenate_zone:
      type: number
      default: 0
      min: 0
      max: 1296
      description: >
        Hyphenation Zone in pt — distance from the right margin within
        which hyphenation is considered (non-justified paragraphs only).
        jas:hyphenate-zone.
    hyphenate_bias:
      type: number
      default: 0
      min: 0
      max: 6
      description: >
        Bias slider — discrete 7-step (0 = Better Spacing / cheap
        hyphens; 6 = Fewer Hyphens / expensive hyphens). Wires
        into the every-line composer hyphen penalty as part of the
        layout work that consumes the Knuth-Liang break points
        landed in Phase 9. jas:hyphenate-bias.
    hyphenate_capitalized:
      type: bool
      default: false
      description: >
        Hyphenate Capitalized Words. jas:hyphenate-capitalized.
    preview:
      type: bool
      default: false
      description: >
        Preview checkbox. When on, every edit live-applies to the
        selected paragraphs. Cancel always rolls back to the on-open
        snapshot via the Phase 0 preview snapshot/restore harness.

  # Preview snapshot/restore wiring (Phase 0 schema slot). Stays
  # empty: the harness only handles top-level state keys, but the
  # Hyphenation dialog needs to snapshot per-paragraph-wrapper
  # attrs across the selection. A future patch extends the harness
  # to capture attr maps keyed by element path and wires each
  # dialog field's restore here.
  preview_targets: {}

  content:
    type: container
    layout: column
    style: { gap: 8, padding: 16 }
    children:

      # ── Master checkbox ──
      - type: row
        children:
          - type: col
            col: 12
            children:
              - id: ph_master
                type: toggle
                label: "Hyphenation"
                bind:
                  checked: "dialog.hyphenate"

      # ── Words Longer Than ──
      - type: row
        children:
          - type: col
            col: 6
            children:
              - { type: text, content: "Words Longer Than:",
                  style: { font_size: 11 } }
          - type: col
            col: 3
            children:
              - id: ph_min_word
                type: number_input
                min: 2
                max: 25
                style: { width: "100%" }
                bind:
                  value: "dialog.hyphenate_min_word"
                  disabled: "not dialog.hyphenate"
          - type: col
            col: 3
            children:
              - { type: text, content: "letters",
                  style: { font_size: 11 } }

      # ── After First ──
      - type: row
        children:
          - type: col
            col: 6
            children:
              - { type: text, content: "After First:",
                  style: { font_size: 11 } }
          - type: col
            col: 3
            children:
              - id: ph_min_before
                type: number_input
                min: 1
                max: 10
                style: { width: "100%" }
                bind:
                  value: "dialog.hyphenate_min_before"
                  disabled: "not dialog.hyphenate"
          - type: col
            col: 3
            children:
              - { type: text, content: "letters",
                  style: { font_size: 11 } }

      # ── Before Last ──
      - type: row
        children:
          - type: col
            col: 6
            children:
              - { type: text, content: "Before Last:",
                  style: { font_size: 11 } }
          - type: col
            col: 3
            children:
              - id: ph_min_after
                type: number_input
                min: 1
                max: 10
                style: { width: "100%" }
                bind:
                  value: "dialog.hyphenate_min_after"
                  disabled: "not dialog.hyphenate"
          - type: col
            col: 3
            children:
              - { type: text, content: "letters",
                  style: { font_size: 11 } }

      # ── Hyphen Limit ──
      - type: row
        children:
          - type: col
            col: 6
            children:
              - { type: text, content: "Hyphen Limit:",
                  style: { font_size: 11 } }
          - type: col
            col: 3
            children:
              - id: ph_limit
                type: number_input
                min: 0
                max: 25
                style: { width: "100%" }
                bind:
                  value: "dialog.hyphenate_limit"
                  disabled: "not dialog.hyphenate"
          - type: col
            col: 3
            children:
              - { type: text, content: "hyphens",
                  style: { font_size: 11 } }

      # ── Hyphenation Zone ──
      - type: row
        children:
          - type: col
            col: 6
            children:
              - { type: text, content: "Hyphenation Zone:",
                  style: { font_size: 11 } }
          - type: col
            col: 3
            children:
              - id: ph_zone
                type: number_input
                min: 0
                max: 1296
                style: { width: "100%" }
                bind:
                  value: "dialog.hyphenate_zone"
                  disabled: "not dialog.hyphenate"
          - type: col
            col: 3
            children: []

      # ── Bias slider (7-step discrete) ──
      - type: row
        children:
          - type: col
            col: 12
            children:
              - id: ph_bias
                type: slider
                min: 0
                max: 6
                step: 1
                bind:
                  value: "dialog.hyphenate_bias"
                  disabled: "not dialog.hyphenate"

      # ── Slider endpoint labels ──
      - type: row
        children:
          - type: col
            col: 6
            children:
              - { type: text, content: "Better Spacing",
                  style: { font_size: 10 } }
          - type: col
            col: 6
            children:
              - { type: text, content: "Fewer Hyphens",
                  style: { font_size: 10, alignment: end } }

      # ── Hyphenate Capitalized Words ──
      - type: row
        children:
          - type: col
            col: 12
            children:
              - id: ph_capitalized
                type: toggle
                label: "Hyphenate Capitalized Words"
                bind:
                  checked: "dialog.hyphenate_capitalized"
                  disabled: "not dialog.hyphenate"

      # ── Footer: Preview | Cancel | OK ──
      - type: container
        layout: row
        style: { gap: 8, alignment: center, justify: end }
        children:
          - id: ph_preview
            type: toggle
            label: "Preview"
            bind:
              checked: "dialog.preview"
          - type: spacer
            style: { flex: 1 }
          - { type: button, label: "Cancel", action: dismiss_dialog }
          - { type: button, label: "OK", action: paragraph_hyphenation_confirm,
              variant: primary }
