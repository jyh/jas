boolean_options:
  summary: "Boolean Options"
  description: >
    Modal dialog reached from the Boolean panel's hamburger menu via
    "Boolean Options…". Edits three document-level preferences that
    every boolean operation consults:

    - Precision: single tolerance (in points) for Bezier flattening,
      Bezier refit, and redundant-point collapse. Default 0.0283 pt
      (= 0.01 mm).
    - Remove Redundant Points: when on, collinear points in boolean-
      op output whose deviation is within Precision are collapsed.
    - Divide and Outline Will Remove Unpainted Artwork: when on,
      DIVIDE fragments with no fill and no stroke are discarded
      rather than kept as invisible paths.

    Cancel dismisses the dialog without applying; OK writes the three
    fields to document state and dismisses. See BOOLEAN.md
    §Boolean Options dialog.
  modal: true
  width: 360
  params:
    precision: { type: number }
    remove_redundant_points: { type: bool }
    divide_remove_unpainted: { type: bool }
  state:
    precision:
      type: number
      default: 0.0283
      description: "Geometric tolerance in points"
    remove_redundant_points:
      type: bool
      default: false
      description: "Collapse near-collinear points in boolean-op output"
    divide_remove_unpainted:
      type: bool
      default: false
      description: "DIVIDE drops fragments with no paint when on"
  init:
    precision: "param.precision"
    remove_redundant_points: "param.remove_redundant_points"
    divide_remove_unpainted: "param.divide_remove_unpainted"
  content:
    type: container
    layout: column
    style: { gap: 10, padding: 16 }
    children:

      # Precision
      - type: row
        children:
          - type: col
            col: 4
            children:
              - { type: text, content: "Precision:", style: { font_size: 11 } }
          - type: col
            col: 5
            children:
              - id: bo_precision_input
                type: number_input
                min: 0.001
                max: 100
                step: 0.0001
                bind:
                  value: "dialog.precision"
          - type: col
            col: 3
            children:
              - { type: text, content: "pt", style: { font_size: 11 } }

      # Remove Redundant Points
      - type: row
        children:
          - type: col
            col: 12
            children:
              - id: bo_remove_redundant_points
                type: toggle
                label: "Remove Redundant Points"
                bind:
                  checked: "dialog.remove_redundant_points"

      # Divide and Outline Will Remove Unpainted Artwork
      - type: row
        children:
          - type: col
            col: 12
            children:
              - id: bo_divide_remove_unpainted
                type: toggle
                label: "Divide and Outline Will Remove Unpainted Artwork"
                bind:
                  checked: "dialog.divide_remove_unpainted"

      # Cancel + OK
      - type: container
        layout: row
        style: { gap: 8, alignment: center, justify: end }
        children:
          - type: spacer
            style: { flex: 1 }
          - { type: button, label: "Cancel", action: dismiss_dialog }
          - type: button
            label: "OK"
            action: boolean_options_confirm
            variant: primary
            params:
              precision: "dialog.precision"
              remove_redundant_points: "dialog.remove_redundant_points"
              divide_remove_unpainted: "dialog.divide_remove_unpainted"
