arrow_alternates:
  summary: "Selection Tools"
  description: >
    Tool-alternate flyout menu shown on long-press (250ms) of the arrow
    selection tool button. Lists alternate selection tools: Partial
    Selection (select individual anchor points and path segments) and
    Interior Selection (select objects within groups without ungrouping).
    Clicking an item selects that tool and closes the dialog.
  modal: false
  content:
    type: container
    layout: column
    style: { padding: 4, gap: 2 }
    children:
      - type: icon_button
        icon: "partial_selection_arrow"
        label: "Partial Selection"
        summary: "Select individual anchor points and path segments"
        style: { width: "100%", justify: start, gap: 8, padding: "4 8" }
        behavior:
          - event: click
            effects:
              - set: { active_tool: '"partial_selection"' }
              - close_dialog: null
      - type: icon_button
        icon: "interior_selection_arrow"
        label: "Interior Selection"
        summary: "Select objects within groups without ungrouping"
        style: { width: "100%", justify: start, gap: 8, padding: "4 8" }
        behavior:
          - event: click
            effects:
              - set: { active_tool: '"interior_selection"' }
              - close_dialog: null

pen_alternates:
  summary: "Pen Tools"
  description: >
    Tool-alternate flyout menu for the pen tool slot. Lists: Pen (draw
    paths by clicking anchor points), Add Anchor Point (add anchors to
    existing paths), Delete Anchor Point (remove anchors from paths),
    and Anchor Point (convert anchor point types between smooth and
    corner). Clicking selects the tool and closes the dialog.
  modal: false
  content:
    type: container
    layout: column
    style: { padding: 4, gap: 2 }
    children:
      - type: icon_button
        icon: "pen"
        label: "Pen"
        summary: "Draw paths by clicking to place anchor points"
        style: { width: "100%", justify: start, gap: 8, padding: "4 8" }
        behavior:
          - event: click
            effects:
              - set: { active_tool: '"pen"' }
              - close_dialog: null
      - type: icon_button
        icon: "add_anchor"
        label: "Add Anchor Point"
        summary: "Add anchor points to an existing path"
        style: { width: "100%", justify: start, gap: 8, padding: "4 8" }
        behavior:
          - event: click
            effects:
              - set: { active_tool: '"add_anchor"' }
              - close_dialog: null
      - type: icon_button
        icon: "delete_anchor"
        label: "Delete Anchor Point"
        summary: "Remove anchor points from a path"
        style: { width: "100%", justify: start, gap: 8, padding: "4 8" }
        behavior:
          - event: click
            effects:
              - set: { active_tool: '"delete_anchor"' }
              - close_dialog: null
      - type: icon_button
        icon: "anchor_point"
        label: "Anchor Point"
        summary: "Convert anchor points between smooth and corner"
        style: { width: "100%", justify: start, gap: 8, padding: "4 8" }
        behavior:
          - event: click
            effects:
              - set: { active_tool: '"anchor_point"' }
              - close_dialog: null

