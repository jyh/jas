id: paragraph_panel_content
type: panel
summary: "Paragraph"
description: >
  Paragraph formatting panel per PARAGRAPH.md (Phase 2 — static UI).
  Provides the alignment radio group (7 icon toggles), bullets and
  numbered-list dropdowns, indent and space-before/after combos, and
  the hyphenate checkbox. Panel menu opens the Justification and
  Hyphenation dialogs; Hanging Punctuation is a menu-only checkmark
  toggle. Bound to panel-local state only; selection-driven wiring
  lands in Phase 3, paragraph attribute writes in Phase 4.

  Layout follows PARAGRAPH.md §Layout — bootstrap-style grid with
  intentional right-padding on three rows (alignment: 5-col padding;
  first-line indent: 6-col padding; hyphenate: 9-col padding).

state:
  # ── Alignment radio group ──────────────────────────────────
  # Per PARAGRAPH.md §Selection model rule 3 the seven align /
  # justify buttons are a single radio group. Phase 2 uses one
  # bool per button (matches the All Caps / Small Caps pattern in
  # character.yaml); mutual exclusion is enforced at the action
  # wiring landing in Phase 4. Default has ALIGN_LEFT on.
  align_left:
    type: bool
    default: true
    description: "ALIGN_LEFT_BUTTON state. Default for LTR text."
  align_center:
    type: bool
    default: false
    description: "ALIGN_CENTER_BUTTON state."
  align_right:
    type: bool
    default: false
    description: "ALIGN_RIGHT_BUTTON state."
  justify_left:
    type: bool
    default: false
    description: "JUSTIFY_LEFT_BUTTON — justify body, last line left."
  justify_center:
    type: bool
    default: false
    description: "JUSTIFY_CENTER_BUTTON — justify body, last line centred."
  justify_right:
    type: bool
    default: false
    description: "JUSTIFY_RIGHT_BUTTON — justify body, last line right."
  justify_all:
    type: bool
    default: false
    description: "JUSTIFY_ALL_BUTTON — every line justified, including the last."

  # ── Bullets and numbered lists ─────────────────────────────
  # Both dropdowns share one backing attribute (jas:list-style);
  # they are mutually exclusive in the spec. Phase 2 keeps two
  # independent string state fields; Phase 4 wires the mutual
  # exclusion via action effects.
  bullets:
    type: string
    default: ""
    description: >
      Bullet style. One of: bullet-disc, bullet-open-circle,
      bullet-square, bullet-open-square, bullet-dash, bullet-check;
      empty = None.
  numbered_list:
    type: string
    default: ""
    description: >
      Numbered-list style. One of: num-decimal, num-lower-alpha,
      num-upper-alpha, num-lower-roman, num-upper-roman; empty = None.

  # ── Indents (numeric_combo, pt) ────────────────────────────
  left_indent:
    type: number
    default: 0
    description: "LEFT_INDENT_DROPDOWN. Unsigned, pt; range 0–1296."
  right_indent:
    type: number
    default: 0
    description: "RIGHT_INDENT_DROPDOWN. Unsigned, pt; range 0–1296."
  first_line_indent:
    type: number
    default: 0
    description: >
      FIRST_LINE_INDENT_DROPDOWN. **Signed**, pt; range −1296 to +1296.
      Negative values produce hanging indents.

  # ── Vertical spacing (numeric_combo, pt) ───────────────────
  space_before:
    type: number
    default: 0
    description: "SPACE_BEFORE_DROPDOWN. Unsigned, pt; range 0–1296."
  space_after:
    type: number
    default: 0
    description: "SPACE_AFTER_DROPDOWN. Unsigned, pt; range 0–1296."

  # ── Hyphenate (master) and Hanging Punctuation ─────────────
  hyphenate:
    type: bool
    default: false
    description: >
      HYPHENATE_CHECKBOX (master). Mirrored by HYPHENATE_MASTER_CHECKBOX
      inside the Hyphenation dialog — both surfaces write panel.hyphenate.
  hanging_punctuation:
    type: bool
    default: false
    description: >
      Hanging Punctuation menu-item checkmark state. Toggling the menu
      entry writes this flag; rendering picks up jas:hanging-punctuation
      on the paragraph wrapper tspan in Phase 4.

  # ── Text-kind gating (Phase 3a) ─────────────────────────────
  # PARAGRAPH.md §Text-kind gating disables the four JUSTIFY_*
  # buttons, the three indent combos, the hyphenate checkbox, and
  # the hanging-punctuation menu item when the selection is point
  # text or text-on-path (they need a wrapping frame). These two
  # bools are pushed by the native apps' selection-change hooks;
  # flask defaults them to true so the static demo renders fully
  # enabled.
  text_selected:
    type: bool
    default: true
    description: >
      True when any text or text-on-path element is selected. Drives
      bind.disabled on universal controls (alignments, space, list
      style). Native apps overwrite on selection change; flask demo
      keeps the default.
  area_text_selected:
    type: bool
    default: true
    description: >
      True when every selected text element is area text (a wrapping
      frame, width > 0 and height > 0). Drives bind.disabled on
      area-only controls (JUSTIFY_*, indents, hyphenate, hanging
      punctuation). Native apps overwrite on selection change.

init: {}

menu:
  - label: "Hanging Punctuation"
    action: toggle_hanging_punctuation
    checked: "panel.hanging_punctuation"
  - separator
  - label: "Justification…"
    action: open_paragraph_justification
  - label: "Hyphenation…"
    action: open_paragraph_hyphenation
  - separator
  - label: "Reset Panel"
    action: reset_paragraph_panel

content:
  type: container
  id: pg_content
  layout: column
  style: { padding: 4, gap: 6 }
  children:

    # ── Row 1: Alignment radio group (7 col-1 icon toggles) ──
    # 5-column right-padding intentional per PARAGRAPH.md §Layout.
    - type: row
      children:
        - type: container
          col: 1
          style: { alignment: center }
          children:
            - id: pg_align_left
              type: checkbox
              icon: para_align_left
              summary: "Align Left"
              description: "Align each line to the left boundary; right is ragged."
              style: { width: 24, height: 22 }
              bind:
                value: "panel.align_left"
                disabled: "not panel.text_selected"
        - type: container
          col: 1
          style: { alignment: center }
          children:
            - id: pg_align_center
              type: checkbox
              icon: para_align_center
              summary: "Align Center"
              description: "Centre each line; both edges are ragged."
              style: { width: 24, height: 22 }
              bind:
                value: "panel.align_center"
                disabled: "not panel.text_selected"
        - type: container
          col: 1
          style: { alignment: center }
          children:
            - id: pg_align_right
              type: checkbox
              icon: para_align_right
              summary: "Align Right"
              description: "Align each line to the right boundary; left is ragged."
              style: { width: 24, height: 22 }
              bind:
                value: "panel.align_right"
                disabled: "not panel.text_selected"
        - type: container
          col: 1
          style: { alignment: center }
          children:
            - id: pg_justify_left
              type: checkbox
              icon: para_justify_left
              summary: "Justify Left"
              description: "Justify the body of the paragraph; last line aligned left."
              style: { width: 24, height: 22 }
              bind:
                value: "panel.justify_left"
                disabled: "not panel.area_text_selected"
        - type: container
          col: 1
          style: { alignment: center }
          children:
            - id: pg_justify_center
              type: checkbox
              icon: para_justify_center
              summary: "Justify Center"
              description: "Justify the body; last line centred."
              style: { width: 24, height: 22 }
              bind:
                value: "panel.justify_center"
                disabled: "not panel.area_text_selected"
        - type: container
          col: 1
          style: { alignment: center }
          children:
            - id: pg_justify_right
              type: checkbox
              icon: para_justify_right
              summary: "Justify Right"
              description: "Justify the body; last line aligned right."
              style: { width: 24, height: 22 }
              bind:
                value: "panel.justify_right"
                disabled: "not panel.area_text_selected"
        - type: container
          col: 1
          style: { alignment: center }
          children:
            - id: pg_justify_all
              type: checkbox
              icon: para_justify_all
              summary: "Justify All"
              description: "Force every line — including the last — to justify to both margins."
              style: { width: 24, height: 22 }
              bind:
                value: "panel.justify_all"
                disabled: "not panel.area_text_selected"
        # 5-column right-padding intentional.

    # ── Row 2: Bullets dropdown + Numbered list dropdown ─────
    - type: row
      children:
        - type: container
          col: 6
          children:
            - id: pg_bullets
              type: select
              summary: "Bullets"
              description: >
                Bullet marker for each paragraph. Mutually exclusive with
                Numbered List via shared jas:list-style attribute.
              style: { width: "100%" }
              options:
                - { value: "",                  label: "None" }
                - { value: "bullet-disc",       label: "•   Disc" }
                - { value: "bullet-open-circle", label: "○   Open Circle" }
                - { value: "bullet-square",     label: "■   Square" }
                - { value: "bullet-open-square", label: "□   Open Square" }
                - { value: "bullet-dash",       label: "–   Dash" }
                - { value: "bullet-check",      label: "✓   Check" }
              bind:
                value: "panel.bullets"
                disabled: "not panel.text_selected"
        - type: container
          col: 6
          children:
            - id: pg_numbered_list
              type: select
              summary: "Numbered List"
              description: >
                Numbering style. Counter resets when a paragraph with a
                different (or absent) jas:list-style breaks the run.
              style: { width: "100%" }
              options:
                - { value: "",                label: "None" }
                - { value: "num-decimal",     label: "1.   Decimal" }
                - { value: "num-lower-alpha", label: "a.   Lower Alpha" }
                - { value: "num-upper-alpha", label: "A.   Upper Alpha" }
                - { value: "num-lower-roman", label: "i.   Lower Roman" }
                - { value: "num-upper-roman", label: "I.   Upper Roman" }
              bind:
                value: "panel.numbered_list"
                disabled: "not panel.text_selected"

    # ── Row 3: Left indent (col-1 icon + col-5 combo) + Right indent ──
    - type: row
      children:
        - type: container
          col: 1
          style: { alignment: center }
          children:
            - type: icon
              name: para_left_indent
              style: { width: 20, height: 20 }
        - type: container
          col: 5
          children:
            - id: pg_left_indent
              type: number_input
              summary: "Left indent"
              description: "Left indent in points; range 0–1296."
              min: 0
              max: 1296
              style: { width: "100%" }
              bind:
                value: "panel.left_indent"
                disabled: "not panel.area_text_selected"
        - type: container
          col: 1
          style: { alignment: center }
          children:
            - type: icon
              name: para_right_indent
              style: { width: 20, height: 20 }
        - type: container
          col: 5
          children:
            - id: pg_right_indent
              type: number_input
              summary: "Right indent"
              description: "Right indent in points; range 0–1296."
              min: 0
              max: 1296
              style: { width: "100%" }
              bind:
                value: "panel.right_indent"
                disabled: "not panel.area_text_selected"

    # ── Row 4: First-line indent (col-1 icon + col-5 combo) ──
    # 6-column right-padding intentional.
    - type: row
      children:
        - type: container
          col: 1
          style: { alignment: center }
          children:
            - type: icon
              name: para_first_line_indent
              style: { width: 20, height: 20 }
        - type: container
          col: 5
          children:
            - id: pg_first_line_indent
              type: number_input
              summary: "First-line indent"
              description: >
                First-line indent in points; signed (negative produces
                hanging indent). Range −1296 to +1296.
              min: -1296
              max: 1296
              style: { width: "100%" }
              bind:
                value: "panel.first_line_indent"
                disabled: "not panel.area_text_selected"

    # ── Row 5: Space before (col-1 icon + col-5 combo) + Space after ──
    - type: row
      children:
        - type: container
          col: 1
          style: { alignment: center }
          children:
            - type: icon
              name: para_space_before
              style: { width: 20, height: 20 }
        - type: container
          col: 5
          children:
            - id: pg_space_before
              type: number_input
              summary: "Space before"
              description: >
                Vertical space above each paragraph (omitted before the
                first paragraph in a text element). Points; range 0–1296.
              min: 0
              max: 1296
              style: { width: "100%" }
              bind:
                value: "panel.space_before"
                disabled: "not panel.text_selected"
        - type: container
          col: 1
          style: { alignment: center }
          children:
            - type: icon
              name: para_space_after
              style: { width: 20, height: 20 }
        - type: container
          col: 5
          children:
            - id: pg_space_after
              type: number_input
              summary: "Space after"
              description: "Vertical space below each paragraph in points; range 0–1296."
              min: 0
              max: 1296
              style: { width: "100%" }
              bind:
                value: "panel.space_after"
                disabled: "not panel.text_selected"

    # ── Row 6: Hyphenate checkbox (col-3, 9-col right padding) ──
    - type: row
      children:
        - type: container
          col: 3
          style: { alignment: center }
          children:
            - id: pg_hyphenate
              type: checkbox
              label: "Hyphenate"
              summary: "Hyphenate"
              description: >
                Master switch — when on, line breaking may use hyphenation.
                Hyphenation language is inherited from the character-level
                xml:lang. Fine-grained parameters live in the Hyphenation
                dialog (panel menu → Hyphenation…).
              bind:
                value: "panel.hyphenate"
                disabled: "not panel.area_text_selected"
