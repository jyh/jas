id: properties_panel_content
summary: "Object properties"
description: >
  Transform properties for the selected object(s). This increment shows
  the position (X, Y) and size (W, H) of the selection's EVALUATED
  bounding box, in document points — the effective geometry after any
  live scale / rotate / shear transform is folded in (decision-5: the
  panel reflects effective values, not the stored local geometry). The
  bounds are the union of each selected element's geometric bounding box
  (stroke width excluded) mapped through its full document-space
  transform, then axis-aligned; this matches the selection highlight box.

  All fields are editable. Editing X/Y moves the selection; W/H scales the
  object's local axes by the typed/current ratio (preserving rotation, so
  the displayed AABB may differ from the typed value on a rotated object);
  rotation sets the absolute angle about the bounding-box center; opacity
  and blend mode are set on every selected element. W/H and rotation are
  enabled only for a single selection (their semantics are well-defined for
  one object); X/Y/opacity/blend apply to any selection. The
  constrain-proportions lock, shear, and multi-object W/H / rotation editing
  remain later increments. When nothing is selected every field shows 0.

state:
  # Keys are prefixed prop_ so they never collide with another panel's
  # short state keys (the Color panel uses y / h for CMYK-yellow / hue);
  # some renderers feed live panel values through one shared override map
  # keyed only by the leaf name, so a bare x/y/w/h here would clobber them.
  prop_x:
    type: number
    default: 0
    description: "Selection bounding-box left edge (document X), in points."
  prop_y:
    type: number
    default: 0
    description: "Selection bounding-box top edge (document Y), in points."
  prop_w:
    type: number
    default: 0
    description: "Selection bounding-box width, in points."
  prop_h:
    type: number
    default: 0
    description: "Selection bounding-box height, in points."
  prop_rotation:
    type: number
    default: 0
    description: >
      Rotation angle of the FIRST selected element's transform, in degrees
      (atan2 of the linear part). 0 when there is no rotation.
  prop_opacity:
    type: number
    default: 100
    description: "Opacity of the FIRST selected element, 0-100 percent."
  prop_blend:
    type: enum
    values:
      - normal
      - darken
      - multiply
      - color_burn
      - lighten
      - screen
      - color_dodge
      - overlay
      - soft_light
      - hard_light
      - difference
      - exclusion
      - hue
      - saturation
      - color
      - luminosity
    default: normal
    description: "Blend mode of the FIRST selected element."

init:
  prop_x: "0"
  prop_y: "0"
  prop_w: "0"
  prop_h: "0"
  prop_rotation: "0"
  prop_opacity: "100"
  prop_blend: "'normal'"

menu:
  - label: "Close Object properties"
    action: close_panel
    params: { panel: properties }
    description: "Close the Object properties panel"

content:
  type: container
  id: prop_content
  layout: column
  style: { padding: 4, gap: 6 }
  children:

    # ── Position (X, Y) ─────────────────────────────────────
    # length_input bound to the panel key (NOT a static text label): a
    # bound widget re-reads its value when the sync writes the panel key,
    # so the field updates live on selection change AND a user edit writes
    # the key back, which subscribe_properties_panel applies to the
    # selection. Editing X/Y moves the selection (translation bakes).
    # Editable whenever something is selected.
    - type: container
      layout: row
      style: { gap: 4, alignment: center }
      children:
        - type: text
          content: "X"
          style: { width: 14, font_size: 10 }
        - id: prop_x
          type: length_input
          unit: pt
          summary: "Selection X"
          description: "Left edge of the selection bounding box (document X), in points. Editing moves the selection."
          disabled: "active_document.selection_count == 0"
          style: { flex: 1 }
          bind:
            value: "panel.prop_x"
        - type: text
          content: "Y"
          style: { width: 14, font_size: 10 }
        - id: prop_y
          type: length_input
          unit: pt
          summary: "Selection Y"
          description: "Top edge of the selection bounding box (document Y), in points. Editing moves the selection."
          disabled: "active_document.selection_count == 0"
          style: { flex: 1 }
          bind:
            value: "panel.prop_y"

    # ── Size (W, H) ─────────────────────────────────────────
    # Editing W/H scales the object's LOCAL axes by typed/current (preserves
    # rotation, never shears). Well-defined only for a single element, so the
    # fields are disabled unless exactly one object is selected.
    - type: container
      layout: row
      style: { gap: 4, alignment: center }
      children:
        - type: text
          content: "W"
          style: { width: 14, font_size: 10 }
        - id: prop_w
          type: length_input
          unit: pt
          summary: "Selection width"
          description: "Width of the selection bounding box, in points. Editing scales the object (single selection only)."
          disabled: "active_document.selection_count != 1"
          style: { flex: 1 }
          bind:
            value: "panel.prop_w"
        - type: text
          content: "H"
          style: { width: 14, font_size: 10 }
        - id: prop_h
          type: length_input
          unit: pt
          summary: "Selection height"
          description: "Height of the selection bounding box, in points. Editing scales the object (single selection only)."
          disabled: "active_document.selection_count != 1"
          style: { flex: 1 }
          bind:
            value: "panel.prop_h"

    # ── Rotation ────────────────────────────────────────────
    # Per-element attrs (rotation / opacity / blend) reflect the FIRST
    # selected element, like the Stroke panel weight. Bound widgets so the
    # value re-reads on the sync's panel write AND a user edit applies back.
    # Editing rotation sets the absolute angle about the bbox center
    # (single selection only — decompose/recompose is well-defined for one
    # element).
    - type: container
      layout: row
      style: { gap: 4, alignment: center }
      children:
        - type: text
          content: "R"
          style: { width: 14, font_size: 10 }
        - id: prop_rotation_input
          type: number_input
          suffix: "°"
          summary: "Selection rotation"
          description: "Rotation angle of the first selected element, in degrees. Editing rotates about the bbox center (single selection only)."
          disabled: "active_document.selection_count != 1"
          style: { flex: 1 }
          bind:
            value: "panel.prop_rotation"

    # ── Opacity ─────────────────────────────────────────────
    - type: container
      layout: row
      style: { gap: 4, alignment: center }
      children:
        - type: text
          content: "Opacity"
          style: { width: 44, font_size: 10 }
        - id: prop_opacity_input
          type: number_input
          min: 0
          max: 100
          suffix: "%"
          summary: "Selection opacity"
          description: "Opacity of the first selected element, 0-100 percent. Editing sets opacity on every selected element."
          disabled: "active_document.selection_count == 0"
          style: { flex: 1 }
          bind:
            value: "panel.prop_opacity"

    # ── Blend mode ──────────────────────────────────────────
    - type: container
      layout: row
      style: { gap: 4, alignment: center }
      children:
        - type: text
          content: "Blend"
          style: { width: 44, font_size: 10 }
        - id: prop_blend_select
          type: select
          summary: "Selection blend mode"
          description: "Blend mode of the first selected element. Editing sets the blend mode on every selected element."
          disabled: "active_document.selection_count == 0"
          style: { flex: 1 }
          bind:
            value: "panel.prop_blend"
          options:
            - { value: normal,      label: "Normal" }
            - { value: darken,      label: "Darken" }
            - { value: multiply,    label: "Multiply" }
            - { value: color_burn,  label: "Color Burn" }
            - { value: lighten,     label: "Lighten" }
            - { value: screen,      label: "Screen" }
            - { value: color_dodge, label: "Color Dodge" }
            - { value: overlay,     label: "Overlay" }
            - { value: soft_light,  label: "Soft Light" }
            - { value: hard_light,  label: "Hard Light" }
            - { value: difference,  label: "Difference" }
            - { value: exclusion,   label: "Exclusion" }
            - { value: hue,         label: "Hue" }
            - { value: saturation,  label: "Saturation" }
            - { value: color,       label: "Color" }
            - { value: luminosity,  label: "Luminosity" }
