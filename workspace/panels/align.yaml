id: align_panel_content
type: panel
summary: "Align"
description: >
  Align and distribute operations on the current selection. The
  panel performs three families of operations:

  - Alignment: move elements so their edges or centers coincide
    along a chosen axis.
  - Distribute: move elements so a chosen edge or center is
    evenly spaced along an axis.
  - Distribute Spacing: move elements so the gaps between them
    are uniform along an axis.

  All three families share a single Align To target: selection,
  artboard, or a designated key object from the selection. The
  Use Preview Bounds panel-menu toggle selects whether operations
  consult geometric or preview (stroke-inclusive) bounding boxes.

  Layout (top to bottom):

  Row 1 — "Align Objects:" label.
  Row 2 — six icon buttons: left, horizontal-center, right
    (horizontal-axis alignment) on the left half; top, vertical-
    center, bottom (vertical-axis alignment) on the right half.
  Row 3 — "Distribute Objects:" label.
  Row 4 — six icon buttons: distribute-left, distribute-
    horizontal-center, distribute-right on the left half;
    distribute-top, distribute-vertical-center, distribute-
    bottom on the right half.
  Row 5 — two halves. Left half: "Distribute Spacing:" label,
    two spacing icon buttons (vertical, horizontal), and a pt
    value input. Right half: "Align To:" label and three
    mutually-exclusive icon_button toggles (artboard, selection,
    key-object).

  Action buttons behave as one-shot operations — clicking fires
  the alignment and never leaves a persistent checked state.
  Align To toggles form a radio group and are checked when
  panel.align_to matches their target. Per ALIGN.md §Widget
  types.

state:
  align_to:
    type: enum
    values: [selection, artboard, key_object]
    default: selection
    description: >
      Align-To target mode. Mirrors state.align_to. Per
      ALIGN.md §Align To target.
  key_object_path:
    type: path
    default: null
    nullable: true
    description: >
      Path of the designated key object while align_to ==
      'key_object'. Null when no key is designated.
  distribute_spacing_value:
    type: number
    default: 0
    description: >
      Explicit gap in points for Distribute Spacing operations
      when a key object is designated. Otherwise unused.
  use_preview_bounds:
    type: bool
    default: false
    description: >
      When true, operations consult preview (stroke-inclusive)
      bounds; otherwise geometric bounds.

init:
  align_to: "state.align_to"
  key_object_path: "state.align_key_object_path"
  distribute_spacing_value: "state.align_distribute_spacing"
  use_preview_bounds: "state.align_use_preview_bounds"

content:
  type: container
  id: align_content
  layout: column
  style: { padding: 4, gap: 6 }
  children:

    # ── Align Objects ────────────────────────────────────────
    - type: container
      layout: row
      children:
        - type: text
          content: "Align Objects:"
          style: { font_size: 10 }

    - type: container
      layout: row
      style: { gap: 4, alignment: center }
      children:
        # Horizontal-axis alignment: left / horizontal-center / right.
        - type: container
          layout: row
          style: { gap: 2, flex: 1 }
          children:
            - id: align_left_button
              type: icon_button
              icon: align_left
              summary: "Align left"
              description: >
                ALIGN_LEFT_BUTTON. Move elements so their left
                edges coincide along the horizontal axis.
              style: { size: 20 }
            - id: align_horizontal_center_button
              type: icon_button
              icon: align_horizontal_center
              summary: "Align horizontal center"
              description: >
                ALIGN_HORIZONTAL_CENTER_BUTTON. Move elements so
                their horizontal centers coincide.
              style: { size: 20 }
            - id: align_right_button
              type: icon_button
              icon: align_right
              summary: "Align right"
              description: >
                ALIGN_RIGHT_BUTTON. Move elements so their right
                edges coincide along the horizontal axis.
              style: { size: 20 }
        # Vertical-axis alignment: top / vertical-center / bottom.
        - type: container
          layout: row
          style: { gap: 2, flex: 1 }
          children:
            - id: align_top_button
              type: icon_button
              icon: align_top
              summary: "Align top"
              description: >
                ALIGN_TOP_BUTTON. Move elements so their top
                edges coincide along the vertical axis.
              style: { size: 20 }
            - id: align_vertical_center_button
              type: icon_button
              icon: align_vertical_center
              summary: "Align vertical center"
              description: >
                ALIGN_VERTICAL_CENTER_BUTTON. Move elements so
                their vertical centers coincide.
              style: { size: 20 }
            - id: align_bottom_button
              type: icon_button
              icon: align_bottom
              summary: "Align bottom"
              description: >
                ALIGN_BOTTOM_BUTTON. Move elements so their
                bottom edges coincide along the vertical axis.
              style: { size: 20 }

    # ── Distribute Objects ───────────────────────────────────
    - type: container
      layout: row
      children:
        - type: text
          content: "Distribute Objects:"
          style: { font_size: 10 }

    - type: container
      layout: row
      style: { gap: 4, alignment: center }
      children:
        # Horizontal-axis distribution: left / horizontal-center / right.
        - type: container
          layout: row
          style: { gap: 2, flex: 1 }
          children:
            - id: distribute_left_button
              type: icon_button
              icon: distribute_left
              summary: "Distribute by left edge"
              description: >
                DISTRIBUTE_LEFT_BUTTON. Redistribute elements
                horizontally so the left coordinates of their
                bounding boxes are evenly spaced.
              style: { size: 20 }
            - id: distribute_horizontal_center_button
              type: icon_button
              icon: distribute_horizontal_center
              summary: "Distribute by horizontal center"
              description: >
                DISTRIBUTE_HORIZONTAL_CENTER_BUTTON. Redistribute
                elements horizontally so their horizontal centers
                are evenly spaced.
              style: { size: 20 }
            - id: distribute_right_button
              type: icon_button
              icon: distribute_right
              summary: "Distribute by right edge"
              description: >
                DISTRIBUTE_RIGHT_BUTTON. Redistribute elements
                horizontally so the right coordinates of their
                bounding boxes are evenly spaced.
              style: { size: 20 }
        # Vertical-axis distribution: top / vertical-center / bottom.
        - type: container
          layout: row
          style: { gap: 2, flex: 1 }
          children:
            - id: distribute_top_button
              type: icon_button
              icon: distribute_top
              summary: "Distribute by top edge"
              description: >
                DISTRIBUTE_TOP_BUTTON. Redistribute elements
                vertically so the top coordinates of their
                bounding boxes are evenly spaced.
              style: { size: 20 }
            - id: distribute_vertical_center_button
              type: icon_button
              icon: distribute_vertical_center
              summary: "Distribute by vertical center"
              description: >
                DISTRIBUTE_VERTICAL_CENTER_BUTTON. Redistribute
                elements vertically so their vertical centers
                are evenly spaced.
              style: { size: 20 }
            - id: distribute_bottom_button
              type: icon_button
              icon: distribute_bottom
              summary: "Distribute by bottom edge"
              description: >
                DISTRIBUTE_BOTTOM_BUTTON. Redistribute elements
                vertically so the bottom coordinates of their
                bounding boxes are evenly spaced.
              style: { size: 20 }

    # ── Distribute Spacing + Align To ────────────────────────
    - type: container
      layout: row
      style: { gap: 4, alignment: top }
      children:

        # Left half: Distribute Spacing.
        - type: container
          layout: column
          style: { gap: 4, flex: 1 }
          children:
            - type: container
              layout: row
              children:
                - type: text
                  content: "Distribute Spacing:"
                  style: { font_size: 10 }
            - type: container
              layout: row
              style: { gap: 2, alignment: center }
              children:
                - id: distribute_vertical_spacing_button
                  type: icon_button
                  icon: distribute_spacing_vertical
                  summary: "Distribute vertical spacing"
                  description: >
                    DISTRIBUTE_VERTICAL_SPACING_BUTTON. Move
                    elements vertically so gaps between them are
                    uniform.
                  style: { size: 20 }
                - id: distribute_horizontal_spacing_button
                  type: icon_button
                  icon: distribute_spacing_horizontal
                  summary: "Distribute horizontal spacing"
                  description: >
                    DISTRIBUTE_HORIZONTAL_SPACING_BUTTON. Move
                    elements horizontally so gaps between them
                    are uniform.
                  style: { size: 20 }
                - id: distribute_spacing_value
                  type: number_input
                  summary: "Explicit spacing"
                  description: >
                    DISTRIBUTE_SPACING_VALUE. Explicit gap in
                    points for Distribute Spacing when Align To
                    is Key Object and a key has been designated.
                    Range 0–1296 pt.
                  min: 0
                  max: 1296
                  style: { flex: 1 }
                  bind:
                    value: "panel.distribute_spacing_value"

        # Right half: Align To.
        - type: container
          layout: column
          style: { gap: 4, flex: 1 }
          children:
            - type: container
              layout: row
              children:
                - type: text
                  content: "Align To:"
                  style: { font_size: 10 }
            - type: container
              layout: row
              style: { gap: 2, alignment: center }
              children:
                - id: align_to_artboard_button
                  type: icon_button
                  icon: align_to_artboard
                  summary: "Align to artboard"
                  description: >
                    ALIGN_TO_ARTBOARD_BUTTON. Use the active
                    artboard rectangle as the reference for every
                    Align and Distribute operation.
                  style: { size: 20 }
                  bind:
                    checked: 'panel.align_to == "artboard"'
                  behavior:
                    - event: click
                      effects:
                        - set_panel_state: { key: align_to, value: '"artboard"' }
                        - set: { align_to: '"artboard"' }
                - id: align_to_selection_button
                  type: icon_button
                  icon: align_to_selection
                  summary: "Align to selection"
                  description: >
                    ALIGN_TO_SELECTION_BUTTON. Use the current
                    selection bounding box as the reference. This
                    is the default mode.
                  style: { size: 20 }
                  bind:
                    checked: 'panel.align_to == "selection"'
                  behavior:
                    - event: click
                      effects:
                        - set_panel_state: { key: align_to, value: '"selection"' }
                        - set: { align_to: '"selection"' }
                - id: align_to_key_object_button
                  type: icon_button
                  icon: align_to_key_object
                  summary: "Align to key object"
                  description: >
                    ALIGN_TO_KEY_OBJECT_BUTTON. Use a designated
                    element from the selection as the fixed
                    reference. The key is designated by clicking
                    an already-selected element on the canvas.
                  style: { size: 20 }
                  bind:
                    checked: 'panel.align_to == "key_object"'
                  behavior:
                    - event: click
                      effects:
                        - set_panel_state: { key: align_to, value: '"key_object"' }
                        - set: { align_to: '"key_object"' }
