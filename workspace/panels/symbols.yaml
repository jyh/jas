id: symbols_panel_content
type: panel
summary: "Symbols"
description: >
  Symbols panel — the document's library of reusable master definitions
  (SYMBOLS.md §8, P3 first slice). A symbol is an off-canvas master element
  stored in the document's master store; every place on the canvas that uses
  it is an instance (a lightweight reference that resolves to the master's
  geometry at paint time). Editing a master once updates every instance, so
  symbols are the document's mechanism for "draw once, reuse many".

  This first slice is a TEXT LIST modeled directly on the Artboards panel —
  a scrolling foreach over document-derived master data, one row per master,
  plus a small footer of actions. Thumbnails, rename, redefine-from-UI,
  duplicate, and drag-to-place are deferred to a later slice.

  === Row Layout ===

  Each row is laid out left to right as:

  SYMBOL_NAME — SYMBOL_USAGE_COUNT

  SYMBOL_NAME is the master's user-visible name (its common.name). Masters
  promoted from an already-named element keep that name; masters with no
  name fall back to a derived "Symbol N" label computed positionally by the
  view-builder, so every row always shows something readable. Click selects
  the row as the sole panel-selected master.

  SYMBOL_USAGE_COUNT is the number of live instances of that master in the
  document — the length of the master's reverse-dependency list (rdeps) in
  the dependency index. It is a derived, read-only value that updates
  whenever instances are placed, detached, or deleted. It doubles as the
  safe-delete signal: a non-zero count means deleting the master would leave
  instances empty (see Delete below).

  === Panel Selection ===

  Panel-selection is a single master id (or none). Clicking a row replaces
  the selection with that master. Clicking empty panel area (below the last
  row) is a no-op. The selection keys on the stable master id, so it
  survives list reordering and the placing or deleting of instances. The
  panel-selected master is the target of Place Instance and Delete.

  === Actions (footer) ===

  NEW_SYMBOL_BUTTON promotes the current canvas selection to a master:
  the selected element moves off-canvas into the master store and an
  instance of it is left in its place, so the canvas looks unchanged.
  Enabled only when exactly one whole canvas element is selected
  (active_document.selection_count == 1); a fresh master id and instance
  id are minted by the initiator and carried in the operation
  (value-in-op), never minted inside the shared core.

  PLACE_INSTANCE_BUTTON appends a new instance of the panel-selected
  master to the active layer and selects it. Enabled only when a master
  is panel-selected. A fresh instance id is minted by the initiator.

  DELETE_SYMBOL_BUTTON removes the panel-selected master from the master
  store. Enabled only when a master is panel-selected. It is
  reference-aware: when the master still has live instances
  (usage count > 0) it first opens a confirmation warning that says how
  many instances will be left empty; confirming deletes the master (the
  orphaned instances resolve to nothing until undone). When the master
  has no instances it deletes silently. Deleting a master never touches
  its instances — they are left in place and become recoverable via undo.

  === Deferrals (this slice) ===

  Thumbnail previews, inline rename, Redefine from the panel, Duplicate,
  drag-to-place onto the canvas, multi-select, and reordering are all
  deferred. Their underlying operations exist in the shared core but are
  not surfaced here yet.

state:
  selected_symbol:
    type: string
    default: null
    nullable: true
    description: "Id of the panel-selected master, or null when none is selected"

init:
  selected_symbol: "null"

menu:
  - label: "New Symbol"
    action: new_symbol
    enabled_when: "active_document.selection_count == 1"
    description: "Promote the single selected canvas element to a master"

  - label: "Place Instance"
    action: place_instance
    enabled_when: "panel.selected_symbol != null"
    description: "Place a new instance of the panel-selected master"

  - label: "Delete Symbol"
    action: delete_symbol_action
    enabled_when: "panel.selected_symbol != null"
    description: "Delete the panel-selected master (warns if it still has instances)"

  - separator

  - label: "Close Symbols"
    action: close_panel
    params: { panel: symbols }
    description: "Close the Symbols panel"

content:
  type: container
  id: sym_root
  layout: column
  style: { padding: 0, gap: 0 }
  children:

    # ── Row list ──────────────────────────────────────────────

    - id: sym_list
      type: container
      layout: column
      style: { flex: 1, overflow_y: auto, padding: 0, gap: 0 }
      foreach:
        source: "active_document.symbols"
        as: sym
      do:
        type: container
        layout: row
        style: { height: 24, padding: "0 6", gap: 4, alignment: center }
        bind:
          background: "if sym.id == panel.selected_symbol then '{{theme.colors.selection}}' else 'transparent'"
        children:

          # SYMBOL_NAME (col-10): click panel-selects this master
          - id: sym_name
            type: text
            content: "{{sym.name}}"
            style: { flex: 1, font_size: 11, color: "{{theme.colors.text}}", overflow: hidden, text_overflow: ellipsis, white_space: nowrap }
            behavior:
              - event: click
                action: symbols_panel_select
                params: { symbol_id: "sym.id" }

          # SYMBOL_USAGE_COUNT (col-1): derived instance count
          - id: sym_usage
            type: text
            content: "{{sym.usage_count}}"
            style: { width: 32, text_align: right, font_size: 11, color: "{{theme.colors.text_dim}}" }
            behavior:
              - event: click
                action: symbols_panel_select
                params: { symbol_id: "sym.id" }

    # ── Separator ─────────────────────────────────────────────

    - type: separator
      orientation: horizontal

    # ── Footer ────────────────────────────────────────────────

    - id: sym_footer
      type: container
      layout: row
      style: { padding: "4 6", gap: 4, alignment: center }
      children:

        # NEW_SYMBOL_BUTTON — exactly one whole element selected
        - id: sym_new
          type: icon_button
          icon: symbol_new
          summary: "New Symbol"
          description: "Promote the single selected canvas element to a master"
          style: { size: 16 }
          bind:
            disabled: "active_document.selection_count != 1"
          behavior:
            - event: click
              action: new_symbol

        # PLACE_INSTANCE_BUTTON — a master is panel-selected
        - id: sym_place
          type: icon_button
          icon: symbol_place
          summary: "Place Instance"
          description: "Place a new instance of the panel-selected master"
          style: { size: 16 }
          bind:
            disabled: "panel.selected_symbol == null"
          behavior:
            - event: click
              action: place_instance

        # DELETE_SYMBOL_BUTTON — a master is panel-selected
        - id: sym_delete
          type: icon_button
          icon: trash
          summary: "Delete Symbol"
          description: "Delete the panel-selected master (warns if it still has instances)"
          style: { size: 16 }
          bind:
            disabled: "panel.selected_symbol == null"
          behavior:
            - event: click
              action: delete_symbol_action
