id: boolean_panel_content
type: panel
summary: "Boolean"
description: >
  The Boolean panel performs boolean operations on the geometry of the
  current selection. Nine destructive operations and four compound-
  shape variants let the user combine overlapping paths into unified
  shapes or live (non-destructive) compound shapes.

  Layout (top to bottom):

  Row 1 — "Shape Modes:" label.
  Row 2 — four icon buttons (UNION, SUBTRACT_FRONT, INTERSECTION,
    EXCLUDE) on the left half; an "Expand" button on the right half
    that flattens the selected compound shape(s) to static paths.
  Row 3 — five icon buttons (DIVIDE, TRIM, MERGE, CROP,
    SUBTRACT_BACK). A sixth slot is reserved for OUTLINE, which is
    deferred until the planar-graph / DCEL primitive ships.

  Alt/Option-clicking UNION, SUBTRACT_FRONT, INTERSECTION, or EXCLUDE
  creates a live compound shape that re-evaluates when its operands
  are edited. A plain click applies the boolean destructively.

  Enable / disable rules:
  - Every operation button requires at least 2 selected elements.
  - The Expand button and Release / Expand Compound Shape menu items
    require the selection to contain at least one compound shape.
  - Repeat Boolean Operation enables only when last_operation is not
    null and the current selection satisfies that op's gate.

  See `transcripts/BOOLEAN.md` for the complete spec, operand and
  paint rules, Boolean Options dialog, and cross-language parity
  expectations.

state:
  last_operation:
    type: enum
    values: [
      null,
      union, subtract_front, intersection, exclude,
      divide, trim, merge, crop, subtract_back,
      union_compound, subtract_front_compound,
      intersection_compound, exclude_compound,
    ]
    default: null
    nullable: true
    description: >
      Most-recently-applied operation. Populated by each op action;
      consumed by "Repeat Boolean Operation". Mirrors
      state.last_boolean_op.

init:
  last_operation: "state.last_boolean_op"

menu:
  - label: "Repeat Boolean Operation"
    action: repeat_boolean_operation
  - label: "Boolean Options…"
    action: open_boolean_options
  - separator
  - label: "Make Compound Shape"
    action: make_compound_shape
  - label: "Release Compound Shape"
    action: release_compound_shape
  - label: "Expand Compound Shape"
    action: expand_compound_shape
  - separator
  - label: "Reset Panel"
    action: reset_boolean_panel
  - separator
  - label: "Close Boolean"
    action: close_panel

content:
  type: container
  id: boolean_content
  layout: column
  style: { padding: 4, gap: 6 }
  children:

    # ── Shape Modes ──────────────────────────────────────────
    - type: container
      layout: row
      children:
        - type: text
          content: "Shape Modes:"
          style: { font_size: 10 }

    - type: container
      layout: row
      style: { gap: 2, alignment: center }
      children:
        - id: boolean_union_button
          type: icon_button
          icon: boolean_union
          summary: "Union"
          description: >
            UNION_BUTTON. Merge all selected elements into a single
            element taking the union of their geometries. Result
            carries the frontmost operand's paint. Alt/Option+click
            creates a live compound shape instead.
          style: { size: 20 }
          bind:
            disabled: "active_document.selection_count < 2"
          behavior:
            - event: click
              condition: "not event.alt"
              effects:
                - dispatch: boolean_union
            - event: click
              condition: "event.alt"
              effects:
                - dispatch: boolean_union_compound
        - id: boolean_subtract_front_button
          type: icon_button
          icon: boolean_subtract_front
          summary: "Subtract Front"
          description: >
            SUBTRACT_FRONT_BUTTON. Subtract the frontmost element
            from all others in the selection. The frontmost is
            consumed; remaining elements keep their own paint.
            Alt/Option+click creates a live compound shape instead.
          style: { size: 20 }
          bind:
            disabled: "active_document.selection_count < 2"
          behavior:
            - event: click
              condition: "not event.alt"
              effects:
                - dispatch: boolean_subtract_front
            - event: click
              condition: "event.alt"
              effects:
                - dispatch: boolean_subtract_front_compound
        - id: boolean_intersection_button
          type: icon_button
          icon: boolean_intersection
          summary: "Intersection"
          description: >
            INTERSECTION_BUTTON. Keep only the region covered by
            every selected element. Result carries the frontmost
            operand's paint. Alt/Option+click creates a live
            compound shape instead.
          style: { size: 20 }
          bind:
            disabled: "active_document.selection_count < 2"
          behavior:
            - event: click
              condition: "not event.alt"
              effects:
                - dispatch: boolean_intersection
            - event: click
              condition: "event.alt"
              effects:
                - dispatch: boolean_intersection_compound
        - id: boolean_exclude_button
          type: icon_button
          icon: boolean_exclude
          summary: "Exclude"
          description: >
            EXCLUDE_BUTTON. Keep the region covered by exactly one
            selected element (symmetric difference). Result carries
            the frontmost operand's paint. Alt/Option+click creates
            a live compound shape instead.
          style: { size: 20 }
          bind:
            disabled: "active_document.selection_count < 2"
          behavior:
            - event: click
              condition: "not event.alt"
              effects:
                - dispatch: boolean_exclude
            - event: click
              condition: "event.alt"
              effects:
                - dispatch: boolean_exclude_compound
        - id: boolean_expand_button
          type: icon_button
          icon: boolean_expand
          summary: "Expand"
          description: >
            EXPAND_BUTTON. Flatten every selected compound shape
            into static Polygon elements derived from its evaluated
            geometry. The compound shape's paint is carried to each
            expanded polygon; the operand tree is discarded. Enabled
            only when the selection contains at least one compound
            shape.
          style: { size: 20, flex: 2 }
          bind:
            disabled: "not active_document.selection_has_compound_shape"
          behavior:
            - event: click
              effects:
                - dispatch: expand_compound_shape

    # ── Pathfinders ──────────────────────────────────────────
    - type: container
      layout: row
      children:
        - type: text
          content: "Pathfinders:"
          style: { font_size: 10 }

    - type: container
      layout: row
      style: { gap: 2, alignment: center }
      children:
        - id: boolean_divide_button
          type: icon_button
          icon: boolean_divide
          summary: "Divide"
          description: >
            DIVIDE_BUTTON. Cut the elements apart so none overlap.
            Each fragment inherits the paint of the frontmost
            original element that covered it.
          style: { size: 20 }
          bind:
            disabled: "active_document.selection_count < 2"
          behavior:
            - event: click
              effects:
                - dispatch: boolean_divide
        - id: boolean_trim_button
          type: icon_button
          icon: boolean_trim
          summary: "Trim"
          description: >
            TRIM_BUTTON. Remove parts of elements that are hidden
            behind other elements. Each survivor keeps its own paint.
          style: { size: 20 }
          bind:
            disabled: "active_document.selection_count < 2"
          behavior:
            - event: click
              effects:
                - dispatch: boolean_trim
        - id: boolean_merge_button
          type: icon_button
          icon: boolean_merge
          summary: "Merge"
          description: >
            MERGE_BUTTON. TRIM first, then union any touching
            survivors whose fills are exactly equal.
          style: { size: 20 }
          bind:
            disabled: "active_document.selection_count < 2"
          behavior:
            - event: click
              effects:
                - dispatch: boolean_merge
        - id: boolean_crop_button
          type: icon_button
          icon: boolean_crop
          summary: "Crop"
          description: >
            CROP_BUTTON. Use the frontmost element as a mask and
            crop all others to its interior. The mask is consumed;
            each cropped survivor keeps its own paint.
          style: { size: 20 }
          bind:
            disabled: "active_document.selection_count < 2"
          behavior:
            - event: click
              effects:
                - dispatch: boolean_crop
        - id: boolean_subtract_back_button
          type: icon_button
          icon: boolean_subtract_back
          summary: "Subtract Back"
          description: >
            SUBTRACT_BACK_BUTTON. Subtract the backmost element
            from all others. The backmost is consumed; remaining
            elements keep their own paint.
          style: { size: 20 }
          bind:
            disabled: "active_document.selection_count < 2"
          behavior:
            - event: click
              effects:
                - dispatch: boolean_subtract_back
        # Reserved slot for OUTLINE (deferred).
        - type: spacer
          style: { size: 20 }
