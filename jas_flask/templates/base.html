<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ ws.app.name }} — {% block title %}{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
  <style>
    :root {
      {% for name, val in ws.theme.colors.items() %}
      --jas-{{ name | replace('_', '-') }}: {{ val }};
      {% endfor %}
    }
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100vh;
      background: var(--jas-window-bg, #2e2e2e);
      color: var(--jas-text, #cccccc);
      font-family: {{ ws.theme.fonts.default.family }};
      font-size: {{ ws.theme.fonts.default.size }}px;
    }
    .navbar { min-height: 28px; }
    .navbar .nav-link { font-size: 12px; padding: 2px 10px; }
    .dropdown-menu { font-size: 12px; background: #444; border-color: #555; }
    .dropdown-item { color: #ccc; }
    .dropdown-item:hover { background: #555; color: #fff; }
    .dropdown-divider { border-color: #555; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  {{ menubar_html | safe }}
  {% block body %}{% endblock %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
