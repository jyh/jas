<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <title>{{ ws.app.name }} — {% block title %}{% endblock %}</title>
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon.png') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
  <style>
    :root {
      {% for name, val in ws.theme.colors.items() %}
      --jas-{{ name | replace('_', '-') }}: {{ val }};
      {% endfor %}
      {% for name, font in ws.theme.fonts.items() %}
      --jas-font-{{ name }}-family: {{ font.family }};
      --jas-font-{{ name }}-size: {{ font.size }}px;
      {% if font.weight is defined %}--jas-font-{{ name }}-weight: {{ font.weight }};{% endif %}
      {% endfor %}
      {% for name, val in ws.theme.sizes.items() %}
      --jas-size-{{ name | replace('_', '-') }}: {{ val }}px;
      {% endfor %}
    }
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100vh;
      background: var(--jas-window-bg, #2e2e2e);
      color: var(--jas-text, #cccccc);
      font-family: var(--jas-font-default-family, sans-serif);
      font-size: var(--jas-font-default-size, 12px);
    }
    .navbar { min-height: 28px; }
    .navbar .nav-link { font-size: 12px; padding: 2px 10px; color: var(--jas-text, #ccc); }
    .navbar .nav-link:hover { color: var(--jas-title-bar-text, #fff); }
    .dropdown-menu { font-size: 12px; background: var(--jas-pane-bg, #444); border-color: var(--jas-border, #555); }
    .dropdown-item { color: var(--jas-text, #ccc); }
    .dropdown-item:hover { background: var(--jas-button-checked, #555); color: var(--jas-title-bar-text, #fff); }
    .dropdown-divider { border-color: var(--jas-border, #555); }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  {{ menubar_html | safe }}
  {% block body %}{% endblock %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
