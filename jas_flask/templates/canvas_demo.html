<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Canvas Demo — jas_flask</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #2b2b2b;
      color: #ccc;
    }
    header {
      padding: 8px 16px;
      background: #1e1e1e;
      border-bottom: 1px solid #444;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    header h1 { font-size: 14px; font-weight: normal; margin: 0; }
    header .status { font-size: 12px; color: #888; margin-left: auto; }
    #tool-bar { display: flex; gap: 6px; }
    #tool-bar button {
      background: #444; border: 1px solid #555; color: #ccc;
      padding: 4px 10px; font-size: 12px; border-radius: 3px;
      cursor: pointer;
    }
    #tool-bar button.active { background: #4a90d9; border-color: #4a90d9; color: #fff; }
    #canvas-container {
      position: relative;
      width: 100vw;
      height: calc(100vh - 40px);
      overflow: hidden;
      background: #3a3a3a;
    }
    #canvas-viewport {
      position: absolute;
      inset: 0;
      transform-origin: 0 0;
    }
    #canvas-viewport svg {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }
    /* Pasteboard color shows through where no artboard covers it. The
       per-artboard fill / fade overlay is drawn by the JS engine. */
    #canvas-container { background: #cfcfcf; }
    #artboard-fill-layer,
    #artboard-deco-layer,
    #selection-layer,
    #overlay-layer { pointer-events: none; }
    .tool-label {
      display: inline-block;
      padding: 2px 8px;
      background: #444;
      border-radius: 3px;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Canvas Demo</h1>
    <div id="tool-bar"></div>
    <span class="status" id="status">loading…</span>
  </header>

  <div id="canvas-container">
    <div id="canvas-viewport">
      <svg id="artboard-fill-layer" viewBox="0 0 800 600"></svg>
      <svg id="doc-layer" viewBox="0 0 800 600"></svg>
      <svg id="artboard-deco-layer" viewBox="0 0 800 600"></svg>
      <svg id="selection-layer" viewBox="0 0 800 600"></svg>
      <svg id="overlay-layer" viewBox="0 0 800 600"></svg>
    </div>
  </div>

  <script type="module">
    import { Model } from "{{ url_for('static', filename='js/engine/model.mjs') }}";
    import { StateStore } from "{{ url_for('static', filename='js/engine/store.mjs') }}";
    import {
      registerTools, dispatchEvent
    } from "{{ url_for('static', filename='js/engine/tools.mjs') }}";
    import {
      mkLayer, mkRect, mkCircle, mkEllipse,
    } from "{{ url_for('static', filename='js/engine/document.mjs') }}";
    import {
      renderDocumentLayer, renderSelectionLayer, renderOverlayLayer,
      renderArtboardFillLayer, renderArtboardDecorationLayer,
    } from "{{ url_for('static', filename='js/engine/canvas.mjs') }}";
    import { Scope } from "{{ url_for('static', filename='js/engine/scope.mjs') }}";

    const status = document.getElementById("status");
    const artboardFillLayer = document.getElementById("artboard-fill-layer");
    const docLayer = document.getElementById("doc-layer");
    const artboardDecoLayer = document.getElementById("artboard-deco-layer");
    const selLayer = document.getElementById("selection-layer");
    const overlayLayer = document.getElementById("overlay-layer");
    const CANVAS_VIEWBOX = { x: 0, y: 0, width: 800, height: 600 };

    status.textContent = "loading workspace.json…";
    const ws = await fetch("/api/workspace").then((r) => r.json());
    status.textContent = `loaded tools=${Object.keys(ws.tools || {}).join(",")}`;

    // Seed a document with a few colorful shapes so there's something
    // to click.
    const doc = {
      layers: [mkLayer({
        name: "Layer 1",
        children: [
          mkRect({ x: 80, y: 80, width: 160, height: 100, fill: "#4a90d9" }),
          mkCircle({ cx: 400, cy: 200, r: 60, fill: "#d94a4a" }),
          mkEllipse({ cx: 600, cy: 380, rx: 80, ry: 50, fill: "#4ad94a" }),
          mkRect({ x: 120, y: 340, width: 200, height: 120, fill: "#d9d94a" }),
        ],
      })],
      selection: [],
      artboards: [
        // Letter-sized artboard centered roughly in the 800×600 view,
        // shrunk to fit. Defines a printable region; the gray pasteboard
        // shows around it once fade is on.
        {
          id: "demo0001",
          name: "Artboard 1",
          x: 60, y: 40,
          width: 480, height: 520,
          fill: "#ffffff",
          show_center_mark: false,
          show_cross_hairs: false,
          show_video_safe_areas: false,
          video_ruler_pixel_aspect_ratio: 1.0,
        },
      ],
      artboard_options: {
        fade_region_outside_artboard: true,
        update_while_dragging: true,
      },
    };
    const model = new Model(doc);
    const store = new StateStore();
    registerTools(ws.tools, store);

    // Build the tool bar from workspace.tools. Each tool becomes a
    // button labelled with its menu_label (fallback to id); the
    // active tool is highlighted. Clicking switches tools and fires
    // on_leave / on_enter handlers.
    let activeTool = "selection";
    const toolBar = document.getElementById("tool-bar");
    const buttons = new Map();

    function buildToolBar() {
      toolBar.innerHTML = "";
      for (const id of Object.keys(ws.tools || {})) {
        const spec = ws.tools[id];
        const btn = document.createElement("button");
        btn.textContent = spec.menu_label || id;
        btn.title = spec.shortcut ? `${spec.menu_label || id} (${spec.shortcut})` : (spec.menu_label || id);
        btn.addEventListener("click", () => switchTool(id));
        toolBar.appendChild(btn);
        buttons.set(id, btn);
      }
      refreshToolBar();
    }
    function refreshToolBar() {
      for (const [id, btn] of buttons.entries()) {
        btn.classList.toggle("active", id === activeTool);
      }
    }
    function switchTool(id) {
      if (id === activeTool) return;
      dispatchEvent(activeTool, { type: "leave" }, store, { model });
      activeTool = id;
      dispatchEvent(activeTool, { type: "enter" }, store, { model });
      refreshToolBar();
      render();
    }
    buildToolBar();

    function render() {
      artboardFillLayer.innerHTML = renderArtboardFillLayer(model.document);
      docLayer.innerHTML = renderDocumentLayer(model.document);
      artboardDecoLayer.innerHTML = renderArtboardDecorationLayer(
        model.document,
        { viewBox: CANVAS_VIEWBOX, panelSelectedIds: [] },
      );
      selLayer.innerHTML = renderSelectionLayer(model.document);
      const scope = new Scope({
        state: store.state, panel: store.panel, tool: store.tool,
      });
      overlayLayer.innerHTML = renderOverlayLayer(ws.tools[activeTool], scope);
    }
    model.addListener(render);
    store.addListener(render);
    render();

    // Event wiring — translate DOM events into the dispatchEvent shape.
    const container = document.getElementById("canvas-container");

    function eventCoords(domEvent) {
      const rect = container.getBoundingClientRect();
      return {
        client_x: domEvent.clientX,
        client_y: domEvent.clientY,
        x: domEvent.clientX - rect.left,
        y: domEvent.clientY - rect.top,
      };
    }

    function modifiers(domEvent) {
      return {
        shift: !!domEvent.shiftKey,
        ctrl: !!domEvent.ctrlKey,
        alt: !!domEvent.altKey,
        meta: !!domEvent.metaKey,
      };
    }

    container.addEventListener("mousedown", (e) => {
      dispatchEvent(activeTool, {
        type: "mousedown",
        ...eventCoords(e),
        button: e.button,
        modifiers: modifiers(e),
      }, store, { model });
    });
    container.addEventListener("mousemove", (e) => {
      dispatchEvent(activeTool, {
        type: "mousemove",
        ...eventCoords(e),
        modifiers: modifiers(e),
      }, store, { model });
    });
    container.addEventListener("mouseup", (e) => {
      dispatchEvent(activeTool, {
        type: "mouseup",
        ...eventCoords(e),
        button: e.button,
        modifiers: modifiers(e),
      }, store, { model });
    });
    window.addEventListener("keydown", (e) => {
      dispatchEvent(activeTool, {
        type: "keydown",
        key: e.key,
        modifiers: modifiers(e),
      }, store, { model });
    });

    // Suppress the browser's default context menu so right-click is
    // free to become a tool event later.
    container.addEventListener("contextmenu", (e) => e.preventDefault());

    // Tiny DOM-level niceness — show tool mode in the status line.
    const origListener = store.addListener((path) => {
      if (path === "tool.selection.mode") {
        status.textContent = `tool.selection.mode = ${store.get(path)}`;
      }
    });

    // Expose handles for browser-console experimentation.
    window._jas = { model, store, render };
  </script>
</body>
</html>
