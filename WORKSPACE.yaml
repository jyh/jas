  lasso:
    viewbox: "0 0 28 28"
    svg: >
      <path d="M14,5 C6,5 3,10 3,14 C3,20 8,24 14,22 C20,20 22,16 20,12 C18,8 12,9 12,13 C12,16 16,17 17,15"
        fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>

  eyedropper:
    viewbox: "0 0 16 16"
    svg: >
      <path d="M13.3,1.3c0.9,0.9,0.9,2.3,0,3.2l-1.1,1.1L10.4,3.8l1.1-1.1
        C12.4,1.8,12.4,1.8,13.3,1.3z M9.7,4.5l1.8,1.8L5.8,12
        c-0.3,0.3-0.7,0.5-1.1,0.5L3,13l0.5-1.7c0.1-0.4,0.2-0.8,0.5-1.1
        L9.7,4.5z" fill="none" stroke="currentColor" stroke-width="1.2"
        stroke-linecap="round" stroke-linejoin="round"/>

  close:
    viewbox: "0 0 16 16"
    svg: >
      <line x1="3" y1="3" x2="13" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="13" y1="3" x2="3" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>

  chevron_right:
    viewbox: "0 0 16 16"
    svg: >
      <path d="M3,3 L8,8 L3,13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M9,3 L14,8 L9,13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  chevron_left:
    viewbox: "0 0 16 16"
    svg: >
      <path d="M13,3 L8,8 L13,13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M7,3 L2,8 L7,13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  chevron_down:
    viewbox: "0 0 16 16"
    svg: >
      <path d="M3,6 L8,11 L13,6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  hamburger:
    viewbox: "0 0 16 16"
    svg: >
      <line x1="2" y1="4" x2="14" y2="4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="2" y1="8" x2="14" y2="8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="2" y1="12" x2="14" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>

  maximize:
    viewbox: "0 0 16 16"
    svg: >
      <rect x="2" y="2" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5" rx="1"/>
      <line x1="2" y1="5" x2="14" y2="5" stroke="currentColor" stroke-width="1.5"/>

  swap_arrows:
    viewbox: "0 0 16 16"
    svg: >
      <path d="M2,6 L8,2 L8,4 L14,4 L14,8 L8,8 L8,10 Z" fill="currentColor" transform="rotate(45,8,8)"/>

  default_colors:
    viewbox: "0 0 16 16"
    svg: >
      <rect x="4" y="4" width="8" height="8" fill="#fff" stroke="#999" stroke-width="1"/>
      <rect x="1" y="1" width="8" height="8" fill="none" stroke="#000" stroke-width="2"/>

  color_none:
    viewbox: "0 0 16 16"
    svg: >
      <rect x="1" y="1" width="14" height="14" fill="#fff" stroke="#888" stroke-width="1"/>
      <line x1="1" y1="15" x2="15" y2="1" stroke="red" stroke-width="1.5"/>

# ═══════════════════════════════════════════════════════════════
# Reactive state
# ═══════════════════════════════════════════════════════════════
state:
  active_tool:
    type: enum
    values: [selection, direct_selection, group_selection,
             pen, add_anchor, delete_anchor, anchor_point,
             pencil, path_eraser, smooth,
             type, type_on_path,
             line, rect, rounded_rect, polygon, star, lasso]
    default: selection
    description: "Currently selected drawing tool"

  fill_color:
    type: color
    default: "#ffffff"
    nullable: true
    description: "Active fill color (null = no fill)"

  stroke_color:
    type: color
    default: "#000000"
    nullable: true
    description: "Active stroke color (null = no stroke)"

  stroke_width:
    type: number
    default: 1.0
    description: "Active stroke width in points"

  fill_on_top:
    type: bool
    default: true
    description: "Whether the fill swatch renders in front of the stroke swatch"

  toolbar_visible:
    type: bool
    default: true
    description: "Whether the toolbar pane is visible"

  canvas_visible:
    type: bool
    default: true
    description: "Whether the canvas pane is visible"

  dock_visible:
    type: bool
    default: true
    description: "Whether the dock panel pane is visible"

  canvas_maximized:
    type: bool
    default: false
    description: "Whether the canvas fills the viewport"

  dock_collapsed:
    type: bool
    default: false
    description: "Whether the dock is in collapsed (chevron-only) state"

  active_tab:
    type: number
    default: -1
    description: "Index of the active document tab (-1 = none)"

  tab_count:
    type: number
    default: 0
    description: "Number of open document tabs"

  dock_group0_active:
    type: number
    default: 0
    description: "Active panel index in dock group 0"

  dock_group0_collapsed:
    type: bool
    default: false
    description: "Whether dock group 0 (Layers) is collapsed"

  dock_group1_active:
    type: number
    default: 0
    description: "Active panel index in dock group 1"

  dock_group1_collapsed:
    type: bool
    default: false
    description: "Whether dock group 1 (Color/Stroke/Properties) is collapsed"

# ═══════════════════════════════════════════════════════════════
# Actions
# ═══════════════════════════════════════════════════════════════
actions:
  # ── File ──────────────────────────────────────────────────
  new_document:
    description: "Create a new untitled document in a new tab"
    category: file
    effects:
      # Set active tab and increment count first so create_child
      # deepResolve sees the correct values
      - set: { active_tab: "{{state.tab_count}}" }
      # Create the tab button (with close x) in the tab bar
      - create_child:
          parent: canvas_tab_bar
          element:
            id: "canvas_tab_{{state.tab_count}}"
            type: container
            layout: row
            style: { padding: "2 4 2 8", font_size: 11, gap: 4, alignment: center, background: "#4a4a4a", border: "1px solid #666" }
            behavior:
              - event: click
                effects:
                  - set: { active_tab: "{{state.tab_count}}" }
            bind:
              active: "{{state.active_tab}} == {{state.tab_count}}"
            children:
              - type: text
                content: "Untitled-{{state.tab_count}}"
              - type: icon_button
                icon: "close"
                summary: "Close tab"
                style: { size: 12 }
                behavior:
                  - event: click
                    stop_propagation: true
                    effects:
                      - remove_child: "canvas_tab_{{state.tab_count}}"
                      - remove_child: "canvas_surface_{{state.tab_count}}"
      # Create the canvas in the drawing surface
      - create_child:
          parent: drawing_surface
          element:
            id: "canvas_surface_{{state.tab_count}}"
            type: canvas
            summary: "Drawing surface"
            tier: 3
            style: { flex: 1, background: "#ffffff" }
            bind:
              visible: "{{state.active_tab}} == {{state.tab_count}}"
      # Increment tab count after creation so the frozen index is correct
      - increment: { key: tab_count, by: 1 }
  open_file:
    description: "Show Open dialog, load an SVG file into a new tab (or focus existing tab)"
    category: file
    effects:
      - log: "open_file: show native file dialog"
  save:
    description: "Save active document; if untitled, fall through to save_as"
    category: file
    effects:
      - if:
          condition: "not model.has_filename"
          then:
            - dispatch: save_as
          else:
            - log: "save: write to {{model.filename}}"
  save_as:
    description: "Show Save As dialog for the active document"
    category: file
    effects:
      - log: "save_as: show native save dialog"
  revert:
    description: "Reload the active document from disk, discarding unsaved changes"
    category: file
    enabled_when: "model.is_modified and model.has_filename"
    effects:
      - log: "revert: reload {{model.filename}}"
  quit:
    description: "Close the application; prompt to save any modified documents"
    category: file
    effects:
      - if:
          condition: "model.any_modified"
          then:
            - open_dialog: { id: save_changes_window }
          else:
            - log: "quit: close window"

  # ── Edit ──────────────────────────────────────────────────
  undo:
    description: "Undo the last editing operation on the active document"
    category: edit
    tier: 3
    effects:
      - log: "undo"
  redo:
    description: "Redo the last undone operation"
    category: edit
    tier: 3
    effects:
      - log: "redo"
  cut:
    description: "Copy selection to clipboard as SVG, then delete it"
    category: edit
    tier: 3
    effects:
      - dispatch: copy
      - dispatch: delete_selection
  copy:
    description: "Copy selection to clipboard as SVG"
    category: edit
    tier: 3
    effects:
      - log: "copy: selection to clipboard"
  paste:
    description: "Paste from clipboard with a 24pt offset"
    category: edit
    tier: 3
    effects:
      - log: "paste: offset 24pt"
  paste_in_place:
    description: "Paste from clipboard at the original position"
    category: edit
    tier: 3
    effects:
      - log: "paste_in_place: offset 0"
  select_all:
    description: "Select all objects in the active document"
    category: edit
    tier: 3
    effects:
      - log: "select_all"
  delete_selection:
    description: "Delete the selected objects"
    category: edit
    tier: 3
    effects:
      - log: "delete_selection"

  # ── Object ────────────────────────────────────────────────
  group:
    description: "Group selected sibling elements into a single Group"
    category: object
    tier: 3
    effects:
      - log: "group"
  ungroup:
    description: "Ungroup selected Group elements, replacing each with its children"
    category: object
    tier: 3
    effects:
      - log: "ungroup"
  ungroup_all:
    description: "Recursively ungroup all unlocked Group elements"
    category: object
    tier: 3
    effects:
      - log: "ungroup_all"
  lock:
    description: "Lock selected elements to prevent editing"
    category: object
    tier: 3
    effects:
      - log: "lock"
  unlock_all:
    description: "Unlock all locked elements in the document"
    category: object
    tier: 3
    effects:
      - log: "unlock_all"
  hide_selection:
    description: "Hide selected elements from the canvas"
    category: object
    tier: 3
    effects:
      - log: "hide_selection"
  show_all:
    description: "Show all hidden elements"
    category: object
    tier: 3
    effects:
      - log: "show_all"

  # ── View ──────────────────────────────────────────────────
  zoom_in:
    description: "Zoom the canvas in"
    category: view
    tier: 3
    effects:
      - log: "zoom_in"
  zoom_out:
    description: "Zoom the canvas out"
    category: view
    tier: 3
    effects:
      - log: "zoom_out"
  fit_in_window:
    description: "Fit all content within the viewport"
    category: view
    tier: 3
    effects:
      - log: "fit_in_window"

  # ── Tool ──────────────────────────────────────────────────
  select_tool:
    description: "Switch the active drawing tool"
    category: tool
    params:
      tool: { type: state_ref, ref: "active_tool" }
    effects:
      - set: { active_tool: "{{param.tool}}" }

  # ── Fill / Stroke ─────────────────────────────────────────
  swap_fill_stroke:
    description: "Swap fill and stroke colors"
    category: fill_stroke
    effects:
      - swap: [fill_color, stroke_color]
  reset_fill_stroke:
    description: "Reset to default white fill and 1pt black stroke"
    category: fill_stroke
    effects:
      - set: { fill_color: "#ffffff", stroke_color: "#000000", stroke_width: 1.0, fill_on_top: true }
  toggle_fill_on_top:
    description: "Toggle whether fill or stroke swatch is in front"
    category: fill_stroke
    effects:
      - toggle: fill_on_top
  set_fill_none:
    description: "Set the fill color to none"
    category: fill_stroke
    effects:
      - set: { fill_color: null }
  set_stroke_none:
    description: "Set the stroke color to none"
    category: fill_stroke
    effects:
      - set: { stroke_color: null }
  open_color_picker:
    description: "Open the color picker dialog for fill or stroke"
    category: fill_stroke
    params:
      target: { type: enum, values: [fill, stroke] }
    effects:
      - open_dialog: { id: color_picker, params: { target: "{{param.target}}" } }

  # ── Window / Layout ──────────────────────────────────────
  toggle_pane:
    description: "Show or hide a pane"
    category: window
    params:
      pane: { type: enum, values: [toolbar, canvas, dock] }
    effects:
      - toggle: "{{param.pane}}_visible"
  toggle_panel:
    description: "Show or hide a dock panel"
    category: window
    params:
      panel: { type: enum, values: [layers, color, stroke, properties] }
    effects:
      - log: "toggle_panel: {{param.panel}}"
  toggle_canvas_maximize:
    description: "Toggle canvas between maximized and normal layout"
    category: window
    effects:
      - toggle: canvas_maximized
  toggle_dock_collapse:
    description: "Collapse or expand the dock panel"
    category: window
    effects:
      - toggle: dock_collapsed
  tile_panes:
    description: "Arrange all visible panes in a tiled grid"
    category: window
    effects:
      - tile: { container: main }

  # ── Workspace ─────────────────────────────────────────────
  save_workspace_as:
    description: "Save the current pane layout under a new name"
    category: workspace
    effects:
      - open_dialog: { id: workspace_save_as }
  reset_workspace:
    description: "Reset pane layout to factory defaults"
    category: workspace
    effects:
      - reset_layout: { container: main }
  revert_workspace:
    description: "Revert pane layout to last saved version"
    category: workspace
    enabled_when: "workspace.has_saved_layout"
    effects:
      - log: "revert_workspace"
  switch_workspace:
    description: "Switch to a named workspace layout"
    category: workspace
    params:
      name: { type: string }
    effects:
      - log: "switch_workspace: {{param.name}}"

  # ── Tab ───────────────────────────────────────────────────
  close_tab:
    description: "Close a document tab (prompt to save if modified)"
    category: tab
    params:
      index: { type: number }
    effects:
      - if:
          condition: "model.is_modified"
          then:
            - open_dialog: { id: save_changes_tab, params: { filename: "{{model.filename}}" } }
          else:
            - dispatch: { action: remove_tab, params: { index: "{{param.index}}" } }
  remove_tab:
    description: "Remove a tab without prompting"
    category: tab
    params:
      index: { type: number }
    effects:
      - log: "remove_tab: {{param.index}}"

  # ── Panel ─────────────────────────────────────────────────
  close_panel:
    description: "Close the panel that owns this menu"
    category: panel
    effects:
      - log: "close_panel"

  # ── Dialog ────────────────────────────────────────────────
  dismiss_dialog:
    description: "Dismiss the current modal dialog"
    category: dialog
    effects:
      - close_dialog: null
  close_without_saving:
    description: "Close the tab/window without saving"
    category: dialog
    effects:
      - close_dialog: null
      - log: "close_without_saving"
  save_and_close:
    description: "Save the active document then close the tab"
    category: dialog
    effects:
      - dispatch: save
      - close_dialog: null
      - log: "save_and_close"
  save_all_and_close:
    description: "Save all modified documents then close the window"
    category: dialog
    effects:
      - log: "save_all_and_close"
      - close_dialog: null

# ═══════════════════════════════════════════════════════════════
# Keyboard shortcuts
# ═══════════════════════════════════════════════════════════════
shortcuts:
  # File
  - { key: "Ctrl+N",       action: new_document }
  - { key: "Ctrl+O",       action: open_file }
  - { key: "Ctrl+S",       action: save }
  - { key: "Ctrl+Shift+S", action: save_as }
  - { key: "Ctrl+Q",       action: quit }
  # Edit
  - { key: "Ctrl+Z",       action: undo }
  - { key: "Ctrl+Shift+Z", action: redo }
  - { key: "Ctrl+X",       action: cut }
  - { key: "Ctrl+C",       action: copy }
  - { key: "Ctrl+V",       action: paste }
  - { key: "Ctrl+Shift+V", action: paste_in_place }
  - { key: "Ctrl+A",       action: select_all }
  - { key: "Delete",       action: delete_selection }
  - { key: "Backspace",    action: delete_selection }
  # Object
  - { key: "Ctrl+G",       action: group }
  - { key: "Ctrl+Shift+G", action: ungroup }
  - { key: "Ctrl+2",       action: lock }
  - { key: "Ctrl+Alt+2",   action: unlock_all }
  - { key: "Ctrl+3",       action: hide_selection }
  - { key: "Ctrl+Alt+3",   action: show_all }
  # View
  - { key: "Ctrl+=",       action: zoom_in }
  - { key: "Ctrl+-",       action: zoom_out }
  - { key: "Ctrl+0",       action: fit_in_window }
  # Tools
  - { key: "V",            action: select_tool,      params: { tool: selection } }
  - { key: "A",            action: select_tool,      params: { tool: direct_selection } }
  - { key: "P",            action: select_tool,      params: { tool: pen } }
  - { key: "=",            action: select_tool,      params: { tool: add_anchor } }
  - { key: "-",            action: select_tool,      params: { tool: delete_anchor } }
  - { key: "T",            action: select_tool,      params: { tool: type } }
  - { key: "\\",           action: select_tool,      params: { tool: line } }
  - { key: "M",            action: select_tool,      params: { tool: rect } }
  - { key: "Shift+E",      action: select_tool,      params: { tool: path_eraser } }
  - { key: "Q",            action: select_tool,      params: { tool: lasso } }
  # Fill / Stroke
  - { key: "D",            action: reset_fill_stroke }
  - { key: "X",            action: toggle_fill_on_top }
  - { key: "Shift+X",      action: swap_fill_stroke }

# ═══════════════════════════════════════════════════════════════
# Menubar
# ═══════════════════════════════════════════════════════════════
menubar:
  - id: file_menu
    label: "&File"
    items:
      - { id: menu_new,      label: "&New",         action: new_document,  shortcut: "Ctrl+N" }
      - { id: menu_open,     label: "&Open...",     action: open_file,     shortcut: "Ctrl+O" }
      - { id: menu_save,     label: "&Save",        action: save,          shortcut: "Ctrl+S" }
      - { id: menu_save_as,  label: "Save &As...",  action: save_as,       shortcut: "Ctrl+Shift+S" }
      - { id: menu_revert,   label: "&Revert",      action: revert,
          enabled_when: "model.is_modified and model.has_filename" }
      - separator
      - { id: menu_quit,     label: "&Quit",        action: quit,          shortcut: "Ctrl+Q" }

  - id: edit_menu
    label: "&Edit"
    items:
      - { id: menu_undo,           label: "&Undo",           action: undo,           shortcut: "Ctrl+Z" }
      - { id: menu_redo,           label: "&Redo",           action: redo,           shortcut: "Ctrl+Shift+Z" }
      - separator
      - { id: menu_cut,            label: "Cu&t",            action: cut,            shortcut: "Ctrl+X" }
      - { id: menu_copy,           label: "&Copy",           action: copy,           shortcut: "Ctrl+C" }
      - { id: menu_paste,          label: "&Paste",          action: paste,          shortcut: "Ctrl+V" }
      - { id: menu_paste_in_place, label: "Paste in &Place", action: paste_in_place, shortcut: "Ctrl+Shift+V" }
      - separator
      - { id: menu_select_all,     label: "Select &All",     action: select_all,     shortcut: "Ctrl+A" }

  - id: object_menu
    label: "&Object"
    items:
      - { id: menu_group,       label: "&Group",       action: group,       shortcut: "Ctrl+G" }
      - { id: menu_ungroup,     label: "&Ungroup",     action: ungroup,     shortcut: "Ctrl+Shift+G" }
      - { id: menu_ungroup_all, label: "Ungroup A&ll", action: ungroup_all }
      - separator
      - { id: menu_lock,        label: "&Lock",        action: lock,        shortcut: "Ctrl+2" }
      - { id: menu_unlock_all,  label: "Unlock &All",  action: unlock_all,  shortcut: "Ctrl+Alt+2" }
      - separator
      - { id: menu_hide,        label: "&Hide",        action: hide_selection,  shortcut: "Ctrl+3" }
      - { id: menu_show_all,    label: "&Show All",    action: show_all,        shortcut: "Ctrl+Alt+3" }

  - id: view_menu
    label: "&View"
    items:
      - { id: menu_zoom_in,  label: "Zoom &In",       action: zoom_in,       shortcut: "Ctrl+=" }
      - { id: menu_zoom_out, label: "Zoom &Out",      action: zoom_out,      shortcut: "Ctrl+-" }
      - { id: menu_fit,      label: "&Fit in Window",  action: fit_in_window, shortcut: "Ctrl+0" }

  - id: window_menu
    label: "&Window"
    items:
      - id: menu_workspace
        label: "Workspace"
        type: submenu
        dynamic: true
        description: >
          Lists saved workspace layouts with a checkmark on the active one.
          Includes Save As, Reset to Default, and Revert to Saved commands.
        items:
          - { id: menu_ws_save_as,  label: "Save As...",       action: save_workspace_as }
          - separator
          - { id: menu_ws_reset,    label: "Reset to Default", action: reset_workspace }
          - { id: menu_ws_revert,   label: "Revert to Saved",  action: revert_workspace,
              enabled_when: "workspace.has_saved_layout" }
      - separator
      - { id: menu_tile,       label: "Tile",        action: tile_panes }
      - separator
      - { id: menu_toolbar,    label: "Toolbar",     action: toggle_pane,  params: { pane: toolbar } }
      - { id: menu_panels,     label: "Panels",      action: toggle_pane,  params: { pane: dock } }
      - separator
      - { id: menu_layers,     label: "&Layers",     action: toggle_panel, params: { panel: layers } }
      - { id: menu_color,      label: "&Color",      action: toggle_panel, params: { panel: color } }
      - { id: menu_stroke,     label: "&Stroke",     action: toggle_panel, params: { panel: stroke } }
      - { id: menu_properties, label: "&Properties",  action: toggle_panel, params: { panel: properties } }

# ═══════════════════════════════════════════════════════════════
# Layout
# ═══════════════════════════════════════════════════════════════
layout:
  id: main
  type: pane_system
  summary: "Main workspace"
  description: >
    Three draggable, resizable panes with edge-snapping. Panes can be
    reordered in z-order by clicking. The canvas pane can be maximized
    to fill the viewport, causing toolbar and dock to float on top.
  style:
    background: "{{theme.colors.window_bg}}"
  behavior:
    # Pane title bar drag protocol
    - event: drag_start
      description: "Begin dragging a pane by its title bar"
      effects:
        - cursor: grabbing
        - set: { _drag_pane: "{{event.target_id}}", _drag_offset_x: "{{event.offset_x}}", _drag_offset_y: "{{event.offset_y}}" }
    - event: drag_move
      description: "Move pane to follow cursor, snap to edges within snap_distance"
      effects:
        - set_style:
            target: "{{state._drag_pane}}"
            left: "{{event.client_x - state._drag_offset_x}}"
            top: "{{event.client_y - state._drag_offset_y}}"
    - event: drag_end
      description: "Drop the pane; apply snap alignment if within threshold"
      effects:
        - cursor: grab
        - set: { _drag_pane: null }
    # Edge resize protocol
    - event: drag_start
      condition: "event.target_class == 'jas-edge-handle'"
      description: "Begin resizing a pane by its edge handle"
      effects:
        - cursor: "{{event.resize_cursor}}"
        - set: { _resize_pane: "{{event.target_id}}", _resize_edge: "{{event.edge}}", _resize_start_x: "{{event.client_x}}", _resize_start_y: "{{event.client_y}}" }
    - event: drag_move
      condition: "state._resize_pane != null"
      description: "Resize the pane edge, respecting min/max constraints"
    - event: drag_end
      condition: "state._resize_pane != null"
      effects:
        - cursor: default
        - set: { _resize_pane: null }
  children:

    # ─── Toolbar pane ───────────────────────────────────────
    - id: toolbar_pane
      type: pane
      summary: "Toolbar"
      description: >
        Vertical toolbar containing drawing tool icons in a 2-column
        grid, followed by a fill/stroke color indicator widget.
      default_position: { x: 0, y: 0, width: 72, height: 900 }
      min_width: 72
      max_width: 72
      fixed_width: true
      style:
        background: "{{theme.colors.pane_bg}}"
        border: "1px solid {{theme.colors.border}}"
      bind:
        visible: "{{state.toolbar_visible}}"
      title_bar:
        label: "Tools"
        draggable: true
        buttons:
          - id: toolbar_close_btn
            type: icon_button
            summary: "Close toolbar"
            icon: "close"
            style: { size: 14 }
            behavior:
              - event: click
                action: toggle_pane
                params: { pane: toolbar }
      content:
        type: container
        layout: column
        style:
          padding: "4 2 4 2"
        children:

          # Tool button grid
          - id: tool_grid
            type: grid
            summary: "Tool buttons"
            description: >
              4-row, 2-column grid of 32x32px tool buttons. Single click
              selects the tool. Buttons with a small triangle indicator have
              alternate tools accessible via long-press (250ms hold).
            cols: 2
            gap: 2
            children:

              # Row 0, Col 0: Selection
              - id: btn_selection
                type: icon_button
                summary: "Selection (V)"
                description: "Black arrow cursor for selecting and moving objects"
                icon: "selection_arrow"
                grid: { row: 0, col: 0 }
                style:
                  size: "{{theme.sizes.tool_button}}"
                  checked_bg: "{{theme.colors.button_checked}}"
                  hover: { background: "{{theme.colors.button_checked}}" }
                behavior:
                  - event: click
                    action: select_tool
                    params: { tool: selection }
                bind:
                  checked: "{{state.active_tool}} == selection"

              # Row 0, Col 1: Arrow slot (Direct Selection / Group Selection)
              - id: btn_arrow_slot
                type: icon_button
                summary: "Direct Selection (A)"
                description: "White arrow for selecting individual anchor points and segments"
                icon: "direct_selection_arrow"
                grid: { row: 0, col: 1 }
                style:
                  size: "{{theme.sizes.tool_button}}"
                  checked_bg: "{{theme.colors.button_checked}}"
                  hover: { background: "{{theme.colors.button_checked}}" }
                behavior:
                  - event: mouse_down
                    effects:
                      - start_timer:
                          id: "long_press_btn_arrow_slot"
                          delay_ms: 250
                          effects:
                            - open_dialog: { id: arrow_alternates }
                  - event: mouse_up
                    effects:
                      - cancel_timer: "long_press_btn_arrow_slot"
                  - event: click
                    action: select_tool
                    params: { tool: direct_selection }
                bind:
                  checked: "{{state.active_tool}} in [direct_selection, group_selection]"
                alternates:
                  menu_id: arrow_alternates
                  items:
                    - id: direct_selection
                      label: "Direct Selection"
                      icon: "direct_selection_arrow"
                      description: "Select and move individual anchor points and path segments"
                    - id: group_selection
                      label: "Group Selection"
                      icon: "group_selection_arrow"
                      description: "Select objects within groups without ungrouping"

              # Row 1, Col 0: Pen slot
              - id: btn_pen_slot
                type: icon_button
                summary: "Pen (P)"
                description: "Draw precise paths by placing anchor points with bezier handles"
                icon: "pen"
                grid: { row: 1, col: 0 }
                style:
                  size: "{{theme.sizes.tool_button}}"
                  checked_bg: "{{theme.colors.button_checked}}"
                  hover: { background: "{{theme.colors.button_checked}}" }
                behavior:
                  - event: mouse_down
                    effects:
                      - start_timer:
                          id: "long_press_btn_pen_slot"
                          delay_ms: 250
                          effects:
                            - open_dialog: { id: pen_alternates }
                  - event: mouse_up
                    effects:
                      - cancel_timer: "long_press_btn_pen_slot"
                  - event: click
                    action: select_tool
                    params: { tool: pen }
                bind:
                  checked: "{{state.active_tool}} in [pen, add_anchor, delete_anchor, anchor_point]"
                alternates:
                  menu_id: pen_alternates
                  items:
                    - { id: pen,            label: "Pen",                 icon: "pen",
                        description: "Draw paths by clicking to place anchor points" }
                    - { id: add_anchor,     label: "Add Anchor Point",    icon: "add_anchor",
                        description: "Add anchor points to an existing path" }
                    - { id: delete_anchor,  label: "Delete Anchor Point", icon: "delete_anchor",
                        description: "Remove anchor points from a path" }
                    - { id: anchor_point,   label: "Anchor Point",        icon: "anchor_point",
                        description: "Convert anchor points between smooth and corner" }

              # Row 1, Col 1: Pencil slot
              - id: btn_pencil_slot
                type: icon_button
                summary: "Pencil (N)"
                description: "Freehand drawing tool"
                icon: "pencil"
                grid: { row: 1, col: 1 }
                style:
                  size: "{{theme.sizes.tool_button}}"
                  checked_bg: "{{theme.colors.button_checked}}"
                  hover: { background: "{{theme.colors.button_checked}}" }
                behavior:
                  - event: mouse_down
                    effects:
                      - start_timer:
                          id: "long_press_btn_pencil_slot"
                          delay_ms: 250
                          effects:
                            - open_dialog: { id: pencil_alternates }
                  - event: mouse_up
                    effects:
                      - cancel_timer: "long_press_btn_pencil_slot"
                  - event: click
                    action: select_tool
                    params: { tool: pencil }
                bind:
                  checked: "{{state.active_tool}} in [pencil, path_eraser, smooth]"
                alternates:
                  menu_id: pencil_alternates
                  items:
                    - { id: pencil,      label: "Pencil",      icon: "pencil",
                        description: "Draw freehand paths" }
                    - { id: path_eraser, label: "Path Eraser",  icon: "path_eraser",
                        description: "Erase portions of paths" }
                    - { id: smooth,      label: "Smooth",       icon: "smooth",
                        description: "Smooth rough path segments" }

              # Row 2, Col 0: Text slot
              - id: btn_text_slot
                type: icon_button
                summary: "Type (T)"
                description: "Create and edit text objects"
                icon: "type"
                grid: { row: 2, col: 0 }
                style:
                  size: "{{theme.sizes.tool_button}}"
                  checked_bg: "{{theme.colors.button_checked}}"
                  hover: { background: "{{theme.colors.button_checked}}" }
                behavior:
                  - event: mouse_down
                    effects:
                      - start_timer:
                          id: "long_press_btn_text_slot"
                          delay_ms: 250
                          effects:
                            - open_dialog: { id: text_alternates }
                  - event: mouse_up
                    effects:
                      - cancel_timer: "long_press_btn_text_slot"
                  - event: click
                    action: select_tool
                    params: { tool: type }
                bind:
                  checked: "{{state.active_tool}} in [type, type_on_path]"
                alternates:
                  menu_id: text_alternates
                  items:
                    - { id: type,         label: "Type",            icon: "type",
                        description: "Create and edit text" }
                    - { id: type_on_path, label: "Type on a Path",  icon: "type_on_path",
                        description: "Place text along a path curve" }

              # Row 2, Col 1: Line
              - id: btn_line
                type: icon_button
                summary: "Line (\\)"
                description: "Draw straight line segments"
                icon: "line"
                grid: { row: 2, col: 1 }
                style:
                  size: "{{theme.sizes.tool_button}}"
                  checked_bg: "{{theme.colors.button_checked}}"
                  hover: { background: "{{theme.colors.button_checked}}" }
                behavior:
                  - event: click
                    action: select_tool
                    params: { tool: line }
                bind:
                  checked: "{{state.active_tool}} == line"

              # Row 3, Col 0: Shape slot
              - id: btn_shape_slot
                type: icon_button
                summary: "Rectangle (M)"
                description: "Draw rectangular shapes"
                icon: "rect"
                grid: { row: 3, col: 0 }
                style:
                  size: "{{theme.sizes.tool_button}}"
                  checked_bg: "{{theme.colors.button_checked}}"
                  hover: { background: "{{theme.colors.button_checked}}" }
                behavior:
                  - event: mouse_down
                    effects:
                      - start_timer:
                          id: "long_press_btn_shape_slot"
                          delay_ms: 250
                          effects:
                            - open_dialog: { id: shape_alternates }
                  - event: mouse_up
                    effects:
                      - cancel_timer: "long_press_btn_shape_slot"
                  - event: click
                    action: select_tool
                    params: { tool: rect }
                bind:
                  checked: "{{state.active_tool}} in [rect, rounded_rect, polygon, star]"
                alternates:
                  menu_id: shape_alternates
                  items:
                    - { id: rect,         label: "Rectangle",         icon: "rect",
                        description: "Draw rectangles and squares" }
                    - { id: rounded_rect, label: "Rounded Rectangle", icon: "rounded_rect",
                        description: "Draw rectangles with rounded corners" }
                    - { id: polygon,      label: "Polygon",           icon: "polygon",
                        description: "Draw regular polygons" }
                    - { id: star,         label: "Star",              icon: "star",
                        description: "Draw star shapes" }

              # Row 3, Col 1: Lasso
              - id: btn_lasso
                type: icon_button
                summary: "Lasso (Q)"
                description: "Freehand selection of objects by drawing a lasso boundary"
                icon: "lasso"
                grid: { row: 3, col: 1 }
                style:
                  size: "{{theme.sizes.tool_button}}"
                  checked_bg: "{{theme.colors.button_checked}}"
                  hover: { background: "{{theme.colors.button_checked}}" }
                behavior:
                  - event: click
                    action: select_tool
                    params: { tool: lasso }
                bind:
                  checked: "{{state.active_tool}} == lasso"

          - type: spacer
            style: { height: 8 }

          # Fill / Stroke widget
          - id: fill_stroke_widget
            type: container
            summary: "Fill & Stroke"
            description: >
              Two overlapping color swatches showing the active fill and stroke
              colors. Click a swatch to bring it to front. Double-click to open
              the color picker. Swap arrow (top-right) exchanges colors. Default
              button (bottom-left, D key) resets to white fill / 1pt black stroke.
              None button removes color from the front swatch.
            layout: column
            style:
              alignment: center
              width: 56
              height: 76
            children:

              - id: fill_swatch
                type: color_swatch
                summary: "Fill color"
                description: "28x28 filled square showing the active fill color"
                style: { size: 28, position: { x: 0, y: 0 } }
                bind:
                  color: "{{state.fill_color}}"
                  z_index: "{{state.fill_on_top}} == true ? 2 : 1"
                behavior:
                  - event: click
                    effects:
                      - set: { fill_on_top: true }
                    description: "Bring fill swatch to front"
                  - event: double_click
                    action: open_color_picker
                    params: { target: fill }

              - id: stroke_swatch
                type: color_swatch
                summary: "Stroke color"
                description: "28x28 hollow square with 6px colored border and white center"
                hollow: true
                style: { size: 28, position: { x: 10, y: 10 } }
                bind:
                  color: "{{state.stroke_color}}"
                  z_index: "{{state.fill_on_top}} == true ? 1 : 2"
                behavior:
                  - event: click
                    effects:
                      - set: { fill_on_top: false }
                    description: "Bring stroke swatch to front"
                  - event: double_click
                    action: open_color_picker
                    params: { target: stroke }

              - id: swap_btn
                type: icon_button
                summary: "Swap (Shift+X)"
                description: "Double-headed arrow; swaps fill and stroke colors"
                icon: "swap_arrows"
                style: { size: 12, position: { x: 44, y: 0 } }
                behavior:
                  - event: click
                    action: swap_fill_stroke

              - id: default_btn
                type: icon_button
                summary: "Default (D)"
                description: "Resets fill to white and stroke to 1pt black"
                icon: "default_colors"
                style: { size: 14, position: { x: 0, y: 42 } }
                behavior:
                  - event: click
                    action: reset_fill_stroke

              - id: none_btn
                type: icon_button
                summary: "None"
                description: >
                  Sets the front swatch color to none. If fill is on top,
                  removes fill; otherwise removes stroke.
                icon: "color_none"
                style: { size: 14, position: { x: 38, y: 62 } }
                behavior:
                  - event: click
                    action: set_fill_none
                    condition: "{{state.fill_on_top}}"
                  - event: click
                    action: set_stroke_none
                    condition: "not {{state.fill_on_top}}"

          - type: spacer

    # ─── Canvas pane ────────────────────────────────────────
    - id: canvas_pane
      type: pane
      summary: "Canvas"
      description: >
        Central drawing area with a multi-tab bar. Each tab represents
        an open document. The tab label shows the filename (with * if
        modified). Supports zoom and scroll. Can be maximized to fill
        the viewport.
      default_position: { x: 72, y: 0, width: 888, height: 900 }
      min_width: 200
      flex: true
      style:
        background: "{{theme.colors.window_bg}}"
        border: "1px solid {{theme.colors.border}}"
      bind:
        visible: "{{state.canvas_visible}}"
      title_bar:
        label: "Canvas"
        draggable: true
        buttons:
          - id: maximize_btn
            type: icon_button
            summary: "Maximize"
            icon: "maximize"
            style: { size: 14 }
            behavior:
              - event: click
                action: toggle_canvas_maximize
          - id: canvas_close_btn
            type: icon_button
            summary: "Close canvas"
            icon: "close"
            style: { size: 14 }
            behavior:
              - event: click
                action: toggle_pane
                params: { pane: canvas }
      content:
        type: container
        layout: column
        style: { flex: 1 }
        children:

          # Tab bar (populated dynamically by new_document)
          - id: canvas_tab_bar
            type: container
            summary: "Document tabs"
            description: >
              Horizontal row of tab buttons. Populated dynamically
              when documents are opened via new_document/open_file.
            layout: row
            style:
              background: "{{theme.colors.pane_bg_dark}}"
              min_height: 24
              gap: 0
              alignment: center
            bind:
              visible: "{{state.tab_count}} != 0"
            children: []

          # Drawing surface area (canvases added dynamically)
          - id: drawing_surface
            type: container
            summary: "Drawing surface"
            description: >
              Container for document canvases. Each open document gets a
              canvas here. Starts empty; populated by new_document/open_file.
            layout: column
            style:
              flex: 1
              min_height: 200
              background: "{{theme.colors.window_bg}}"
            children: []

    # ─── Dock panel pane ────────────────────────────────────
    - id: dock_pane
      type: pane
      summary: "Panels"
      description: >
        Right-side dock containing panel groups. Each group has a tab
        bar selecting the active panel. The dock can collapse to a 36px
        chevron strip. Panels and groups can be reordered by drag-and-drop.
      default_position: { x: 960, y: 0, width: 240, height: 900 }
      min_width: 150
      max_width: 500
      collapsed_width: 36
      style:
        background: "{{theme.colors.pane_bg}}"
        border: "1px solid {{theme.colors.border}}"
      bind:
        visible: "{{state.dock_visible}}"
        collapsed: "{{state.dock_collapsed}}"
      title_bar:
        label: "Panels"
        draggable: true
        buttons:
          - id: dock_collapse_btn
            type: icon_button
            summary: "Collapse/Expand dock"
            icon: "chevron_right"
            style: { size: 14 }
            behavior:
              - event: click
                action: toggle_dock_collapse
            bind:
              icon: "{{state.dock_collapsed}} == true ? chevron_left : chevron_right"
          - id: dock_close_btn
            type: icon_button
            summary: "Close panels"
            icon: "close"
            style: { size: 14 }
            behavior:
              - event: click
                action: toggle_pane
                params: { pane: dock }
      behavior:
        - event: drop
          description: >
            Panels can be dragged between groups. Groups can be reordered
            within the dock via drag-and-drop.
      content:
        type: container
        layout: column
        children:

          # Group 0: Layers
          - id: dock_group_0
            type: container
            summary: "Layers group"
            description: "Panel group containing the Layers panel, with collapse chevron and hamburger"
            layout: column
            children:
              - id: dock_group_0_header
                type: container
                layout: row
                style:
                  background: "{{theme.colors.pane_bg_dark}}"
                  padding: "2 4"
                  gap: 2
                  alignment: center
                children:
                  - id: dock_group_0_tab_layers
                    type: button
                    label: "Layers"
                    summary: "Layers tab"
                    style: { padding: "1 6", font_size: 11 }
                    behavior:
                      - event: click
                        effects:
                          - set: { dock_group0_active: 0 }
                    bind:
                      active: "{{state.dock_group0_active}} == 0"
                  - type: spacer
                  - id: dock_group_0_chevron
                    type: icon_button
                    summary: "Collapse/Expand group"
                    icon: "chevron_right"
                    style: { size: 14 }
                    behavior:
                      - event: click
                        effects:
                          - toggle: dock_group0_collapsed
                    bind:
                      icon: "{{state.dock_group0_collapsed}} == true ? chevron_left : chevron_right"
                  - id: dock_group_0_hamburger
                    type: dropdown
                    summary: "Panel menu"
                    icon: "hamburger"
                    style: { size: 14 }
                    items:
                      - { label: "Close Layers", action: close_panel }
                    bind:
                      visible: "not {{state.dock_group0_collapsed}}"

              - id: dock_group_0_body
                type: container
                summary: "Layers panel body"
                layout: column
                bind:
                  visible: "not {{state.dock_group0_collapsed}}"
                children:
                  - type: placeholder
                    summary: "Layer list"
                    description: "Will contain the layer hierarchy tree with visibility and lock toggles"

          - type: separator

          # Group 1: Color, Stroke, Properties
          - id: dock_group_1
            type: container
            summary: "Properties group"
            description: "Panel group with Color, Stroke, and Properties tabs, with collapse chevron and hamburger"
            layout: column
            children:
              - id: dock_group_1_header
                type: container
                layout: row
                style:
                  background: "{{theme.colors.pane_bg_dark}}"
                  padding: "2 4"
                  gap: 2
                  alignment: center
                children:
                  - id: dock_group_1_tab_color
                    type: button
                    label: "Color"
                    summary: "Color tab"
                    style: { padding: "1 6", font_size: 11 }
                    behavior:
                      - event: click
                        effects:
                          - set: { dock_group1_active: 0 }
                    bind:
                      active: "{{state.dock_group1_active}} == 0"
                  - id: dock_group_1_tab_stroke
                    type: button
                    label: "Stroke"
                    summary: "Stroke tab"
                    style: { padding: "1 6", font_size: 11 }
                    behavior:
                      - event: click
                        effects:
                          - set: { dock_group1_active: 1 }
                    bind:
                      active: "{{state.dock_group1_active}} == 1"
                  - id: dock_group_1_tab_properties
                    type: button
                    label: "Properties"
                    summary: "Properties tab"
                    style: { padding: "1 6", font_size: 11 }
                    behavior:
                      - event: click
                        effects:
                          - set: { dock_group1_active: 2 }
                    bind:
                      active: "{{state.dock_group1_active}} == 2"
                  - type: spacer
                  - id: dock_group_1_chevron
                    type: icon_button
                    summary: "Collapse/Expand group"
                    icon: "chevron_right"
                    style: { size: 14 }
                    behavior:
                      - event: click
                        effects:
                          - toggle: dock_group1_collapsed
                    bind:
                      icon: "{{state.dock_group1_collapsed}} == true ? chevron_left : chevron_right"
                  - id: dock_group_1_hamburger
                    type: dropdown
                    summary: "Panel menu"
                    icon: "hamburger"
                    style: { size: 14 }
                    items:
                      - { label: "Close Color", action: close_panel }
                      - { label: "Close Stroke", action: close_panel }
                      - { label: "Close Properties", action: close_panel }
                    bind:
                      visible: "not {{state.dock_group1_collapsed}}"

              - id: dock_group_1_body
                type: container
                summary: "Active panel body"
                layout: column
                style: { flex: 1 }
                bind:
                  visible: "not {{state.dock_group1_collapsed}}"
                children:
                  - id: color_panel_content
                    type: placeholder
                    summary: "Color picker"
                    description: "Will contain color wheel, RGB/HSB sliders, and hex input"
                    bind:
                      visible: "{{state.dock_group1_active}} == 0"
                  - id: stroke_panel_content
                    type: placeholder
                    summary: "Stroke properties"
                    description: "Will contain width, cap, join, dash, and arrowhead controls"
                    bind:
                      visible: "{{state.dock_group1_active}} == 1"
                  - id: properties_panel_content
                    type: placeholder
                    summary: "Object properties"
                    description: "Will contain position, size, rotation, opacity, and blend mode fields"
                    bind:
                      visible: "{{state.dock_group1_active}} == 2"

# ═══════════════════════════════════════════════════════════════
# Dialogs
# ═══════════════════════════════════════════════════════════════
dialogs:

  color_picker:
    summary: "Select Color"
    description: >
      Modal color picker dialog matching the Illustrator-style layout.
      Left column: 180x180 saturation/brightness gradient + 20x180 hue
      colorbar + web-safe checkbox. Center column: HSB fields with radio
      selectors + color preview swatch, RGB fields, CMYK fields, hex field.
      Right column: OK, Cancel, Color Swatches buttons.
    modal: true
    params:
      target: { type: enum, values: [fill, stroke] }
    content:
      type: container
      layout: column
      style: { gap: 12, padding: 16, min_width: 480 }
      children:

        # Title row
        - type: container
          layout: row
          style: { gap: 8, alignment: center }
          children:
            - { type: text, content: "Select Color:" }
            - id: cp_eyedropper
              type: icon_button
              summary: "Eyedropper"
              description: "Click to sample a color from the canvas"
              icon: "eyedropper"
              style: { size: 18 }
              behavior:
                - event: click
                  effects:
                    - log: "eyedropper: activate color sampling"

        # Main layout: left (gradient) + center (fields) + right (buttons)
        - type: container
          layout: row
          style: { gap: 12 }
          children:

            # Left column: gradient + colorbar + web-safe
            # Stretches to match the full height of the fields column
            - type: container
              layout: column
              style: { gap: 4 }
              children:
                # Gradient + colorbar row (fills available height)
                - type: container
                  layout: row
                  style: { gap: 4, flex: 1 }
                  children:
                    # 2D saturation/brightness gradient (square, fills height)
                    - id: cp_gradient
                      type: placeholder
                      summary: "Color gradient"
                      description: >
                        Square 2D gradient filling the available height.
                        Horizontal axis = saturation (white to hue color).
                        Vertical axis = brightness (transparent to black).
                        Circle indicator shows current position. Drag to
                        change S and B.
                      style: { aspect_ratio: 1, min_width: 180, min_height: 180 }
                    # Vertical hue colorbar (fills height)
                    - id: cp_colorbar
                      type: placeholder
                      summary: "Hue bar"
                      description: >
                        64px wide vertical bar with rainbow hue gradient
                        (red-yellow-green-cyan-blue-magenta-red). Triangle
                        sliders on left and right indicate current position.
                        Drag to change the selected radio channel.
                      style: { width: 64, flex: 1, min_height: 100 }
                # Web-safe checkbox (below both gradient and colorbar)
                - id: cp_web_only
                  type: toggle
                  label: "Only Web Colors"
                  summary: "Web-safe color snap"
                  description: "Snap all color values to the web-safe palette (0, 51, 102, 153, 204, 255)"

            # Fields + buttons column
            - type: container
              layout: column
              style: { gap: 4 }
              children:

                # Top section: swatch + HSB | OK/Cancel/Swatches
                - type: container
                  layout: row
                  style: { gap: 12 }
                  children:
                    # Swatch + HSB
                    - type: container
                      layout: column
                      style: { gap: 4 }
                      children:
                        - id: cp_preview
                          type: color_swatch
                          summary: "Preview"
                          description: "50x50px swatch showing the currently selected color in real time"
                          style: { size: 50 }
                          bind:
                            color: "{{state.fill_color}}"
                        - type: container
                          layout: row
                          style: { gap: 4, alignment: center }
                          children:
                            - { type: radio_group, id: cp_radio_h, options: [{id: h, label: ""}], bind: "cp_radio" }
                            - { type: text, content: "H:" }
                            - { type: number_input, id: cp_h, style: { width: 45 }, min: 0, max: 360 }
                            - { type: text, content: "\u00b0" }
                        - type: container
                          layout: row
                          style: { gap: 4, alignment: center }
                          children:
                            - { type: radio_group, id: cp_radio_s, options: [{id: s, label: ""}], bind: "cp_radio" }
                            - { type: text, content: "S:" }
                            - { type: number_input, id: cp_s, style: { width: 45 }, min: 0, max: 100 }
                            - { type: text, content: "%" }
                        - type: container
                          layout: row
                          style: { gap: 4, alignment: center }
                          children:
                            - { type: radio_group, id: cp_radio_b, options: [{id: b, label: ""}], bind: "cp_radio" }
                            - { type: text, content: "B:" }
                            - { type: number_input, id: cp_b, style: { width: 45 }, min: 0, max: 100 }
                            - { type: text, content: "%" }
                    # OK / Cancel / Swatches
                    - type: container
                      layout: column
                      style: { gap: 6 }
                      children:
                        - { type: button, label: "OK", action: dismiss_dialog, variant: primary,
                            style: { padding: "6 20" } }
                        - { type: button, label: "Cancel", action: dismiss_dialog,
                            style: { padding: "6 20" } }
                        - { type: button, label: "Color Swatches",
                            style: { padding: "6 20", opacity: 0.5 } }

                # Separator
                - { type: separator }

                # Bottom section: RGB + hex | CMYK
                - type: container
                  layout: row
                  style: { gap: 16 }
                  children:
                    # RGB + hex
                    - type: container
                      layout: column
                      style: { gap: 4 }
                      children:
                        - type: container
                          layout: row
                          style: { gap: 4, alignment: center }
                          children:
                            - { type: radio_group, id: cp_radio_r, options: [{id: r, label: ""}], bind: "cp_radio" }
                            - { type: text, content: "R:" }
                            - { type: number_input, id: cp_r, style: { width: 45 }, min: 0, max: 255 }
                        - type: container
                          layout: row
                          style: { gap: 4, alignment: center }
                          children:
                            - { type: radio_group, id: cp_radio_g, options: [{id: g, label: ""}], bind: "cp_radio" }
                            - { type: text, content: "G:" }
                            - { type: number_input, id: cp_g, style: { width: 45 }, min: 0, max: 255 }
                        - type: container
                          layout: row
                          style: { gap: 4, alignment: center }
                          children:
                            - { type: radio_group, id: cp_radio_bl, options: [{id: bl, label: ""}], bind: "cp_radio" }
                            - { type: text, content: "B:" }
                            - { type: number_input, id: cp_bl, style: { width: 45 }, min: 0, max: 255 }
                        - type: container
                          layout: row
                          style: { gap: 4, alignment: center, margin: "4 0 0 0" }
                          children:
                            - { type: text, content: "#" }
                            - { type: text_input, id: cp_hex, placeholder: "000000", style: { width: 60 } }
                    # CMYK
                    - type: container
                      layout: column
                      style: { gap: 4 }
                      children:
                        - type: container
                          layout: row
                          style: { gap: 2, alignment: center }
                          children:
                            - { type: text, content: "C:" }
                            - { type: number_input, id: cp_c, style: { width: 40 }, min: 0, max: 100 }
                            - { type: text, content: "%" }
                        - type: container
                          layout: row
                          style: { gap: 2, alignment: center }
                          children:
                            - { type: text, content: "M:" }
                            - { type: number_input, id: cp_m, style: { width: 40 }, min: 0, max: 100 }
                            - { type: text, content: "%" }
                        - type: container
                          layout: row
                          style: { gap: 2, alignment: center }
                          children:
                            - { type: text, content: "Y:" }
                            - { type: number_input, id: cp_y, style: { width: 40 }, min: 0, max: 100 }
                            - { type: text, content: "%" }
                        - type: container
                          layout: row
                          style: { gap: 2, alignment: center }
                          children:
                            - { type: text, content: "K:" }
                            - { type: number_input, id: cp_k, style: { width: 40 }, min: 0, max: 100 }
                            - { type: text, content: "%" }

  save_changes_tab:
    summary: "Save Changes"
    description: >
      Confirmation dialog shown when closing a tab with unsaved changes.
      Three options: Save the document, Discard changes, or Cancel.
    modal: true
    params:
      filename: { type: string }
    content:
      type: container
      layout: column
      style: { gap: 12, padding: 16 }
      children:
        - { type: text, content: "Save changes to \"{{param.filename}}\"?" }
        - type: row
          style: { justify: end, gap: 8 }
          children:
            - { type: button, label: "Cancel",  action: dismiss_dialog }
            - { type: button, label: "Discard", action: close_without_saving }
            - { type: button, label: "Save",    action: save_and_close, variant: primary }

  save_changes_window:
    summary: "Save All Changes"
    description: >
      Confirmation dialog shown when closing the window with one or more
      modified documents. Four options: Save All, Save (active only),
      Don't Save, Cancel.
    modal: true
    content:
      type: container
      layout: column
      style: { gap: 12, padding: 16 }
      children:
        - { type: text, content: "You have unsaved changes. Save before closing?" }
        - type: row
          style: { justify: end, gap: 8 }
          children:
            - { type: button, label: "Cancel",     action: dismiss_dialog }
            - { type: button, label: "Don't Save", action: close_without_saving }
            - { type: button, label: "Save",       action: save_and_close }
            - { type: button, label: "Save All",   action: save_all_and_close, variant: primary }

  workspace_save_as:
    summary: "Save Workspace As"
    description: >
      Text input dialog for naming a workspace layout. Warns if the name
      "Workspace" is used (reserved system name) or if overwriting an
      existing layout.
    modal: true
    content:
      type: container
      layout: column
      style: { gap: 12, padding: 16 }
      children:
        - { type: text, content: "Workspace name:" }
        - id: ws_name_input
          type: text_input
          placeholder: "My Layout"
          bind: "workspace_name"
        - type: row
          style: { justify: end, gap: 8 }
          children:
            - { type: button, label: "Cancel", action: dismiss_dialog }
            - { type: button, label: "Save",   action: save_workspace_as, variant: primary }
