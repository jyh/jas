[pytest]
# Both the app tests (jas/) and the shared reference-interpreter tests
# (workspace_interpreter/) must run. CI invokes them explicitly, but a bare
# `pytest` from the repo root previously discovered only what the current
# working directory happened to reach — which is how ~700 reference tests
# went ungated. Pin both roots so no directory is silently omitted.
testpaths = jas workspace_interpreter
