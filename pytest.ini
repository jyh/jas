[pytest]
# A bare `pytest` from the repo root gates the LIVE Python surface: the shared
# reference interpreter (workspace_interpreter/), which is blocking in CI.
# The jas/ Qt app suite is pinned to the `five-port-parity` tag (POLICY.md §1)
# and runs in its own CI canary lane from a checkout of that tag — it is
# deliberately NOT in the default discovery path, so main-branch runs never
# mix live and frozen expectations. To run it locally: `cd jas && pytest`.
testpaths = workspace_interpreter
