name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  workspace-json-fresh:
    name: workspace.json up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install PyYAML
      - run: bash scripts/check_workspace_json.sh
      - run: python scripts/check_menu_structure.py
      - run: python scripts/check_toolbar_structure.py
      - run: python scripts/check_action_refs.py
      - run: bash scripts/check_panel_goldens.sh
      - run: python scripts/check_path_b_exclusions.py

  expr-corpus-fresh:
    name: expression corpus JSON up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install PyYAML
      - run: bash scripts/check_expr_corpus.sh

  concept-corpus-fresh:
    name: concept corpus JSON up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install PyYAML
      - run: bash scripts/check_concept_corpus.sh

  concept-operations-corpus-fresh:
    name: concept-operation corpus JSON up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install PyYAML
      - run: bash scripts/check_concept_operations_corpus.sh

  concept-fitters-corpus-fresh:
    name: concept-fitter corpus JSON up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install PyYAML
      - run: bash scripts/check_concept_fitters_corpus.sh

  concept-constraints-corpus-fresh:
    name: concept-constraint corpus JSON up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install PyYAML
      - run: bash scripts/check_concept_constraints_corpus.sh

  genericity:
    name: Genericity policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Self-test the lint script
        run: python scripts/genericity_check_test.py
      - name: Run the lint
        run: python scripts/genericity_check.py

  rust:
    name: Rust tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cd jas_dioxus && cargo test

  python:
    name: Python tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Install from requirements.txt so the CI deps cannot drift from what the
      # app actually imports (msgpack in geometry/binary, reportlab in
      # geometry/pdf were declared there but omitted from the hardcoded list,
      # so binary_test / pdf_test / cross_language_test failed to collect).
      - run: pip install -r requirements.txt
      - run: cd jas && python -m pytest
      # The shared reference interpreter lives in workspace_interpreter/ — the
      # exact modules (effects, state_store, scope, doc_primitives, loader,
      # expr) every native app mirrors. `cd jas && pytest` does not discover it,
      # so gate the WHOLE suite explicitly, not just expr+concepts. Previously
      # only test_expr.py + test_concepts.py ran, so ~700 reference tests
      # (incl. the action-ref referential-integrity check) never gated CI.
      - name: Reference interpreter conformance (Python reference)
        run: python -m pytest workspace_interpreter/tests

  ocaml:
    name: OCaml tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.2"
      # alcotest is the test framework the jas_ocaml test/ dune files depend on
      # (libraries jas lablgtk3 alcotest) — it was missing from the install list
      # so `dune test` could not build the test executables.
      - run: opam install --yes dune lablgtk3 xmlm yojson alcotest msgpck camlzip
      - run: cd jas_ocaml && opam exec -- dune test

  swift:
    name: Swift tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      # Pin a recent Xcode: Tests/Document/WriteChokepointTests uses swift-testing
      # exit tests (`#expect(processExitsWith:)`), which need Swift 6.2+ (Xcode
      # 26+). The runner default was older, so the whole suite failed to compile.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - run: cd JasSwift && swift test

  # Flask is a non-gating reference renderer (TESTING_STRATEGY.md §6), so this
  # job does not block the merge (continue-on-error) — but it keeps the flask
  # reference renderer and its parked workspace-spec tests (Path B layout,
  # opacity/artboards/concepts panels) from rotting silently, as they had:
  # a stale test_all_menu_actions_exist was red here for lack of any CI.
  flask:
    name: Flask reference tests (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r jas_flask/requirements.txt
      - run: cd jas_flask && python -m pytest tests/

  cross-language:
    name: Cross-language equivalence
    needs: [rust, python, ocaml, swift]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.2"
      - run: pip install -r requirements.txt
      - run: opam install --yes dune lablgtk3 xmlm yojson alcotest msgpck camlzip
      # Pre-build exactly the binaries the equivalence drivers invoke, so the
      # first driver call does not compile inside its per-command timeout
      # (finding #25). The drivers run `swift run AlgorithmRoundtrip` (DEBUG),
      # `cargo run --bin algorithm_roundtrip`, and `dune exec` — so the Swift
      # build must be DEBUG (the old `swift build -c release` left the debug
      # binary to compile on-demand, timing out `measure swift` after 60s).
      - name: Build all
        run: |
          (cd jas_dioxus && cargo build --bins)
          (cd jas_ocaml && opam exec -- dune build)
          (cd JasSwift && swift build)
      - name: Algorithm equivalence
        run: opam exec -- python scripts/cross_language_algorithms.py
      - name: SVG commutativity
        run: opam exec -- python scripts/cross_language_commutativity.py
      - name: Workspace equivalence
        run: opam exec -- python scripts/cross_language_workspace.py
