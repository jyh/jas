name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  workspace-json-fresh:
    name: workspace.json up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install PyYAML
      - run: bash scripts/check_workspace_json.sh
      - run: python scripts/check_menu_structure.py
      - run: python scripts/check_toolbar_structure.py
      - run: python scripts/check_action_refs.py
      - run: bash scripts/check_panel_goldens.sh
      - run: python scripts/check_path_b_exclusions.py

  expr-corpus-fresh:
    name: expression corpus JSON up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install PyYAML
      - run: bash scripts/check_expr_corpus.sh

  concept-corpus-fresh:
    name: concept corpus JSON up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install PyYAML
      - run: bash scripts/check_concept_corpus.sh

  concept-operations-corpus-fresh:
    name: concept-operation corpus JSON up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install PyYAML
      - run: bash scripts/check_concept_operations_corpus.sh

  concept-fitters-corpus-fresh:
    name: concept-fitter corpus JSON up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install PyYAML
      - run: bash scripts/check_concept_fitters_corpus.sh

  concept-constraints-corpus-fresh:
    name: concept-constraint corpus JSON up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install PyYAML
      - run: bash scripts/check_concept_constraints_corpus.sh

  genericity:
    name: Genericity policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Self-test the lint script
        run: python scripts/genericity_check_test.py
      - name: Run the lint
        run: python scripts/genericity_check.py

  rust:
    name: Rust tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cd jas_dioxus && cargo test

  # The shared reference interpreter lives in workspace_interpreter/ — the
  # exact modules (effects, state_store, scope, doc_primitives, loader, expr)
  # every native app mirrors. It stays LIVE and BLOCKING under the
  # five-port-parity freeze (POLICY.md): it is the spec's executable meaning
  # and the corpus-authoring substrate.
  workspace-interpreter:
    name: Reference interpreter conformance (Python reference)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Install from requirements.txt so the CI deps cannot drift from what
      # the code actually imports.
      - run: pip install -r requirements.txt
      - run: python -m pytest workspace_interpreter/tests

  # The jas/ Qt app is FROZEN at the five-port-parity tag (POLICY.md): this
  # lane checks out the WHOLE repo at the tag — not just fixtures — because
  # the app imports live workspace_interpreter modules, so a HEAD checkout
  # would mix frozen app code with an evolving interpreter. Tag-pinned, the
  # job can only red on toolchain drift, which is exactly the canary signal;
  # continue-on-error keeps frozen-lane noise from blocking active work
  # (same pattern as the flask job).
  python-canary:
    name: Python Qt app (frozen toolchain canary)
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: five-port-parity
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Preflight — pinned inputs present
        run: test -f workspace/workspace.json && test -d test_fixtures/algorithms
      - run: cd jas && python -m pytest

  # jas_ocaml is FROZEN at the five-port-parity tag (POLICY.md): whole-repo
  # tag checkout pins its sources, test_fixtures/, and workspace/workspace.json
  # together. The preflight guards against a botched pin: several OCaml suites
  # Alcotest.skip (or pass vacuously) when the bundle is missing, so a bad
  # checkout would otherwise go green instead of red.
  ocaml-canary:
    name: OCaml (frozen toolchain canary)
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: five-port-parity
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.2"
      # alcotest is the test framework the jas_ocaml test/ dune files depend on
      # (libraries jas lablgtk3 alcotest).
      - run: opam install --yes dune lablgtk3 xmlm yojson alcotest msgpck camlzip
      - name: Preflight — pinned inputs present
        run: test -f workspace/workspace.json && test -d test_fixtures/algorithms
      - run: cd jas_ocaml && opam exec -- dune test

  swift:
    name: Swift tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      # Pin a recent Xcode: Tests/Document/WriteChokepointTests uses swift-testing
      # exit tests (`#expect(processExitsWith:)`), which need Swift 6.2+ (Xcode
      # 26+). The runner default was older, so the whole suite failed to compile.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - run: cd JasSwift && swift test

  # Flask is a non-gating reference renderer (TESTING_STRATEGY.md §6), so this
  # job does not block the merge (continue-on-error) — but it keeps the flask
  # reference renderer and its parked workspace-spec tests (Path B layout,
  # opacity/artboards/concepts panels) from rotting silently, as they had:
  # a stale test_all_menu_actions_exist was red here for lack of any CI.
  flask:
    name: Flask reference tests (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r jas_flask/requirements.txt
      - run: cd jas_flask && python -m pytest tests/

  # Blocking equivalence lane for the ACTIVE ports (Rust, Swift) per the
  # five-port-parity freeze (POLICY.md). The frozen ports' equivalence is
  # preserved at the tag their canary lanes check out; every driver cell here
  # is anchored to pinned goldens, not mutual agreement.
  cross-language:
    name: Cross-language equivalence (active ports)
    needs: [rust, swift]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Pre-build exactly the binaries the equivalence drivers invoke, so the
      # first driver call does not compile inside its per-command timeout
      # (finding #25). The drivers run `swift run AlgorithmRoundtrip` (DEBUG)
      # and `cargo run --bin ...` — so the Swift build must be DEBUG (the old
      # `swift build -c release` left the debug binary to compile on-demand,
      # timing out `measure swift` after 60s).
      - name: Build all
        run: |
          (cd jas_dioxus && cargo build --bins)
          (cd JasSwift && swift build)
      - name: Algorithm equivalence
        run: python scripts/cross_language_algorithms.py --lang rust,swift
      - name: SVG commutativity
        run: python scripts/cross_language_commutativity.py --lang rust,swift
      - name: Workspace equivalence
        run: python scripts/cross_language_workspace.py --lang rust,swift
